<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1800" viewBox="0 0 1200 1800" role="img" aria-labelledby="title desc">
  <title id="title">Hypothalamic Pituitary Testicular Axis</title>
  <desc id="desc">Educational medical diagram showing GnRH, FSH, LH, testosterone, ABP, inhibin, and spermatogenesis.</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0891b2"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#be123c"/>
    </marker>
    <marker id="arrow-black" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202020"/>
    </marker>
    <linearGradient id="tissue" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fee3a2"/>
      <stop offset="1" stop-color="#f6c96f"/>
    </linearGradient>
    <radialGradient id="cell" cx="50%" cy="50%" r="56%">
      <stop offset="0" stop-color="#f8b4c5"/>
      <stop offset="0.62" stop-color="#d982a5"/>
      <stop offset="1" stop-color="#8b3a6b"/>
    </radialGradient>
    <style>
      .frame { fill: #fffdf8; stroke: #2b6cb0; stroke-width: 5; }
      .panel { fill: #f6f0ff; stroke: #c4b5fd; stroke-width: 2; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 34px; fill: #171717; }
      .label-small { font-family: Arial, Helvetica, sans-serif; font-size: 28px; fill: #171717; }
      .hormone { font-family: Arial, Helvetica, sans-serif; font-size: 32px; font-weight: 700; fill: #0f172a; }
      .num { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; fill: #111827; }
      .blue { fill: none; stroke: #0891b2; stroke-width: 6; marker-end: url(#arrow-blue); stroke-linecap: round; }
      .red { fill: none; stroke: #be123c; stroke-width: 5; stroke-dasharray: 16 12; marker-end: url(#arrow-red); stroke-linecap: round; }
      .black { fill: none; stroke: #202020; stroke-width: 4; marker-end: url(#arrow-black); stroke-linecap: round; }
      .callout { fill: none; stroke: #202020; stroke-width: 3; stroke-linecap: round; }
      .cell-outline { fill: url(#cell); stroke: #6b2154; stroke-width: 3; }
      .nucleus { fill: #f4d5e4; stroke: #6b2154; stroke-width: 2; }
    </style>
  </defs>

  <rect x="12" y="12" width="1176" height="1776" class="frame"/>
  <text x="600" y="74" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#111827">
    Hypothalamic-Pituitary-Testicular Axis
  </text>

  <!-- Hypothalamus and anterior pituitary -->
  <rect x="66" y="116" width="412" height="435" rx="8" class="panel"/>
  <path d="M86 162 C130 122, 226 128, 266 164 C300 194, 292 242, 246 268 C214 286, 206 318, 232 346 C264 384, 310 394, 342 424 C372 454, 362 508, 304 520 C236 535, 162 504, 132 452 C102 400, 122 350, 152 320 C184 288, 176 244, 136 230 C104 218, 72 196, 86 162 Z" fill="#efd39c" stroke="#c59b5c" stroke-width="3"/>
  <ellipse cx="290" cy="420" rx="88" ry="92" fill="#ecd096" stroke="#c59b5c" stroke-width="3"/>
  <path d="M290 510 C286 560, 326 590, 364 620" fill="none" stroke="#c59b5c" stroke-width="10" stroke-linecap="round"/>
  <circle cx="224" cy="166" r="24" fill="#fff" stroke="#111827" stroke-width="3"/>
  <text x="224" y="177" text-anchor="middle" class="num">1</text>
  <circle cx="164" cy="428" r="24" fill="#fff" stroke="#111827" stroke-width="3"/>
  <text x="164" y="439" text-anchor="middle" class="num">2</text>
  <text x="150" y="250" class="hormone">GnRH</text>
  <path d="M224 204 C240 270, 260 330, 280 388" class="blue"/>
  <text x="500" y="170" class="label">Hypothalamus</text>
  <path d="M474 162 L318 170" class="callout"/>
  <text x="500" y="488" class="label">Anterior</text>
  <text x="500" y="526" class="label">pituitary</text>
  <path d="M478 495 L334 430" class="callout"/>

  <!-- Pituitary hormones -->
  <path d="M286 510 C230 635, 120 712, 72 850" class="blue"/>
  <text x="58" y="724" class="hormone">FSH</text>
  <path d="M330 515 C386 660, 480 715, 585 748" class="blue"/>
  <text x="314" y="664" class="hormone">LH</text>

  <!-- Leydig cells -->
  <g transform="translate(598 590)">
    <path d="M0 28 C20 -8, 82 -14, 112 22 C138 54, 118 106, 76 113 C30 121,-22 82,0 28 Z" class="cell-outline"/>
    <ellipse cx="56" cy="55" rx="27" ry="20" class="nucleus"/>
  </g>
  <g transform="translate(758 620) rotate(8)">
    <path d="M0 28 C20 -8, 82 -14, 112 22 C138 54, 118 106, 76 113 C30 121,-22 82,0 28 Z" class="cell-outline"/>
    <ellipse cx="56" cy="55" rx="27" ry="20" class="nucleus"/>
  </g>
  <g transform="translate(690 742) rotate(-7)">
    <path d="M0 28 C20 -8, 82 -14, 112 22 C138 54, 118 106, 76 113 C30 121,-22 82,0 28 Z" class="cell-outline"/>
    <ellipse cx="56" cy="55" rx="27" ry="20" class="nucleus"/>
  </g>
  <circle cx="612" cy="778" r="24" fill="#fff" stroke="#111827" stroke-width="3"/>
  <text x="612" y="789" text-anchor="middle" class="num">4</text>
  <text x="620" y="548" class="label-small">Leydig</text>
  <text x="620" y="583" class="label-small">cells</text>
  <path d="M390 668 C460 714, 524 742, 590 764" class="blue"/>
  <path d="M750 610 C780 560, 810 516, 840 482" class="blue"/>
  <text x="760" y="410" class="hormone">Testosterone</text>
  <path d="M780 810 C708 875, 638 896, 550 896" class="blue"/>
  <text x="344" y="818" class="label-small">To other</text>
  <text x="344" y="855" class="label-small">target tissues</text>

  <!-- Feedback loops -->
  <circle cx="856" cy="462" r="24" fill="#fff" stroke="#111827" stroke-width="3"/>
  <text x="856" y="473" text-anchor="middle" class="num">5</text>
  <text x="930" y="474" class="hormone">Inhibin</text>
  <path d="M880 520 C940 386, 880 232, 526 202" class="red"/>
  <path d="M926 1098 C1048 782, 1024 360, 524 316" class="red"/>

  <!-- Seminiferous tubule -->
  <path d="M40 1240 C190 1028, 342 970, 548 980 C770 990, 958 1032, 1160 1240 L1160 1634 L990 1634 C1008 1472, 930 1348, 810 1306 C682 1260, 524 1268, 402 1320 C284 1372, 216 1488, 230 1634 L40 1634 Z" fill="url(#tissue)" stroke="#d8a64f" stroke-width="4"/>
  <path d="M368 1302 C422 1138, 508 1058, 618 1036 C728 1058, 814 1138, 868 1302" fill="#f9e8b6" stroke="#8c6a32" stroke-width="5"/>
  <ellipse cx="618" cy="1162" rx="88" ry="46" fill="#f4c65f" stroke="#ad7b22" stroke-width="4"/>
  <text x="618" y="1174" text-anchor="middle" class="hormone">ABP</text>
  <path d="M586 1014 C548 936, 458 906, 270 830" class="blue"/>
  <path d="M750 840 C736 934, 696 1002, 642 1112" class="blue"/>
  <path d="M656 1205 C708 1250, 760 1290, 800 1364" class="blue"/>
  <path d="M590 1206 C540 1255, 498 1298, 464 1372" class="blue"/>
  <path d="M616 1207 L616 1410" class="blue"/>
  <path d="M550 1162 L470 1134" class="blue"/>
  <path d="M686 1162 L782 1138" class="blue"/>

  <!-- Sertoli and spermatogenic cells -->
  <g>
    <ellipse cx="460" cy="1060" rx="44" ry="44" fill="#f7d6bd" stroke="#b07a52" stroke-width="3"/>
    <circle cx="460" cy="1060" r="20" fill="#7e2f72"/>
    <ellipse cx="776" cy="1064" rx="44" ry="44" fill="#f7d6bd" stroke="#b07a52" stroke-width="3"/>
    <circle cx="776" cy="1064" r="20" fill="#7e2f72"/>
    <ellipse cx="500" cy="1224" rx="40" ry="40" fill="#f7d6bd" stroke="#b07a52" stroke-width="3"/>
    <circle cx="500" cy="1224" r="18" fill="#7e2f72"/>
    <ellipse cx="734" cy="1224" rx="40" ry="40" fill="#f7d6bd" stroke="#b07a52" stroke-width="3"/>
    <circle cx="734" cy="1224" r="18" fill="#7e2f72"/>
    <ellipse cx="544" cy="1362" rx="32" ry="40" fill="#f0b0a2" stroke="#a76555" stroke-width="3"/>
    <circle cx="544" cy="1362" r="15" fill="#6741a8"/>
    <ellipse cx="690" cy="1362" rx="32" ry="40" fill="#f0b0a2" stroke="#a76555" stroke-width="3"/>
    <circle cx="690" cy="1362" r="15" fill="#6741a8"/>
  </g>
  <path d="M166 1122 L426 1085" class="black"/>
  <text x="58" y="1098" class="label-small">Sertoli</text>
  <text x="58" y="1135" class="label-small">cell</text>
  <path d="M194 1310 L492 1242" class="black"/>
  <text x="58" y="1282" class="label-small">Spermatogenic</text>
  <text x="58" y="1319" class="label-small">cells</text>
  <path d="M1040 1042 L808 1068" class="black"/>
  <text x="890" y="998" class="label-small">Seminiferous</text>
  <text x="890" y="1035" class="label-small">tubule</text>
  <text x="862" y="1392" class="label-small">Spermatogenesis</text>

  <!-- Spermatozoa -->
  <g fill="none" stroke="#c77748" stroke-width="5" stroke-linecap="round">
    <path d="M520 1440 C494 1498, 520 1548, 468 1610 C430 1654, 440 1692, 498 1724"/>
    <path d="M574 1442 C558 1510, 604 1570, 562 1634 C536 1674, 550 1710, 618 1730"/>
    <path d="M640 1440 C670 1512, 634 1580, 690 1644 C730 1690, 708 1720, 656 1742"/>
    <path d="M702 1438 C744 1504, 734 1566, 792 1618 C838 1660, 826 1706, 770 1734"/>
  </g>
  <g>
    <ellipse cx="520" cy="1440" rx="16" ry="26" fill="#e96f50" stroke="#9d3a2a" stroke-width="3"/>
    <ellipse cx="574" cy="1442" rx="16" ry="26" fill="#e96f50" stroke="#9d3a2a" stroke-width="3"/>
    <ellipse cx="640" cy="1440" rx="16" ry="26" fill="#e96f50" stroke="#9d3a2a" stroke-width="3"/>
    <ellipse cx="702" cy="1438" rx="16" ry="26" fill="#e96f50" stroke="#9d3a2a" stroke-width="3"/>
  </g>

  <!-- Legend -->
  <rect x="38" y="1658" width="360" height="108" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="62" y="1692" class="label-small" font-weight="700">Key:</text>
  <line x1="62" y1="1722" x2="160" y2="1722" class="blue"/>
  <text x="178" y="1733" class="label-small">Stimulates</text>
  <line x1="62" y1="1758" x2="160" y2="1758" class="red"/>
  <text x="178" y="1769" class="label-small">Inhibits</text>
</svg>
