<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Đại Cương Ôn Bệnh</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
header{background:linear-gradient(135deg,#1e3a5f,#0f2744);padding:20px 24px;border-bottom:2px solid #2563eb}
header h1{font-size:1.5rem;color:#60a5fa;letter-spacing:.5px}
header p{font-size:.85rem;color:#94a3b8;margin-top:4px}
.tabs{display:flex;gap:0;background:#1e293b;border-bottom:2px solid #334155}
.tab-btn{flex:1;padding:14px;cursor:pointer;background:none;border:none;color:#94a3b8;font-size:.95rem;font-weight:600;transition:all .2s;border-bottom:3px solid transparent}
.tab-btn.active{color:#60a5fa;border-bottom-color:#2563eb;background:#0f172a}
.tab-btn:hover:not(.active){background:#334155;color:#e2e8f0}
.tab-content{display:none;padding:20px 16px}
.tab-content.active{display:block}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;font-size:.8rem;transition:all .2s}
.filter-btn.active{background:#2563eb;color:#fff;border-color:#2563eb}
.stats-bar{display:flex;gap:16px;margin-bottom:16px;padding:10px 16px;background:#1e293b;border-radius:8px;font-size:.85rem;flex-wrap:wrap}
.stat{color:#94a3b8}.stat span{color:#60a5fa;font-weight:700}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card-wrap{perspective:1000px;height:200px;cursor:pointer}
.card-wrap.tall{height:280px}
.card-inner{position:relative;width:100%;height:100%;transition:transform .55s;transform-style:preserve-3d}
.card-wrap.flipped .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;padding:16px;display:flex;flex-direction:column;justify-content:space-between}
.card-front{background:linear-gradient(135deg,#1e3a5f,#0f2744);border:1px solid #2563eb}
.card-back{background:linear-gradient(135deg,#14532d,#052e16);border:1px solid #16a34a;transform:rotateY(180deg)}
.card-topic{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.85;margin-bottom:8px}
.card-q{font-size:.9rem;line-height:1.5;flex:1;display:flex;align-items:center}
.card-a{font-size:.82rem;line-height:1.55;flex:1;overflow-y:auto}
.card-a ul{padding-left:16px}.card-a li{margin-bottom:3px}
.card-hint{font-size:.7rem;color:#64748b;text-align:right}
.mcq-progress{margin-bottom:20px}
.progress-bar{height:6px;background:#1e293b;border-radius:3px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#2563eb,#16a34a);transition:width .4s;border-radius:3px}
.question-card{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #334155;transition:border-color .3s}
.question-card.correct{border-color:#16a34a;background:#0f2d1a}
.question-card.wrong{border-color:#dc2626;background:#2d0f0f}
.q-header{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap}
.q-num{background:#2563eb;color:#fff;border-radius:6px;padding:2px 8px;font-size:.75rem;font-weight:700;white-space:nowrap}
.q-topic-tag{background:#334155;color:#94a3b8;border-radius:6px;padding:2px 8px;font-size:.72rem}
.q-bloom{background:#7c3aed33;color:#a78bfa;border-radius:6px;padding:2px 8px;font-size:.72rem}
.q-stem{font-size:.92rem;line-height:1.6;color:#e2e8f0;margin-bottom:14px;font-weight:500}
.q-scenario{background:#0f172a;border-left:3px solid #2563eb;padding:10px 14px;border-radius:4px;font-size:.85rem;color:#94a3b8;margin-bottom:12px;line-height:1.6}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.option{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:8px;border:1px solid #334155;cursor:pointer;transition:all .2s;background:#0f172a}
.option:hover:not(.disabled){background:#1e3a5f;border-color:#2563eb}
.option.selected{background:#1e3a5f;border-color:#2563eb}
.option.correct-ans{background:#052e16;border-color:#16a34a;color:#4ade80}
.option.wrong-ans{background:#2d0f0f;border-color:#dc2626;color:#f87171}
.option.disabled{cursor:default}
.opt-label{font-weight:700;min-width:20px;color:#60a5fa}
.opt-text{font-size:.88rem;line-height:1.5}
.reveal-btn{padding:8px 18px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s}
.reveal-btn:hover{background:#1d4ed8}
.reveal-btn:disabled{background:#334155;color:#64748b;cursor:default}
.explanation{display:none;margin-top:12px;padding:14px;background:#0f172a;border-radius:8px;border:1px solid #334155}
.explanation.show{display:block}
.exp-correct{color:#4ade80;font-weight:700;margin-bottom:8px}
.exp-text{font-size:.85rem;line-height:1.6;color:#cbd5e1}
.exp-key{font-size:.82rem;color:#fbbf24;margin-top:8px;font-style:italic}
.hidden{display:none!important}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0f172a}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
.reset-btn{padding:8px 18px;background:#334155;color:#e2e8f0;border:none;border-radius:8px;cursor:pointer;font-size:.85rem;transition:all .2s;margin-left:auto;display:block}
.reset-btn:hover{background:#475569}
.empty{color:#64748b;font-size:.9rem;padding:20px;text-align:center}
</style>
</head>
<body>
<header>
  <h1>🌡️ Đại Cương Ôn Bệnh</h1>
  <p>Ôn Bệnh học — KB on_benh_dai_cuong (Giáo trình Ôn Bệnh, ĐH Y Dược Cần Thơ, 2024)</p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('fc')" id="tab-btn-fc">🃏 Flashcard</button>
  <button class="tab-btn" onclick="switchTab('mcq')" id="tab-btn-mcq">📝 MCQ (SBA)</button>
</div>

<div id="tab-fc" class="tab-content active">
  <div class="stats-bar">
    <div class="stat">Tổng: <span id="fc-total">0</span> thẻ</div>
    <div class="stat">Đã lật: <span id="fc-flipped">0</span></div>
    <div class="stat">Chủ đề: <span id="fc-topics">0</span></div>
  </div>
  <div class="filters" id="fc-filters"></div>
  <div class="cards-grid" id="fc-grid"></div>
</div>

<div id="tab-mcq" class="tab-content">
  <div class="mcq-progress">
    <div class="stats-bar">
      <div class="stat">Đã trả lời: <span id="mcq-answered">0</span>/<span id="mcq-total">0</span></div>
      <div class="stat">Đúng: <span id="mcq-correct-count">0</span></div>
      <div class="stat">Tỉ lệ: <span id="mcq-pct">0%</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="mcq-bar" style="width:0%"></div></div>
  </div>
  <div class="filters" id="mcq-filters"></div>
  <button class="reset-btn" onclick="resetMCQ()">↺ Reset bài</button>
  <div id="mcq-list" style="margin-top:16px"></div>
</div>

<script>
const TOPICS = ["Lịch sử & Y gia","Khái niệm & Đặc điểm","Phân loại & So sánh Thương hàn","Biện chứng Vệ-Khí-Dinh-Huyết","Ứng dụng lâm sàng","Nguyên tắc điều trị Ôn bệnh","Phương dược theo giai đoạn bệnh","Ca lâm sàng & Tích hợp YHHĐ","Đại cương bệnh truyền nhiễm & Ôn bệnh","Nguyên tắc điều trị Vệ-Khí-Dinh-Huyết","Phương dược theo giai đoạn bệnh","Ca lâm sàng & Tích hợp YHHĐ","Chẩn đoán Ôn bệnh nhi khoa (Sởi, Thủy đậu, Quai bị)","Chẩn đoán Ôn bệnh nội khoa (SXH Dengue, Viêm gan)"];
const COLORS = {"Lịch sử & Y gia":"#0ea5e9","Khái niệm & Đặc điểm":"#f59e0b","Phân loại & So sánh Thương hàn":"#3b82f6","Biện chứng Vệ-Khí-Dinh-Huyết":"#8b5cf6","Ứng dụng lâm sàng":"#10b981","Nguyên tắc điều trị Ôn bệnh":"#ef4444","Phương dược theo giai đoạn bệnh":"#14b8a6","Ca lâm sàng & Tích hợp YHHĐ":"#a855f7","Đại cương bệnh truyền nhiễm & Ôn bệnh":"#0ea5e9","Nguyên tắc điều trị Vệ-Khí-Dinh-Huyết":"#8b5cf6","Chẩn đoán Ôn bệnh nhi khoa (Sởi, Thủy đậu, Quai bị)":"#f59e0b","Chẩn đoán Ôn bệnh nội khoa (SXH Dengue, Viêm gan)":"#ef4444"};
const flashcards = [];
const mcqs = [{"scenario":"","stem":"Người sáng lập Vệ, khí, dinh, huyết biện chứng là:","opts":["A. Diệp Thiên Sĩ","B. Trương Trọng Cảnh","C. Ngô Cúc Thông","D. Quách Ung"],"ans":"A","exp":"Diệp Thiên Sĩ (đời Thanh) qua \"Ôn nhiệt luận\" là người đầu tiên sáng lập lý luận Vệ-Khí-Dinh-Huyết biện chứng. Trương Trọng Cảnh viết Thương hàn luận (lục kinh biện chứng); Ngô Cúc Thông sáng lập Tam tiêu biện chứng; Quách Ung là y gia đời Tống bàn về khái niệm Ôn bệnh, không liên quan Vệ-Khí-Dinh-Huyết.","key":"Diệp Thiên Sĩ = Vệ-Khí-Dinh-Huyết.","id":1,"topic":"Lịch sử & Y gia","bloom":"Nhớ"},{"scenario":"","stem":"Người sáng lập Tam tiêu biện chứng là:","opts":["A. Diệp Thiên Sĩ","B. Trương Trọng Cảnh","C. Ngô Cúc Thông","D. Quách Ung"],"ans":"C","exp":"Ngô Cúc Thông kế thừa Diệp Thiên Sĩ, viết \"Ôn bệnh điều biện\", sáng lập Tam tiêu biện chứng bổ sung chỗ thiếu của Vệ-Khí-Dinh-Huyết. Các đáp án khác không phải tác giả Tam tiêu biện chứng.","key":"Ngô Cúc Thông = Tam tiêu biện chứng.","id":2,"topic":"Lịch sử & Y gia","bloom":"Nhớ"},{"scenario":"","stem":"Thuyết Phục khí Ôn bệnh phát vào mùa xuân xuất phát từ:","opts":["A. Ngô Hựu Khả","B. Nội kinh","C. Chu Dương Tuấn","D. Vương Mạnh Anh"],"ans":"B","exp":"Thuyết này bắt nguồn từ Nội kinh: thu đông cảm hàn tà, phát bệnh trước hạ chí gọi Ôn bệnh, sau hạ chí gọi Thử bệnh. Ngô Hựu Khả bàn về ôn dịch/lệ khí; Chu Dương Tuấn phân biệt Ôn/Dịch; Vương Mạnh Anh cho Ôn bệnh là ôn nhiệt bệnh.","key":"Phục khí xuân ôn → gốc Nội kinh.","id":3,"topic":"Lịch sử & Y gia","bloom":"Nhớ"},{"scenario":"","stem":"Y gia nói \"Một người bị bệnh gọi là Ôn, một địa phương nhiều người bị bệnh giống nhau gọi là Dịch\" là:","opts":["A. Ngô Hựu Khả","B. Nội kinh","C. Chu Dương Tuấn","D. Vương Mạnh Anh"],"ans":"C","exp":"Câu này là của Chu Dương Tuấn, dùng phân biệt Ôn bệnh (bệnh lẻ tẻ từng người) với Ôn dịch (bệnh hàng loạt).","key":"Chu Dương Tuấn phân biệt Ôn – Dịch.","id":4,"topic":"Lịch sử & Y gia","bloom":"Nhớ"},{"scenario":"","stem":"Sự phát triển của Ôn bệnh được chia làm mấy thời kỳ?","opts":["A. 4","B. 5","C. 6","D. 7"],"ans":"A","exp":"Giáo trình chia 4 thời kỳ: Chiến quốc-Tần Đường, Tống Kim Nguyên, Minh Thanh, cận đại.","key":"4 thời kỳ phát triển Ôn bệnh học.","id":5,"topic":"Lịch sử & Y gia","bloom":"Nhớ"},{"scenario":"","stem":"Thời Tống, y gia nào viết câu này: \"phong ôn, thấp ôn trong Ôn bệnh nếu dựa vào Thương hàn phát hãn thì thập tử vô nhất sinh\"?","opts":["A. Vương Thúc Hòa","B. Mang An Thường","C. Chu Quảng","D. Lưu Hà Gian"],"ans":"B","exp":"Mang An Thường (đời Tống) nêu trong Thương hàn tổng bệnh luận. Vương Thúc Hòa là đời Tấn (phục hàn hóa nhiệt, thời hành chi khí); Chu Quảng bàn gia giảm Quế chi thang theo mùa; Lưu Hà Gian là tứ đại y gia Kim Nguyên, khai sáng thanh nhiệt giải độc.","key":"Mang An Thường – cảnh báo phát hãn sai ở phong/thấp ôn.","id":6,"topic":"Lịch sử & Y gia","bloom":"Nhớ"},{"scenario":"","stem":"Thời Kim, Nguyên, người khai sáng phương pháp \"thanh nhiệt giải độc\" là:","opts":["A. Vương An Đạo","B. Tôn Tư Hạo","C. Lưu Hà Gian","D. Chu Quảng"],"ans":"C","exp":"Lưu Hà Gian cho lục khí đều từ hỏa hóa ra, sáng chế Song giải tán, Phòng phong thông thánh tán, người đầu tiên khai sáng thanh nhiệt giải độc (\"Thương hàn tôn Trọng Cảnh, Nhiệt bệnh sùng Hà Gian\"). Vương An Đạo phân biệt rạch ròi Ôn bệnh–Thương hàn; Tôn Tư Hạo là đời Đường (Uy nhuy thang); Chu Quảng là đời Tống.","key":"Lưu Hà Gian = thanh nhiệt giải độc.","id":7,"topic":"Lịch sử & Y gia","bloom":"Nhớ"},{"scenario":"","stem":"Đời Đường, y gia nào đã kê \"Uy Nhuy thang\", sau trở thành phương \"Tư âm giải biểu\"?","opts":["A. Mang An Thường","B. Tôn Tư Hạo","C. Lưu Hà Gian","D. Vương Thúc Hòa"],"ans":"B","exp":"Tôn Tư Hạo trong \"Bị cấp thiên kim yếu phương\" liệt kê 10 phương trong đó có Uy nhuy thang, sau được gia giảm thành phương tư âm giải biểu chữa âm hư ngoại cảm biểu chứng.","key":"Tôn Tư Hạo – Uy nhuy thang.","id":8,"topic":"Lịch sử & Y gia","bloom":"Nhớ"},{"scenario":"","stem":"Thời nhà Nguyên, y gia nào đã viết \"Ôn bệnh không thể nhầm lẫn với Thương hàn\"?","opts":["A. Vương An Đạo","B. Tôn Tư Hạo","C. Lưu Hà Gian","D. Mang An Thường"],"ans":"A","exp":"Vương An Đạo (cuối đời Nguyên), trong \"Y kinh tố hồi tập\", là người đầu tiên phân biệt rạch ròi Ôn bệnh với Thương hàn, nhấn mạnh pháp trị Ôn bệnh là thanh lý nhiệt là chính.","key":"Vương An Đạo – tách Ôn bệnh khỏi Thương hàn.","id":9,"topic":"Lịch sử & Y gia","bloom":"Nhớ"},{"scenario":"","stem":"Theo Ngô Cúc Thông, trong \"Ôn bệnh điều biện\", có bao nhiêu loại ngoại cảm nhiệt bệnh?","opts":["A. 9","B. 10","C. 11","D. 12"],"ans":"A","exp":"Ngô Cúc Thông liệt kê 9 loại: phong ôn, ôn nhiệt, ôn dịch, ôn độc, thử ôn, thấp ôn, thu táo, đông ôn, ôn ngược.","key":"Ôn bệnh điều biện = 9 loại ngoại cảm nhiệt bệnh.","id":10,"topic":"Khái niệm & Đặc điểm","bloom":"Nhớ"},{"scenario":"","stem":"Ôn bệnh có mấy tính chất?","opts":["A. 4","B. 5","C. 6","D. 7"],"ans":"B","exp":"5 tính chất: truyền nhiễm, lưu hành, thời tiết, khu vực, giai đoạn.","key":"5 tính chất gây bệnh của Ôn bệnh.","id":11,"topic":"Khái niệm & Đặc điểm","bloom":"Nhớ"},{"scenario":"","stem":"Bệnh Tây y nào thuộc Ôn bệnh?","opts":["A. Sởi","B. Bệnh dại","C. Bệnh uốn ván","D. Bệnh ký sinh trùng"],"ans":"A","exp":"Sởi nằm trong nhóm bệnh cấp tính lây nhiễm có đặc điểm Ôn bệnh cùng cúm, quai bị, viêm não B, sốt xuất huyết... Uốn ván và đa số bệnh ký sinh trùng tuy có tính truyền nhiễm nhưng không mang đặc tính Ôn bệnh nên không xếp vào; bệnh dại không được liệt kê trong giáo trình.","key":"Sởi = bệnh Tây y thuộc phạm vi Ôn bệnh.","id":12,"topic":"Khái niệm & Đặc điểm","bloom":"Nhớ"},{"scenario":"","stem":"Ôn bệnh có mấy giai đoạn?","opts":["A. 3","B. 4","C. 5","D. 6"],"ans":"C","exp":"5 giai đoạn theo tính giai đoạn: tà tại vệ phần, tà tại khí phần, tà tại dinh phần, tà tại huyết phần, giai đoạn hồi phục.","key":"Vệ-Khí-Dinh-Huyết + Hồi phục = 5 giai đoạn.","id":13,"topic":"Khái niệm & Đặc điểm","bloom":"Nhớ"},{"scenario":"","stem":"Có mấy biểu hiện lâm sàng của Ôn bệnh?","opts":["A. 7","B. 6","C. 5","D. 4"],"ans":"D","exp":"4 biểu hiện: khởi bệnh/truyền biến cấp nhanh; phát nhiệt là chủ chứng; xuất hiện chứng hầu nguy hiểm; hao âm thương tân.","key":"4 biểu hiện lâm sàng chung của Ôn bệnh.","id":14,"topic":"Khái niệm & Đặc điểm","bloom":"Nhớ"},{"scenario":"","stem":"Những chứng hầu nguy hiểm của ôn bệnh là:","opts":["A. Ban chẩn, co giật","B. Co giật, thổ huyết, tiện huyết","C. Khạc huyết, thổ huyết, tiện huyết, niệu huyết, co giật, ban chẩn","D. Tiện huyết, niệu huyết"],"ans":"C","exp":"Giáo trình liệt kê đầy đủ: ban chẩn, động phong (co giật), động huyết (khạc huyết, thổ huyết, tiện huyết, niệu huyết, xuất huyết âm đạo), bế khiếu. Các đáp án khác chỉ liệt kê một phần.","key":"Chứng hầu nguy hiểm gồm ban chẩn + động phong + động huyết (đa vị trí) + bế khiếu.","id":15,"topic":"Khái niệm & Đặc điểm","bloom":"Nhớ"},{"scenario":"","stem":"Có bao nhiêu cách phân loại ôn bệnh?","opts":["A. 8","B. 9","C. 10","D. 11"],"ans":"D","exp":"Mục \"Phân loại\" của giáo trình gồm 11 tiểu mục: 3 cách phân loại tổng quát (theo tính chất bệnh chứng; theo phát bệnh & biểu lý; theo vị trí phát bệnh) và 8 loại bệnh cụ thể theo mùa/chủ khí (phong ôn, xuân ôn, thử ôn, thấp ôn, thu táo, phục thử, đông ôn, ôn độc).","key":"11 mục phân loại Ôn bệnh trong giáo trình.","id":16,"topic":"Khái niệm & Đặc điểm","bloom":"Nhớ"},{"scenario":"","stem":"Điều đúng về Phong ôn (trong Ôn bệnh học)","opts":["A. Bệnh cơ vệ dương bị uất hóa nhiệt nhập lý; lục kinh truyền biến theo thứ tự","B. Triệu chứng: ố hàn phát nhiệt, đau đầu, đau mình, rêu lưỡi trắng mỏng, mạch phù khẩn","C. Đường xâm nhập từ da và Bàng quang kinh","D. Nguyên nhân do Phong nhiệt bệnh tà"],"ans":"D","exp":"Theo bảng so sánh, Phong ôn do Phong nhiệt bệnh tà gây ra, xâm nhập từ miệng mũi vào thủ Thái âm Phế kinh, bệnh cơ dễ hóa táo thương âm, truyền biến qua Vệ-Khí-Dinh-Huyết. Các phương án A, B, C mô tả đặc điểm của Thương hàn (phong hàn tà, đường da/Bàng quang kinh, lục kinh truyền biến), không phải Phong ôn.","key":"Phong ôn = Phong nhiệt bệnh tà, vào Phế kinh.","id":17,"topic":"Phân loại & So sánh Thương hàn","bloom":"Hiểu"},{"scenario":"","stem":"Điều đúng về Thương hàn (trong Thương hàn luận)","opts":["A. Đường xâm nhập từ miệng, mũi và Phế kinh","B. Bệnh cơ vệ dương bị uất hóa nhiệt nhập lý; lục kinh truyền biến theo thứ tự","C. Nguyên nhân do Phong nhiệt bệnh tà","D. Bệnh cơ dễ hóa táo thương âm, truyền biến nhanh"],"ans":"B","exp":"Thương hàn do Phong hàn bệnh tà, xâm nhập từ da vào túc Thái dương Bàng quang kinh, bệnh cơ hàn thúc cơ biểu, vệ dương uất hóa nhiệt nhập lý, truyền biến theo lục kinh, cuối cùng dễ tổn thương dương khí. A, C, D là đặc điểm của Phong ôn.","key":"Thương hàn = phong hàn tà, lục kinh truyền biến.","id":18,"topic":"Phân loại & So sánh Thương hàn","bloom":"Hiểu"},{"scenario":"","stem":"Quan hệ giữa Ôn bệnh học và Thương hàn luận là","opts":["A. Thương hàn luận hàm chứa Ôn bệnh học","B. Ôn bệnh học và Thương hàn luận là hai bệnh lý độc lập","C. Mối quan hệ kế thừa và phát triển","D. Ôn bệnh học bao gồm Thương hàn luận"],"ans":"C","exp":"Giáo trình kết luận: học thuyết Ôn bệnh phát triển trên cơ sở Thương hàn luận, dần hình thành hệ lý luận riêng — quan hệ kế thừa và phát triển, không phải bao hàm lẫn nhau hay độc lập hoàn toàn.","key":"Ôn bệnh học kế thừa & phát triển từ Thương hàn luận.","id":19,"topic":"Phân loại & So sánh Thương hàn","bloom":"Hiểu"},{"scenario":"","stem":"Đặc điểm chủ yếu nhất của Ôn bệnh là gì?","opts":["A. Đau bụng và tiêu chảy","B. Phát nhiệt là chủ chứng, dễ hóa táo thương âm","C. Ho kéo dài và suy nhược","D. Khởi phát từ nội thương"],"ans":"B","exp":"Đây là định nghĩa cốt lõi: Ôn bệnh là ngoại cảm nhiệt bệnh cấp tính, phát nhiệt là chủ chứng, dễ hóa táo thương âm — hoàn toàn loại trừ bệnh nội thương.","key":"Phát nhiệt + dễ thương âm = bản chất Ôn bệnh.","id":20,"topic":"Phân loại & So sánh Thương hàn","bloom":"Hiểu"},{"scenario":"","stem":"Người sáng lập hệ thống biện chứng Vệ – Khí – Dinh – Huyết là ai?","opts":["A. Ngô Hựu Khả","B. Vương An Đạo","C. Diệp Thiên Sĩ","D. Tiết Sinh Bạch"],"ans":"C","exp":"Diệp Thiên Sĩ, qua \"Ôn nhiệt luận\", lần đầu nêu thuyết Vệ-Khí-Dinh-Huyết làm căn cứ biện chứng Ôn bệnh.","key":"Diệp Thiên Sĩ = Vệ-Khí-Dinh-Huyết.","id":21,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Áp dụng"},{"scenario":"Bệnh nhân sốt cao, khát nước nhiều, miệng khô, mồ hôi nhiều, đại tiện táo.","stem":"Theo học thuyết Ôn bệnh, đặc điểm bệnh lý nổi bật nhất là:","opts":["A. Hàn tà ngưng trệ","B. Thấp tà khốn tỳ","C. Nhiệt thịnh, dễ hao tân thương âm","D. Khí huyết hư suy"],"ans":"C","exp":"Sốt cao, khát nhiều, mồ hôi nhiều, táo bón là biểu hiện lý nhiệt thịnh gây hao tổn tân dịch — đúng bản chất \"nhiệt thiên thịnh, dễ hóa táo thương âm\" của Ôn bệnh.","key":"Sốt cao + khát + táo = nhiệt thịnh thương âm.","id":22,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Áp dụng"},{"scenario":"Một bệnh nhân mắc bệnh truyền nhiễm cấp tính, sốt cao, khởi phát nhanh.","stem":"Theo Ôn bệnh học, giai đoạn đầu thường là:","opts":["A. Huyết phần","B. Dinh phần","C. Khí phần","D. Vệ phần"],"ans":"D","exp":"Ôn tà sơ khởi xâm phạm cơ thể, bệnh biến đa số tại Vệ phần trước, sau đó mới truyền dần vào Khí, Dinh, Huyết.","key":"Khởi phát Ôn bệnh = Vệ phần.","id":23,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Áp dụng"},{"scenario":"Bệnh nhân sốt cao, tâm phiền, lưỡi đỏ, mạch sác, xuất hiện chảy máu cam.","stem":"Nhiều khả năng bệnh tà đã truyền đến:","opts":["A. Vệ phần","B. Khí phần","C. Dinh phần","D. Huyết phần"],"ans":"D","exp":"Chảy máu cam (nục huyết) là biểu hiện \"động huyết\" — nhiệt thịnh bức huyết vọng hành, đặc trưng của Huyết phần (xuất huyết đa nơi khác với Dinh phần chỉ có ban chẩn ẩn hiện, tâm phiền, chiêm ngữ).","key":"Xuất huyết rõ = dấu hiệu Huyết phần.","id":24,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Áp dụng"},{"scenario":"Một bệnh nhân sốt, khát nước dữ dội, lưỡi đỏ thẫm, ít rêu.","stem":"Triệu chứng này phản ánh tổn thương chủ yếu:","opts":["A. Vị âm","B. Phế khí","C. Tỳ dương","D. Thận dương"],"ans":"A","exp":"Khát nhiều muốn uống nước, lưỡi đỏ thẫm không rêu (quang bóng như gương) là dấu hiệu tổn thương Vị âm ở trung tiêu.","key":"Khát dữ dội + lưỡi đỏ thẫm ít rêu = Vị âm thương.","id":25,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Áp dụng"},{"scenario":"Bệnh nhân sốt, co giật, mê sảng.","stem":"Theo lý luận Ôn bệnh, cơ chế phù hợp nhất là:","opts":["A. Hàn tà nhập lý","B. Thấp tà khốn tỳ","C. Nhiệt tà nội hãm tâm dinh, dẫn động can phong","D. Khí hư hạ hãm"],"ans":"C","exp":"Ôn tà nội hãm tâm dinh gây bế khiếu (mê sảng) hoặc dẫn động can phong gây co giật — đây là cơ chế chuẩn của \"chứng hầu nguy hiểm\" trong Ôn bệnh.","key":"Co giật + mê sảng = nhiệt hãm tâm dinh động can phong.","id":26,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Áp dụng"},{"scenario":"Bệnh nhân sốt cao, khát nước, mê sảng, ban xuất huyết.","stem":"Chuỗi truyền biến phù hợp nhất là:","opts":["A. Vệ → Khí → Dinh → Huyết","B. Khí → Vệ → Dinh → Huyết","C. Dinh → Khí → Huyết → Vệ","D. Huyết → Dinh → Khí → Vệ"],"ans":"A","exp":"Đây là chiều truyền biến chuẩn từ ngoài vào trong, từ nhẹ đến nặng của Ôn bệnh: Vệ phần → Khí phần → Dinh phần → Huyết phần.","key":"Vệ→Khí→Dinh→Huyết = chiều truyền biến kinh điển.","id":27,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Áp dụng"},{"scenario":"Một bệnh nhân sốt kéo dài, ban đầu sốt nhẹ, ngực bụng đầy tức, rêu lưỡi nhớt; sau đó xuất hiện miệng khô, lưỡi đỏ, ít tân dịch.","stem":"Quá trình này cho thấy:","opts":["A. Hàn tà hóa nhiệt","B. Thấp nhiệt hóa táo, hao thương âm tân","C. Dương khí phục hồi","D. Huyết hư sinh phong"],"ans":"B","exp":"Đặc trưng của thấp nhiệt Ôn bệnh: khởi bệnh chậm, thấp nhiệt kèm nhau, về sau thấp nhiệt hóa táo hóa hỏa mới gây hao thương âm tân dịch — quá trình diễn tiến từ từ đúng như mô tả.","key":"Thấp ôn diễn tiến chậm → hóa táo hao âm về sau.","id":28,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Áp dụng"},{"scenario":"Bệnh nhân sốt cao, xuất huyết dưới da, tiểu máu.","stem":"Theo lý luận Ôn bệnh, nguyên nhân trực tiếp nhất là:","opts":["A. Thấp tà khốn tỳ","B. Hàn tà ngưng trệ huyết mạch","C. Nhiệt thịnh bức huyết vọng hành","D. Khí hư bất nhiếp huyết"],"ans":"C","exp":"Nhiệt thịnh bức huyết vọng hành là cơ chế trực tiếp gây xuất huyết đa nơi (khạc huyết, thổ huyết, tiện huyết, niệu huyết...) trong Ôn bệnh giai đoạn Huyết phần.","key":"Nhiệt bức huyết vọng hành = xuất huyết Ôn bệnh.","id":29,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Áp dụng"},{"scenario":"Một địa phương xuất hiện nhiều người mắc cùng một bệnh truyền nhiễm trong thời gian ngắn.","stem":"Theo Chu Dương Tuấn, tình huống này được gọi là:","opts":["A. Thương hàn","B. Ôn bệnh","C. Dịch","D. Nội thương"],"ans":"C","exp":"Theo định nghĩa của Chu Dương Tuấn, nhiều người cùng mắc bệnh giống nhau tại một địa phương gọi là Dịch (khác với Ôn — bệnh lẻ tẻ từng người).","key":"Nhiều người cùng bệnh giống nhau = Dịch.","id":30,"topic":"Ứng dụng lâm sàng","bloom":"Áp dụng"},{"scenario":"","stem":"Nguyên tắc điều trị ban đầu của phong ôn là:","opts":["A. Tân ôn giải biểu","B. Công hạ tả nhiệt","C. Tân lương giải biểu","D. Bổ khí dưỡng huyết"],"ans":"C","exp":"Phong ôn do phong nhiệt (dương tà) gây bệnh, biến nhiệt nhanh nên điều trị ban đầu dùng thuốc tân lương giải biểu (khác Thương hàn dùng tân ôn giải biểu vì do hàn tà).","key":"Phong ôn khởi phát → tân lương giải biểu.","id":31,"topic":"Ứng dụng lâm sàng","bloom":"Áp dụng"},{"scenario":"Một bệnh nhân mắc bệnh vào cuối hạ, sốt không cao, nặng đầu, ngực bụng đầy tức, rêu lưỡi nhớt.","stem":"Loại Ôn bệnh phù hợp nhất là:","opts":["A. Phong ôn","B. Xuân ôn","C. Thấp ôn","D. Thu táo"],"ans":"C","exp":"Thấp ôn xuất hiện vào cuối hạ (nhiều mưa, ẩm thấp), khởi bệnh chậm, sơ khởi hiện tượng nhiệt không rõ, kèm triệu chứng thấp trệ (nặng đầu, ngực bụng đầy tức, rêu nhớt) — đúng đặc điểm thể vệ khí đồng bệnh/thấp nhiệt uất trở trung tiêu.","key":"Cuối hạ + rêu nhớt + đầy tức = Thấp ôn.","id":32,"topic":"Ứng dụng lâm sàng","bloom":"Áp dụng"},{"scenario":"Một người bị sốt sau khi tiếp xúc lâu với thời tiết nắng nóng gay gắt.","stem":"Trường hợp này thuộc phạm vi Ôn bệnh chủ yếu vì:","opts":["A. Có tính di truyền","B. Có đặc tính nhiệt bệnh cấp tính","C. Có đặc tính miễn dịch","D. Có tính tự miễn"],"ans":"B","exp":"Trúng thử (say nắng) tuy không có tính lây truyền nhưng vẫn thuộc phạm vi Ôn bệnh vì mang đặc tính ngoại cảm nhiệt bệnh cấp tính — không phải mọi Ôn bệnh đều cần tính truyền nhiễm.","key":"Trúng thử = Ôn bệnh không lây nhưng có tính nhiệt cấp.","id":33,"topic":"Ứng dụng lâm sàng","bloom":"Áp dụng"},{"scenario":"","stem":"Một bệnh truyền nhiễm lây lan nhanh trên phạm vi toàn cầu được gọi là:","opts":["A. Tản phát","B. Địa phương lưu hành","C. Đại dịch","D. Nội dịch"],"ans":"C","exp":"Theo tính lưu hành, phạm vi lan rộng cực lớn thậm chí toàn thế giới gọi là đại dịch đang lưu hành (khác \"thiên hành\" nhỏ hẹp hơn theo Mang An Thường).","key":"Lây toàn cầu = đại dịch.","id":34,"topic":"Ứng dụng lâm sàng","bloom":"Áp dụng"},{"scenario":"Một bệnh nhân khởi phát bệnh ngay sau khi cảm nhiễm ngoại tà và biểu hiện ban đầu là biểu nhiệt.","stem":"Đây là:","opts":["A. Phục tà ôn bệnh","B. Tân cảm ôn bệnh","C. Nội thương phát nhiệt","D. Hư lao phát nhiệt"],"ans":"B","exp":"Cảm tà lập tức phát bệnh tại biểu, biểu hiện chủ yếu là biểu nhiệt chứng (như phong ôn, thu táo) — đây là Tân cảm Ôn bệnh, khác Phục tà ôn bệnh (tà phục tàng, phát tại lý, sơ khởi lý nhiệt là chính, như xuân ôn, phục thử).","key":"Phát ngay + biểu nhiệt = Tân cảm ôn bệnh.","id":35,"topic":"Ứng dụng lâm sàng","bloom":"Áp dụng"},{"scenario":"","stem":"Điểm khác biệt quan trọng nhất giữa phong ôn và thương hàn ở giai đoạn khởi phát là:","opts":["A. Đều do phong hàn gây nên, và truyền biến theo lục kinh","B. Đều điều trị bằng tân ôn giải biểu","C. Phong ôn thuộc nhiệt tà; thương hàn do phong hàn tà","D. Đều truyền biến theo lục kinh"],"ans":"C","exp":"Khác biệt cốt lõi ở nguyên nhân bệnh: phong ôn do phong nhiệt bệnh tà (dương tà nhiệt); thương hàn do phong hàn bệnh tà. A, B, D đều mô tả sai (nhầm lẫn đặc điểm hai bệnh).","key":"Phong ôn = nhiệt tà ≠ Thương hàn = hàn tà.","id":36,"topic":"Ứng dụng lâm sàng","bloom":"Áp dụng"},{"scenario":"Trong một vụ dịch mới, bệnh nhân chủ yếu mắc bệnh sau khi tiếp xúc gần qua đường hô hấp.","stem":"Nhận định nào phù hợp nhất với học thuyết của Ngô Hựu Khả?","opts":["A. Bệnh xâm nhập qua da là chủ yếu","B. Bệnh do lệ khí, xâm nhập qua mũi miệng","C. Bệnh do thất tình nội thương","D. Bệnh do ăn uống thất thường"],"ans":"B","exp":"Ngô Hựu Khả trong \"Ôn dịch luận\" cho rằng ôn dịch do lệ khí (một loại khí đặc biệt) gây ra, xâm nhập cơ thể qua đường mũi miệng chứ không phải qua bì mao như quan điểm truyền thống.","key":"Ngô Hựu Khả = lệ khí, đường mũi miệng.","id":37,"topic":"Ứng dụng lâm sàng","bloom":"Áp dụng"},{"scenario":"Một bác sĩ gặp bệnh nhân sốt cao, khát nước, họng khô, mạch sác. Bác sĩ quyết định điều trị theo nguyên tắc \"tân ôn giải biểu\" như thương hàn.","stem":"Đánh giá nào phù hợp nhất?","opts":["A. Hoàn toàn chính xác vì mọi ngoại cảm bệnh đều giống nhau","B. Chấp nhận được vì sốt luôn do hàn tà gây ra","C. Không phù hợp vì biểu hiện ôn tà; nên biện chứng theo Ôn bệnh học","D. Không thể đánh giá do thiếu thông tin"],"ans":"C","exp":"Sốt cao, khát, họng khô, mạch sác là biểu hiện ôn nhiệt tà (không ố hàn rõ) — cần biện chứng theo Ôn bệnh học, dùng tân lương giải biểu; dùng tân ôn giải biểu (dành cho Thương hàn/hàn tà) sẽ làm tổn thương tân dịch, đúng như cảnh báo của Mang An Thường \"thập tử vô nhất sinh\".","key":"Sốt cao + khát + mạch sác = ôn tà, không dùng tân ôn giải biểu.","id":38,"topic":"Ứng dụng lâm sàng","bloom":"Áp dụng"},{"scenario":"","stem":"Loại mầm bệnh nào chỉ lây bệnh cho người, không lây bệnh cho súc vật?","opts":["A. Virus dại","B. Yersinia pestis","C. Leptospira","D. Salmonella typhi"],"ans":"D","exp":"Salmonella typhi (thương hàn) chỉ có ổ chứa duy nhất là người, không có ổ chứa động vật (khác các Salmonella khác). Virus dại (chó/dơi), Yersinia pestis (dịch hạch — chuột, bọ chét) và Leptospira (chuột, gia súc) đều là bệnh lây từ động vật (zoonosis).","key":"S. typhi = mầm bệnh đặc hiệu người.","id":39,"topic":"Nguyên tắc điều trị Ôn bệnh","bloom":"Nhớ"},{"scenario":"","stem":"Đặc điểm nào của ôn bệnh theo YHCT là đúng nhất?","opts":["A. Không lây","B. Bệnh khởi đầu bằng lạnh run, vã mồ hôi","C. Tính chất bệnh thiên về hàn","D. Diễn biến theo quy luật nhất định"],"ans":"D","exp":"Ôn bệnh có \"tính giai đoạn\" rõ rệt theo quy luật Vệ→Khí→Dinh→Huyết→Hồi phục. Đa số Ôn bệnh có tính truyền nhiễm (không phải \"không lây\"); khởi đầu lạnh run nặng là đặc trưng Thương hàn (hàn tà), không phải Ôn bệnh; Ôn bệnh thiên về nhiệt chứ không phải hàn.","key":"Ôn bệnh diễn biến có quy luật giai đoạn Vệ-Khí-Dinh-Huyết.","id":40,"topic":"Nguyên tắc điều trị Ôn bệnh","bloom":"Nhớ"},{"scenario":"","stem":"Khi điều trị ôn bệnh giai đoạn ở Vệ phận, thường sử dụng các vị thuốc nào?","opts":["A. Hòa giải","B. Thanh khí","C. Giải biểu","D. Lương huyết"],"ans":"C","exp":"Theo Diệp Thiên Sĩ \"tại vệ hãn chi khả dã\" — Vệ phận dùng phép hãn/giải biểu (tân lương giải biểu) đẩy tà ra ngoài, chưa cần thanh khí/lương huyết vì tà chưa nhập lý.","key":"Vệ phận = giải biểu (tân lương).","id":41,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Hiểu"},{"scenario":"","stem":"Khi điều trị ôn bệnh giai đoạn ở Khí phận, thường sử dụng các vị thuốc nào?","opts":["A. Khai khiếu","B. Công hạ","C. Thanh dinh","D. Giải biểu"],"ans":"B","exp":"Khí phận nguyên tắc chính là \"thanh\"; khi khí phận có phủ thực (dương minh phủ thực, phế nhiệt phủ thực...) phải dùng công hạ (Đại thừa khí thang, Điều vị thừa khí thang, Tuyên bạch thừa khí thang) để tiết nhiệt qua đại tiện. Khai khiếu dùng cho nhiệt hãm tâm bào (dinh/tâm bào); thanh dinh dùng cho dinh phận; giải biểu dùng cho vệ phận.","key":"Khí phận phủ thực → công hạ.","id":42,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Hiểu"},{"scenario":"","stem":"Điều trị ôn bệnh giai đoạn Vệ phận, sử dụng bài thuốc nào?","opts":["A. Ngân kiểu tán","B. An cung ngưu hoàng hoàn","C. Hoắc hương chính khí tán","D. Hóa ban thang"],"ans":"A","exp":"Ngân kiều tán (Kim ngân, Liên kiều, Kinh giới, Đậu xị, Cát cánh, Ngưu bàng tử, Trúc diệp, Lô căn, Cam thảo, Bạc hà) là phương tân lương giải biểu kinh điển cho giai đoạn tà tập phế vệ (Vệ phận) của Phong ôn.","key":"Vệ phận Phong ôn → Ngân kiều tán.","id":43,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Hiểu"},{"scenario":"","stem":"Điều trị ôn bệnh ở Dinh phận, sử dụng bài thuốc nào?","opts":["A. Tăng dịch thang","B. An cung ngưu hoàng hoàn","C. Ích vị thang","D. Ôn đờm thang"],"ans":"B","exp":"Trong 4 lựa chọn, An cung ngưu hoàng hoàn (thanh tâm khai khiếu) là phương gắn với bệnh biến Dinh phận/tâm bào (nhiệt hãm tâm bào — thần hôn, chiêm ngữ), phù hợp nhất so với Tăng dịch thang (dưỡng âm nhuận táo — khí phận táo kết), Ích vị thang (dưỡng vị âm — trung tiêu hậu kỳ) và Ôn đởm thang (hòa giải đởm nhiệt — không thuộc Ôn bệnh).","key":"Dinh phận/tâm bào → An cung ngưu hoàng hoàn.","id":44,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Hiểu"},{"scenario":"","stem":"Điều trị ôn bệnh giai đoạn Huyết phận, sử dụng bài thuốc nào?","opts":["A. Tăng dịch thang","B. Thanh dinh thang","C. Ích vị thang","D. Ôn đớm thang"],"ans":"B","exp":"Trong 4 lựa chọn, Thanh dinh thang (thanh dinh lương huyết, dùng khi tà từ khí chuyển dinh và có xu hướng lan huyết) là phù hợp nhất so với Tăng dịch thang (âm hư táo kết ở khí phận), Ích vị thang (dưỡng vị âm trung tiêu) và Ôn đởm thang (không thuộc hệ Ôn bệnh). Bài kinh điển cho Huyết phận thực thụ là Tê giác (Thủy ngưu giác) địa hoàng thang — không có trong 4 lựa chọn.","key":"Gần Huyết phận nhất trong 4 lựa chọn → Thanh dinh thang.","id":45,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Hiểu"},{"scenario":"Một bệnh nhân nam 56 tuổi, bị sốt hai ngày, ớn lạnh, được chẩn đoán là nhiệt ở vệ phận.","stem":"Nguyên tắc điều trị nào là phù hợp nhất?","opts":["A. Thanh khí","B. Thấu nhiệt","C. Phát hãn","D. Tư âm"],"ans":"C","exp":"Theo Diệp Thiên Sĩ (Ôn nhiệt luận): \"tại vệ hãn chi khả dã, đáo khí tài khả thanh khí, nhập dinh do khả thấu nhiệt chuyển khí, nhập huyết trực tu lương huyết tán huyết\" — Vệ phận dùng phép hãn (phát hãn bằng thuốc tân lương giải biểu, không phải tân ôn phát hãn của Thương hàn).","key":"Vệ = hãn (phát hãn/giải biểu).","id":46,"topic":"Nguyên tắc điều trị Ôn bệnh","bloom":"Áp dụng"},{"scenario":"Một bệnh nhân nữ 60 tuổi, bị sốt 6 ngày, không ớn lạnh, được chẩn đoán là nhiệt ở dinh phận.","stem":"Nguyên tắc điều trị nào là phù hợp nhất?","opts":["A. Thanh khí","B. Tư âm","C. Phát hãn","D. Thấu nhiệt"],"ans":"D","exp":"Theo nguyên tắc tứ phận của Diệp Thiên Sĩ, Dinh phận dùng \"thấu nhiệt chuyển khí\" — vừa thanh dinh vừa dẫn tà từ dinh trở ra khí phận (như thêm Ngân hoa, Liên kiều, Trúc diệp tâm trong Thanh dinh thang), tránh chỉ thuần lương huyết mà giữ tà lại dinh phận.","key":"Dinh = thấu nhiệt chuyển khí.","id":47,"topic":"Nguyên tắc điều trị Ôn bệnh","bloom":"Áp dụng"},{"scenario":"","stem":"Khi nghiên cứu về nguyên tắc điều trị Ôn bệnh, nếu nhiệt ở thượng tiêu thì thuốc dùng có tính chất nào phù hợp nhất?","opts":["A. Trọng trọc","B. Khinh thanh","C. Trầm giáng","D. Thu sáp"],"ans":"B","exp":"Ngô Cúc Thông: \"trị thượng tiêu như phi khinh bất cử\" (chữa thượng tiêu như lông chim, không nhẹ thì không bay lên được) — thượng tiêu (phế, tâm) cần dùng thuốc khinh thanh, tính vị nhẹ nhàng, phát tán (Bạc hà, Liên kiều, Cúc hoa...) mới đưa tà ra khỏi phần cao của cơ thể.","key":"Thượng tiêu → thuốc khinh thanh.","id":48,"topic":"Nguyên tắc điều trị Ôn bệnh","bloom":"Áp dụng"},{"scenario":"","stem":"Điều trị Ôn bệnh, nguyên tắc nào phù hợp nhất?","opts":["A. Giải nhiệt, sinh tân và bảo tồn tân dịch","B. Cường Tâm nên dùng: Khương, Quế, Phụ tử","C. Nhiệt ở vệ dùng thuốc khổ hàn làm chủ","D. Nhiệt ở doanh dùng thuốc tân lương làm chủ"],"ans":"A","exp":"Vì Ôn bệnh là dương tà dễ hóa táo thương âm, nguyên tắc xuyên suốt là thanh nhiệt đồng thời sinh tân, bảo tồn tân dịch ở mọi giai đoạn. Khương/Quế/Phụ tử là thuốc đại nhiệt hồi dương — chống chỉ định vì làm nặng thêm nhiệt tà; Vệ phận dùng tân lương (không phải khổ hàn — khổ hàn dùng sớm sẽ \"bế tà\" giữ tà ở lại biểu); Dinh phận (doanh) dùng thanh dinh lương huyết chứ không phải tân lương (tân lương chỉ dùng cho Vệ phận).","key":"Xuyên suốt Ôn bệnh = giải nhiệt + bảo tồn tân dịch.","id":49,"topic":"Nguyên tắc điều trị Ôn bệnh","bloom":"Áp dụng"},{"scenario":"","stem":"Nguyên tắc chung quan trọng nhất khi điều trị ôn bệnh là gì?","opts":["A. Giải nhiệt, sinh tân và bảo tồn tân dịch","B. Ôn dương, hồi nghịch và cố thoát khí","C. Bổ huyết, dưỡng âm và hoạt huyết lạc","D. Kiện tỳ, hóa thấp và điều hòa khí cơ"],"ans":"A","exp":"Lặp lại nguyên tắc cốt lõi: Ôn bệnh dương nhiệt kháng thịnh dễ thương âm nên xuyên suốt điều trị luôn song hành thanh nhiệt và bảo tồn/sinh tân dịch. Ôn dương hồi nghịch (B) chỉ dùng cấp cứu thoát chứng hiếm gặp (tâm dương hư suy); bổ huyết dưỡng âm (C) và kiện tỳ hóa thấp (D) là pháp trị cục bộ từng thể, không phải nguyên tắc chung.","key":"Nguyên tắc chung Ôn bệnh = thanh nhiệt + bảo tân dịch.","id":50,"topic":"Nguyên tắc điều trị Ôn bệnh","bloom":"Áp dụng"},{"scenario":"","stem":"Theo Diệp Thiên Sĩ, khi bệnh đang ở khí phận thì pháp điều trị chủ yếu là gì?","opts":["A. Hồi dương cứu nghịch làm phương pháp chính","B. Tư âm dưỡng huyết làm phương pháp chính","C. Thanh khí tiết nhiệt làm phương pháp chính","D. Bổ khí kiện tỳ làm phương pháp chính"],"ans":"C","exp":"\"Đáo khí tài khả thanh khí\" — khi tà đã vào khí phận, phép trị chính là thanh khí tiết nhiệt (Bạch hổ thang, Ma hạnh thạch cam thang...), khác Vệ phận (giải biểu) và Dinh/Huyết phận (thấu nhiệt/lương huyết).","key":"Khí phận = thanh khí tiết nhiệt.","id":51,"topic":"Nguyên tắc điều trị Ôn bệnh","bloom":"Áp dụng"},{"scenario":"Người bệnh sốt nhẹ, hơi sợ lạnh, đau đầu, mới khởi phát bệnh ôn nhiệt.","stem":"Phương thuốc phù hợp nhất là gì?","opts":["A. Tê giác địa hoàng thang để lương huyết","B. Đại thừa khí thang để công hạ nhiệt kết","C. Tăng dịch thang để tư âm nhuận táo","D. Ngân kiều tán để tân lương giải biểu"],"ans":"D","exp":"Sốt nhẹ + hơi sợ lạnh + đau đầu là chứng hầu sơ khởi tà tại phế vệ (Vệ phận) — dùng Ngân kiều tán tân lương giải biểu, tuyên phế tiết nhiệt. Ba phương còn lại dùng cho giai đoạn sâu hơn (huyết phận, phủ thực khí phận, âm hư táo kết).","key":"Sơ khởi Vệ phận → Ngân kiều tán.","id":52,"topic":"Phương dược theo giai đoạn bệnh","bloom":"Áp dụng"},{"scenario":"Người bệnh sốt cao liên tục, không còn ớn lạnh, khát nước nhiều, mạch hồng đại.","stem":"Phương thuốc thích hợp nhất là gì?","opts":["A. Hoắc hương chính khí tán để hóa thấp","B. Bạch hổ thang để thanh khí tiết nhiệt","C. Thanh dinh thang để thanh dinh tiết nhiệt","D. Phục mạch thang để dưỡng âm phục mạch"],"ans":"B","exp":"Sốt cao liên tục, hết ố hàn, khát nhiều, mạch hồng đại là \"tứ đại chủ chứng\" của dương minh khí phận nhiệt tích (nhiệt tích dương minh) — điều trị bằng Bạch hổ thang thanh nhiệt bảo tân, đúng như mô tả trong bài Phong ôn (KB <code>on_benh_dai_cuong/02_benh-lam-sang/phong-on_001.md</code>).","key":"Tứ đại chủ chứng (sốt cao, khát, mồ hôi nhiều, mạch hồng đại) → Bạch hổ thang.","id":53,"topic":"Phương dược theo giai đoạn bệnh","bloom":"Áp dụng"},{"scenario":"Người bệnh sốt cao, mạch phù đại, khát nước nhiều, khí âm đều hao tổn.","stem":"Bài thuốc phù hợp nhất là gì?","opts":["A. Bạch hổ gia nhân sâm thang","B. Hoàng long thang gia giảm","C. Trấn can tức phong thang","D. An cung ngưu hoàng hoàn"],"ans":"A","exp":"Khi dương minh khí phận nhiệt thịnh kèm khí âm đều hao (mạch phù đại vô lực hoặc hư đại), gia Nhân sâm vào Bạch hổ thang để ích khí sinh tân đồng thời thanh nhiệt — thành Bạch hổ gia nhân sâm thang.","key":"Nhiệt thịnh + khí âm hao tổn → Bạch hổ gia Nhân sâm thang.","id":54,"topic":"Phương dược theo giai đoạn bệnh","bloom":"Áp dụng"},{"scenario":"Người bệnh sốt cao về đêm, tâm phiền, hao tổn tân dịch, nhiệt tà nhập dinh phận.","stem":"Phương thuốc phù hợp nhất là gì?","opts":["A. Đại thừa khí thang để công hạ tích trệ","B. Thanh dinh thang để thanh dinh tiết nhiệt","C. Hoắc hương chính khí tán để hóa thấp","D. Bát chính tán để thanh nhiệt lợi thấp"],"ans":"B","exp":"Sốt về đêm nặng hơn, tâm phiền, hao tân dịch là biểu hiện điển hình dinh phận (dinh nhiệt âm thương) — điều trị bằng Thanh dinh thang (thanh dinh tiết nhiệt, thấu nhiệt chuyển khí).","key":"Sốt nặng về đêm + tâm phiền = dinh phận → Thanh dinh thang.","id":55,"topic":"Phương dược theo giai đoạn bệnh","bloom":"Áp dụng"},{"scenario":"","stem":"Người bệnh hôn mê, nói sảng, sốt cao, nhiệt nhập tâm bào. Phương thuốc được ưu tiên lựa chọn là gì?","opts":["A. Ôn đởm thang hòa giải đởm nhiệt","B. Tăng dịch thang tư âm nhuận táo","C. An cung ngưu hoàng hoàn khai khiếu","D. Kỷ cúc địa hoàng hoàn dưỡng âm"],"ans":"C","exp":"Nhiệt hãm tâm bào (hôn mê, nói sảng) là chứng hầu nguy hiểm cần thanh tâm khai khiếu cấp — An cung ngưu hoàng hoàn (thuộc nhóm \"Tam bảo\": An cung ngưu hoàng hoàn, Tử tuyết đơn, Chí bảo đơn).","key":"Nhiệt nhập tâm bào, hôn mê → An cung ngưu hoàng hoàn.","id":56,"topic":"Phương dược theo giai đoạn bệnh","bloom":"Áp dụng"},{"scenario":"","stem":"Người bệnh ôn bệnh xuất hiện ban chẩn ngoài da, nhiệt tà thịnh. Phương thuốc thích hợp nhất là gì?","opts":["A. Đại định phong châu tức phong tiềm dương","B. Bát chính tán thanh nhiệt lợi niệu","C. Phục mạch thang dưỡng âm phục mạch","D. Hóa ban thang thanh nhiệt giải độc"],"ans":"D","exp":"Ban chẩn do nhiệt tà thịnh nhập huyết lạc (phế nhiệt phát chẩn/dinh phận phát ban) điều trị bằng Hóa ban thang (Thạch cao, Tri mẫu, Huyền sâm, Tê giác, Cam thảo, Ngạnh mễ) thanh nhiệt lương huyết giải độc thấu chẩn.","key":"Ban chẩn nhiệt thịnh → Hóa ban thang.","id":57,"topic":"Phương dược theo giai đoạn bệnh","bloom":"Áp dụng"},{"scenario":"","stem":"Người bệnh nhiệt thịnh gây chảy máu cam và nôn ra máu. Phương thuốc phù hợp nhất là gì?","opts":["A. Tê giác địa hoàng thang lương huyết","B. Ngân kiều tán sơ phong thanh nhiệt","C. Bạch hổ thang thanh khí tiết nhiệt","D. Hoắc hương chính khí tán hóa thấp"],"ans":"A","exp":"Chảy máu cam, nôn ra máu là \"động huyết\" thuộc Huyết phận (nhiệt thịnh bức huyết vọng hành) — điều trị bằng Tê giác (Thủy ngưu giác) địa hoàng thang lương huyết tán ứ.","key":"Xuất huyết đa nơi (huyết phận) → Tê giác địa hoàng thang.","id":58,"topic":"Phương dược theo giai đoạn bệnh","bloom":"Áp dụng"},{"scenario":"","stem":"Người bệnh sốt, bụng đầy cứng, táo bón nhiều ngày, lưỡi đỏ rêu vàng khô. Phép điều trị thích hợp nhất là gì?","opts":["A. Thanh tâm khai khiếu bằng An cung hoàn","B. Tân lương giải biểu bằng Ngân kiều tán","C. Thanh dinh tiết nhiệt bằng Thanh dinh thang","D. Khổ hàn tả hạ bằng Đại thừa khí thang"],"ans":"D","exp":"Bụng đầy cứng, táo bón nhiều ngày, rêu vàng khô là phủ thực chứng (dương minh nhiệt kết trường phủ) — điều trị bằng khổ hàn tả hạ với Đại thừa khí thang (Đại hoàng, Mang tiêu, Chỉ thực, Hậu phác).","key":"Phủ thực chứng (bụng cứng, táo bón, rêu vàng khô) → Đại thừa khí thang.","id":59,"topic":"Phương dược theo giai đoạn bệnh","bloom":"Áp dụng"},{"scenario":"","stem":"Người bệnh đại tiện táo nhưng mạch vi sác vô lực, biểu hiện âm dịch hao tổn. Bài thuốc phù hợp nhất là gì?","opts":["A. Đại thừa khí thang để công hạ tích trệ","B. Tăng dịch thang để tăng dịch nhuận hạ","C. Hoắc hương chính khí tán để hóa thấp","D. Bát chính tán để thanh nhiệt lợi thấp"],"ans":"B","exp":"Táo bón do âm dịch hao tổn (không phải nhiệt kết thực chứng — mạch vi sác vô lực chứng tỏ chính khí đã hư) không thể công hạ mạnh; dùng Tăng dịch thang (Huyền sâm, Sinh địa, Mạch môn) để \"tăng dịch hành chu\" — tăng tân dịch làm mềm phân, nhuận hạ nhẹ nhàng.","key":"Táo bón do hư (âm hao, mạch vô lực) → Tăng dịch thang, không công hạ mạnh.","id":60,"topic":"Phương dược theo giai đoạn bệnh","bloom":"Áp dụng"},{"scenario":"","stem":"Người bệnh thấp nhiệt trung tiêu, sốt âm ỉ, đầy bụng, buồn nôn, rêu lưỡi vàng nhớt. Phương thuốc phù hợp nhất là gì?","opts":["A. Trấn can tức phong thang tiềm dương","B. Thanh dinh thang thanh dinh tiết nhiệt","C. Hoắc hương chính khí tán hóa thấp","D. Tăng dịch thang dưỡng âm nhuận táo"],"ans":"C","exp":"Thấp nhiệt uất trở trung tiêu (tỳ vị) với đầy bụng, buồn nôn, rêu vàng nhớt cần hóa thấp lý khí — Hoắc hương chính khí tán (Hoắc hương, Bán hạ, Hậu phác, Trần bì, Bạch chỉ...) hóa thấp hòa trung.","key":"Thấp nhiệt trung tiêu (rêu nhớt, đầy bụng) → Hoắc hương chính khí tán.","id":61,"topic":"Phương dược theo giai đoạn bệnh","bloom":"Áp dụng"},{"scenario":"","stem":"Người bệnh sốt về chiều, lòng bàn tay chân nóng, lưỡi đỏ ít rêu, mạch tế sác. Phép trị phù hợp nhất là gì?","opts":["A. Tư âm thanh nhiệt bằng Tri Bá địa hoàng hoàn","B. Thanh nhiệt hóa thấp bằng Hoắc hương chính khí tán","C. Khổ hàn tả hạ bằng Đại thừa khí thang","D. Tân lương giải biểu bằng Ngân kiều tán"],"ans":"A","exp":"Sốt về chiều, ngũ tâm phiền nhiệt (lòng bàn tay chân nóng), lưỡi đỏ ít rêu, mạch tế sác là hư nhiệt do can thận âm hư (hạ tiêu, giai đoạn hồi phục/hậu kỳ) — điều trị tư âm thanh nhiệt bằng Tri Bá địa hoàng hoàn.","key":"Sốt chiều + ngũ tâm phiền nhiệt = âm hư hỏa vượng → Tri Bá địa hoàng hoàn.","id":62,"topic":"Phương dược theo giai đoạn bệnh","bloom":"Áp dụng"},{"scenario":"","stem":"Người bệnh tiểu buốt, tiểu vàng đục, rêu lưỡi vàng nhớt, thấp nhiệt hạ tiêu. Phương thuốc phù hợp nhất là gì?","opts":["A. Thanh dinh thang thanh nhiệt lương huyết","B. Bát chính tán thanh nhiệt lợi thấp","C. Bạch hổ thang thanh khí tiết nhiệt","D. Phục mạch thang dưỡng âm sinh tân"],"ans":"B","exp":"Tiểu buốt, tiểu vàng đục, rêu vàng nhớt là thấp nhiệt hạ tiêu (bàng quang) — dùng Bát chính tán thanh nhiệt lợi thấp, thông lâm.","key":"Thấp nhiệt hạ tiêu (tiểu buốt, đục) → Bát chính tán.","id":63,"topic":"Phương dược theo giai đoạn bệnh","bloom":"Áp dụng"},{"scenario":"Một bệnh nhân mắc bệnh truyền nhiễm cấp tính bước sang ngày thứ 4, xuất hiện triệu chứng sốt cao, khát nước nhiều, thích uống nước lạnh, vã mồ hôi như tắm, kèm theo bứt rứt, mặt đỏ, đại tiện táo, nước tiểu vàng thẫm. Khám thấy lưỡi đỏ, rêu lưỡi vàng khô, mạch hồng đại và sác.","stem":"Dựa trên lý luận Vệ Khí Dinh Huyết, hãy xác định vị trí bệnh và phương án xử trí bằng bài thuốc Y học cổ truyền phù hợp nhất?","opts":["A. Bệnh tại Khí phận (Vị nhiệt); xử trí bằng bài thuốc Bạch hổ thang","B. Bệnh tại Huyết phận; xử trí bằng bài thuốc Tê giác địa hoàng thang","C. Bệnh tại Dinh phận; xử trí bằng bài thuốc Thanh Dinh Thang","D. Bệnh tại Vệ phận; xử trí bằng bài thuốc Ngân kiều tán hoặc Tang cúc ẩm"],"ans":"A","exp":"Bộ tứ triệu chứng \"trạng nhiệt, hãn đại xuất, khát muốn uống, mạch đại\" (sốt cao, mồ hôi như tắm, khát thích uống lạnh, mạch hồng đại) là \"tứ đại chủ chứng\" kinh điển của dương minh khí phận nhiệt tích, mô tả gần như nguyên văn trong KB <code>on_benh_dai_cuong</code> (bài Phong ôn, mục \"Nhiệt tích dương minh\"). Điều trị bằng Bạch hổ thang thanh nhiệt bảo tân.","key":"Tứ đại chủ chứng = Khí phận dương minh → Bạch hổ thang.","id":64,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Áp dụng"},{"scenario":"Thầy thuốc đang điều trị cho một bệnh nhân ôn bệnh bằng bài thuốc Thanh Dinh Thang do tà nhiệt đang từ khí phận chuyển vào dinh phận (nhiệt thương doanh âm).","stem":"Theo nguyên tắc phối ngũ trị liệu của Diệp Thiên Sĩ được đề cập trong bài giảng, hành động nào sau đây của thầy thuốc là đúng đắn nhất?","opts":["A. Gia thêm các vị thuốc đại nhiệt như Phụ tử, Nhục quế để ôn dương, thông mạch, dẫn thuốc vào sâu bên trong","B. Giữ nguyên vị Hoàng liên trong bài thuốc để tăng cường hiệu quả khổ hàn thanh nhiệt tại dinh phận","C. Thay thế toàn bộ bài thuốc bằng bài Đại Thừa Khí Thang để công hạ ngay lập tức","D. Bỏ vị Hoàng liên ra khỏi bài thuốc để tránh tính vị quá đắng lạnh làm giữ tà nhiệt lại dinh phận, giúp đẩy nhiệt ra ngoài khí phận"],"ans":"D","exp":"Nguyên tắc \"thấu nhiệt chuyển khí\" của Diệp Thiên Sĩ ở dinh phận đòi hỏi vừa thanh dinh vừa mở đường cho tà quay lại khí phận để giải ra ngoài; dùng khổ hàn quá mức (Hoàng liên) sẽ khiến khí cơ ngưng trệ, \"bế môn lưu khấu\" giữ tà lại trong dinh, đi ngược với ý \"thấu\". Phụ tử/Nhục quế là đại nhiệt trợ hỏa — chống chỉ định tuyệt đối. Đại thừa khí thang chỉ dùng khi có phủ thực rõ ở khí phận, không phải hướng xử trí của dinh phận.","key":"Thấu nhiệt chuyển khí → bớt khổ hàn quá mức (bỏ Hoàng liên khi cần) để không giữ tà lại.","id":65,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Áp dụng"},{"scenario":"Một bệnh nhân nam nhập viện trong tình trạng sốt âm ỉ kéo dài (nặng hơn về chiều và đêm), lòng bàn tay và chân nóng, miệng khô, họng khát, tiểu ít và vàng gắt, đại tiện phân khô cứng. Khám thấy thể trạng gầy, lưỡi đỏ sẫm và có rất ít rêu, mạch tế sác.","stem":"Dựa trên phân loại bộ vị bị bệnh, cơ chế bệnh sinh chính đang diễn ra ở bệnh nhân này là gì và phép trị tương ứng là gì?","opts":["A. Thấp nhiệt kết tụ ở trung tiêu làm Tỳ mất vận hóa; phép trị là Thanh nhiệt hóa thấp","B. Tà nhiệt xâm phạm vào Vệ phận ở Thượng tiêu; phép trị là Tân lương giải biểu","C. Nhiệt kết ở Trường vị gây táo kết đại tiện; phép trị là Tả hạ nhiệt kết","D. Thận âm hư không chế được dương dẫn đến hư nhiệt bốc lên ở Hạ tiêu; phép trị là Tư âm thanh nhiệt"],"ans":"D","exp":"Sốt âm ỉ nặng về chiều/đêm, ngũ tâm phiền nhiệt, lưỡi đỏ sẫm ít rêu, mạch tế sác, thể trạng gầy là bộ mặt kinh điển của hậu kỳ Ôn bệnh tổn thương Hạ tiêu can thận âm — thận âm hư không chế được dương, hư hỏa bốc lên. Phép trị: tư âm thanh nhiệt (như Tri Bá địa hoàng hoàn/Gia giảm phục mạch thang), khác hẳn thấp nhiệt trung tiêu (rêu nhớt, không phải ít rêu) hay thực nhiệt trường vị (mạch phải hữu lực, không tế sác).","key":"Sốt về chiều/đêm + lưỡi đỏ sẫm ít rêu + mạch tế sác = Hạ tiêu thận âm hư.","id":66,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Áp dụng"},{"scenario":"Một bệnh nhân nam 45 tuổi vào viện vì sốt cao liên tục sang ngày thứ 5, kèm theo biểu hiện tâm phiền bứt rứt dữ dội, mê sảng lúc tỉnh lúc mê, trên da xuất hiện nhiều vết ban chẩn màu đỏ tía, đại tiện phân đen, lưỡi đỏ thẫm và khô nứt nẻ. Xét nghiệm máu ghi nhận số lượng tiểu cầu giảm nặng, thời gian đông máu kéo dài.","stem":"Phân tích diễn tiến theo lý luận Ôn bệnh và mối tương quan với Y học hiện đại, nhận định nào sau đây là chính xác nhất?","opts":["A. Bệnh mới ở giai đoạn Vệ phận; tương ứng với nhiễm trùng đường hô hấp trên giai đoạn khởi phát","B. Bệnh đã tiến triển vào Huyết phận; tương ứng với tình trạng rối loạn đông máu nội mạch lan tỏa (DIC) và tổn thương nội mô nặng nề","C. Bệnh thuộc phạm vi Thấp nhiệt ở Trung tiêu; tương ứng với viêm dạ dày cấp tính","D. Bệnh đang ở giai đoạn Khí phận; tương ứng với hội chứng đáp ứng viêm toàn thân (SIRS) mức độ nhẹ"],"ans":"B","exp":"Ban chẩn tía + đại tiện phân đen (xuất huyết tiêu hóa) + tiểu cầu giảm nặng + đông máu kéo dài + lưỡi đỏ thẫm khô nứt là bộ triệu chứng \"động huyết\" điển hình của Huyết phận (nhiệt thịnh bức huyết vọng hành, nhiệt cực sinh phong/hao huyết), tương ứng lâm sàng hiện đại với DIC (đông máu nội mạch lan tỏa) và tổn thương nội mô lan tỏa trong nhiễm trùng huyết nặng/sốc nhiễm khuẩn.","key":"Xuất huyết đa cơ quan + rối loạn đông máu = Huyết phận ≈ DIC.","id":67,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Áp dụng"},{"scenario":"","stem":"Theo chỉ dạy của danh y Ngô Cúc Thông: \"Trị thượng tiêu như phi khinh bất cử, trị hạ tiêu như quyền phi trọng bất trầm\". Khi điều trị một bệnh nhân ôn bệnh giai đoạn muộn có tổn thương sâu sắc ở hạ tiêu (Thận âm chân thủy bị thiêu rụi, hư phong nội động gây co giật), thầy thuốc cần vận dụng nguyên tắc này như thế nào trong phối ngũ dược liệu?","opts":["A. Sử dụng các vị thuốc có tính vị thanh nhẹ, phát tán như Bạc hà, Kinh giới để sơ phong thanh nhiệt ở Thượng tiêu","B. Sử dụng các vị thuốc đắng lạnh, táo thấp như Hoàng liên, Hoàng cầm để tả hỏa mạnh mẽ ở Trung tiêu","C. Chỉ sử dụng các bài thuốc xông hơi bên ngoài để phát hãn đưa tà độc ra ngoài theo đường mồ hôi","D. Sử dụng các vị thuốc có trọng lượng nặng, chất keo đặc, các vị thuốc từ động vật quy bản, để tư âm ghìm dương, trầm giáng hỏa tà xuống dưới"],"ans":"D","exp":"\"Trị hạ tiêu như quyền phi trọng bất trầm\" (như quả cân, không nặng thì không chìm xuống được) — hạ tiêu (can thận) cần thuốc có tính trọng trấn, chất nê (Quy bản, Miết giáp, Mẫu lệ, A giao, Kê tử hoàng...) để tư âm tiềm dương, trầm giáng hư phong (như Đại định phong châu, Tam giáp phục mạch thang). Bạc hà/Kinh giới (khinh thanh) dùng cho thượng tiêu; Hoàng liên/Hoàng cầm (khổ hàn) dùng cho trung tiêu thực nhiệt; xông hơi phát hãn không phù hợp giai đoạn hư phong nội động nguy kịch.","key":"Hạ tiêu → thuốc trọng trấn, chất nê động vật (quy bản...) để tư âm tiềm dương.","id":68,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Áp dụng"},{"scenario":"","stem":"Dựa trên phần \"Mối tương quan giữa hai nền y học\" trong bài giảng, các hợp chất tự nhiên như Flavonoid, Alkaloide, Tinh dầu có trong các bài thuốc cổ phương trị Ôn bệnh đóng vai trò gì khi đối chiếu với cơ chế sinh lý bệnh học hiện đại?","opts":["A. Chúng chỉ có tác dụng tạo mùi thơm và làm giảm vị đắng của bài thuốc chứ không có hoạt tính sinh học","B. Chúng có khả năng thay thế hoàn toàn máy thở và các phương tiện hồi sức cấp cứu tại ICU","C. Chúng hoạt động như các chất kháng sinh, kháng viêm, bảo vệ nội mô mạch máu và chống xuất huyết, phù hợp với từng giai đoạn diễn tiến của hội chứng nhiễm trùng","D. Chúng làm tăng tính thấm mao mạch nhằm giúp vi khuẩn dễ dàng đi vào máu hơn"],"ans":"C","exp":"Các hoạt chất trong dược liệu thanh nhiệt/lương huyết cổ phương (Kim ngân, Hoàng liên, Sinh địa, Đơn bì...) chứa Flavonoid, Alkaloide, Tinh dầu có tác dụng kháng khuẩn/kháng viêm, chống oxy hóa, bảo vệ tính toàn vẹn nội mô mạch máu và cầm máu — cơ chế này song song và bổ trợ với diễn tiến sinh lý bệnh học hiện đại của hội chứng nhiễm trùng (từ đáp ứng viêm đến DIC), chứ không thay thế hồi sức tích cực và không có tác dụng ngược (tăng thấm mao mạch giúp vi khuẩn xâm nhập) như D nêu.","key":"Flavonoid/Alkaloide cổ phương ≈ kháng viêm-bảo vệ nội mô, hỗ trợ chứ không thay thế hồi sức hiện đại.","id":69,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Áp dụng"},{"scenario":"Một bệnh nhân ôn bệnh giai đoạn đầu chỉ sốt nhẹ, hơi sợ lạnh. Thầy thuốc quyết định dùng ngay Đại thừa khí thang để công hạ mạnh.","stem":"Đánh giá nào phù hợp nhất?","opts":["A. Không ảnh hưởng vì bài thuốc dùng ở mọi giai đoạn","B. Hợp lý vì cần tấn công tà khí càng sớm càng tốt","C. Hợp lý vì mọi thể ôn bệnh đều cần công hạ","D. Không phù hợp vì chưa đúng giai đoạn bệnh lý"],"ans":"D","exp":"Sốt nhẹ, hơi sợ lạnh là biểu hiện tà còn ở Vệ phận (biểu chứng), cần tân lương giải biểu; Đại thừa khí thang là khổ hàn công hạ mạnh chỉ dùng khi có phủ thực ở khí phận (bụng đầy cứng, táo bón, rêu vàng khô). Dùng công hạ quá sớm khi tà còn ở biểu sẽ làm tổn thương chính khí, dẫn tà nội hãm — vi phạm nguyên tắc biện chứng theo giai đoạn của Ôn bệnh.","key":"Công hạ chỉ dùng khi phủ thực rõ ở khí phận, không dùng khi tà còn ở Vệ phận.","id":70,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Áp dụng"},{"scenario":"Khi nghiên cứu về mối tương quan điều trị giữa hai nền y học theo định hướng tích hợp Đông - Tây y tại ICU, một học viên đặt câu hỏi: \"Tại sao trong giai đoạn Huyết phận của Ôn bệnh (tương ứng biến chứng Sepsis/DIC nặng), YHCT lại nhấn mạnh các phép Lương huyết giải độc, Chỉ huyết, Tức phong bằng các dược liệu giàu Flavonoid, Alkaloide thay vì dùng các thuốc đại nhiệt để trợ tim?\"","stem":"Nhận định nào sau đây giải thích một cách khoa học và chính xác nhất bản chất vấn đề này?","opts":["A. Vì thuốc Lương huyết giải độc có khả năng tiêu diệt trực tiếp 100% các loại virus và vi khuẩn tương tự như kháng sinh phổ rộng","B. Vì ở giai đoạn này, tổn thương bản chất là viêm nội mô lan tỏa, rối loạn đông máu và xuất huyết nặng nề; các hợp chất Flavonoid, Alkaloide giúp kháng viêm, bảo vệ thành mạch, chống xuất huyết, phù hợp với cơ chế bệnh sinh của YHHĐ","C. Vì việc sử dụng các vị thuốc Lương huyết giúp tăng huyết áp nhanh chóng cho bệnh nhân đang bị sốc nhiễm khuẩn","D. Vì các thuốc đại nhiệt (Khương, Quế) làm ức chế hệ miễn dịch của cơ thể, khiến vi trùng bùng phát mạnh hơn tại mạch máu"],"ans":"B","exp":"Huyết phận Ôn bệnh (động huyết, ban chẩn tía, xuất huyết đa nơi) tương ứng cơ chế viêm nội mô lan tỏa và rối loạn đông máu (DIC) trong nhiễm trùng huyết nặng của YHHĐ — dùng đại nhiệt (Khương, Quế, Phụ tử) sẽ làm nặng thêm viêm/xuất huyết (nhiệt cực bức huyết); lương huyết giải độc/chỉ huyết/tức phong (giàu Flavonoid, Alkaloide) có tác dụng kháng viêm, bảo vệ nội mô, chống xuất huyết — đúng hướng điều trị hỗ trợ sinh lý bệnh hiện đại, không phải diệt trùng 100% hay tăng huyết áp trực tiếp.","key":"Huyết phận ≈ viêm nội mô + DIC → lương huyết/chỉ huyết = kháng viêm + bảo vệ mạch, không dùng đại nhiệt.","id":71,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Áp dụng"},{"scenario":"","stem":"Yếu tố quan trọng nào dùng để định nghĩa bệnh truyền nhiễm?","opts":["A. Cơ thể con người","B. Mầm bệnh","C. Đường lây","D. Thời gian phơi nhiễm"],"ans":"B","exp":"Bệnh truyền nhiễm được định nghĩa trước hết bởi sự hiện diện của một mầm bệnh (vi sinh vật gây bệnh) có khả năng xâm nhập và gây bệnh cho cơ thể — đây là yếu tố cốt lõi, còn đường lây, cơ thể cảm thụ và thời gian phơi nhiễm là các yếu tố dịch tễ đi kèm chứ không phải bản chất định nghĩa bệnh.","key":"Mầm bệnh = yếu tố cốt lõi định nghĩa bệnh truyền nhiễm.","id":72,"topic":"Đại cương bệnh truyền nhiễm & Ôn bệnh","bloom":"Nhớ"},{"scenario":"","stem":"Loại mầm bệnh nào chỉ lây bệnh cho người, không lây bệnh cho súc vật?","opts":["A. Virus dại","B. Yersinia pestis","C. Leptospira","D. Salmonella typhi"],"ans":"D","exp":"Salmonella typhi (thương hàn) chỉ có ổ chứa duy nhất là người, không có ổ chứa động vật. Virus dại (chó/dơi), Yersinia pestis (dịch hạch — chuột, bọ chét) và Leptospira (chuột, gia súc) đều là bệnh lây từ động vật (zoonosis).","key":"S. typhi = mầm bệnh đặc hiệu người, không zoonosis.","id":73,"topic":"Đại cương bệnh truyền nhiễm & Ôn bệnh","bloom":"Nhớ"},{"scenario":"","stem":"Tiến triển của bệnh truyền nhiễm thường trải qua mấy thời kỳ (giai đoạn)?","opts":["A. 5","B. 4","C. 6","D. 3"],"ans":"B","exp":"4 thời kỳ kinh điển: nung bệnh (ủ bệnh) → khởi phát → toàn phát → lui bệnh (hồi phục).","key":"Ủ bệnh - Khởi phát - Toàn phát - Lui bệnh = 4 thời kỳ.","id":74,"topic":"Đại cương bệnh truyền nhiễm & Ôn bệnh","bloom":"Nhớ"},{"scenario":"","stem":"Đặc điểm nào của ôn bệnh theo YHCT là đúng nhất?","opts":["A. Không lây","B. Bệnh khởi đầu bằng lạnh run, vã mồ hôi","C. Tính chất bệnh thiên về hàn","D. Diễn biến theo quy luật nhất định"],"ans":"D","exp":"Ôn bệnh có \"tính giai đoạn\" rõ rệt theo quy luật Vệ→Khí→Dinh→Huyết→Hồi phục. Đa số Ôn bệnh có tính truyền nhiễm (không phải \"không lây\"); khởi đầu lạnh run nặng là đặc trưng Thương hàn (hàn tà), không phải Ôn bệnh; Ôn bệnh thiên về nhiệt chứ không phải hàn.","key":"Ôn bệnh diễn biến có quy luật giai đoạn Vệ-Khí-Dinh-Huyết.","id":75,"topic":"Đại cương bệnh truyền nhiễm & Ôn bệnh","bloom":"Nhớ"},{"scenario":"","stem":"Nguyên tắc điều trị ôn bệnh theo YHCT là gì?","opts":["A. Cần giải nhiệt sinh tân","B. Chú ý bảo tồn tân dịch","C. Không dùng thuốc quá nhiệt, quá hàn","D. Tất cả đều đúng"],"ans":"D","exp":"Ba nội dung A, B, C đều là thành phần của nguyên tắc điều trị Ôn bệnh: giải nhiệt sinh tân (vì ôn tà dễ hóa táo thương âm); bảo tồn tân dịch xuyên suốt các giai đoạn; không dùng đại nhiệt (Khương, Quế, Phụ tử — sẽ trợ nhiệt tà) cũng không lạm dụng khổ hàn quá sớm (sẽ \"bế tà\" giữ tà ở lại biểu).","key":"Nguyên tắc điều trị Ôn bệnh = tổng hợp cả 3 ý A+B+C.","id":76,"topic":"Đại cương bệnh truyền nhiễm & Ôn bệnh","bloom":"Nhớ"},{"scenario":"","stem":"Khi điều trị ôn bệnh giai đoạn ở Vệ phận, thường sử dụng các vị thuốc nào?","opts":["A. Hòa giải","B. Thanh khí","C. Giải biểu","D. Lương huyết"],"ans":"C","exp":"Theo Diệp Thiên Sĩ \"tại vệ hãn chi khả dã\" — Vệ phận dùng phép hãn/giải biểu (tân lương giải biểu) đẩy tà ra ngoài, chưa cần thanh khí/lương huyết vì tà chưa nhập lý.","key":"Vệ phận = giải biểu (tân lương).","id":77,"topic":"Nguyên tắc điều trị Vệ-Khí-Dinh-Huyết","bloom":"Hiểu"},{"scenario":"","stem":"Khi điều trị ôn bệnh giai đoạn ở Khí phận, thường sử dụng các vị thuốc nào?","opts":["A. Khai khiếu","B. Công hạ","C. Thanh dinh","D. Giải biểu"],"ans":"B","exp":"Khí phận nguyên tắc chính là \"thanh\"; khi khí phận có phủ thực (dương minh phủ thực, phế nhiệt phủ thực...) phải dùng công hạ (Đại thừa khí thang, Điều vị thừa khí thang, Tuyên bạch thừa khí thang) để tiết nhiệt qua đại tiện. Khai khiếu dùng cho nhiệt hãm tâm bào (dinh/tâm bào); thanh dinh dùng cho dinh phận; giải biểu dùng cho vệ phận.","key":"Khí phận phủ thực → công hạ.","id":78,"topic":"Nguyên tắc điều trị Vệ-Khí-Dinh-Huyết","bloom":"Hiểu"},{"scenario":"","stem":"Điều trị ôn bệnh giai đoạn Vệ phận, sử dụng bài thuốc nào?","opts":["A. Ngân kiểu tán","B. An cung ngưu hoàng hoàn","C. Hoắc hương chính khí tán","D. Hóa ban thang"],"ans":"A","exp":"Ngân kiều tán (Kim ngân, Liên kiều, Kinh giới, Đậu xị, Cát cánh, Ngưu bàng tử, Trúc diệp, Lô căn, Cam thảo, Bạc hà) là phương tân lương giải biểu kinh điển cho giai đoạn tà tập phế vệ (Vệ phận) của Phong ôn.","key":"Vệ phận Phong ôn → Ngân kiều tán.","id":79,"topic":"Nguyên tắc điều trị Vệ-Khí-Dinh-Huyết","bloom":"Hiểu"},{"scenario":"","stem":"Điều trị ôn bệnh ở Dinh phận, sử dụng bài thuốc nào?","opts":["A. Tăng dịch thang","B. An cung ngưu hoàng hoàn","C. Ích vị thang","D. Ôn đờm thang"],"ans":"B","exp":"Trong 4 lựa chọn, An cung ngưu hoàng hoàn (thanh tâm khai khiếu) là phương gắn với bệnh biến Dinh phận/tâm bào (nhiệt hãm tâm bào — thần hôn, chiêm ngữ), phù hợp nhất so với Tăng dịch thang (dưỡng âm nhuận táo — khí phận táo kết), Ích vị thang (dưỡng vị âm — trung tiêu hậu kỳ) và Ôn đởm thang (hòa giải đởm nhiệt — không thuộc Ôn bệnh).","key":"Dinh phận/tâm bào → An cung ngưu hoàng hoàn.","id":80,"topic":"Nguyên tắc điều trị Vệ-Khí-Dinh-Huyết","bloom":"Hiểu"},{"scenario":"","stem":"Điều trị ôn bệnh giai đoạn Huyết phận, sử dụng bài thuốc nào?","opts":["A. Tăng dịch thang","B. Thanh dinh thang","C. Ích vị thang","D. Ôn đớm thang"],"ans":"B","exp":"Trong 4 lựa chọn, Thanh dinh thang (thanh dinh lương huyết, dùng khi tà từ khí chuyển dinh và có xu hướng lan huyết) là phù hợp nhất so với Tăng dịch thang (âm hư táo kết khí phận), Ích vị thang (dưỡng vị âm trung tiêu) và Ôn đởm thang (không thuộc hệ Ôn bệnh). Bài kinh điển cho Huyết phận thực thụ là Tê giác (Thủy ngưu giác) địa hoàng thang — không có trong 4 lựa chọn.","key":"Gần Huyết phận nhất trong 4 lựa chọn → Thanh dinh thang.","id":81,"topic":"Nguyên tắc điều trị Vệ-Khí-Dinh-Huyết","bloom":"Hiểu"},{"scenario":"Một bệnh nhân nam 56 tuổi, bị sốt hai ngày, ớn lạnh, được chẩn đoán là nhiệt ở vệ phận.","stem":"Nguyên tắc điều trị nào là phù hợp nhất?","opts":["A. Thanh khí","B. Thấu nhiệt","C. Phát hãn","D. Tư âm"],"ans":"C","exp":"Theo Diệp Thiên Sĩ (Ôn nhiệt luận): \"tại vệ hãn chi khả dã, đáo khí tài khả thanh khí, nhập dinh do khả thấu nhiệt chuyển khí, nhập huyết trực tu lương huyết tán huyết\" — Vệ phận dùng phép hãn (phát hãn bằng thuốc tân lương giải biểu, không phải tân ôn phát hãn của Thương hàn).","key":"Vệ = hãn (phát hãn/giải biểu).","id":82,"topic":"Nguyên tắc điều trị Vệ-Khí-Dinh-Huyết","bloom":"Hiểu"},{"scenario":"Một bệnh nhân nữ 60 tuổi, bị sốt 6 ngày, không ớn lạnh, được chẩn đoán là nhiệt ở dinh phận.","stem":"Nguyên tắc điều trị nào là phù hợp nhất?","opts":["A. Thanh khí","B. Tư âm","C. Phát hãn","D. Thấu nhiệt"],"ans":"D","exp":"Theo nguyên tắc tứ phận của Diệp Thiên Sĩ, Dinh phận dùng \"thấu nhiệt chuyển khí\" — vừa thanh dinh vừa dẫn tà từ dinh trở ra khí phận, tránh chỉ thuần lương huyết mà giữ tà lại dinh phận.","key":"Dinh = thấu nhiệt chuyển khí.","id":83,"topic":"Nguyên tắc điều trị Vệ-Khí-Dinh-Huyết","bloom":"Hiểu"},{"scenario":"","stem":"Khi nghiên cứu về nguyên tắc điều trị Ôn bệnh, nếu nhiệt ở thượng tiêu thì thuốc dùng có tính chất nào phù hợp nhất?","opts":["A. Trọng trọc","B. Khinh thanh","C. Trầm giáng","D. Thu sáp"],"ans":"B","exp":"Ngô Cúc Thông: \"trị thượng tiêu như phi khinh bất cử\" (chữa thượng tiêu như lông chim, không nhẹ thì không bay lên được) — thượng tiêu (phế, tâm) cần dùng thuốc khinh thanh, tính vị nhẹ nhàng, phát tán (Bạc hà, Liên kiều, Cúc hoa...) mới đưa tà ra khỏi phần cao của cơ thể.","key":"Thượng tiêu → thuốc khinh thanh.","id":84,"topic":"Nguyên tắc điều trị Vệ-Khí-Dinh-Huyết","bloom":"Hiểu"},{"scenario":"","stem":"Điều trị Ôn bệnh, nguyên tắc nào phù hợp nhất?","opts":["A. Giải nhiệt, sinh tân và bảo tồn tân dịch","B. Cường Tâm nên dùng: Khương, Quế, Phụ tử","C. Nhiệt ở vệ dùng thuốc khổ hàn làm chủ","D. Nhiệt ở doanh dùng thuốc tân lương làm chủ"],"ans":"A","exp":"Vì Ôn bệnh là dương tà dễ hóa táo thương âm, nguyên tắc xuyên suốt là thanh nhiệt đồng thời sinh tân, bảo tồn tân dịch ở mọi giai đoạn. Khương/Quế/Phụ tử là thuốc đại nhiệt hồi dương — chống chỉ định vì làm nặng thêm nhiệt tà; Vệ phận dùng tân lương (không phải khổ hàn — khổ hàn dùng sớm sẽ \"bế tà\" giữ tà ở lại biểu); Dinh phận (doanh) dùng thanh dinh lương huyết chứ không phải tân lương.","key":"Xuyên suốt Ôn bệnh = giải nhiệt + bảo tồn tân dịch.","id":85,"topic":"Nguyên tắc điều trị Vệ-Khí-Dinh-Huyết","bloom":"Hiểu"},{"scenario":"Một bệnh nhân mắc bệnh truyền nhiễm cấp tính bước sang ngày thứ 4, xuất hiện triệu chứng sốt cao, khát nước nhiều, thích uống nước lạnh, vã mồ hôi như tắm, kèm theo bứt rứt, mặt đỏ, đại tiện táo, nước tiểu vàng thẫm. Khám thấy lưỡi đỏ, rêu lưỡi vàng khô, mạch hồng đại và sác.","stem":"Dựa trên lý luận Vệ Khí Dinh Huyết, hãy xác định vị trí bệnh và phương án xử trí bằng bài thuốc Y học cổ truyền phù hợp nhất?","opts":["A. Bệnh tại Khí phận (Vị nhiệt); xử trí bằng bài thuốc Bạch hổ thang","B. Bệnh tại Huyết phận; xử trí bằng bài thuốc Tê giác địa hoàng thang","C. Bệnh tại Dinh phận; xử trí bằng bài thuốc Thanh Dinh Thang","D. Bệnh tại Vệ phận; xử trí bằng bài thuốc Ngân kiều tán hoặc Tang cúc ẩm"],"ans":"A","exp":"Bộ tứ triệu chứng \"trạng nhiệt, hãn đại xuất, khát muốn uống, mạch đại\" (sốt cao, mồ hôi như tắm, khát thích uống lạnh, mạch hồng đại) là \"tứ đại chủ chứng\" kinh điển của dương minh khí phận nhiệt tích, mô tả gần như nguyên văn trong KB <code>on_benh_dai_cuong</code> (bài Phong ôn, mục \"Nhiệt tích dương minh\"). Điều trị bằng Bạch hổ thang thanh nhiệt bảo tân.","key":"Tứ đại chủ chứng = Khí phận dương minh → Bạch hổ thang.","id":86,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Áp dụng"},{"scenario":"Thầy thuốc đang điều trị cho một bệnh nhân ôn bệnh bằng bài thuốc Thanh Dinh Thang do tà nhiệt đang từ khí phận chuyển vào dinh phận (nhiệt thương doanh âm).","stem":"Theo nguyên tắc phối ngũ trị liệu của Diệp Thiên Sĩ được đề cập trong bài giảng, hành động nào sau đây của thầy thuốc là đúng đắn nhất?","opts":["A. Gia thêm các vị thuốc đại nhiệt như Phụ tử, Nhục quế để ôn dương, thông mạch, dẫn thuốc vào sâu bên trong","B. Giữ nguyên vị Hoàng liên trong bài thuốc để tăng cường hiệu quả khổ hàn thanh nhiệt tại dinh phận","C. Thay thế toàn bộ bài thuốc bằng bài Đại Thừa Khí Thang để công hạ ngay lập tức","D. Bỏ vị Hoàng liên ra khỏi bài thuốc để tránh tính vị quá đắng lạnh làm giữ tà nhiệt lại dinh phận, giúp đẩy nhiệt ra ngoài khí phận"],"ans":"D","exp":"Nguyên tắc \"thấu nhiệt chuyển khí\" của Diệp Thiên Sĩ ở dinh phận đòi hỏi vừa thanh dinh vừa mở đường cho tà quay lại khí phận để giải ra ngoài; dùng khổ hàn quá mức (Hoàng liên) sẽ khiến khí cơ ngưng trệ, \"bế môn lưu khấu\" giữ tà lại trong dinh, đi ngược với ý \"thấu\". Phụ tử/Nhục quế là đại nhiệt trợ hỏa — chống chỉ định tuyệt đối. Đại thừa khí thang chỉ dùng khi có phủ thực rõ ở khí phận.","key":"Thấu nhiệt chuyển khí → bớt khổ hàn quá mức để không giữ tà lại.","id":87,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Áp dụng"},{"scenario":"Một bệnh nhân nam nhập viện trong tình trạng sốt âm ỉ kéo dài (nặng hơn về chiều và đêm), lòng bàn tay và chân nóng, miệng khô, họng khát, tiểu ít và vàng gắt, đại tiện phân khô cứng. Khám thấy thể trạng gầy, lưỡi đỏ sẫm và có rất ít rêu, mạch tế sác.","stem":"Dựa trên phân loại bộ vị bị bệnh, cơ chế bệnh sinh chính đang diễn ra ở bệnh nhân này là gì và phép trị tương ứng là gì?","opts":["A. Thấp nhiệt kết tụ ở trung tiêu làm Tỳ mất vận hóa; phép trị là Thanh nhiệt hóa thấp","B. Tà nhiệt xâm phạm vào Vệ phận ở Thượng tiêu; phép trị là Tân lương giải biểu","C. Nhiệt kết ở Trường vị gây táo kết đại tiện; phép trị là Tả hạ nhiệt kết","D. Thận âm hư không chế được dương dẫn đến hư nhiệt bốc lên ở Hạ tiêu; phép trị là Tư âm thanh nhiệt"],"ans":"D","exp":"Sốt âm ỉ nặng về chiều/đêm, ngũ tâm phiền nhiệt (lòng bàn tay chân nóng), lưỡi đỏ sẫm ít rêu, mạch tế sác, thể trạng gầy là bộ mặt kinh điển của hậu kỳ Ôn bệnh tổn thương Hạ tiêu can thận âm — thận âm hư không chế được dương, hư hỏa bốc lên. Phép trị: tư âm thanh nhiệt.","key":"Sốt về chiều/đêm + lưỡi đỏ sẫm ít rêu + mạch tế sác = Hạ tiêu thận âm hư.","id":88,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Áp dụng"},{"scenario":"Ở giai đoạn cuối của một bệnh lý ôn nhiệt mãn tính, bệnh nhân xuất hiện trạng thái hôn mê sâu, kèm theo các cơn co giật, run rẩy toàn thân liên tục, mạch hư nhược sắp tuyệt.","stem":"Phân tích diễn tiến lâm sàng theo sơ đồ tích hợp Đông – Tây y, trạng thái này tương ứng với tổn thương hệ thống nào trong Y học hiện đại và bài thuốc nào cần được chỉ định khẩn cấp?","opts":["A. Tương ứng với Sốc nhiễm khuẩn, rối loạn đông máu nội mạch lan tỏa (DIC) và suy đa cơ quan ở đơn vị hồi sức tích cực (ICU); chỉ định bài thuốc Đại Định Phong Châu","B. Tương ứng với nhiễm trùng đường hô hấp trên giai đoạn đầu; chỉ định bài thuốc Ngân Kiều Tán","C. Tương ứng với viêm dạ dày cấp tính do tăng axit; chỉ định bài thuốc Bạch Hổ Thang","D. Tương ứng với hội chứng đáp ứng viêm toàn thân (SIRS); chỉ định bài thuốc Hoắc Hương Chính Khí Tán"],"ans":"A","exp":"Hôn mê sâu, co giật, run rẩy toàn thân, mạch hư nhược sắp tuyệt là biểu hiện \"chân âm dục kiệt, hư phong nội động\" ở giai đoạn cuối cùng của Ôn bệnh (hạ tiêu can thận âm kiệt) — điều trị khẩn cấp bằng Đại Định Phong Châu (Quy bản, Miết giáp, Mẫu lệ, A giao, Sinh địa, Bạch thược, Ngũ vị tử, Ma nhân, Cam thảo, Kê tử hoàng) tư âm tức phong. Tương ứng lâm sàng hiện đại là tình trạng nguy kịch toàn thân: sốc nhiễm khuẩn, DIC, suy đa cơ quan tại ICU — không phải nhiễm trùng hô hấp trên nhẹ, viêm dạ dày hay SIRS mức độ nhẹ.","key":"Hư phong nội động giai đoạn cuối → Đại Định Phong Châu ≈ sốc nhiễm khuẩn/DIC/suy đa cơ quan.","id":89,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Áp dụng"},{"scenario":"Khi nghiên cứu về mối tương quan điều trị giữa hai nền y học theo định hướng tích hợp Đông - Tây y tại ICU, một học viên đặt câu hỏi: \"Tại sao trong giai đoạn Huyết phận của Ôn bệnh (tương ứng biến chứng Sepsis/DIC nặng), YHCT lại nhấn mạnh các phép Lương huyết giải độc, Chỉ huyết, Tức phong bằng các dược liệu giàu Flavonoid, Alkaloide thay vì dùng các thuốc đại nhiệt để trợ tim?\"","stem":"Nhận định nào sau đây giải thích một cách khoa học và chính xác nhất bản chất vấn đề này?","opts":["A. Vì thuốc Lương huyết giải độc có khả năng tiêu diệt trực tiếp 100% các loại virus và vi khuẩn tương tự như kháng sinh phổ rộng","B. Vì ở giai đoạn này, tổn thương bản chất là viêm nội mô lan tỏa, rối loạn đông máu và xuất huyết nặng nề; các hợp chất Flavonoid, Alkaloide giúp kháng viêm, bảo vệ thành mạch, chống xuất huyết, phù hợp với cơ chế bệnh sinh của YHHĐ","C. Vì việc sử dụng các vị thuốc Lương huyết giúp tăng huyết áp nhanh chóng cho bệnh nhân đang bị sốc nhiễm khuẩn","D. Vì các thuốc đại nhiệt (Khương, Quế) làm ức chế hệ miễn dịch của cơ thể, khiến vi trùng bùng phát mạnh hơn tại mạch máu"],"ans":"B","exp":"Huyết phận Ôn bệnh (động huyết, ban chẩn tía, xuất huyết đa nơi) tương ứng cơ chế viêm nội mô lan tỏa và rối loạn đông máu (DIC) trong nhiễm trùng huyết nặng của YHHĐ — dùng đại nhiệt (Khương, Quế, Phụ tử) sẽ làm nặng thêm viêm/xuất huyết; lương huyết giải độc/chỉ huyết/tức phong (giàu Flavonoid, Alkaloide) có tác dụng kháng viêm, bảo vệ nội mô, chống xuất huyết — đúng hướng điều trị hỗ trợ sinh lý bệnh hiện đại.","key":"Huyết phận ≈ viêm nội mô + DIC → lương huyết/chỉ huyết = kháng viêm + bảo vệ mạch, không dùng đại nhiệt.","id":90,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Áp dụng"},{"scenario":"Một bệnh nhân nam 45 tuổi vào viện vì sốt cao liên tục sang ngày thứ 5, kèm theo biểu hiện tâm phiền bứt rứt dữ dội, mê sảng lúc tỉnh lúc mê, trên da xuất hiện nhiều vết ban chẩn màu đỏ tía, đại tiện phân đen, lưỡi đỏ thẫm và khô nứt nẻ. Xét nghiệm máu ghi nhận số lượng tiểu cầu giảm nặng, thời gian đông máu kéo dài.","stem":"Phân tích diễn tiến theo lý luận Ôn bệnh và mối tương quan với Y học hiện đại, nhận định nào sau đây là chính xác nhất?","opts":["A. Bệnh mới ở giai đoạn Vệ phận; tương ứng với nhiễm trùng đường hô hấp trên giai đoạn khởi phát","B. Bệnh đã tiến triển vào Huyết phận; tương ứng với tình trạng rối loạn đông máu nội mạch lan tỏa (DIC) và tổn thương nội mô nặng nề","C. Bệnh thuộc phạm vi Thấp nhiệt ở Trung tiêu; tương ứng với viêm dạ dày cấp tính","D. Bệnh đang ở giai đoạn Khí phận; tương ứng với hội chứng đáp ứng viêm toàn thân (SIRS) mức độ nhẹ"],"ans":"B","exp":"Ban chẩn tía + đại tiện phân đen (xuất huyết tiêu hóa) + tiểu cầu giảm nặng + đông máu kéo dài + lưỡi đỏ thẫm khô nứt là bộ triệu chứng \"động huyết\" điển hình của Huyết phận (nhiệt thịnh bức huyết vọng hành), tương ứng lâm sàng hiện đại với DIC và tổn thương nội mô lan tỏa trong nhiễm trùng huyết nặng/sốc nhiễm khuẩn.","key":"Xuất huyết đa cơ quan + rối loạn đông máu = Huyết phận ≈ DIC.","id":91,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Áp dụng"},{"scenario":"","stem":"Theo chỉ dạy của danh y Ngô Cúc Thông: \"Trị thượng tiêu như phi khinh bất an, trị hạ tiêu như quyền phi trọng bất trầm\". Khi điều trị một bệnh nhân ôn bệnh giai đoạn muộn có tổn thương sâu sắc ở hạ tiêu (Thận âm chân thủy bị thiêu rụi, hư phong nội động gây co giật), thầy thuốc cần vận dụng nguyên tắc này như thế nào trong phối ngũ dược liệu?","opts":["A. Sử dụng các vị thuốc có tính vị thanh nhẹ, phát tán như Bạc hà, Kinh giới để sơ phong thanh nhiệt ở Thượng tiêu","B. Sử dụng các vị thuốc đắng lạnh, táo thấp như Hoàng liên, Hoàng cầm để tả hỏa mạnh mẽ ở Trung tiêu","C. Chỉ sử dụng các bài thuốc xông hơi bên ngoài để phát hãn đưa tà độc ra ngoài theo đường mồ hôi","D. Sử dụng các vị thuốc có trọng lượng nặng, chất keo đặc, các vị thuốc từ động vật quy bản, để tư âm ghìm dương, trầm giáng hỏa tà xuống dưới"],"ans":"D","exp":"\"Trị hạ tiêu như quyền phi trọng bất trầm\" — hạ tiêu (can thận) cần thuốc có tính trọng trấn, chất nê (Quy bản, Miết giáp, Mẫu lệ, A giao, Kê tử hoàng...) để tư âm tiềm dương, trầm giáng hư phong. Bạc hà/Kinh giới (khinh thanh) dùng cho thượng tiêu; Hoàng liên/Hoàng cầm (khổ hàn) dùng cho trung tiêu thực nhiệt; xông hơi phát hãn không phù hợp giai đoạn hư phong nội động nguy kịch.","key":"Hạ tiêu → thuốc trọng trấn, chất nê động vật (quy bản...) để tư âm tiềm dương.","id":92,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Áp dụng"},{"scenario":"","stem":"Dựa trên phần \"Mối tương quan giữa hai nền y học\" trong bài giảng, các hợp chất tự nhiên như Flavonoid, Alkaloide, Tinh dầu có trong các bài thuốc cổ phương trị Ôn bệnh đóng vai trò gì khi đối chiếu với cơ chế sinh lý bệnh học hiện đại?","opts":["A. Chúng chỉ có tác dụng tạo mùi thơm và làm giảm vị đắng của bài thuốc chứ không có hoạt tính sinh học","B. Chúng có khả năng thay thế hoàn toàn máy thở và các phương tiện hồi sức cấp cứu tại ICU","C. Chúng hoạt động như các chất kháng sinh, kháng viêm, bảo vệ nội mô mạch máu và chống xuất huyết, phù hợp với từng giai đoạn diễn tiến của hội chứng nhiễm trùng","D. Chúng làm tăng tính thấm mao mạch nhằm giúp vi khuẩn dễ dàng đi vào máu hơn"],"ans":"C","exp":"Các hoạt chất trong dược liệu thanh nhiệt/lương huyết cổ phương (Kim ngân, Hoàng liên, Sinh địa, Đơn bì...) chứa Flavonoid, Alkaloide, Tinh dầu có tác dụng kháng khuẩn/kháng viêm, chống oxy hóa, bảo vệ tính toàn vẹn nội mô mạch máu và cầm máu — cơ chế này song song và bổ trợ với diễn tiến sinh lý bệnh học hiện đại của hội chứng nhiễm trùng, không thay thế hồi sức tích cực và không có tác dụng ngược như D nêu.","key":"Flavonoid/Alkaloide cổ phương ≈ kháng viêm-bảo vệ nội mô, hỗ trợ chứ không thay thế hồi sức hiện đại.","id":93,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Áp dụng"},{"scenario":"Bệnh nhân nam 20 tuổi, đến khám YHCT với các triệu chứng: Sốt cao li bì, tâm phiền khó ngủ, hoặc nói lảm nhảm, miệng khô, khó thở, lưỡi đỏ tươi, mạch trầm tế hoạt, tế sác hoặc phù đại.","stem":"Chẩn đoán là gì?","opts":["A. Phong nhiệt xâm phạm Vệ phận","B. Nhiệt thương dinh âm","C. Nhiệt tà xâm phạm Khí phận","D. Khí âm lưỡng hư"],"ans":"B","exp":"Sốt cao li bì (liên miên, đặc trưng dinh phận), tâm phiền khó ngủ, nói lảm nhảm (chiêm ngữ nhẹ), lưỡi đỏ, mạch tế sác là bộ triệu chứng dinh phần âm thương (nhiệt thương dinh âm) — khác Vệ phận (phải có sợ gió/lạnh, mạch phù) và Khí phận thuần túy (phải có khát nhiều, rêu vàng, mạch hồng đại, chưa ảnh hưởng thần chí).","key":"Sốt li bì + tâm phiền + nói lảm nhảm + mạch tế sác = Nhiệt thương dinh âm.","id":94,"topic":"Chẩn đoán Ôn bệnh nội khoa (SXH Dengue, Viêm gan)","bloom":"Áp dụng"},{"scenario":"Bệnh nhân nữ 30 tuổi, đến khám YHCT với các triệu chứng: Phát sốt, sợ gió, khát ít, ho đờm ít, khó khạc, mạch phù sác.","stem":"Chẩn đoán là gì?","opts":["A. Phong nhiệt xâm phạm Vệ phận","B. Nhiệt thương dinh âm","C. Nhiệt tà xâm phạm Khí phận","D. Khí âm lưỡng hư"],"ans":"A","exp":"Sốt kèm sợ gió (ố phong), khát nhẹ, ho, mạch phù sác là chứng hầu kinh điển tà tập phế vệ (Vệ phận) của Phong ôn — bệnh còn nông, mạch còn phù (chưa nhập lý).","key":"Sốt + sợ gió + mạch phù sác = Vệ phận.","id":95,"topic":"Chẩn đoán Ôn bệnh nội khoa (SXH Dengue, Viêm gan)","bloom":"Áp dụng"},{"scenario":"Bệnh nhi nam, 20 tháng tuổi được chẩn đoán bệnh sởi, khám với các triệu chứng theo YHCT: Sốt nhẹ, họng khô, ho ít, nốt sởi mờ dần, lưỡi đỏ nhẹ.","stem":"Chẩn đoán phù hợp trên bệnh nhân này?","opts":["A. Nhiệt tà phạm Vệ phận (Thời kỳ khởi phát)","B. Nhiệt tà uất kết Dinh Huyết phận (Thời kỳ sởi mọc)","C. Nhiệt tà uất kết Dinh Huyết phận (Thời kỳ sởi bay)","D. Nhiệt tà xâm nhập ở Khí phận (Thời kỳ sởi mọc)"],"ans":"C","exp":"Nốt sởi mờ dần, sốt nhẹ, triệu chứng toàn thân giảm nhẹ là đặc trưng của thời kỳ ban sởi lặn (sởi bay) — giai đoạn nhiệt độc dinh huyết đang thoái lui, còn dư nhiệt nhẹ và bắt đầu tổn thương âm dịch (họng khô).","key":"Ban mờ dần, nhẹ dần = thời kỳ sởi bay (dinh huyết đang giải).","id":96,"topic":"Chẩn đoán Ôn bệnh nội khoa (SXH Dengue, Viêm gan)","bloom":"Áp dụng"},{"scenario":"Bệnh nhi nữ, 18 tháng tuổi được chẩn đoán bệnh sởi, khám với các triệu chứng theo YHCT: Sốt, đau họng, ho khan, nốt sởi xuất hiện từ phía sau tai, chân tóc, vùng cổ rồi lan dần ra toàn thân, lưỡi đỏ, mạch sác.","stem":"Chẩn đoán phù hợp trên bệnh nhân này?","opts":["A. Nhiệt tà phạm Vệ phận (Thời kỳ khởi phát)","B. Nhiệt tà uất kết Dinh Huyết phận (Thời kỳ sởi mọc)","C. Nhiệt tà uất kết Dinh Huyết phận (Thời kỳ sởi bay)","D. Nhiệt tà xâm nhập ở Khí phận (Thời kỳ sởi mọc)"],"ans":"B","exp":"Ban sởi đang mọc và lan rộng dần khắp người (từ sau tai, chân tóc, cổ → toàn thân) là dấu hiệu đặc trưng thời kỳ sởi mọc — nhiệt độc từ khí phận đã lan vào dinh huyết, bức huyết ra bì phu tạo ban.","key":"Ban đang mọc, lan dần toàn thân = thời kỳ sởi mọc (dinh huyết phận).","id":97,"topic":"Chẩn đoán Ôn bệnh nội khoa (SXH Dengue, Viêm gan)","bloom":"Áp dụng"},{"scenario":"Bệnh nhi nam, 12 tuổi được chẩn đoán Thủy đậu, hiện bệnh nhân có các triệu chứng: Sốt cao, phiền khát, mặt đỏ, môi hồng, niêm mạc miệng có những nốt phỏng. Nốt đậu mọc dày, sắc tím tối, màu nước đục, xung quanh nốt đậu màu đỏ sậm. Chất lưỡi đỏ, rêu lưỡi vàng. Mạch sác.","stem":"Chẩn đoán Y học cổ truyền vị trí bệnh trên bệnh nhân này?","opts":["A. Bệnh ở Vệ phận","B. Bệnh ở Khí và Dinh Phận","C. Bệnh ở Kinh lạc","D. Bệnh ở tạng phủ"],"ans":"B","exp":"Sốt cao, phiền khát, nốt đậu mọc dày sắc tím tối, nước đục, quầng đỏ sậm, lưỡi đỏ rêu vàng, mạch sác là biểu hiện nhiệt độc thịnh đã vào sâu Khí phận (sốt cao khát, rêu vàng) và lan Dinh phận (màu tím tối, quầng đỏ sậm là dấu hiệu nhiệt nhập huyết lạc) — nặng hơn nhiều so với thể nhẹ chỉ ở Vệ phận.","key":"Nốt đậu dày, tím tối, sốt cao khát = Khí và Dinh phận (nặng).","id":98,"topic":"Chẩn đoán Ôn bệnh nội khoa (SXH Dengue, Viêm gan)","bloom":"Áp dụng"},{"scenario":"Bệnh nhi nữ, 10 tuổi được chẩn đoán Thủy đậu, hiện bệnh nhân có các triệu chứng: sốt nhẹ, ho ít, nước mũi loãng trong, mệt mỏi nhẹ, ăn uống bình thường, nốt đậu mọc rải rác, xung quanh màu hồng nhạt. Lưỡi đỏ. Mạch phù sác.","stem":"Chẩn đoán Y học cổ truyền vị trí bệnh trên bệnh nhân này?","opts":["A. Bệnh ở Vệ phận","B. Bệnh ở Khí và Dinh Phận","C. Bệnh ở Huyết phận","D. Bệnh ở tạng phủ"],"ans":"A","exp":"Sốt nhẹ, ho ít, nước mũi loãng trong, mệt mỏi nhẹ, nốt đậu rải rác quầng hồng nhạt, mạch phù sác là thể nhẹ, biểu chứng phong nhiệt còn ở Vệ phận (phế vệ), chưa nhập lý.","key":"Thể nhẹ, nốt đậu thưa quầng nhạt, mạch phù = Vệ phận.","id":99,"topic":"Chẩn đoán Ôn bệnh nội khoa (SXH Dengue, Viêm gan)","bloom":"Áp dụng"},{"scenario":"Bệnh nhân nam 50 tuổi, được chẩn đoán Sốt xuất huyết Dengue, hiện tại bệnh nhân hết sốt, người mệt mỏi, chán ăn, tay chân lạnh, đoản hơi, tiêu lỏng, da xanh, lưỡi nhợt, mạch vô lực.","stem":"Chẩn đoán Y học cổ truyền trên bệnh nhân này?","opts":["A. Phế khí hư","B. Tỳ khí hư","C. Can khí hư","D. Thận khí hư"],"ans":"B","exp":"Theo phác đồ YHCT SXH Dengue (KB <code>benh_hoc_dong_tay_y_Guidline_Bo_y_te/nhiem_trung/sot_xuat_huyet_dengue.md</code>, mục \"Thể Tỳ dương hư — tương ứng giai đoạn hồi phục\"): \"Mệt mỏi, chân tay lạnh, chán ăn, mồ hôi đầm đìa, đại tiện lỏng, mạch tế nhược\" — khớp với bộ triệu chứng chán ăn, tay chân lạnh, tiêu lỏng, mạch vô lực của bệnh nhân, thuộc phạm trù Tỳ khí/dương hư (giai đoạn hồi phục sau sốt, chính khí — đặc biệt tỳ vị — chưa phục hồi).","key":"Hết sốt + mệt mỏi
