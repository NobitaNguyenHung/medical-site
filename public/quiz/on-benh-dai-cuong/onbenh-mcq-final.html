 + chán ăn + tay chân lạnh + tiêu lỏng = Tỳ khí (dương) hư, giai đoạn hồi phục.","id":100,"topic":"Chẩn đoán Ôn bệnh nội khoa (SXH Dengue, Viêm gan)","bloom":"Áp dụng"},{"scenario":"Bệnh nhân nữ, 40 tuổi được chẩn đoán Sốt xuất huyết Dengue, khám theo Y học cổ truyền có các triệu chứng sốt cao, chảy máu chân răng, chất lưỡi đỏ, mạch sác hay hồng đại.","stem":"Tương ứng với giai đoạn nào sau đây?","opts":["A. Nhiệt độc xâm phạm tạng phủ","B. Nhiệt độc xâm phạm phần vệ, khí","C. Nhiệt độc xâm phạm kinh lạc","D. Nhiệt độc xâm phạm Dinh Huyết phận"],"ans":"D","exp":"Sốt cao kèm xuất huyết (chảy máu chân răng — thuộc nhóm \"khạc huyết, thổ huyết, tiện huyết, nục huyết...\") là dấu hiệu \"động huyết\" — nhiệt thịnh bức huyết vọng hành, đặc trưng cho giai đoạn nhiệt độc đã xâm phạm Dinh Huyết phận, nặng hơn giai đoạn vệ khí thuần túy (không xuất huyết).","key":"Sốt cao + xuất huyết = nhiệt độc xâm phạm Dinh Huyết phận.","id":101,"topic":"Chẩn đoán Ôn bệnh nội khoa (SXH Dengue, Viêm gan)","bloom":"Áp dụng"},{"scenario":"Bệnh nhân nam, 30 tuổi khám với các triệu chứng sốt vừa hoặc sốt nhẹ, sưng cứng dưới tai và vùng dưới hàm, ấn vào đau, thường sưng một bên dần dần sưng cả hai bên, lưỡi đỏ, rêu vàng mỏng, mạch phù sác.","stem":"Hãy đưa ra chẩn đoán hội chứng bệnh YHCT phù hợp nhất ở bệnh nhân này?","opts":["A. Phong nhiệt phạm Phế","B. Phong nhiệt phạm kinh Đởm Vị","C. Phế âm hư","D. Phong hàn phạm kinh Đởm Vị"],"ans":"B","exp":"Quai bị (Sang di) do phong nhiệt thời độc xâm phạm, vị trí sưng đau dưới tai/góc hàm nằm trên đường đi của kinh túc Thiếu dương Đởm và túc Dương minh Vị — nên gọi là phong nhiệt phạm kinh Đởm Vị (không phải phế, vì vị trí bệnh không phải hô hấp; không phải phong hàn vì có sốt, rêu vàng, mạch sác — dấu hiệu nhiệt).","key":"Sưng đau góc hàm/dưới tai + sốt + rêu vàng mạch sác = Phong nhiệt phạm kinh Đởm Vị.","id":102,"topic":"Chẩn đoán Ôn bệnh nội khoa (SXH Dengue, Viêm gan)","bloom":"Áp dụng"},{"scenario":"Bệnh nhi nữ, 18 tháng tuổi được chẩn đoán bệnh sởi, khám với các triệu chứng theo YHCT: Phát sốt, sợ lạnh, tắc mũi, chảy nước mũi, khái thấu, hắt hơi, mắt đỏ, chảy nước mắt, lưỡi đỏ, mạch phù sác.","stem":"Chẩn đoán phù hợp trên bệnh nhân này?","opts":["A. Nhiệt tà phạm Vệ phận (Thời kỳ khởi phát)","B. Nhiệt tà uất kết Dinh Huyết phận (Thời kỳ sởi mọc)","C. Nhiệt tà uất kết Dinh Huyết phận (Thời kỳ sởi bay)","D. Nhiệt tà xâm nhập ở khí phận (Thời kỳ sởi mọc)"],"ans":"A","exp":"Sốt, sợ lạnh, tắc mũi chảy nước mũi, ho, hắt hơi, mắt đỏ chảy nước mắt, mạch phù sác — chưa có ban sởi, chỉ là triệu chứng giống cảm mạo (phế vệ biểu chứng) — đây là thời kỳ khởi phát (tiền triệu) của sởi, nhiệt tà còn ở Vệ phận.","key":"Triệu chứng giống cảm mạo, chưa phát ban, mạch phù = Vệ phận, thời kỳ khởi phát.","id":103,"topic":"Chẩn đoán Ôn bệnh nội khoa (SXH Dengue, Viêm gan)","bloom":"Áp dụng"},{"scenario":"Bệnh nhân nữ, 25 tuổi được chẩn đoán Viêm gan siêu vi cấp, đến khám với các triệu chứng sau: Vàng da, ngứa, đau hạ sườn (P), sốt, miệng khô, đắng, ăn kém, buồn nôn, nôn, đầy bụng, tiểu vàng tiêu bón, rêu lưỡi vàng dơ, mạch sác.","stem":"Hãy đưa ra chẩn đoán YHCT phù hợp nhất?","opts":["A. Can Tỳ thấp nhiệt","B. Can uất tỳ hư","C. Tỳ khí hư","D. Can khí uất kết"],"ans":"A","exp":"Vàng da (dương hoàng), sốt, miệng khô đắng, buồn nôn, đầy bụng, tiểu vàng táo bón, rêu vàng dơ, mạch sác là bộ triệu chứng kinh điển của thấp nhiệt uất kết tại Can Đởm - Tỳ Vị (Can Tỳ thấp nhiệt, dương hoàng chứng) — khác các thể hư/uất đơn thuần (Can uất tỳ hư, Tỳ khí hư, Can khí uất kết đều không có sốt, rêu vàng dơ, mạch sác là dấu hiệu thấp nhiệt thực chứng rõ).","key":"Vàng da + sốt + miệng đắng + rêu vàng dơ + mạch sác = Can Tỳ thấp nhiệt.","id":104,"topic":"Chẩn đoán Ôn bệnh nội khoa (SXH Dengue, Viêm gan)","bloom":"Áp dụng"},{"scenario":"","stem":"Ôn bệnh có mấy tính chất?","opts":["A. 4","B. 5","C. 6","D. 7"],"ans":"A","exp":"KB nêu sau phần hao âm thương tân: \"Trên đây là bốn đặc điểm cùng có của Tứ thời Ôn bệnh\". Vì vậy đáp án đúng là 4. Nguồn: kb/on_benh_dai_cuong/01_ly-thuyet/bai-01-dai-cuong-on-benh_001.md.","key":"Tứ thời Ôn bệnh có 4 đặc điểm chung.","id":105,"topic":"Khái niệm & Đặc điểm","bloom":"Nhớ"},{"scenario":"Một bệnh nhân sốt cao, khát nước nhiều, miệng khô, mồ hôi nhiều, đại tiện táo.","stem":"Theo học thuyết Ôn bệnh, đặc điểm bệnh lý nổi bật nhất là:","opts":["A. Hàn tà ngưng trệ","B. Thấp tà khốn tỳ","C. Nhiệt thịnh, dễ hao tân thương âm","D. Khí huyết hư suy"],"ans":"C","exp":"Ôn tà là dương nhiệt kháng thịnh, dễ hao tổn âm và tân dịch; triệu chứng khát, khô miệng, táo bón phù hợp nhiệt thịnh thương tân. Nguồn: bai-01-dai-cuong-on-benh_001.md; bai-03-bien-chung_001.md.","key":"Ôn bệnh: nhiệt thịnh dễ thương tân hao âm.","id":106,"topic":"Khái niệm & Đặc điểm","bloom":"Hiểu"},{"scenario":"Một địa phương xuất hiện nhiều người mắc cùng một bệnh truyền nhiễm trong thời gian ngắn.","stem":"Theo Chu Dương Tuấn, tình huống này được gọi là:","opts":["A. Thương hàn","B. Ôn bệnh","C. Dịch","D. Nội thương"],"ans":"C","exp":"Chu Dương Tuấn phân biệt một người bệnh là Ôn, một địa phương nhiều người mắc bệnh giống nhau là Dịch. Đây là tình huống lưu hành hàng loạt. Nguồn: bai-01-dai-cuong-on-benh_001.md.","key":"Nhiều người cùng bệnh trong địa phương = Dịch.","id":107,"topic":"Lịch sử & Y gia","bloom":"Nhớ"},{"scenario":"Bệnh nhân sốt cao, ho khan, họng khô, không đàm, miệng khô táo.","stem":"Biểu hiện này phù hợp nhất với tổn thương:","opts":["A. Thận âm","B. Can âm","C. Phế âm","D. Tỳ dương"],"ans":"C","exp":"KB mô tả bệnh tại thượng tiêu tổn thương phế âm có miệng, mũi, hầu họng khô táo, ho khan, không đàm. Nguồn: bai-01-dai-cuong-on-benh_001.md.","key":"Ho khan, họng khô, không đàm = Phế âm thương.","id":108,"topic":"Cơ chế YHCT","bloom":"Áp dụng"},{"scenario":"Một bệnh nhân mắc bệnh truyền nhiễm cấp tính, sốt cao, khởi phát nhanh.","stem":"Theo Ôn bệnh học, giai đoạn đầu thường là:","opts":["A. Huyết phần","B. Dinh phần","C. Khí phần","D. Vệ phần"],"ans":"D","exp":"Ôn tà mới xâm nhập cơ biể "D. Thận dương"],"ans":"A","exp":"KB nêu bệnh tại trung tiêu gây tổn thương vị âm với miệng khát muốn uống, lưỡi đỏ thẫm, ít/không rêu. Nguồn: bai-01-dai-cuong-on-benh_001.md.","key":"Khát dữ + lưỡi đỏ ít rêu = Vị âm thương.","id":113,"topic":"Cơ chế YHCT","bloom":"Áp dụng"},{"scenario":"Bệnh nhân sốt, co giật, mê sảng.","stem":"Theo lý luận Ôn bệnh, cơ chế phù hợp nhất là:","opts":["A. Hàn tà nhập lý","B. Thấp tà khốn tỳ","C. Nhiệt tà nội hãm tâm dinh, dẫn động can phong","D. Khí hư hạ hãm"],"ans":"C","exp":"Ôn tà nhập sâu có thể nhiễu tâm thần gây mê sảng; nhiệt cực, âm thương có thể dẫn động can phong gây co giật. Nguồn: bai-03-bien-chung_001.md; bai-03-bien-chung_002.md.","key":"Mê sảng + co giật = nhiệt nhập sâu, động phong.","id":114,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Phân tích"},{"scenario":"Một bệnh nhân khởi phát bệnh ngay sau khi cảm nhiễm ngoại tà và biểu hiện ban đầu là biểu nhiệt.","stem":"Đây là:","opts":["A. Phục tà ôn bệnh","B. Tân cảm ôn bệnh","C. Nội thương phát nhiệt","D. Hư lao phát nhiệt"],"ans":"B","exp":"Cảm tà lập tức phát, bệnh phát tại biểu là loại Ôn bệnh tân cảm. Nguồn: bai-01-dai-cuong-on-benh_001.md.","key":"Cảm tà liền phát ở biểu = Tân cảm.","id":115,"topic":"Phân loại Ôn bệnh","bloom":"Nhớ"},{"scenario":"Bệnh nhân sốt cao, khát nước, mê sảng, ban xuất huyết.","stem":"Chuỗi truyền biến phù hợp nhất là:","opts":["A. Vệ -> Khí -> Dinh -> Huyết","B. Khí -> Vệ -> Dinh -> Huyết","C. Dinh -> Khí -> Huyết -> Vệ","D. Huyết -> Dinh -> Khí -> Vệ"],"ans":"A","exp":"Biện chứng Vệ-Khí-Dinh-Huyết mô tả truyền biến từ nông vào sâu: vệ, khí, dinh, huyết; huyết phần là giai đoạn sâu nặng với xuất huyết. Nguồn: bai-03-bien-chung_001.md.","key":"Truyền biến điển hình: Vệ -> Khí -> Dinh -> Huyết.","id":116,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Nhớ"},{"scenario":"Một bệnh nhân sốt kéo dài, ban đầu sốt nhẹ, ngực bụng đầy tức, rêu lưỡi nhớt; sau đó xuất hiện miệng khô, lưỡi đỏ, ít tân dịch.","stem":"Quá trình này cho thấy:","opts":["A. Hàn tà hóa nhiệt","B. Thấp nhiệt hóa táo, hao thương âm tân","C. Dương khí phục hồi","D. Huyết hư sinh phong"],"ans":"B","exp":"KB nêu thấp nhiệt hóa táo hóa hỏa mới dẫn đến hao âm tân; trong quá trình có thể còn thấp nhiệt mà âm tân đã thương tổn. Nguồn: bai-01-dai-cuong-on-benh_001.md.","key":"Thấp nhiệt kéo dài có thể hóa táo, thương âm tân.","id":117,"topic":"Cơ chế YHCT","bloom":"Hiểu"},{"scenario":"Một bệnh nhân sốt cao, xuất huyết dưới da, tiểu máu.","stem":"Theo lý luận Ôn bệnh, nguyên nhân trực tiếp nhất là:","opts":["A. Thấp tà khốn tỳ","B. Hàn tà ngưng trệ huyết mạch","C. Nhiệt thịnh bức huyết vọng hành","D. Khí hư bất nhiếp huyết"],"ans":"C","exp":"Huyết phần chứng gây nhiều khiếu xuất huyết do huyết phần nhiệt quá thịnh, huyết lạc tổn thương, kinh huyết vọng hành. Nguồn: bai-03-bien-chung_001.md.","key":"Nhiệt thịnh bức huyết vọng hành gây xuất huyết.","id":118,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Áp dụng"},{"scenario":"Trong một vụ dịch mới, bệnh nhân chủ yếu mắc bệnh sau khi tiếp xúc gần qua đường hô hấp.","stem":"Nhận định nào phù hợp nhất với học thuyết của Ngô Hựu Khả?","opts":["A. Bệnh xâm nhập qua da là chủ yếu","B. Bệnh do lệ khí, xâm nhập qua mũi miệng","C. Bệnh do thất tình nội thương","D. Bệnh do ăn uống thất thường"],"ans":"B","exp":"KB ghi Ngô Hựu Khả gọi lây bằng đường mũi miệng là thiên thụ, do tiếp xúc là truyền nhiễm. Nguồn: bai-02-nguyen-nhan-phat-benh_003.md.","key":"Ngô Hựu Khả: lệ khí/tạp khí lây qua mũi miệng.","id":119,"topic":"Lịch sử & Y gia","bloom":"Hiểu"},{"scenario":"Một bác sĩ gặp bệnh nhân sốt cao, khát nước, họng khô, mạch sác. Bác sĩ quyết định điều trị theo nguyên tắc \"tân ôn giải biểu\" như thương hàn.","stem":"Đánh giá nào phù hợp nhất?","opts":["A. Hoàn toàn chính xác vì mọi ngoại cảm bệnh đều giống nhau","B. Chấp nhận được vì sốt luôn do hàn tà gây ra","C. Không phù hợp vì biểu hiện ôn tà; nên biện chứng theo Ôn bệnh học","D. Không thể đánh giá do thiếu thông tin"],"ans":"C","exp":"Ôn là dương tà, mới phát đã thiên nhiệt nên dùng tân lương nhẹ; dùng pháp tân ôn như thương hàn không phù hợp và dễ thương tân. Nguồn: bai-01-dai-cuong-on-benh_002.md.","key":"Ôn bệnh khác thương hàn: trị thiên tân lương, thanh nhiệt.","id":120,"topic":"Phân loại & So sánh Thương hàn","bloom":"Đánh giá"},{"scenario":"Một bệnh nhân nam 56 tuổi, bị sốt hai ngày, ớn lạnh, được chẩn đoán là nhiệt ở vệ phận.","stem":"Nguyên tắc điều trị nào là phù hợp nhất?","opts":["A. Thanh khí","B. Thấu nhiệt","C. Phát hãn","D. Tư âm"],"ans":"C","exp":"Vệ phần là tà còn ở biểu; nguyên tắc kinh điển là giải biểu, trong hệ lựa chọn tương ứng với hãn pháp. Cần hiểu là tân lương giải biểu, không phải phát hãn tân ôn mạnh. Nguồn: bai-03-bien-chung_001.md; bai-01-dai-cuong-on-benh_002.md.","key":"Vệ phần: giải biểu/hãn pháp theo hướng tân lương.","id":121,"topic":"Nguyên tắc điều trị Ôn bệnh","bloom":"Áp dụng"},{"scenario":"Một bệnh nhân nữ 60 tuổi, bị sốt 6 ngày, không ớn lạnh, được chẩn đoán là nhiệt ở dinh phận.","stem":"Nguyên tắc điều trị nào là phù hợp nhất?","opts":["A. Thanh khí","B. Tư âm","C. Phát hãn","D. Thấu nhiệt"],"ans":"D","exp":"Dinh phần mới nhập còn có thể thấu nhiệt chuyển khí, đưa nhiệt ra khí phần; đây là nguyên tắc điều trị đặc trưng. Nguồn: bai-03-bien-chung_001.md.","key":"Dinh phần: thấu nhiệt chuyển khí.","id":122,"topic":"Nguyên tắc điều trị Ôn bệnh","bloom":"Áp dụng"},{"scenario":"Một bệnh nhân mắc bệnh truyền nhiễm cấp tính bước sang ngày thứ 4, sốt cao, khát nước nhiều, thích uống lạnh, vã mồ hôi, bứt rứt, mặt đỏ, đại tiện táo, nước tiểu vàng thẫm; lưỡi đỏ, rêu vàng khô, mạch hồng đại sác.","stem":"Dựa trên lý luận Vệ Khí Dinh Huyết, hãy xác định vị trí bệnh và lựa chọn phương án xử trí bằng bài thuốc Y học cổ truyền phù hợp nhất?","opts":["A. Bệnh tại Khí phận (Vị nhiệt); xử trí bằng bài thuốc Bạch hổ thang.","B. Bệnh tại Huyết phận; xử trí bằng bài thuốc Tê giác địa hoàng thang","C. Bệnh tại Dinh phận; xử trí bằng bài thuốc Thanh Dinh Thang.","D. Bệnh tại Vệ phận; xử trí bằng bài thuốc Ngân kiều tán hoặc Tang cúc ẩm."],"ans":"A","exp":"Sốt cao, không ố hàn, khát uống lạnh, mồ hôi nhiều, rêu vàng khô, mạch hồng đại là nhiệt thịnh dương minh/khí phần. Kuzu cũng trả về Nhiệt tích dương minh khí phần trị bằng Bạch hổ thang. Nguồn: bai-03-bien-chung_001.md; Kuzu on_benh_dai_cuong.","key":"Tứ đại chứng dương minh/khí phận -> Bạch hổ thang.","id":123,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Phân tích"},{"scenario":"Thầy thuốc đang điều trị bệnh nhân ôn bệnh bằng Thanh Dinh Thang do tà nhiệt từ khí phận chuyển vào dinh phận.","stem":"Theo nguyên tắc phối ngũ trị liệu của Diệp Thiên Sĩ, hành động nào đúng nhất?","opts":["A. Gia thêm Phụ tử, Nhục quế để ôn dương.","B. Giữ nguyên Hoàng liên để tăng khổ hàn thanh nhiệt tại dinh phận.","C. Thay bằng Đại Thừa Khí Thang để công hạ ngay.","D. Bỏ vị Hoàng liên để tránh quá đắng lạnh giữ tà nhiệt lại dinh phận, giúp đẩy nhiệt ra ngoài khí phận."],"ans":"D","exp":"Dinh phần mới nhập cần thấu nhiệt chuyển khí; tránh vị quá khổ hàn làm tà bị bế ở dinh. Nguyên tắc này phù hợp hướng thấu dinh chuyển khí trong KB. Nguồn: bai-03-bien-chung_001.md.","key":"Dinh phần: thanh dinh nhưng phải thấu nhiệt ra khí.","id":124,"topic":"Nguyên tắc điều trị Ôn bệnh","bloom":"Đánh giá"},{"scenario":"Bệnh nhân nam sốt âm ỉ kéo dài, nặng chiều đêm, lòng bàn tay chân nóng, miệng khô họng khát, tiểu ít vàng, đại tiện khô; gầy, lưỡi đỏ sẫm ít rêu, mạch tế sác.","stem":"Dựa trên phân loại bộ vị bị bệnh, cơ chế bệnh sinh chính và phép trị tương ứng là gì?","opts":["A. Thấp nhiệt trung tiêu; thanh nhiệt hóa thấp.","B. Tà nhiệt vệ phận thượng tiêu; tân lương giải biểu.","C. Nhiệt kết trường vị; tả hạ nhiệt kết.","D. Thận âm hư không chế dương, hư nhiệt hạ tiêu; tư âm thanh nhiệt."],"ans":"D","exp":"Hạ tiêu thận tinh hao tổn có miệng họng khô, thủ túc tâm nhiệt, lưỡi đỏ khô ít tân dịch, mạch hư; trị theo hướng tư âm thanh nhiệt. Nguồn: bai-03-bien-chung_002.md.","key":"Ngũ tâm phiền nhiệt + lưỡi đỏ ít rêu = hạ tiêu thận âm thương.","id":125,"topic":"Tam tiêu biện chứng","bloom":"Phân tích"},{"scenario":"Bệnh nhân nam 45 tuổi sốt cao liên tục ngày 5, tâm phiền, mê sảng, ban chẩn đỏ tía, đại tiện phân đen, lưỡi đỏ thẫm khô; tiểu cầu giảm nặng, thời gian đông máu kéo dài.","stem":"Phân tích diễn tiến theo Ôn bệnh và tương quan YHHĐ, nhận định nào chính xác nhất?","opts":["A. Bệnh mới ở Vệ phận; tương ứng nhiễm trùng hô hấp trên khởi phát.","B. Bệnh đã vào Huyết phận; tương ứng DIC và tổn thương nội mô nặng.","C. Bệnh thuộc Thấp nhiệt trung tiêu; tương ứng viêm dạ dày cấp.","D. Bệnh đang ở Khí phận; tương ứng SIRS nhẹ."],"ans":"B","exp":"Ban đỏ tía, phân đen, lưỡi đỏ thẫm, xuất huyết là Huyết phần. DIC/tổn thương nội mô là phần đối chiếu hiện đại của tình trạng xuất huyết, rối loạn đông máu nặng. Nguồn KB: bai-03-bien-chung_001.md; thuật ngữ YHHĐ là đối chiếu ngoài graph.","key":"Xuất huyết + ban tím + lưỡi tối thẫm = Huyết phận.","id":126,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Phân tích"},{"scenario":"Bệnh nhân ôn bệnh giai đoạn muộn, tổn thương hạ tiêu: Thận âm chân thủy bị thiêu rụi, hư phong nội động gây co giật.","stem":"Theo câu “Trị thượng tiêu như phi khinh bất an, trị hạ tiêu như quyền phi trọng bất trầm”, cần vận dụng thế nào?","opts":["A. Dùng vị thanh nhẹ phát tán như Bạc hà, Kinh giới.","B. Dùng vị đắng lạnh táo thấp như Hoàng liên, Hoàng cầm.","C. Chỉ dùng xông hơi phát hãn.","D. Dùng vị trọng, chất keo đặc, vị động vật/quy bản để tư âm ghìm dương, trầm giáng hỏa tà."],"ans":"D","exp":"Hạ tiêu âm hư phong động cần tư âm dưỡng huyết, tiềm dương tức phong; Kuzu trả về Tam giáp phục mạch thang hoặc Đại định phong châu cho Xuân Ôn âm hư phong động. Nguồn: xuan-on_002.md; Kuzu on_benh_dai_cuong.","key":"Hạ tiêu bệnh sâu: trọng trấn, tư âm, tiềm dương tức phong.","id":127,"topic":"Nguyên tắc điều trị Ôn bệnh","bloom":"Phân tích"},{"scenario":"","stem":"Các hợp chất tự nhiên như Flavonoid, Alkaloide, Tinh dầu trong bài thuốc cổ phương trị Ôn bệnh đóng vai trò gì khi đối chiếu cơ chế sinh lý bệnh hiện đại?","opts":["A. Chỉ tạo mùi, giảm vị đắng, không có hoạt tính.","B. Thay thế hoàn toàn máy thở và ICU.","C. Hoạt động như chất kháng sinh, kháng viêm, bảo vệ nội mô và chống xuất huyết phù hợp từng giai đoạn nhiễm trùng.","D. Làm tăng tính thấm mao mạch để vi khuẩn vào máu."],"ans":"C","exp":"KB Ôn bệnh mô tả pháp thanh nhiệt giải độc, lương huyết, chỉ huyết, bảo vệ phế lạc; lựa chọn C là diễn giải tích hợp hiện đại hợp lý nhất, còn các lựa chọn khác cực đoan hoặc sai. Nguồn KB: xuan-on_002.md; thu-thap_001.md; phần hoạt chất là đối chiếu ngoài KB Ôn bệnh.","key":"Dược liệu thanh nhiệt/lương huyết tương ứng kháng viêm, bảo vệ mạch, chống xuất huyết.","id":128,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Hiểu"},{"scenario":"Người bệnh sốt nhẹ, hơi sợ lạnh, đau đầu, mới khởi phát bệnh ôn nhiệt.","stem":"Phương thuốc phù hợp nhất là gì?","opts":["A. Tê giác địa hoàng thang để lương huyết","B. Đại thừa khí thang để công hạ nhiệt kết","C. Tăng dịch thang để tư âm nhuận táo","D. Ngân kiều tán để tân lương giải biểu"],"ans":"D","exp":"Phong nhiệt/phế vệ sơ khởi dùng tân lương giải biểu; Kuzu trả về Tà tập phế vệ vệ phần trị bằng Ngân kiều tán/Tang cúc ẩm. Nguồn: phong-on_001.md; Kuzu on_benh_dai_cuong.","key":"Sơ khởi vệ phần -> Ngân kiều tán.","id":129,"topic":"Phương dược theo giai đoạn bệnh","bloom":"Áp dụng"},{"scenario":"Người bệnh sốt cao liên tục, không còn ớn lạnh, khát nước nhiều, mạch hồng đại.","stem":"Phương thuốc thích hợp nhất là gì?","opts":["A. Hoắc hương chính khí tán để hóa thấp","B. Bạch hổ thang để thanh khí tiết nhiệt","C. Thanh dinh thang để thanh dinh tiết nhiệt","D. Phục mạch thang để dưỡng âm phục mạch"],"ans":"B","exp":"Sốt cao, không ố hàn, khát, mạch hồng đại là khí phần/dương minh nhiệt thịnh; Kuzu ghi Nhiệt tích dương minh khí phần dùng Bạch hổ thang. Nguồn: bai-03-bien-chung_001.md; Kuzu.","key":"Khí phần dương minh nhiệt thịnh -> Bạch hổ thang.","id":130,"topic":"Phương dược theo giai đoạn bệnh","bloom":"Áp dụng"},{"scenario":"Người bệnh sốt cao, mạch phù đại, khát nước nhiều, khí âm đều hao tổn.","stem":"Bài thuốc phù hợp nhất là gì?","opts":["A. Bạch hổ gia nhân sâm thang","B. Hoàng long thang gia giảm","C. Trấn can tức phong thang","D. An cung ngưu hoàng hoàn"],"ans":"A","exp":"Khí phần nhiệt thịnh kèm khí âm hao tổn cần thanh nhiệt sinh tân, ích khí; Bạch hổ gia nhân sâm thang phù hợp nhất trong các lựa chọn. Nguồn: xuan-on_003.md; Kuzu nhóm khí phần dương minh.","key":"Nhiệt thịnh + khí âm hao -> Bạch hổ gia nhân sâm thang.","id":131,"topic":"Phương dược theo giai đoạn bệnh","bloom":"Áp dụng"},{"scenario":"Người bệnh sốt cao về đêm, tâm phiền, hao tổn tân dịch, nhiệt tà nhập dinh phận.","stem":"Phương thuốc phù hợp nhất là gì?","opts":["A. Đại thừa khí thang để công hạ tích trệ","B. Thanh dinh thang để thanh dinh tiết nhiệt","C. Hoắc hương chính khí tán để hóa thấp","D. Bát chính tán để thanh nhiệt lợi thấp"],"ans":"B","exp":"Dinh phần chứng có sốt cao về đêm, tâm phiền, lưỡi đỏ thẫm; pháp là thanh dinh thấu nhiệt. Kuzu cũng trả về Thanh dinh thang cho nhiệt hãm tâm bào/dinh phần. Nguồn: bai-03-bien-chung_001.md; Kuzu.","key":"Dinh phần -> Thanh dinh thang.","id":132,"topic":"Phương dược theo giai đoạn bệnh","bloom":"Áp dụng"},{"scenario":"Người bệnh sốt cao về đêm, tâm phiền, lưỡi đỏ sẫm, hao tân dịch rõ.","stem":"Dấu hiệu nào có giá trị nhất để xác định bệnh đã vào dinh phận?","opts":["A. Đầy bụng kèm táo bón nhiều ngày","B. Đau đầu kèm hơi sợ lạnh","C. Khát nước nhưng chưa tổn hao tân dịch","D. Sốt cao thiên về ban đêm kéo dài"],"ans":"D","exp":"Căn cứ xác định dinh phần là sốt cao về đêm, thần trí bất thường và chất lưỡi đỏ thẫm; trong các lựa chọn, sốt cao về đêm đặc hiệu nhất. Nguồn: bai-03-bien-chung_001.md.","key":"Dinh phần: thân nhiệt dạ thâm.","id":133,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Áp dụng"},{"scenario":"Người bệnh sốt cao, mê sảng, bụng đầy cứng, táo bón nhiều ngày.","stem":"Cơ chế bệnh sinh chủ yếu là gì?","opts":["A. Âm huyết hư tổn gây hư phong nội động","B. Phong hàn phạm biểu gây vệ khí bất hòa","C. Nhiệt kết trường vị gây bế tắc phủ khí","D. Thấp nhiệt hạ tiêu gây rối loạn khí hóa"],"ans":"C","exp":"Dương minh tả kết/nhiệt kết trường phủ có triều nhiệt, thần hôn chiêm ngữ, đại tiện táo kết, bụng cứng đầy đau. Nguồn: bai-03-bien-chung_002.md.","key":"Táo bón, bụng cứng, mê sảng = nhiệt kết trường vị.","id":134,"topic":"Tam tiêu biện chứng","bloom":"Áp dụng"},{"scenario":"Người bệnh sốt âm ỉ, lòng bàn tay chân nóng, mất ngủ, ù tai, lưỡi đỏ ít rêu.","stem":"Cơ chế bệnh sinh chủ yếu là gì?","opts":["A. Âm hư không chế ước được dương khí","B. Thấp nhiệt trung tiêu làm tỳ vị thất điều","C. Phong hàn phạm phế làm vệ khí bế tắc","D. Thực nhiệt trường vị gây táo kết đại tiện"],"ans":"A","exp":"Hạ tiêu thận tinh hao tổn có thủ túc tâm nhiệt, miệng họng khô, lưỡi đỏ khô ít tân dịch; bản chất là âm hư sinh nội nhiệt. Nguồn: bai-03-bien-chung_002.md.","key":"Âm hư -> hư nhiệt, ngũ tâm phiền nhiệt.","id":135,"topic":"Tam tiêu biện chứng","bloom":"Áp dụng"},{"scenario":"Người bệnh thấp nhiệt trung tiêu có rêu lưỡi vàng nhớt dày.","stem":"Đặc điểm nào giúp phân biệt với vị nhiệt đơn thuần?","opts":["A. Táo bón kéo dài và bụng cứng đầy","B. Khát nước nhiều và mạch hồng đại","C. Cảm giác nặng người và rêu nhớt dày","D. Sốt cao liên tục và miệng rất khô"],"ans":"C","exp":"Thấp nhiệt có đặc trưng thân thể nặng nề, ngực bụng đầy tức, rêu nề/nhớt; vị nhiệt đơn thuần thiên sốt cao, khát, rêu vàng táo. Nguồn: bai-03-bien-chung_001.md; bai-03-bien-chung_002.md.","key":"Có thấp thì nặng người, rêu nhớt/nề.","id":136,"topic":"Tam tiêu biện chứng","bloom":"Hiểu"},{"scenario":"Người bệnh hôn mê co giật, mạch hư nhược sắp tuyệt sau giai đoạn ôn nhiệt kéo dài.","stem":"Cơ chế bệnh sinh phù hợp nhất là gì?","opts":["A. Thấp nhiệt uất kết gây trở ngại khí cơ","B. Chân âm dục kiệt sinh hư phong nội động","C. Phong hàn nhập lý gây tổn thương dương khí","D. Thực nhiệt trường vị gây phủ khí bế tắc"],"ans":"B","exp":"Hạ tiêu giai đoạn sau có thận tinh hao tổn, hư phong nội động, co giật, mạch hư; âm kiệt có thể dẫn tới dương thoát. Nguồn: bai-03-bien-chung_002.md.","key":"Ôn nhiệt lâu ngày + co giật + mạch hư = chân âm dục kiệt, hư phong.","id":137,"topic":"Tam tiêu biện chứng","bloom":"Áp dụng"},{"scenario":"Một bệnh nhân ôn bệnh giai đoạn đầu chỉ sốt nhẹ, hơi sợ lạnh. Thầy thuốc dùng ngay Đại thừa khí thang để công hạ mạnh.","stem":"Đánh giá nào phù hợp nhất?","opts":["A. Không ảnh hưởng vì bài thuốc dùng mọi giai đoạn","B. Hợp lý vì cần tấn công tà khí sớm","C. Hợp lý vì mọi thể ôn bệnh đều cần công hạ","D. Không phù hợp vì chưa đúng giai đoạn bệnh lý"],"ans":"D","exp":"Sốt nhẹ hơi sợ lạnh là vệ phần; nên tân lương giải biểu. Công hạ mạnh chỉ phù hợp khi nhiệt kết trường phủ/dương minh phủ thực. Nguồn: bai-03-bien-chung_001.md; bai-03-bien-chung_002.md.","key":"Dùng phương phải đúng giai đoạn.","id":138,"topic":"Nguyên tắc điều trị Ôn bệnh","bloom":"Đánh giá"},{"scenario":"Trong giai đoạn Huyết phận của Ôn bệnh tương ứng biến chứng Sepsis/DIC nặng, học viên hỏi vì sao YHCT nhấn mạnh lương huyết giải độc, chỉ huyết, tức phong bằng dược liệu giàu Flavonoid, Alkaloide thay vì đại nhiệt trợ tim.","stem":"Nhận định nào giải thích khoa học và chính xác nhất?","opts":["A. Vì thuốc lương huyết diệt trực tiếp 100% virus/vi khuẩn như kháng sinh phổ rộng.","B. Vì bản chất là viêm nội mô lan tỏa, rối loạn đông máu và xuất huyết; Flavonoid, Alkaloide giúp kháng viêm, bảo vệ thành mạch, chống xuất huyết, phù hợp cơ chế YHHĐ.","C. Vì lương huyết giúp tăng huyết áp nhanh trong sốc nhiễm khuẩn.","D. Vì thuốc đại nhiệt ức chế miễn dịch khiến vi trùng bùng phát."],"ans":"B","exp":"Huyết phần có động huyết, hao huyết, ứ nhiệt nội trở; pháp lương huyết giải độc/chỉ huyết phù hợp tổn thương xuất huyết. Phần hoạt chất và DIC là diễn giải tích hợp hiện đại, không phải node Kuzu. Nguồn KB: bai-03-bien-chung_001.md; xuan-on_002.md.","key":"Huyết phận: lương huyết giải độc, bảo vệ mạch, chống xuất huyết.","id":139,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Phân tích"},{"scenario":"Một bệnh nhân nam 56 tuổi, bị sốt hai ngày, ớn lạnh, được chẩn đoán là nhiệt ở vệ phận.","stem":"Nguyên tắc điều trị nào là phù hợp nhất?","opts":["A. Thanh khí","B. Thấu nhiệt","C. Phát hãn","D. Tư âm"],"ans":"C","exp":"Trùng với câu 17: vệ phần là biểu chứng, tương ứng hãn/giải biểu; trong Ôn bệnh phải là tân lương giải biểu. Nguồn: bai-03-bien-chung_001.md.","key":"Vệ phần -> giải biểu.","id":140,"topic":"Nguyên tắc điều trị Ôn bệnh","bloom":"Áp dụng"},{"scenario":"Một bệnh nhân nữ 60 tuổi, bị sốt 6 ngày, không ớn lạnh, được chẩn đoán là nhiệt ở dinh phận.","stem":"Nguyên tắc điều trị nào là phù hợp nhất?","opts":["A. Thanh khí","B. Tư âm","C. Phát hãn","D. Thấu nhiệt"],"ans":"D","exp":"Trùng với câu 18: dinh phần mới nhập cần thấu nhiệt chuyển khí. Nguồn: bai-03-bien-chung_001.md.","key":"Dinh phần -> thấu nhiệt.","id":141,"topic":"Nguyên tắc điều trị Ôn bệnh","bloom":"Áp dụng"},{"scenario":"Một bệnh nhân mắc bệnh truyền nhiễm cấp tính bước sang ngày thứ 4, sốt cao, khát nước nhiều, thích uống lạnh, vã mồ hôi, bứt rứt, mặt đỏ, đại tiện táo, nước tiểu vàng thẫm; lưỡi đỏ, rêu vàng khô, mạch hồng đại sác.","stem":"Dựa trên lý luận Vệ Khí Dinh Huyết, hãy xác định vị trí bệnh và lựa chọn xử trí phù hợp nhất?","opts":["A. Bệnh tại Khí phận (Vị nhiệt); xử trí bằng Bạch hổ thang.","B. Bệnh tại Huyết phận; xử trí bằng Tê giác địa hoàng thang","C. Bệnh tại Dinh phận; xử trí bằng Thanh Dinh Thang.","D. Bệnh tại Vệ phận; xử trí bằng Ngân kiều tán hoặc Tang cúc ẩm."],"ans":"A","exp":"Trùng với câu 19: bộ chứng dương minh khí phần, Bạch hổ thang phù hợp. Nguồn: bai-03-bien-chung_001.md; Kuzu.","key":"Khí phận/Vị nhiệt -> Bạch hổ thang.","id":142,"topic":"Biện chứng Vệ-Khí-Dinh-Huyết","bloom":"Phân tích"},{"scenario":"Thầy thuốc đang điều trị bệnh nhân ôn bệnh bằng Thanh Dinh Thang do tà nhiệt từ khí phận chuyển vào dinh phận.","stem":"Theo nguyên tắc phối ngũ trị liệu của Diệp Thiên Sĩ, hành động nào đúng nhất?","opts":["A. Gia thêm Phụ tử, Nhục quế.","B. Giữ nguyên Hoàng liên để tăng khổ hàn.","C. Thay bằng Đại Thừa Khí Thang.","D. Bỏ Hoàng liên để tránh quá đắng lạnh giữ tà, giúp nhiệt thấu ra khí phận."],"ans":"D","exp":"Trùng với câu 20: nguyên tắc dinh phần là thanh dinh nhưng phải thấu nhiệt chuyển khí, tránh bế tà. Nguồn: bai-03-bien-chung_001.md.","key":"Thanh dinh cần thấu nhiệt.","id":143,"topic":"Nguyên tắc điều trị Ôn bệnh","bloom":"Đánh giá"},{"scenario":"Bệnh nhân nam sốt âm ỉ kéo dài, nặng chiều đêm, lòng bàn tay chân nóng, miệng khô họng khát, tiểu ít vàng, đại tiện khô; gầy, lưỡi đỏ sẫm ít rêu, mạch tế sác.","stem":"Dựa trên phân loại bộ vị bị bệnh, cơ chế bệnh sinh chính và phép trị tương ứng là gì?","opts":["A. Thấp nhiệt trung tiêu; thanh nhiệt hóa thấp.","B. Tà nhiệt vệ phận thượng tiêu; tân lương giải biểu.","C. Nhiệt kết trường vị; tả hạ nhiệt kết.","D. Thận âm hư không chế dương, hư nhiệt hạ tiêu; tư âm thanh nhiệt."],"ans":"D","exp":"Trùng với câu 21: biểu hiện hạ tiêu thận âm/thận tinh hao tổn, nên tư âm thanh nhiệt. Nguồn: bai-03-bien-chung_002.md.","key":"Hạ tiêu thận âm hư -> tư âm thanh nhiệt.","id":144,"topic":"Tam tiêu biện chứng","bloom":"Phân tích"},{"scenario":"Ở giai đoạn cuối của bệnh lý ôn nhiệt mạn tính, bệnh nhân hôn mê sâu, co giật, run rẩy liên tục, mạch hư nhược sắp tuyệt.","stem":"Trạng thái này tương ứng tổn thương hệ thống nào trong YHHĐ và bài thuốc nào cần chỉ định khẩn cấp?","opts":["A. Tương ứng sốc nhiễm khuẩn, DIC và suy đa cơ quan ICU; chỉ định Đại Định Phong Châu.","B. Tương ứng nhiễm trùng hô hấp trên giai đoạn đầu; Ngân Kiều Tán.","C. Tương ứng viêm dạ dày cấp do tăng acid; Bạch Hổ Thang.","D. Tương ứng SIRS; Hoắc Hương Chính Khí Tán."],"ans":"A","exp":"Ôn nhiệt lâu ngày vào hạ tiêu gây âm hư phong động, co giật, mạch hư; Kuzu và KB Xuân Ôn ghi âm hư phong động trị Tam giáp phục mạch thang hoặc Đại định phong châu, dùng cấp cứu khi âm dương đều thoát. Nguồn: xuan-on_002.md; Kuzu.","key":"Âm hư phong động nặng -> Đại định phong châu.","id":145,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Phân tích"},{"scenario":"Trong giai đoạn Huyết phận của Ôn bệnh tương ứng Sepsis/DIC nặng, hỏi vì sao nhấn mạnh lương huyết giải độc, chỉ huyết, tức phong.","stem":"Nhận định nào giải thích chính xác nhất?","opts":["A. Vì thuốc lương huyết diệt trực tiếp 100% virus/vi khuẩn.","B. Vì bản chất là viêm nội mô lan tỏa, rối loạn đông máu và xuất huyết; Flavonoid, Alkaloide giúp kháng viêm, bảo vệ thành mạch, chống xuất huyết.","C. Vì lương huyết giúp tăng huyết áp nhanh.","D. Vì thuốc đại nhiệt ức chế miễn dịch."],"ans":"B","exp":"Trùng với câu 35: Huyết phần có động huyết, hao huyết, ứ nhiệt; pháp lương huyết/chỉ huyết sát cơ chế xuất huyết và rối loạn đông máu hơn đại nhiệt. Nguồn: bai-03-bien-chung_001.md; xuan-on_002.md.","key":"Huyết phận nặng -> lương huyết giải độc, chỉ huyết.","id":146,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Phân tích"},{"scenario":"Bệnh nhân nam 45 tuổi sốt cao liên tục ngày 5, tâm phiền, mê sảng, ban đỏ tía, đại tiện phân đen, lưỡi đỏ thẫm khô; tiểu cầu giảm nặng, đông máu kéo dài.","stem":"Nhận định nào chính xác nhất?","opts":["A. Bệnh mới ở Vệ phận; nhiễm trùng hô hấp trên khởi phát.","B. Bệnh đã vào Huyết phận; tương ứng DIC và tổn thương nội mô nặng.","C. Bệnh thuộc Thấp nhiệt trung tiêu; viêm dạ dày cấp.","D. Bệnh đang ở Khí phận; SIRS nhẹ."],"ans":"B","exp":"Trùng với câu 22: xuất huyết, ban tím, lưỡi đỏ thẫm tối là Huyết phần; xét nghiệm đông máu củng cố đối chiếu DIC. Nguồn: bai-03-bien-chung_001.md.","key":"Huyết phận = xuất huyết nặng.","id":147,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Phân tích"},{"scenario":"Bệnh nhân ôn bệnh giai đoạn muộn tổn thương hạ tiêu, Thận âm chân thủy bị thiêu rụi, hư phong nội động co giật.","stem":"Cần vận dụng nguyên tắc Ngô Cúc Thông như thế nào?","opts":["A. Dùng vị thanh nhẹ phát tán.","B. Dùng vị đắng lạnh táo thấp.","C. Chỉ dùng xông hơi phát hãn.","D. Dùng vị trọng, chất keo đặc, vị động vật/quy bản để tư âm ghìm dương, trầm giáng."],"ans":"D","exp":"Trùng với câu 23: hạ tiêu âm hư phong động cần tư âm dưỡng huyết, tiềm dương tức phong; Kuzu trả về Tam giáp phục mạch thang/Đại định phong châu. Nguồn: xuan-on_002.md; Kuzu.","key":"Hạ tiêu cần trọng trầm, tư âm tiềm dương.","id":148,"topic":"Nguyên tắc điều trị Ôn bệnh","bloom":"Phân tích"},{"scenario":"","stem":"Các hợp chất Flavonoid, Alkaloide, Tinh dầu trong bài thuốc cổ phương trị Ôn bệnh đóng vai trò gì khi đối chiếu cơ chế sinh lý bệnh hiện đại?","opts":["A. Chỉ tạo mùi thơm và giảm vị đắng.","B. Thay thế hoàn toàn máy thở và ICU.","C. Hoạt động như chất kháng sinh, kháng viêm, bảo vệ nội mô và chống xuất huyết.","D. Làm tăng tính thấm mao mạch."],"ans":"C","exp":"Trùng với câu 24: trong các lựa chọn, C là diễn giải tích hợp phù hợp nhất với pháp thanh nhiệt giải độc/lương huyết/chỉ huyết của KB. Nguồn KB: xuan-on_002.md; thu-thap_001.md.","key":"Cổ phương thanh nhiệt/lương huyết có ý nghĩa kháng viêm, bảo vệ mạch.","id":149,"topic":"Ca lâm sàng & Tích hợp YHHĐ","bloom":"Hiểu"},{"scenario":"Bệnh nhân nam 20 tuổi: sốt cao li bì, tâm phiền khó ngủ hoặc nói lảm nhảm, miệng khô, khó thở, lưỡi đỏ tươi, mạch trầm tế hoạt/tế sác/phù đại.","stem":"Chẩn đoán là gì?","opts":["A. Phong nhiệt xâm phạm Vệ phận","B. Nhiệt thương dinh âm","C. Nhiệt tà xâm phạm Khí phận","D. Khí âm lưỡng hư"],"ans":"B","exp":"Tâm phiền, nói lảm nhảm, miệng khô, lưỡi đỏ là dấu hiệu nhiệt nhập dinh, dinh âm bị thương; khác vệ phần vì không còn biểu chứng nhẹ. Nguồn: bai-03-bien-chung_001.md.","key":"Tâm phiền, lảm nhảm, lưỡi đỏ = dinh âm bị nhiệt thương.","id":150,"topic":"Chẩn đoán Ôn bệnh","bloom":"Áp dụng"},{"scenario":"Bệnh nhân nữ 30 tuổi: phát sốt, sợ gió, khát ít, ho đờm ít khó khạc, mạch phù sác.","stem":"Chẩn đoán là gì?","opts":["A. Phong nhiệt xâm phạm Vệ phận","B. Nhiệt thương dinh âm","C. Nhiệt tà xâm phạm Khí phận","D. Khí âm lưỡng hư"],"ans":"A","exp":"Sốt kèm sợ gió, ho, mạch phù sác là phế vệ biểu chứng; vệ phần có sốt, ố phong hàn, ho, hơi khát, mạch phù sác. Nguồn: bai-03-bien-chung_001.md.","key":"Sốt + sợ gió + mạch phù sác = Vệ phận/phong nhiệt.","id":151,"topic":"Chẩn đoán Ôn bệnh","bloom":"Áp dụng"},{"scenario":"Bệnh nhi nam 20 tháng tuổi mắc sởi: sốt nhẹ, họng khô, ho ít, nốt sởi mờ dần, lưỡi đỏ nhẹ.","stem":"Chẩn đoán phù hợp?","opts":["A. Nhiệt tà phạm Vệ phận (Thời kỳ khởi phát)","B. Nhiệt tà uất kết Dinh Huyết phận (Thời kỳ sởi mọc)","C. Nhiệt tà uất kết Dinh Huyết phận (Thời kỳ sởi bay)","D. Nhiệt tà xâm nhập ở Khí phận (Thời kỳ sởi mọc)"],"ans":"C","exp":"Nốt sởi mờ dần, sốt nhẹ là thời kỳ sởi bay; KB Ôn bệnh chỉ nêu sởi thuộc phạm vi Ôn bệnh và có triệu chứng mắt đỏ, chảy nước mắt/nước mũi, dễ thành dịch. Nguồn chính: onbenhTest_Gen.md; đối chiếu phạm vi: phong-on_001.md.","key":"Ban mờ dần = sởi bay.","id":152,"topic":"Chẩn đoán Ôn bệnh nhi khoa","bloom":"Áp dụng"},{"scenario":"Bệnh nhi nữ 18 tháng tuổi mắc sởi: sốt, đau họng, ho khan, nốt sởi xuất hiện sau tai, chân tóc, cổ rồi lan toàn thân, lưỡi đỏ, mạch sác.","stem":"Chẩn đoán phù hợp?","opts":["A. Nhiệt tà phạm Vệ phận (Thời kỳ khởi phát)","B. Nhiệt tà uất kết Dinh Huyết phận (Thời kỳ sởi mọc)","C. Nhiệt tà uất kết Dinh Huyết phận (Thời kỳ sởi bay)","D. Nhiệt tà xâm nhập ở Khí phận (Thời kỳ sởi mọc)"],"ans":"B","exp":"Ban sởi đang mọc và lan dần toàn thân là thời kỳ sởi mọc, tương ứng nhiệt độc uất kết dinh huyết. Nguồn chính: onbenhTest_Gen.md; KB Ôn bệnh xác nhận sởi thuộc phạm vi Ôn bệnh.","key":"Ban đang mọc lan dần = sởi mọc, dinh huyết.","id":153,"topic":"Chẩn đoán Ôn bệnh nhi khoa","bloom":"Áp dụng"},{"scenario":"Bệnh nhi nam 12 tuổi mắc thủy đậu: sốt cao, phiền khát, mặt đỏ, môi hồng, niêm mạc miệng có nốt phỏng; nốt đậu dày, tím tối, nước đục, quầng đỏ sậm; lưỡi đỏ rêu vàng, mạch sác.","stem":"Chẩn đoán YHCT vị trí bệnh?","opts":["A. Bệnh ở Vệ phận","B. Bệnh ở Khí và Dinh Phận","C. Bệnh ở Kinh lạc","D. Bệnh ở tạng phủ"],"ans":"B","exp":"Sốt cao khát, rêu vàng là khí phần; nốt đậu dày tím tối, quầng đỏ sậm cho thấy ","bloom":"Áp dụng"},{"scenario":"Bệnh nhân nam 30 tuổi: sốt vừa/nhẹ, sưng cứng dưới tai và dưới hàm, ấn đau, thường một bên rồi hai bên, lưỡi đỏ, rêu vàng mỏng, mạch phù sác.","stem":"Chẩn đoán hội chứng YHCT phù hợp nhất?","opts":["A. Phong nhiệt phạm Phế","B. Phong nhiệt phạm kinh Đởm Vị","C. Phế âm hư","D. Phong hàn phạm kinh Đởm Vị"],"ans":"B","exp":"Quai bị thuộc nhóm bệnh cấp tính lây nhiễm có đặc điểm Ôn bệnh trong KB; sưng đau dưới tai/góc hàm thuộc vùng kinh Đởm Vị, kèm rêu vàng mạch sác là phong nhiệt. Nguồn chính: onbenhTest_Gen.md; phạm vi KB: bai-01-dai-cuong-on-benh_001.md.","key":"Sưng dưới tai + nhiệt chứng = phong nhiệt phạm kinh Đởm Vị.","id":158,"topic":"Chẩn đoán Ôn bệnh nhi khoa","bloom":"Áp dụng"},{"scenario":"Bệnh nhi nữ 18 tháng tuổi mắc sởi: phát sốt, sợ lạnh, tắc mũi, chảy nước mũi, ho, hắt hơi, mắt đỏ, chảy nước mắt, lưỡi đỏ, mạch phù sác.","stem":"Chẩn đoán phù hợp?","opts":["A. Nhiệt tà phạm Vệ phận (Thời kỳ khởi phát)","B. Nhiệt tà uất kết Dinh Huyết phận (Thời kỳ sởi mọc)","C. Nhiệt tà uất kết Dinh Huyết phận (Thời kỳ sởi bay)","D. Nhiệt tà xâm nhập ở khí phận (Thời kỳ sởi mọc)"],"ans":"A","exp":"Chưa có ban, chỉ biểu hiện phế vệ: sốt, sợ lạnh, tắc mũi, ho, mắt đỏ, mạch phù sác; phù hợp thời kỳ khởi phát/vệ phần. Nguồn chính: onbenhTest_Gen.md; nguyên lý vệ phần: bai-03-bien-chung_001.md.","key":"Sởi tiền triệu chưa ban = Vệ phận.","id":159,"topic":"Chẩn đoán Ôn bệnh nhi khoa","bloom":"Áp dụng"},{"scenario":"Bệnh nhân nữ 25 tuổi viêm gan siêu vi cấp: vàng da, ngứa, đau hạ sườn phải, sốt, miệng khô đắng, ăn kém, buồn nôn/nôn, đầy bụng, tiểu vàng, táo bón, rêu vàng dơ, mạch sác.","stem":"Chẩn đoán YHCT phù hợp nhất?","opts":["A. Can Tỳ thấp nhiệt","B. Can uất tỳ hư","C. Tỳ khí hư","D. Can khí uất kết"],"ans":"A","exp":"Vàng da kèm sốt, miệng đắng, rêu vàng dơ, mạch sác là thấp nhiệt thực chứng vùng can đởm/tỳ vị; các thể hư/uất đơn thuần không giải thích nhiệt và rêu vàng dơ. Nguồn chính: onbenhTest_Gen.md; KB dự phòng có nhắc viêm gan trong phạm vi ôn bệnh liên quan.","key":"Vàng da + rêu vàng dơ + mạch sác = Can Tỳ thấp nhiệt.","id":160,"topic":"Chẩn đoán Ôn bệnh nội khoa","bloom":"Áp dụng"}];

let fcFlipped = 0;
let mcqAnswered = 0, mcqCorrect = 0;
let fcFilter = 'Tất cả', mcqFilter = 'Tất cả';

function initCounts(){
  document.getElementById('tab-btn-fc').textContent = '🃏 ' + flashcards.length + ' Flashcard';
  document.getElementById('tab-btn-mcq').textContent = '📝 ' + mcqs.length + ' MCQ (SBA)';
  document.getElementById('fc-total').textContent = flashcards.length;
  document.getElementById('fc-topics').textContent = TOPICS.length;
  document.getElementById('mcq-total').textContent = mcqs.length;
}

function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===(t==='fc'?0:1)));
  document.getElementById('tab-fc').classList.toggle('active',t==='fc');
  document.getElementById('tab-mcq').classList.toggle('active',t==='mcq');
}

function buildFilters(containerId, filterVar, onChangeFn){
  const c = document.getElementById(containerId);
  const cats = ['Tất cả',...TOPICS];
  c.innerHTML = '';
  cats.forEach(function(t){
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (t === filterVar ? ' active' : '');
    btn.textContent = t;
    btn.onclick = function(){ onChangeFn(t); };
    c.appendChild(btn);
  });
}

function renderFlashcards(){ buildFilters('fc-filters', fcFilter, fcSetFilter); renderFCGrid(); }
function fcSetFilter(t){ fcFilter = t; buildFilters('fc-filters', fcFilter, fcSetFilter); renderFCGrid(); }

function renderFCGrid(){
  const grid = document.getElementById('fc-grid');
  const cards = fcFilter === 'Tất cả' ? flashcards : flashcards.filter(function(c){ return c.topic === fcFilter; });
  if(!cards.length){ grid.innerHTML = '<div class="empty">Không có thẻ nào.</div>'; return; }
  grid.innerHTML = cards.map(function(c){
    return '<div class="card-wrap' + (c.tall ? ' tall' : '') + '" id="fc-' + c.id + '" onclick="flipCard(' + c.id + ')">' +
      '<div class="card-inner">' +
        '<div class="card-face card-front">' +
          '<div class="card-topic" style="color:' + (COLORS[c.topic]||'#60a5fa') + '">' + c.topic + ' • Thẻ ' + c.id + '</div>' +
          '<div class="card-q">' + c.q + '</div>' +
          '<div class="card-hint">Chạm để xem đáp án →</div>' +
        '</div>' +
        '<div class="card-face card-back">' +
          '<div class="card-topic" style="color:' + (COLORS[c.topic]||'#16a34a') + '">' + c.topic + ' • Đáp án</div>' +
          '<div class="card-a">' + c.a + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function flipCard(id){
  const el = document.getElementById('fc-'+id);
  const wasFlipped = el.classList.contains('flipped');
  el.classList.toggle('flipped');
  if(!wasFlipped){ fcFlipped++; document.getElementById('fc-flipped').textContent = fcFlipped; }
}

function renderMCQ(){ buildFilters('mcq-filters', mcqFilter, mcqSetFilter); renderMCQList(); }
function mcqSetFilter(t){ mcqFilter = t; buildFilters('mcq-filters', mcqFilter, mcqSetFilter); renderMCQList(); }

function renderMCQList(){
  const list = document.getElementById('mcq-list');
  const qs = mcqFilter === 'Tất cả' ? mcqs : mcqs.filter(function(q){ return q.topic === mcqFilter; });
  if(!qs.length){ list.innerHTML = '<div class="empty">Không có câu hỏi nào.</div>'; return; }
  list.innerHTML = qs.map(function(q){
    const scenario = q.scenario ? '<div class="q-scenario">📋 ' + q.scenario + '</div>' : '';
    const opts = q.opts.map(function(o, i){
      return '<div class="option" id="opt-' + q.id + '-' + i + '" onclick="selectOpt(' + q.id + ',' + i + ')">' +
        '<span class="opt-label">' + String.fromCharCode(65+i) + '.</span>' +
        '<span class="opt-text">' + o.substring(3) + '</span>' +
      '</div>';
    }).join('');
    return '<div class="question-card" id="qcard-' + q.id + '">' +
      '<div class="q-header">' +
        '<span class="q-num">Câu ' + q.id + '</span>' +
        '<span class="q-topic-tag" style="border-left:3px solid ' + (COLORS[q.topic]||'#334155') + ';padding-left:8px">' + q.topic + '</span>' +
        (q.bloom ? '<span class="q-bloom">' + q.bloom + '</span>' : '') +
      '</div>' +
      scenario +
      '<div class="q-stem">' + q.stem + '</div>' +
      '<div class="options">' + opts + '</div>' +
      '<button class="reveal-btn" id="rbtn-' + q.id + '" onclick="revealAns(' + q.id + ')">Xem đáp án</button>' +
      '<div class="explanation" id="exp-' + q.id + '">' +
        '<div class="exp-correct">✓ Đáp án đúng: ' + q.ans + '</div>' +
        '<div class="exp-text">' + q.exp + '</div>' +
        (q.key ? '<div class="exp-key">💡 Key: ' + q.key + '</div>' : '') +
      '</div>' +
    '</div>';
  }).join('');
}

function selectOpt(qid, optIdx){
  const q = mcqs.find(function(x){ return x.id === qid; });
  const card = document.getElementById('qcard-'+qid);
  if(card.classList.contains('correct') || card.classList.contains('wrong')) return;
  q.opts.forEach(function(_,i){ document.getElementById('opt-'+qid+'-'+i).classList.remove('selected'); });
  document.getElementById('opt-'+qid+'-'+optIdx).classList.add('selected');
}

function revealAns(qid){
  const q = mcqs.find(function(x){ return x.id === qid; });
  const card = document.getElementById('qcard-'+qid);
  if(card.classList.contains('correct') || card.classList.contains('wrong')) return;
  const correctIdx = q.ans.charCodeAt(0) - 65;
  const selectedEl = document.querySelector('#qcard-'+qid+' .option.selected');
  let selectedIdx = -1;
  if(selectedEl) selectedIdx = parseInt(selectedEl.id.split('-')[2]);
  q.opts.forEach(function(_,i){
    const opt = document.getElementById('opt-'+qid+'-'+i);
    opt.classList.add('disabled');
    if(i === correctIdx) opt.classList.add('correct-ans');
    else if(i === selectedIdx) opt.classList.add('wrong-ans');
  });
  const isCorrect = selectedIdx === correctIdx;
  card.classList.add(isCorrect ? 'correct' : 'wrong');
  document.getElementById('exp-'+qid).classList.add('show');
  document.getElementById('rbtn-'+qid).disabled = true;
  mcqAnswered++;
  if(isCorrect) mcqCorrect++;
  updateMCQStats();
}

function updateMCQStats(){
  const total = mcqs.length;
  document.getElementById('mcq-answered').textContent = mcqAnswered;
  document.getElementById('mcq-correct-count').textContent = mcqCorrect;
  const pct = mcqAnswered > 0 ? Math.round(mcqCorrect / mcqAnswered * 100) : 0;
  document.getElementById('mcq-pct').textContent = pct + '%';
  document.getElementById('mcq-bar').style.width = (total > 0 ? mcqAnswered / total * 100 : 0) + '%';
}

function resetMCQ(){ mcqAnswered = 0; mcqCorrect = 0; updateMCQStats(); renderMCQList(); }

initCounts();
renderFlashcards();
renderMCQ();
</script>
