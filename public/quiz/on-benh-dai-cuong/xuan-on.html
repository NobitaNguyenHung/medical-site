<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xuân Ôn — 50 MCQ SBA</title>
<style>
  :root {
    --bg:#0F172A; --surface:#1E293B; --surface2:#263348; --border:#334155;
    --text:#F1F5F9; --text2:#94A3B8; --text3:#CBD5E1;
    --accent:#F59E0B; --green:#22C55E; --red:#EF4444; --blue:#3B82F6;
    --option-hover:#1D3461; --option-correct:#14532D; --option-wrong:#7F1D1D;
    --option-selected:#1E3A8A;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}

  /* Header */
  .hdr{background:linear-gradient(135deg,#1E293B,#0F172A);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .hdr-left h1{font-size:18px;font-weight:700;color:var(--accent);}
  .hdr-left p{font-size:11px;color:var(--text2);margin-top:2px;}
  .hdr-right{display:flex;align-items:center;gap:16px;}
  .score-chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;}
  .score-chip span{color:var(--green);}

  /* Progress */
  .prog-wrap{padding:10px 24px;background:var(--surface);border-bottom:1px solid var(--border);}
  .prog-bar{height:6px;background:var(--border);border-radius:3px;}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#22C55E);border-radius:3px;transition:width .4s;}
  .prog-info{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-top:5px;}

  /* Layout */
  .main{max-width:860px;margin:0 auto;padding:24px 16px;}

  /* Filter tabs */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
  .tab{padding:5px 14px;border-radius:16px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s;}
  .tab:hover,.tab.on{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600;}

  /* Question card */
  .q-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;transition:border-color .3s;}
  .q-card.done-right{border-color:#166534;}
  .q-card.done-wrong{border-color:#991B1B;}
  .q-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;}
  .q-num{font-size:11px;font-weight:700;color:var(--accent);white-space:nowrap;}
  .bloom-chip{font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap;}
  .b1{background:#1E3A8A;color:#93C5FD;}
  .b2{background:#1E3A8A;color:#93C5FD;}
  .b3{background:#713F12;color:#FDE68A;}
  .b4{background:#4C1D95;color:#DDD6FE;}
  .b5{background:#7F1D1D;color:#FCA5A5;}
  .b6{background:#134E4A;color:#99F6E4;}
  .q-stem{font-size:14px;line-height:1.65;color:var(--text3);}
  .q-stem strong{color:var(--text);font-weight:600;}
  .clinical-box{background:#0F172A;border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:12px 14px;margin:12px 0;font-size:13px;line-height:1.7;color:#BAE6FD;}
  .q-ask{font-size:14px;font-weight:600;color:var(--text);margin:14px 0 10px;}

  /* Options */
  .options{display:grid;gap:8px;margin-bottom:14px;}
  .opt{padding:11px 14px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:13px;color:var(--text3);display:flex;gap:10px;align-items:flex-start;transition:all .2s;line-height:1.5;}
  .opt:hover:not(.locked){background:var(--option-hover);border-color:var(--blue);}
  .opt.selected{background:var(--option-selected);border-color:var(--blue);color:var(--text);}
  .opt.correct{background:var(--option-correct);border-color:var(--green);color:#86EFAC;}
  .opt.wrong{background:var(--option-wrong);border-color:var(--red);color:#FCA5A5;}
  .opt.locked{cursor:default;}
  .opt-key{font-weight:700;min-width:18px;color:var(--text2);}
  .opt.selected .opt-key{color:#93C5FD;}
  .opt.correct .opt-key{color:#86EFAC;}
  .opt.wrong .opt-key{color:#FCA5A5;}

  /* Action buttons */
  .q-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .btn-check{padding:8px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
  .btn-check.active{background:var(--blue);color:#fff;}
  .btn-check:disabled{background:var(--surface2);color:var(--text2);cursor:not-allowed;}
  .btn-show{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;}
  .btn-show:hover{background:var(--surface2);color:var(--text);}
  .result-chip{font-size:13px;font-weight:700;padding:6px 14px;border-radius:20px;}
  .chip-right{background:#14532D;color:#86EFAC;}
  .chip-wrong{background:#7F1D1D;color:#FCA5A5;}

  /* Explanation */
  .explain{display:none;background:#0F172A;border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:12px;font-size:13px;line-height:1.7;}
  .explain.show{display:block;}
  .explain h4{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;}
  .explain p{color:#BAE6FD;margin-bottom:6px;}
  .explain .why{color:var(--text2);font-size:12px;}
  .explain .why span{color:#FCD34D;}
  .explain .kp{margin-top:10px;background:#1E293B;border-radius:7px;padding:10px 12px;border-left:3px solid var(--green);font-size:12px;color:#86EFAC;}

  /* Summary */
  .summary{display:none;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center;margin-bottom:30px;}
  .summary.show{display:block;}
  .summary h2{font-size:28px;font-weight:800;margin-bottom:8px;}
  .summary .grade{font-size:48px;font-weight:900;margin:16px 0;}
  .sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0;}
  .sum-cell{background:#0F172A;border-radius:10px;padding:14px;border:1px solid var(--border);}
  .sum-val{font-size:22px;font-weight:700;}
  .sum-label{font-size:11px;color:var(--text2);margin-top:3px;}
  .btn-restart{background:var(--accent);color:#000;border:none;padding:12px 32px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;}
  .btn-restart:hover{transform:scale(1.03);}

  /* Nav */
  .nav-bottom{display:flex;gap:10px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
  .nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:8px 18px;border-radius:8px;font-size:13px;cursor:pointer;}
  .nav-btn:hover{background:var(--surface2);color:var(--text);}

  /* Bloom legend */
  .legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .leg{font-size:10px;padding:2px 8px;border-radius:10px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <h1>🌿 Xuân Ôn — 50 MCQ SBA</h1>
    <p>春温 · Phục Khí Ôn Bệnh · Nguồn: Giáo trình Ôn Bệnh</p>
  </div>
  <div class="hdr-right">
    <div class="score-chip">Điểm: <span id="live-score">0</span> / <span id="live-done">0</span></div>
  </div>
</div>

<div class="prog-wrap">
  <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <div class="prog-info"><span id="prog-label">0 / 50 câu</span><span id="pct-label">0%</span></div>
</div>

<div class="main">
  <div class="summary" id="summary">
    <h2>Hoàn thành bài kiểm tra!</h2>
    <div class="grade" id="grade-emoji">🎯</div>
    <div style="font-size:20px;font-weight:700;" id="grade-text"></div>
    <div class="sum-grid">
      <div class="sum-cell"><div class="sum-val green" id="s-right">0</div><div class="sum-label">✓ Đúng</div></div>
      <div class="sum-cell"><div class="sum-val red" id="s-wrong">0</div><div class="sum-label">✗ Sai</div></div>
      <div class="sum-cell"><div class="sum-val yellow" id="s-pct">0%</div><div class="sum-label">Tỷ lệ đúng</div></div>
    </div>
    <button class="btn-restart" onclick="restartAll()">↺ Làm lại từ đầu</button>
  </div>

  <div class="legend">
    <span class="leg b1">B1 Nhớ</span>
    <span class="leg b2">B2 Hiểu</span>
    <span class="leg b3">B3 Áp dụng</span>
    <span class="leg b4">B4 Phân tích</span>
    <span class="leg b5">B5 Đánh giá</span>
    <span class="leg b6">B6 Tổng hợp</span>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab on" onclick="showAll(this)">Tất cả (50)</button>
    <button class="tab" onclick="filterBloom(1,this)">Bloom 1-2</button>
    <button class="tab" onclick="filterBloom(3,this)">Bloom 3</button>
    <button class="tab" onclick="filterBloom(45,this)">Bloom 4-5</button>
    <button class="tab" onclick="showWrong(this)">✗ Câu sai</button>
  </div>

  <div id="q-list"></div>

  <div class="nav-bottom">
    <button class="nav-btn" onclick="scrollTop()">↑ Đầu trang</button>
    <button class="nav-btn" onclick="checkAll()">Kiểm tra tất cả</button>
    <button class="nav-btn" onclick="restartAll()">↺ Làm lại</button>
  </div>
</div>

<script>
const QS = [
  // ===== BLOOM 1-2: NHỚ / HIỂU (Q1-Q10) =====
  {
    bloom:1, cat:'khai-niem',
    stem:'Theo Tố Vấn — Âm Dương Ứng Tượng Đại Luận, căn nguyên của Xuân Ôn được mô tả bằng câu nào?',
    opts:['A. Thụ nhiệt tà, ngoại phát ôn bệnh','B. Đông thương ư hàn, xuân tất ôn bệnh','C. Xuân thương ư phong, hạ sinh vị tiết','D. Hàn tà nhập lý, hóa nhiệt ôn bệnh'],
    ans:1,
    explain:'Câu kinh điển Nội Kinh: "Đông thương ư hàn, xuân tất ôn bệnh" — mùa đông cảm hàn tà nhưng không phát ngay, phục lại đến mùa xuân tất phát thành ôn bệnh.',
    why:['A. Mô tả ôn bệnh nói chung, không phải câu gốc Nội Kinh về Xuân Ôn','C. Câu về Phong ôn hạ kiết','D. Mô tả cơ chế nhưng không phải câu Nội Kinh gốc'],
    kp:'Xuân Ôn = Phục khí ôn bệnh. Nội Kinh: "Đông thương ư hàn, xuân tất ôn bệnh"'
  },
  {
    bloom:1, cat:'khai-niem',
    stem:'Xuân Ôn thuộc loại nào trong phân loại ôn bệnh?',
    opts:['A. Tân cảm ôn bệnh','B. Phục khí ôn bệnh','C. Thấp nhiệt ôn bệnh','D. Phong nhiệt ôn bệnh'],
    ans:1,
    explain:'Xuân Ôn là phục khí ôn bệnh điển hình — tà phục lý từ trước, đến mùa xuân mới phát ra ngoài. Khác với tân cảm (Phong Ôn) là tà mới tiếp xúc và phát ngay.',
    why:['A. Tân cảm = Phong Ôn — tà vừa tiếp xúc phát ngay','C. Thấp nhiệt = Thấp ôn, Thử thấp','D. Phong nhiệt = ngoại tà phong nhiệt, không phải phục khí'],
    kp:'Xuân Ôn = Phục khí ôn bệnh. Phong Ôn = Tân cảm ôn bệnh'
  },
  {
    bloom:1, cat:'phan-biet',
    stem:'Đặc điểm phân biệt QUAN TRỌNG NHẤT của Xuân Ôn so với Phong Ôn là?',
    opts:['A. Sốt cao hơn Phong Ôn','B. Sơ khởi đã có lý nhiệt tích thịnh, không qua vệ biểu','C. Chỉ xảy ra vào mùa xuân','D. Tổn thương tạng Tâm nhiều hơn'],
    ans:1,
    explain:'Điểm then chốt: Xuân Ôn SỞ KHỞI ĐÃ CÓ lý nhiệt tích thịnh (sốt cao, tâm phiền, miệng khát, lưỡi đỏ rêu vàng) — không trải qua giai đoạn Vệ biểu. Phong Ôn bắt đầu từ Phế Vệ.',
    why:['A. Mức độ sốt không phải điểm phân biệt chính','C. Phong Ôn cũng xảy ra mùa xuân','D. Không phải tiêu chuẩn phân biệt quan trọng'],
    kp:'Xuân Ôn: sơ khởi = lý nhiệt. Phong Ôn: sơ khởi = Phế Vệ biểu nhiệt'
  },
  {
    bloom:2, cat:'co-che',
    stem:'Cơ chế bệnh sinh cốt lõi của Xuân Ôn là?',
    opts:['A. Phong nhiệt tà trực tiếp xâm phạm Phế Vệ','B. Hàn tà phục lý uất hóa nhiệt, xuân dương phát tiết nên bùng phát','C. Thử nhiệt thấp tà xâm phạm Tỳ Vị','D. Táo nhiệt tà tổn thương Phế Vị âm'],
    ans:1,
    explain:'Mùa đông cảm hàn tà → hàn tà uất lại hóa nhiệt → phục ở bên trong → mùa xuân dương khí phát tiết → phục nhiệt bùng phát ngoài. Đây là cơ chế "Đông thương ư hàn, xuân tất ôn bệnh".',
    why:['A. Cơ chế Phong Ôn','C. Cơ chế Thấp Ôn / Thử Thấp','D. Cơ chế Táo Nhiệt'],
    kp:'Phục khí: hàn tà → uất → hóa nhiệt → phục lý → xuân dương phát tiết → bùng phát'
  },
  {
    bloom:2, cat:'co-che',
    stem:'Vì sao Xuân Ôn đặc biệt dễ tổn thương âm dịch hơn các ôn bệnh khác?',
    opts:['A. Do bệnh nhân thường không uống nước đủ','B. Phục nhiệt bùng phát trên nền âm tinh sẵn hư tổn, lý nhiệt tích thịnh từ sơ khởi','C. Do dùng thuốc tân ôn phát hãn gây mất dịch','D. Do bệnh nhân cao tuổi thường có ít âm hơn'],
    ans:1,
    explain:'Hai yếu tố cộng hưởng: (1) Người bệnh sẵn âm tinh hư tổn (nội nhân tạo điều kiện phục tà), (2) Lý nhiệt tích thịnh từ ngay sơ khởi → thương âm sớm và sâu.',
    why:['A. Không phải cơ chế y học','C. Là hậu quả nếu điều trị sai, không phải nguyên nhân bệnh sinh','D. Không phải lý do đặc hiệu của Xuân Ôn'],
    kp:'Âm tinh hư (nội nhân) + Lý nhiệt từ sơ khởi → thương âm đặc biệt nặng'
  },
  {
    bloom:2, cat:'chan-doan',
    stem:'Lưỡi điển hình trong Xuân Ôn sơ khởi?',
    opts:['A. Lưỡi nhợt nhạt rêu trắng mỏng','B. Lưỡi đỏ rêu vàng','C. Lưỡi trắng dày nhớt','D. Lưỡi khô không rêu'],
    ans:1,
    explain:'Xuân Ôn sơ khởi: lý nhiệt tích thịnh → lưỡi đỏ (nhiệt tích) rêu vàng (lý nhiệt). Lưỡi nhợt = hàn; rêu trắng dày = thấp; lưỡi khô không rêu = hậu kỳ âm kiệt.',
    why:['A. Biểu hàn chứng','C. Thấp ôn/thấp tà','D. Hậu kỳ âm kiệt, không phải sơ khởi'],
    kp:'Sơ khởi Xuân Ôn: lưỡi đỏ rêu vàng = lý nhiệt dấu hiệu'
  },
  {
    bloom:2, cat:'dieu-tri',
    stem:'Nguyên tắc xuyên suốt trong điều trị Xuân Ôn là?',
    opts:['A. Tân ôn giải biểu + hóa thấp lợi thấp','B. Thanh tiết lý nhiệt + Cố hộ âm dịch + Thấu tà ngoại xuất','C. Ôn bổ thận dương + tán hàn','D. Khai vị hóa đàm + giáng khí'],
    ans:1,
    explain:'3 trụ cột điều trị Xuân Ôn: (1) Thanh tiết lý nhiệt — vì lý nhiệt là bản chất; (2) Cố hộ âm dịch — vì Xuân Ôn đặc biệt hao âm; (3) Thấu tà ngoại xuất — tạo điều kiện tà ra ngoài.',
    why:['A. Nguyên tắc Tân cảm biểu chứng','C. Điều trị thận dương hư','D. Nguyên tắc đàm bế'],
    kp:'Xuân Ôn 3 nguyên tắc: Thanh lý nhiệt + Cố âm + Thấu tà. TUYỆT ĐỐI KHÔNG tân ôn phát hãn'
  },
  {
    bloom:1, cat:'phuong-duoc',
    stem:'"Tam bảo" trong điều trị Xuân Ôn gồm những thuốc nào?',
    opts:['A. Bạch hổ thang, Lương cách tán, Thanh ôn bại độc ẩm','B. An cung ngưu hoàng hoàn, Tử tuyết đan, Chí bảo đan','C. Hoàng liên giải độc thang, Tê giác địa hoàng thang, Phổ tế tiêu độc ẩm','D. Gia giảm Phục mạch thang, Đại định phong châu, Thanh hao miết giáp thang'],
    ans:1,
    explain:'"Tam bảo" là 3 đan hoàn dạng sẵn dùng khai khiếu tỉnh thần trong Xuân Ôn: An cung ngưu hoàng hoàn (hôn mê sâu, sốt cao nhất), Tử tuyết đan (co giật + sốt), Chí bảo đan (đàm trọc + thần hôn).',
    why:['A. Phương tiêu lý nhiệt, không phải khai khiếu','C. Thanh giải độc nhiệt','D. Phương hậu kỳ dưỡng âm'],
    kp:'Tam bảo = khai khiếu tỉnh thần. Phân biệt 3 chỉ định'
  },
  {
    bloom:2, cat:'phuong-duoc',
    stem:'Tại sao Gia giảm Phục mạch thang bỏ Nhân sâm, Quế chi, Khương, Táo, Tửu so với Phục mạch thang gốc (Thương Hàn Luận)?',
    opts:['A. Vì các vị đó làm tăng độc tính của bài thuốc','B. Vì đây là ôn nhiệt bệnh — âm khuy + nội nhiệt, không cần ôn thông dương khí','C. Vì các vị đó không có sẵn ở Việt Nam','D. Vì Gia giảm Phục mạch thang là bài hoàn toàn mới không liên quan Thương Hàn Luận'],
    ans:1,
    explain:'Phục mạch thang gốc = hư lao tổn thương dương khí → cần ôn dương. Xuân Ôn hậu kỳ = chân âm khuy tổn + nội nhiệt → phải bỏ tân cam ôn nhiệt (Quế, Khương, Tửu) vì sẽ làm hao âm thêm.',
    why:['A. Không phải lý do','C. Không phải lý do y học','D. Sai — bài có nguồn gốc từ Phục mạch thang'],
    kp:'Nguyên tắc: Ôn nhiệt bệnh hậu kỳ âm khuy → tư âm. KHÔNG ôn dương'
  },
  {
    bloom:2, cat:'co-che',
    stem:'Phục tà tự phát và Tân cảm dẫn phát trong Xuân Ôn khác nhau thế nào ở giai đoạn sơ khởi?',

// State
let answers = new Array(QS.length).fill(null);
let revealed = new Array(QS.length).fill(false);
let visibleIdx = QS.map((_,i)=>i);

function bloomClass(b){ return b<=2?'b1':b===3?'b3':b===4?'b4':b===5?'b5':'b6'; }
function bloomLabel(b){ return b===1?'B1·Nhớ':b===2?'B2·Hiểu':b===3?'B3·Áp dụng':b===4?'B4·Phân tích':b===5?'B5·Đánh giá':'B6·Tổng hợp'; }

function buildCard(i){
  const q = QS[i];
  const num = i+1;
  const bClass = bloomClass(q.bloom);
  const bLabel = bloomLabel(q.bloom);
  const isAnswered = revealed[i];
  const chosen = answers[i];
  const cardClass = isAnswered ? (chosen===q.ans?'done-right':'done-wrong') : '';

  const optsHtml = q.opts.map((o,oi)=>{
    let cls = 'opt';
    if(isAnswered) { cls += ' locked'; if(oi===q.ans) cls+=' correct'; else if(oi===chosen) cls+=' wrong'; }
    else if(oi===chosen) cls+=' selected';
    const keyLetters=['A','B','C','D','E'];
    return `<div class="${cls}" onclick="selectOpt(${i},${oi})"><span class="opt-key">${keyLetters[oi]}.</span><span>${o.replace(/^[A-E]\.\s*/,'')}</span></div>`;
  }).join('');

  const resultHtml = isAnswered ? `<span class="result-chip ${chosen===q.ans?'chip-right':'chip-wrong'}">${chosen===q.ans?'✓ Đúng rồi!':'✗ Chưa đúng'}</span>` : '';

  const explainHtml = isAnswered ? `
    <div class="explain show">
      <h4>Giải thích</h4>
      <p>${q.explain}</p>
      ${q.why.map((w,wi)=>{const keys=['A','B','C','D','E'];return`<p class="why"><span>Loại ${keys[wi]}:</span> ${w}</p>`}).join('')}
      <div class="kp">💡 Điểm cần nhớ: ${q.kp}</div>
    </div>` : `<div class="explain" id="exp-${i}"></div>`;

  const checkDisabled = answers[i]===null&&!isAnswered ? 'disabled' : '';
  const checkActive = answers[i]!==null&&!isAnswered ? 'active' : '';

  return `
    <div class="q-card ${cardClass}" id="qcard-${i}">
      <div class="q-header">
        <div class="q-num">Câu ${num} / ${QS.length}</div>
        <span class="bloom-chip ${bClass}">${bLabel}</span>
      </div>
      ${q.stem.includes('<strong>Ca') ? `<div class="clinical-box">${q.stem}</div>` :
        `<div class="q-stem">${q.stem}</div>`}
      <div class="q-ask" style="margin-top:${q.stem.includes('<strong>Ca')?0:8}px">Chọn đáp án phù hợp nhất:</div>
      <div class="options" id="opts-${i}">${optsHtml}</div>
      <div class="q-actions">
        <button class="btn-check ${checkActive}" id="chk-${i}" ${checkDisabled} onclick="checkQ(${i})">Kiểm tra</button>
        <button class="btn-show" onclick="showAns(${i})">Xem đáp án</button>
        ${resultHtml}
      </div>
      ${explainHtml}
    </div>`;
}

function render(){
  const list = document.getElementById('q-list');
  list.innerHTML = visibleIdx.map(i=>buildCard(i)).join('');
  updateStats();
}

function selectOpt(qi, oi){
  if(revealed[qi]) return;
  answers[qi] = oi;
  const card = document.getElementById(`qcard-${qi}`);
  const opts = card.querySelectorAll('.opt');
  opts.forEach((el,idx)=>{ el.classList.toggle('selected', idx===oi); });
  const chk = document.getElementById(`chk-${qi}`);
  if(chk){ chk.disabled=false; chk.classList.add('active'); }
}

function checkQ(qi){
  if(answers[qi]===null||revealed[qi]) return;
  revealed[qi]=true;
  refreshCard(qi);
  updateStats();
  checkSummary();
}

function showAns(qi){
  if(answers[qi]===null) answers[qi]=QS[qi].ans;
  revealed[qi]=true;
  refreshCard(qi);
  updateStats();
  checkSummary();
}

function refreshCard(qi){
  const card = document.getElementById(`qcard-${qi}`);
  if(!card) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = buildCard(qi);
  card.replaceWith(tmp.firstElementChild);
}

function checkSummary(){
  const done = revealed.filter(Boolean).length;
  if(done===QS.length){
    const right = QS.filter((_,i)=>answers[i]===QS[i].ans&&revealed[i]).length;
    const pct = Math.round(right/QS.length*100);
    document.getElementById('s-right').textContent=right;
    document.getElementById('s-wrong').textContent=QS.length-right;
    document.getElementById('s-pct').textContent=pct+'%';
    document.getElementById('grade-text').textContent = pct>=80?`Xuất sắc! ${pct}%`:pct>=60?`Đạt. ${pct}%`:`Cần ôn thêm. ${pct}%`;
    document.getElementById('grade-emoji').textContent = pct>=80?'🏆':pct>=60?'✅':'📚';
    document.getElementById('summary').classList.add('show');
  }
}

function updateStats(){
  const done = revealed.filter(Boolean).length;
  const right = QS.filter((_,i)=>revealed[i]&&answers[i]===QS[i].ans).length;
  document.getElementById('live-score').textContent = right;
  document.getElementById('live-done').textContent = done;
  const pct = (done/QS.length)*100;
  document.getElementById('prog').style.width = pct+'%';
  document.getElementById('prog-label').textContent = `${done} / ${QS.length} câu`;
  document.getElementById('pct-label').textContent = Math.round(pct)+'%';
}

function showAll(btn){ setTab(btn); visibleIdx=QS.map((_,i)=>i); render(); }
function filterBloom(b, btn){
  setTab(btn);
  visibleIdx = b===1 ? QS.map((_,i)=>i).filter(i=>QS[i].bloom<=2) :
               b===3 ? QS.map((_,i)=>i).filter(i=>QS[i].bloom===3) :
                       QS.map((_,i)=>i).filter(i=>QS[i].bloom>=4);
  render();
}
function showWrong(btn){
  setTab(btn);
  visibleIdx=QS.map((_,i)=>i).filter(i=>revealed[i]&&answers[i]!==QS[i].ans);
  if(!visibleIdx.length){ alert('Chưa có câu sai, hoặc chưa làm câu nào!'); return; }
  render();
}
function setTab(btn){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on')); btn.classList.add('on'); }

function checkAll(){
  visibleIdx.forEach(i=>{ if(answers[i]!==null&&!revealed[i]){ revealed[i]=true; } });
  render(); updateStats(); checkSummary();
}

function scrollTop(){ window.scrollTo({top:0,behavior:'smooth'}); }

function restartAll(){
  answers=new Array(QS.length).fill(null);
  revealed=new Array(QS.length).fill(false);
  visibleIdx=QS.map((_,i)=>i);
  document.getElementById('summary').classList.remove('show');
  render();
}

render();
</script>
