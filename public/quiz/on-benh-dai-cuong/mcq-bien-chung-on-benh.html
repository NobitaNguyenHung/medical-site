<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
header{background:linear-gradient(135deg,#1e3a5f,#0f2744);padding:20px 24px;border-bottom:2px solid #2563eb}
header h1{font-size:1.5rem;color:#60a5fa;letter-spacing:.5px}
header p{font-size:.85rem;color:#94a3b8;margin-top:4px}
.tabs{display:flex;gap:0;background:#1e293b;border-bottom:2px solid #334155}
.tab-btn{flex:1;padding:14px;cursor:pointer;background:none;border:none;color:#94a3b8;font-size:.95rem;font-weight:600;transition:all .2s;border-bottom:3px solid transparent}
.tab-btn.active{color:#60a5fa;border-bottom-color:#2563eb;background:#0f172a}
.tab-btn:hover:not(.active){background:#334155;color:#e2e8f0}
.tab-content{display:none;padding:20px 16px}
.tab-content.active{display:block}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;font-size:.8rem;transition:all .2s}
.filter-btn.active{background:#2563eb;color:#fff;border-color:#2563eb}
.stats-bar{display:flex;gap:16px;margin-bottom:16px;padding:10px 16px;background:#1e293b;border-radius:8px;font-size:.85rem;flex-wrap:wrap}
.stat{color:#94a3b8}.stat span{color:#60a5fa;font-weight:700}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card-wrap{perspective:1000px;height:200px;cursor:pointer}
.card-wrap.tall{height:280px}
.card-inner{position:relative;width:100%;height:100%;transition:transform .55s;transform-style:preserve-3d}
.card-wrap.flipped .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;padding:16px;display:flex;flex-direction:column;justify-content:space-between}
.card-front{background:linear-gradient(135deg,#1e3a5f,#0f2744);border:1px solid #2563eb}
.card-back{background:linear-gradient(135deg,#14532d,#052e16);border:1px solid #16a34a;transform:rotateY(180deg)}
.card-topic{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.85;margin-bottom:8px}
.card-q{font-size:.9rem;line-height:1.5;flex:1;display:flex;align-items:center}
.card-a{font-size:.82rem;line-height:1.55;flex:1;overflow-y:auto}
.card-a ul{padding-left:16px}.card-a li{margin-bottom:3px}
.card-hint{font-size:.7rem;color:#64748b;text-align:right}
.mcq-progress{margin-bottom:20px}
.progress-bar{height:6px;background:#1e293b;border-radius:3px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#2563eb,#16a34a);transition:width .4s;border-radius:3px}
.question-card{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #334155;transition:border-color .3s}
.question-card.correct{border-color:#16a34a;background:#0f2d1a}
.question-card.wrong{border-color:#dc2626;background:#2d0f0f}
.q-header{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap}
.q-num{background:#2563eb;color:#fff;border-radius:6px;padding:2px 8px;font-size:.75rem;font-weight:700;white-space:nowrap}
.q-topic-tag{background:#334155;color:#94a3b8;border-radius:6px;padding:2px 8px;font-size:.72rem}
.q-bloom{background:#7c3aed33;color:#a78bfa;border-radius:6px;padding:2px 8px;font-size:.72rem}
.q-stem{font-size:.92rem;line-height:1.6;color:#e2e8f0;margin-bottom:14px;font-weight:500}
.q-scenario{background:#0f172a;border-left:3px solid #2563eb;padding:10px 14px;border-radius:4px;font-size:.85rem;color:#94a3b8;margin-bottom:12px;line-height:1.6}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.option{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:8px;border:1px solid #334155;cursor:pointer;transition:all .2s;background:#0f172a}
.option:hover:not(.disabled){background:#1e3a5f;border-color:#2563eb}
.option.selected{background:#1e3a5f;border-color:#2563eb}
.option.correct-ans{background:#052e16;border-color:#16a34a;color:#4ade80}
.option.wrong-ans{background:#2d0f0f;border-color:#dc2626;color:#f87171}
.option.disabled{cursor:default}
.opt-label{font-weight:700;min-width:20px;color:#60a5fa}
.opt-text{font-size:.88rem;line-height:1.5}
.reveal-btn{padding:8px 18px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s}
.reveal-btn:hover{background:#1d4ed8}
.reveal-btn:disabled{background:#334155;color:#64748b;cursor:default}
.explanation{display:none;margin-top:12px;padding:14px;background:#0f172a;border-radius:8px;border:1px solid #334155}
.explanation.show{display:block}
.exp-correct{color:#4ade80;font-weight:700;margin-bottom:8px}
.exp-text{font-size:.85rem;line-height:1.6;color:#cbd5e1}
.exp-key{font-size:.82rem;color:#fbbf24;margin-top:8px;font-style:italic}
.hidden{display:none!important}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0f172a}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
.reset-btn{padding:8px 18px;background:#334155;color:#e2e8f0;border:none;border-radius:8px;cursor:pointer;font-size:.85rem;transition:all .2s;margin-left:auto;display:block}
.reset-btn:hover{background:#475569}
.empty{color:#64748b;font-size:.9rem;padding:20px;text-align:center}
</style>

<script>
const TOPICS = ["Khái niệm & Lịch sử","Vệ phần","Khí phần","Dinh phần","Huyết phần","Tam tiêu biện chứng","Truyền biến & Quan hệ"];
const COLORS = {"Khái niệm & Lịch sử":"#0ea5e9","Vệ phần":"#22c55e","Khí phần":"#f59e0b","Dinh phần":"#8b5cf6","Huyết phần":"#ef4444","Tam tiêu biện chứng":"#3b82f6","Truyền biến & Quan hệ":"#14b8a6"};
const flashcards = [];
const mcqs = [{"scenario":"","stem":"Lý luận vệ, khí, dinh, huyết biện chứng do y gia nào sáng lập?","opts":["A. Ngô Cúc Thông","B. Diệp Thiên Sĩ","C. Lưu Nguyên Tổ","D. Vương Mạnh Anh"],"ans":"B","exp":"Diệp Thiên Sĩ (đời Thanh) căn cứ quy luật diễn biến ôn bệnh kết hợp \"Nội kinh\" và y gia tiền bối để sáng lập vệ-khí-dinh-huyết biện chứng. Ngô Cúc Thông khởi xướng tam tiêu biện chứng.","key":"Vệ-khí-dinh-huyết = Diệp Thiên Sĩ; Tam tiêu = Ngô Cúc Thông.","id":1,"topic":"Khái niệm & Lịch sử","bloom":"Nhớ"},{"scenario":"","stem":"Biện chứng Ôn bệnh về bản chất là biện luận về điều gì?","opts":["A. Lục kinh","B. Bát cương đơn thuần","C. Vệ, khí, dinh, huyết và tam tiêu","D. Tạng phủ kinh lạc đơn thuần"],"ans":"C","exp":"Vệ, khí, dinh, huyết và tam tiêu bệnh chứng là lý luận biện chứng chủ yếu của Ôn bệnh.","key":"Hai trục biện chứng ôn bệnh: vệ-khí-dinh-huyết + tam tiêu.","id":2,"topic":"Khái niệm & Lịch sử","bloom":"Nhớ"},{"scenario":"","stem":"Người khởi xướng và hoàn thiện hệ thống tam tiêu biện chứng trong ôn bệnh học là ai?","opts":["A. Diệp Thiên Sĩ","B. Ngô Cúc Thông","C. Dụ Gia Ngôn","D. Kha Tú Sơn"],"ans":"B","exp":"Tam tiêu biện chứng bắt nguồn từ \"Nội kinh\", \"Nạn kinh\", được Ngô Cúc Thông (nhà Thanh) khởi xướng và hệ thống hóa, xác lập cương lĩnh tam tiêu biện chứng.","key":"Ngô Cúc Thông hoàn thiện tam tiêu biện chứng.","id":3,"topic":"Khái niệm & Lịch sử","bloom":"Hiểu"},{"scenario":"","stem":"Theo phân bố biểu lý, thứ tự từ nông đến sâu của vệ, khí, dinh, huyết là?","opts":["A. Huyết → dinh → khí → vệ","B. Khí → vệ → dinh → huyết","C. Vệ → khí → dinh → huyết","D. Vệ → dinh → khí → huyết"],"ans":"C","exp":"Vệ phân bố cơ biểu (nông nhất), khí sung dưỡng toàn thân, dinh đi trong mạch, huyết do dinh hóa thành trong mạch (sâu nhất). Vệ-khí tầng ngoài cạn; dinh-huyết tầng sâu.","key":"Nông→sâu: Vệ-Khí-Dinh-Huyết.","id":4,"topic":"Khái niệm & Lịch sử","bloom":"Hiểu"},{"scenario":"","stem":"Đặc điểm bệnh cơ phân biệt giai đoạn vệ-khí với dinh-huyết là gì?","opts":["A. Vệ-khí tổn hại thực thể; dinh-huyết công năng thất điều","B. Vệ-khí công năng thất điều; dinh-huyết tổn hại thực thể","C. Cả hai đều thuần công năng","D. Cả hai đều thuần thực thể"],"ans":"B","exp":"Bệnh cơ vệ-khí phần chủ yếu là công năng thất điều; bệnh cơ dinh-huyết phần chủ yếu là tổn hại thực thể.","key":"Vệ-khí = công năng; dinh-huyết = thực thể.","id":5,"topic":"Khái niệm & Lịch sử","bloom":"Hiểu"},{"scenario":"","stem":"Biện chứng yếu điểm (điểm chốt chẩn đoán) của vệ phần chứng là?","opts":["A. Sốt cao, không ố hàn, rêu vàng","B. Sốt, hơi ố phong hàn, miệng hơi khát","C. Sốt cao về đêm, lưỡi đỏ thẫm","D. Ban chẩn, xuất huyết, lưỡi tối thâm"],"ans":"B","exp":"Vệ phần lấy sốt, hơi ố phong hàn (sốt nặng ố hàn nhẹ), miệng hơi khát làm biện chứng yếu điểm.","key":"Vệ phần = sốt + ố phong hàn cùng xuất hiện.","id":6,"topic":"Vệ phần","bloom":"Nhớ"},{"scenario":"","stem":"Đặc điểm bệnh lý cô đọng của vệ phần chứng là?","opts":["A. Lý nhiệt chưng bách, nhiệt tích thương tân","B. Dinh nhiệt âm thương, nhiều thần xuyên lạc","C. Tà uất tại biểu, phế khí thất tuyên, chính tà tương tranh","D. Động huyết, hao huyết, ứ nhiệt nội trở"],"ans":"C","exp":"Tóm lại đặc điểm bệnh lý vệ phần chứng: tà uất tại biểu, phế khí thất tuyên, chính tà tương tranh.","key":"Vệ phần: tà uất biểu + phế thất tuyên.","id":7,"topic":"Vệ phần","bloom":"Hiểu"},{"scenario":"","stem":"Vì sao ố hàn trong vệ phần chứng nhẹ và thời gian ngắn?","opts":["A. Vì ôn tà thuộc tính dương nhiệt","B. Vì chính khí đã suy kiệt","C. Vì tà đã nhập huyết phần","D. Vì tân dịch chưa tổn thương"],"ans":"A","exp":"Ôn tà ức chế vệ dương nên ố hàn, nhưng do ôn tà có thuộc tính dương nhiệt nên ố hàn nhẹ và thời gian ngắn.","key":"Ôn tà dương nhiệt → ố hàn nhẹ, ngắn.","id":8,"topic":"Vệ phần","bloom":"Hiểu"},{"scenario":"","stem":"Triệu chứng \"miệng khát\" trong vệ phần chứng phản ánh điều gì?","opts":["A. Thận tinh hao tổn","B. Cảm phải ôn tà (tà thuộc nhiệt làm thương tân)","C. Thấp tà thiên thịnh","D. Huyết ứ nội trở"],"ans":"B","exp":"Miệng khát nói lên cảm phải ôn tà; ôn tà thường tổn thương tân dịch nên miệng khát — là điểm phán đoán thuộc tính hàn nhiệt của vệ phần.","key":"Khát ở vệ phần = dấu ấn ôn (nhiệt) tà.","id":9,"topic":"Vệ phần","bloom":"Hiểu"},{"scenario":"BN nữ 28 tuổi, sốt, hơi sợ gió lạnh, đau đầu, ho, ít mồ hôi, hơi khát, rêu lưỡi mỏng trắng, hai biên và đầu lưỡi đỏ, mạch phù sác.","stem":"Bệnh ở phần nào của vệ-khí-dinh-huyết?","opts":["A. Vệ phần","B. Khí phần","C. Dinh phần","D. Huyết phần"],"ans":"A","exp":"Sốt + ố phong hàn cùng xuất hiện, rêu mỏng trắng, mạch phù sác — điển hình vệ phần chứng (ôn tà mới phạm vệ biểu).","key":"Sốt+ố phong hàn+mạch phù sác = vệ phần.","id":10,"topic":"Vệ phần","bloom":"Áp dụng"},{"scenario":"BN sốt nhẹ, hơi ố phong hàn, ho nhẹ, bệnh khởi 1 ngày, tổng trạng tốt, chính khí chưa suy, được điều trị thích đáng.","stem":"Chuyển quy thuận lợi nhất của ca này là?","opts":["A. Truyền thẳng vào huyết phần","B. Tà được giải tại biểu, khỏi bệnh","C. Nội hãm tâm bào","D. Chuyển hạ tiêu thận tinh hao tổn"],"ans":"B","exp":"Ôn tà phạm vệ bệnh nông nhẹ; chính khí chưa suy + điều trị thích đáng → ôn tà bị khống chế, giải tại biểu.","key":"Vệ phần chính khí đủ → giải biểu khỏi bệnh.","id":11,"topic":"Vệ phần","bloom":"Phân tích"},{"scenario":"","stem":"Ở người tâm âm hư, ôn tà tại vệ phần có thể truyền biến đặc biệt như thế nào?","opts":["A. Chỉ truyền tuần tự sang khí phần","B. Truyền thẳng vào dinh/huyết phần gây triệu chứng nặng nguy cấp","C. Tự khỏi không truyền","D. Luôn dừng ở vệ phần"],"ans":"B","exp":"Người tâm âm hư, ôn tà có thể từ vệ phần truyền thẳng vào dinh và huyết phần (nghịch truyền), xuất hiện triệu chứng nặng, nguy cấp.","key":"Tâm âm hư → vệ truyền thẳng dinh/huyết.","id":12,"topic":"Vệ phần","bloom":"Phân tích"},{"scenario":"","stem":"Biện chứng yếu điểm của khí phần chứng là?","opts":["A. Sốt, hơi ố phong hàn, miệng hơi khát","B. Sốt cao, không ố hàn, miệng khát, rêu vàng","C. Sốt cao về đêm, tâm phiền, lưỡi đỏ thẫm","D. Ban chẩn, xuất huyết nhiều khiếu"],"ans":"B","exp":"Tà nhập khí phần: chỉ sốt, không ố hàn (ngược lại ố nhiệt), khát, rêu vàng là triệu chứng chủ yếu.","key":"Khí phần = sốt cao, KHÔNG ố hàn, rêu vàng.","id":13,"topic":"Khí phần","bloom":"Nhớ"},{"scenario":"","stem":"Vì sao khí phần chứng \"chỉ sốt mà không kèm ố hàn\"?","opts":["A. Vì tà đã giải ở biểu","B. Vì ôn tà ở lý không còn ở biểu","C. Vì chính khí suy kiệt","D. Vì thấp tà che lấp"],"ans":"B","exp":"Ôn tà tại lý không còn ở biểu nên chỉ sốt mà không kèm ố hàn; lý nhiệt kháng thịnh bức tân dịch nên mồ hôi nhiều.","key":"Tà nhập lý → mất ố hàn (khác vệ phần).","id":14,"topic":"Khí phần","bloom":"Hiểu"},{"scenario":"","stem":"Thể lâm sàng thường gặp nhất của khí phần chứng là?","opts":["A. Thấp nhiệt trung trở","B. Nhiệt thịnh dương minh","C. Tà hãm tâm bào","D. Hư phong nội động"],"ans":"B","exp":"Thể lâm sàng khí phần thường gặp là nhiệt thịnh dương minh: tráng nhiệt, không ố hàn, ố nhiệt, mồ hôi nhiều, khát uống lạnh, rêu vàng khô, mạch hồng đại.","key":"Khí phần điển hình = nhiệt thịnh dương minh.","id":15,"topic":"Khí phần","bloom":"Hiểu"},{"scenario":"","stem":"Phạm vi vị trí bệnh của khí phần chứng KHÔNG bao gồm cơ quan nào sau đây?","opts":["A. Phế, vị","B. Tỳ, trường","C. Đờm, mạc nguyên, hung cách","D. Thận, can (hạ tiêu)"],"ans":"D","exp":"Khí phần: ôn tà không còn ở vệ nhưng chưa vào dinh/huyết — vị trí chủ yếu phế, vị, tỳ, trường, đờm, mạc nguyên, hung cách. Thận-can (hạ tiêu) thuộc giai đoạn cuối.","key":"Khí phần ở trung-thượng tiêu, không tới hạ tiêu can-thận.","id":16,"topic":"Khí phần","bloom":"Nhớ"},{"scenario":"","stem":"Bốn con đường hình thành khí phần chứng KHÔNG gồm con đường nào?","opts":["A. Ôn tà từ vệ phần truyền vào trong","B. Ôn tà trực tiếp phạm khí phần","C. Khí phần phục nhiệt ngoại phát","D. Tà tại biểu trực tiếp nhập huyết phần"],"ans":"D","exp":"Khí phần chứng hình thành do: (1) truyền từ vệ phần, (2) trực tiếp phạm khí phần, (3) phục nhiệt ngoại phát, (4) tà nhiệt từ dinh phần chuyển ra khí. \"Tà biểu trực tiếp nhập huyết\" thuộc cơ chế huyết phần.","key":"4 đường vào khí phần — không có đường thẳng vào huyết.","id":17,"topic":"Khí phần","bloom":"Hiểu"},{"scenario":"BN nam 40 tuổi sốt cao liên tục, không sợ lạnh mà sợ nóng, mồ hôi ra nhiều, khát đòi uống nước lạnh, rêu lưỡi vàng khô, mạch hồng đại hữu lực.","stem":"Chẩn đoán biện chứng phù hợp nhất?","opts":["A. Vệ phần chứng","B. Nhiệt thịnh dương minh (khí phần)","C. Dinh phần chứng","D. Huyết phần chứng"],"ans":"B","exp":"Tráng nhiệt, không ố hàn, ố nhiệt, mồ hôi nhiều, khát uống lạnh, rêu vàng khô, mạch hồng đại = nhiệt thịnh dương minh thuộc khí phần (\"vô hình tráng nhiệt\").","key":"Mạch hồng đại + tráng nhiệt + khát lạnh = nhiệt thịnh dương minh.","id":18,"topic":"Khí phần","bloom":"Áp dụng"},{"scenario":"BN sốt, thân nhiệt bất dương (sốt không cao rõ), bụng đầy tức, rêu lưỡi trắng nề, ít mồ hôi.","stem":"Đây là thể nào trong khí phần chứng?","opts":["A. Nhiệt thịnh dương minh","B. Khí phần thấp nhiệt (thấp tà thiên thịnh)","C. Tà nhiệt ứng phế","D. Dương minh nhiệt kết"],"ans":"B","exp":"Sốt + bụng đầy tức + rêu nề là triệu chứng cơ bản biện biệt thấp nhiệt nội trở khí phần; thấp nặng thì thân nhiệt bất dương, rêu nề trắng.","key":"Sốt + bụng đầy + rêu nề = thấp nhiệt khí phần.","id":19,"topic":"Khí phần","bloom":"Phân tích"},{"scenario":"","stem":"Vì sao thấp nặng trong khí phần thấp nhiệt lại biểu hiện \"thân nhiệt bất dương\" (sốt không cao rõ)?","opts":["A. Vì chính khí đã suy kiệt","B. Vì nhiệt bị thấp lấn át, che lấp","C. Vì tà đã thoái ra biểu","D. Vì âm dịch đã kiệt"],"ans":"B","exp":"Thấp nặng thì nhiệt bị thấp lấn át, che lấp nên thân nhiệt bất dương; nhiệt thiên thịnh thì sốt tương đối cao nhưng ít/không mồ hôi.","key":"Thấp che nhiệt → sốt âm ỉ không cao.","id":20,"topic":"Khí phần","bloom":"Đánh giá"},{"scenario":"","stem":"Biện chứng yếu điểm của dinh phần chứng là?","opts":["A. Sốt cao về đêm, tâm phiền, chiêm ngữ, lưỡi đỏ thẫm","B. Sốt, ố phong hàn, rêu mỏng trắng","C. Sốt cao, không ố hàn, rêu vàng","D. Nhiều khiếu xuất huyết, lưỡi tối thâm"],"ans":"A","exp":"Dinh phần: thân nhiệt dạ thâm (sốt cao về đêm), tâm phiền khó ngủ, có lúc chiêm ngữ, ban chẩn mờ nhạt, chất lưỡi đỏ thẫm, mạch tế sác.","key":"Dinh phần = sốt đêm + chiêm ngữ + lưỡi đỏ thẫm.","id":21,"topic":"Dinh phần","bloom":"Nhớ"},{"scenario":"","stem":"Đặc điểm bệnh lý cô đọng của dinh phần chứng là?","opts":["A. Tà uất tại biểu, phế khí thất tuyên","B. Lý nhiệt chưng bách, nhiệt tích thương tân","C. Dinh nhiệt âm thương, nhiều thần xuyên lạc","D. Động huyết, hao huyết, ứ nhiệt nội trở"],"ans":"C","exp":"Đặc điểm bệnh lý dinh phần chứng: dinh nhiệt âm thương, nhiễu thần (xuyên) lạc.","key":"Dinh phần: dinh nhiệt thương âm + nhiễu thần.","id":22,"topic":"Dinh phần","bloom":"Hiểu"},{"scenario":"","stem":"Câu \"Kỳ nhiệt truyền dinh, thiệt sắc tất giáng (đỏ thẫm)\" của Diệp Thiên Sĩ nhấn mạnh dấu hiệu nào để phán đoán tà nhập dinh?","opts":["A. Mạch phù sác","B. Chất lưỡi đỏ thẫm","C. Rêu lưỡi vàng dày","D. Ban chẩn dày đặc"],"ans":"B","exp":"Chất lưỡi đỏ thẫm (thường không đóng rêu) là biến hóa lưỡi đặc trưng của dinh phần, tiêu chí quan trọng phán đoán ôn tà nhập dinh.","key":"Lưỡi đỏ thẫm = mốc nhập dinh.","id":23,"topic":"Dinh phần","bloom":"Hiểu"},{"scenario":"","stem":"Trong dinh phần chứng, vì sao \"miệng khô nhưng không khát nước nhiều\"?","opts":["A. Vì thấp tà che lấp tân dịch","B. Vì dinh nhiệt bốc lên, dinh âm bị hun đốt (không phải khí phần táo nhiệt thuần)","C. Vì tân dịch chưa tổn thương","D. Vì hàn tà nội thịnh"],"ans":"B","exp":"Dinh nhiệt bốc lên nên miệng khô nhưng không khát nhiều — khác khí phần (nhiệt tích thương tân → khát đòi uống lạnh nhiều).","key":"Dinh phần: khô miệng nhưng không khát rầm rộ.","id":24,"topic":"Dinh phần","bloom":"Hiểu"},{"scenario":"BN sốt cao về đêm, tâm phiền mất ngủ, có lúc nói nhảm, miệng khô không khát nhiều, ban chẩn lờ mờ, chất lưỡi đỏ thẫm không rêu, mạch tế sác.","stem":"Biện chứng phù hợp nhất?","opts":["A. Khí phần — nhiệt thịnh dương minh","B. Dinh phần chứng","C. Huyết phần chứng","D. Vệ phần chứng"],"ans":"B","exp":"Sốt đêm + chiêm ngữ + lưỡi đỏ thẫm + ban chẩn mờ + mạch tế sác = dinh phần chứng (dinh nhiệt âm thương).","key":"Bộ tứ dinh phần: sốt đêm/chiêm ngữ/lưỡi đỏ thẫm/ban mờ.","id":25,"topic":"Dinh phần","bloom":"Áp dụng"},{"scenario":"","stem":"Phương thức chuyển quy thuận lợi của ôn tà mới nhập dinh phần (điều trị tốt) là?","opts":["A. Thấu nhiệt chuyển khí (đưa nhiệt ra khí phần)","B. Thâm hãm huyết phần","C. Trực nhập hạ tiêu","D. Nội bế ngoại thoát"],"ans":"A","exp":"Ôn tà mới nhập dinh phần có thể thấu nhiệt chuyển khí (đưa nhiệt ra khí phần) — hướng chuyển quy tốt; ngược lại nếu dinh âm hao nặng/thất trị thì thâm hãm huyết phần.","key":"Dinh mới nhập → thấu nhiệt chuyển khí (tốt).","id":26,"topic":"Dinh phần","bloom":"Phân tích"},{"scenario":"","stem":"Dinh phần chứng nằm ở ranh giới giữa hai phần nào, nên có hai hướng chuyển quy?","opts":["A. Vệ phần và khí phần","B. Khí phần và huyết phần","C. Thượng tiêu và trung tiêu","D. Trung tiêu và hạ tiêu"],"ans":"B","exp":"Giới hạn bệnh biến dinh phần nằm giữa khí phần và huyết phần — vừa có thể quay lại khí phần, vừa có thể truyền sâu bức hại huyết phần.","key":"Dinh = bản lề giữa khí và huyết.","id":27,"topic":"Dinh phần","bloom":"Phân tích"},{"scenario":"","stem":"Đặc điểm bệnh lý cô đọng của huyết phần chứng là?","opts":["A. Tà uất biểu, phế khí thất tuyên","B. Dinh nhiệt âm thương","C. Động huyết, hao huyết, ứ nhiệt nội trở","D. Lý nhiệt chưng bách thương tân"],"ans":"C","exp":"Huyết phần chứng bệnh cơ chủ yếu: động huyết, hao huyết, ứ nhiệt nội trở.","key":"Huyết phần: động huyết + hao huyết + ứ nhiệt.","id":28,"topic":"Huyết phần","bloom":"Nhớ"},{"scenario":"","stem":"Biện chứng chủ yếu của huyết phần chứng là?","opts":["A. Sốt + ố phong hàn + rêu mỏng","B. Ban chẩn dày đặc, nhiều khiếu xuất huyết cấp, lưỡi tối thâm","C. Sốt cao không ố hàn, rêu vàng","D. Sốt đêm, chiêm ngữ, lưỡi đỏ thẫm"],"ans":"B","exp":"Huyết phần: bệnh cấp nặng, nhiều khiếu xuất huyết (thổ/nục/tiện/niệu huyết), ban chẩn dày đặc, chất lưỡi tối thâm.","key":"Huyết phần = xuất huyết nhiều khiếu + ban dày + lưỡi tối thâm.","id":29,"topic":"Huyết phần","bloom":"Nhớ"},{"scenario":"","stem":"Hai dấu hiệu chính phân biệt huyết phần chứng với dinh phần chứng là?","opts":["A. Sốt ngày vs sốt đêm","B. Xuất huyết rõ + lưỡi từ đỏ thẫm chuyển tối thâm","C. Có ố hàn vs không ố hàn","D. Mạch phù vs mạch trầm"],"ans":"B","exp":"Phân biệt: (1) huyết phần bệnh cấp nặng, nhiều khiếu xuất huyết, ban chẩn lộ rõ — dinh phần chỉ ban chẩn mờ, không xuất huyết khiếu; (2) lưỡi từ đỏ thẫm (dinh) chuyển tối thâm (huyết).","key":"Dinh→ban mờ/lưỡi đỏ thẫm; Huyết→xuất huyết/lưỡi tối thâm.","id":30,"topic":"Huyết phần","bloom":"Hiểu"},{"scenario":"","stem":"Vì sao huyết phần chứng xuất hiện ban chẩn tím bầm và lưỡi tối thâm?","opts":["A. Do thấp tà che lấp","B. Do huyết nhiệt tích thịnh luyện huyết, hình thành ứ huyết trở trệ trong mạch","C. Do dương khí ngoại thoát","D. Do tân dịch chưa tổn thương"],"ans":"B","exp":"Huyết nhiệt tích thịnh, uất nhiệt hồ kết, luyện huyết hao huyết tạo nhiều ứ huyết trở trệ trong mạch lạc → ban chẩn tím bầm, lưỡi tối thâm.","key":"Ứ nhiệt luyện huyết → ban tím, lưỡi tối thâm.","id":31,"topic":"Huyết phần","bloom":"Hiểu"},{"scenario":"BN sốt cao, vật vã bất an, thần hôn nói cuồng, nôn ra máu kèm chảy máu mũi, ban chẩn dày đặc dưới da, chất lưỡi tối thâm.","stem":"Biện chứng phù hợp nhất?","opts":["A. Dinh phần chứng","B. Huyết phần chứng","C. Khí phần chứng","D. Vệ phần chứng"],"ans":"B","exp":"Xuất huyết nhiều khiếu (thổ huyết, nục huyết) + ban chẩn dày + thần hôn chiêm cuồng + lưỡi tối thâm = huyết phần chứng (động huyết hao huyết, ứ nhiệt nội trở).","key":"Xuất huyết + ban dày + lưỡi tối thâm = huyết phần.","id":32,"topic":"Huyết phần","bloom":"Áp dụng"},{"scenario":"","stem":"Cơ chế tử vong nguy hiểm nhất của huyết phần chứng nặng là?","opts":["A. Tà giải tại biểu","B. Huyết mạch ứ trở/tạng khí suy kiệt hoặc mất máu cấp, khí tùy huyết thoát","C. Thấp tà che khiếu nhẹ","D. Phế khí thất tuyên đơn thuần"],"ans":"B","exp":"Huyết phần nhiệt cực thịnh, chính bất địch tà → huyết mạch ứ trở, tạng khí suy kiệt hoặc mất máu cấp, khí tùy huyết thoát mà tử vong.","key":"Huyết phần tử chứng = khí tùy huyết thoát.","id":33,"topic":"Huyết phần","bloom":"Đánh giá"},{"scenario":"","stem":"Theo tam tiêu biện chứng, thượng tiêu chủ yếu gồm tạng phủ nào?","opts":["A. Dương minh vị, trường và túc thái âm tỳ","B. Túc thiếu âm thận và túc quyết âm can","C. Thủ thái âm phế và thủ quyết âm tâm bào","D. Túc thái dương bàng quang"],"ans":"C","exp":"Thượng tiêu chủ yếu gồm thủ thái âm phế và thủ quyết âm tâm bào; trung tiêu gồm dương minh vị-trường và túc thái âm tỳ; hạ tiêu gồm túc thiếu âm thận và túc quyết âm can.","key":"Thượng=phế+tâm bào; Trung=vị-trường-tỳ; Hạ=thận-can.","id":34,"topic":"Tam tiêu biện chứng","bloom":"Nhớ"},{"scenario":"","stem":"\"Ôn tà thượng thụ, thủ tiên phạm phế\" mô tả đặc điểm gì?","opts":["A. Ôn tà đầu tiên phạm vào phế","B. Ôn tà đầu tiên phạm vào thận","C. Ôn tà đầu tiên phạm vào vị","D. Ôn tà đầu tiên phạm vào can"],"ans":"A","exp":"\"Ôn tà thượng thụ thủ tiên phạm phế\" — ôn tà xâm nhập đầu tiên phạm vào phế (thượng tiêu), vì phế hợp bì mao mà thống vệ.","key":"Ôn tà vào trước hết phạm phế.","id":35,"topic":"Tam tiêu biện chứng","bloom":"Nhớ"},{"scenario":"","stem":"Biện chứng yếu điểm của \"ôn tà phạm phế\" (thượng tiêu) là?","opts":["A. Sốt cao, mồ hôi nhiều, mạch hồng đại","B. Sốt, hơi ố phong hàn, ho","C. Triều nhiệt, táo bón, rêu vàng đen","D. Tay run, lưỡi khô teo, mạch hư"],"ans":"B","exp":"Ôn tà phạm phế: sốt, hơi ố phong hàn, ho là điểm chủ yếu để biện chứng (tương ứng vệ phần).","key":"Thượng tiêu phế = sốt + ố phong hàn + ho.","id":36,"topic":"Tam tiêu biện chứng","bloom":"Hiểu"},{"scenario":"","stem":"\"Hóa nguyên muốn tuyệt\" trong thượng tiêu ôn bệnh là bệnh lý của tạng nào?","opts":["A. Tâm bào","B. Phế (không chủ khí, nguồn sinh khí suy kiệt)","C. Thận","D. Can"],"ans":"B","exp":"Hóa nguyên muốn tuyệt = phế không chủ khí, không hóa sinh khí nên nguồn sinh khí suy kiệt; biểu hiện suyễn thúc, cánh mũi phập phồng, mồ hôi như tắm, mạch tán. Ngô Cúc Thông: \"Hóa nguyên tuyệt, nãi ôn bệnh đệ nhất tử pháp\".","key":"Hóa nguyên tuyệt = phế nguồn khí kiệt — tử chứng thượng tiêu.","id":37,"topic":"Tam tiêu biện chứng","bloom":"Hiểu"},{"scenario":"","stem":"Biện chứng chủ yếu của \"tà hãm tâm bào\" là?","opts":["A. Thần hôn, chi lạnh (quyết lãnh), lưỡi đỏ thẫm","B. Sốt, ố phong hàn, rêu mỏng","C. Triều nhiệt, táo bón","D. Tay run, mạch hư"],"ans":"A","exp":"Tà hãm tâm bào: tà nhiệt nội hãm bào lạc, tâm khiếu bế trở → thần hôn, chi quyết lãnh (lạnh từ khuỷu gối trở xuống), lưỡi run, lưỡi đỏ thẫm.","key":"Tà hãm tâm bào = thần hôn + chi lạnh + lưỡi đỏ thẫm.","id":38,"topic":"Tam tiêu biện chứng","bloom":"Hiểu"},{"scenario":"BN thần chí lúc tỉnh lúc mê (mơ màng), rêu lưỡi đóng lớp dày dơ, chất lưỡi KHÔNG đỏ thẫm, tứ chi không quyết lạnh.","stem":"Phân biệt đây là thể nào (so với tà hãm tâm bào)?","opts":["A. Tà hãm tâm bào","B. Thấp mông (che) tâm bào","C. Dương minh nhiệt kết","D. Hư phong nội động"],"ans":"B","exp":"Thấp mông tâm bào: thấp nhiệt ủ đàm trọc che bào lạc → thần chí lúc tỉnh lúc mê, rêu đóng dơ, nhưng lưỡi không đỏ thẫm, chi không quyết lạnh (tà còn ở khí phần chưa nhập dinh huyết). Khác tà hãm tâm bào (lưỡi đỏ thẫm, chi quyết lãnh).","key":"Lưỡi không đỏ thẫm + rêu dơ + chi không lạnh = thấp mông tâm bào.","id":39,"topic":"Tam tiêu biện chứng","bloom":"Phân tích"},{"scenario":"BN nhật bô triều nhiệt (sốt chiều), thần hôn nói nhảm, táo bón, bụng cứng đầy đau, rêu lưỡi vàng đen khô, mạch trầm thực hữu lực.","stem":"Biện chứng phù hợp nhất (trung tiêu)?","opts":["A. Dương minh tích nhiệt (vô hình)","B. Dương minh nhiệt kết (hữu hình)","C. Thấp nhiệt trung trở","D. Thận tinh hao tổn"],"ans":"B","exp":"Triều nhiệt + táo bón + bụng cứng đầy đau + rêu vàng đen khô + mạch trầm thực hữu lực = dương minh nhiệt kết (nhiệt kết trường phủ, có thực tà hữu hình).","key":"Triều nhiệt + táo bón + mạch trầm thực = dương minh nhiệt kết.","id":40,"topic":"Tam tiêu biện chứng","bloom":"Áp dụng"},{"scenario":"","stem":"Điểm khác biệt cốt lõi giữa dương minh tích nhiệt và dương minh nhiệt kết là?","opts":["A. Có/không sốt","B. Tích nhiệt là \"vô hình tráng nhiệt\" (chưa kết thực); nhiệt kết là tà nhiệt kết với cặn bã thành thực tà hữu hình","C. Một ở khí phần, một ở vệ phần","D. Một thuộc hàn, một thuộc nhiệt"],"ans":"B","exp":"Dương minh tích nhiệt = \"tán mạn phủ nhiệt\"/\"vô hình tráng nhiệt\" (nhiệt chưa kết thực, không thể táo hạ). Dương minh nhiệt kết = tà nhiệt kết tụ với chất cặn bã → thực tà hữu hình (triều nhiệt, táo bón, mạch trầm thực).","key":"Tích nhiệt=vô hình; nhiệt kết=hữu hình (kết thực).","id":41,"topic":"Tam tiêu biện chứng","bloom":"Đánh giá"},{"scenario":"BN thân nhiệt bất dương, ngực bụng đầy tức, buồn nôn, lợm giọng, rêu lưỡi trắng nề.","stem":"Biện chứng chủ yếu phù hợp?","opts":["A. Dương minh tích nhiệt","B. Thấp nhiệt trung trở","C. Tà hãm tâm bào","D. Hư phong nội động"],"ans":"B","exp":"Thấp nhiệt trung trở: thấp nhiệt khốn trở tỳ vị, thăng giáng thất tư → thân nhiệt bất dương, bụng đầy, nôn, rêu nề. Thấp nặng thì rêu trắng nề.","key":"Thân nhiệt bất dương + bụng đầy + nôn + rêu nề = thấp nhiệt trung trở.","id":42,"topic":"Tam tiêu biện chứng","bloom":"Áp dụng"},{"scenario":"BN tinh thần lừ đừ, gầy yếu vô lực, miệng họng khô, điếc, nóng lòng bàn tay chân, lưỡi đỏ thẫm không tươi, khô mà teo, mạch hư.","stem":"Biện chứng phù hợp nhất (hạ tiêu)?","opts":["A. Thận tinh hao tổn","B. Hư phong nội động","C. Dương minh nhiệt kết","D. Tà nhiệt ứng phế"],"ans":"A","exp":"Thận tinh hao tổn: tà nhiệt nhập sâu hạ tiêu, hao tổn thận âm → thủ túc tâm nhiệt (cả mu tay chân), miệng họng khô, lưỡi đỏ không tươi khô teo, mạch hư. Giai đoạn cuối ôn bệnh.","key":"Tâm nhiệt + lưỡi khô teo + mạch hư = thận tinh hao tổn.","id":43,"topic":"Tam tiêu biện chứng","bloom":"Phân tích"},{"scenario":"BN cuối giai đoạn ôn bệnh: uể oải, chi lạnh, điếc, ngũ tâm phiền nhiệt, hồi hộp tim đập nhanh, ngón tay run/co giật, lưỡi khô đỏ teo, mạch hư nhược.","stem":"Biện chứng phù hợp nhất?","opts":["A. Tà hãm tâm bào","B. Hư phong nội động","C. Huyết phần chứng","D. Thấp nhiệt trung trở"],"ans":"B","exp":"Hư phong nội động: thận tinh hư tổn → can mộc thất dưỡng, sinh nội phong → tay run/co giật, lưỡi khô teo, mạch hư. Khác động phong thực chứng.","key":"Tay run + lưỡi khô teo + mạch hư = hư phong nội động (hư chứng).","id":44,"topic":"Tam tiêu biện chứng","bloom":"Áp dụng"},{"scenario":"","stem":"Vì sao hư phong nội động (hạ tiêu) thuộc HƯ chứng còn động phong ở giai đoạn nhiệt cực thuộc THỰC?","opts":["A. Vì cùng cơ chế","B. Hư phong do thận tinh/can âm hư tổn cân mất nhu dưỡng; nhiệt cực động phong do tà nhiệt thực thịnh","C. Vì hư phong có sốt cao","D. Vì hư phong xảy ra ở thượng tiêu"],"ans":"B","exp":"Hư phong nội động sinh trên nền thận tinh hư tổn, can thất hàm dưỡng, cân mất nhu nhuận (bản hư); khác với nhiệt cực động phong là tà nhiệt thực thịnh (bản thực).","key":"Hư phong=âm hư cân thất dưỡng; thực phong=nhiệt cực.","id":45,"topic":"Tam tiêu biện chứng","bloom":"Đánh giá"},{"scenario":"","stem":"\"Phàm khán pháp, vệ chi hậu phương ngôn khí, dinh chi hậu phương ngôn huyết\" (Diệp Thiên Sĩ) mô tả kiểu truyền biến nào?","opts":["A. Từ lý đạt biểu","B. Truyền biến tuần tự từ biểu vào lý (vệ→khí→dinh→huyết)","C. Truyền biến không phân thứ tự","D. Nghịch truyền tâm bào"],"ans":"B","exp":"Câu này mô tả truyền biến tuần tự từ biểu vào lý: sau vệ mới đến khí, sau dinh mới đến huyết — đa số gặp ở tân cảm ôn bệnh.","key":"Vệ→khí→dinh→huyết = truyền biến tuần tự (biểu nhập lý).","id":46,"topic":"Truyền biến & Quan hệ","bloom":"Hiểu"},{"scenario":"","stem":"Kiểu truyền biến \"từ lý đạt biểu\" (huyết→dinh→khí→biểu) thường gặp ở loại ôn bệnh nào và ý nghĩa dự hậu?","opts":["A. Tân cảm ôn bệnh, dự hậu xấu","B. Phục tà ôn bệnh, bệnh nhẹ dần, dự hậu tương đối tốt","C. Thử nhiệt, luôn tử vong","D. Thấp ôn, không có dự hậu"],"ans":"B","exp":"Phục tà ôn bệnh đa số truyền biến từ lý đạt biểu; phục tà từ lý thấu ngoại là bệnh nhẹ dần, dự hậu tương đối tốt.","key":"Phục tà → lý đạt biểu → nhẹ dần (tốt).","id":47,"topic":"Truyền biến & Quan hệ","bloom":"Hiểu"},{"scenario":"","stem":"Theo tam tiêu, \"thuận truyền\" và \"nghịch truyền\" của thượng tiêu được định nghĩa thế nào?","opts":["A. Thuận: phế→tâm bào; Nghịch: phế→vị","B. Thuận: phế→trung tiêu vị (tạng truyền phủ, dự hậu tốt); Nghịch: phế→tâm bào (cấp, nguy hiểm, dự hậu kém)","C. Thuận và nghịch giống nhau","D. Thuận: thận→can; Nghịch: can→thận"],"ans":"B","exp":"Thuận truyền: thượng tiêu phế → trung tiêu vị (tạng truyền phủ), chính khí trục tà ngoại xuất, dự hậu tốt. Nghịch truyền: thủ thái âm phế → thủ quyết âm tâm bào, bệnh cấp nguy hiểm, dự hậu kém.","key":"Thuận=phế→vị (tốt); Nghịch=phế→tâm bào (xấu).","id":48,"topic":"Truyền biến & Quan hệ","bloom":"Phân tích"},{"scenario":"","stem":"Yếu tố nào sau đây KHÔNG ảnh hưởng đến phương thức/tốc độ truyền biến của ôn bệnh?","opts":["A. Tính chất tà khí (phong nhiệt, thử nhiệt, thấp nhiệt)","B. Lượng tà cảm nhiễm nhiều hay ít","C. Thể chất người bệnh","D. Màu sắc quần áo bệnh nhân"],"ans":"D","exp":"Truyền biến chịu ảnh hưởng bởi: tính chất tà (phong nhiệt dễ nghịch truyền, thử nhiệt truyền không phân biểu lý, thấp nhiệt truyền chậm), lượng tà cảm, thể chất, và điều trị đúng/sai. Màu quần áo vô can.","key":"Truyền biến do tà tính + lượng tà + thể chất + điều trị.","id":49,"topic":"Truyền biến & Quan hệ","bloom":"Đánh giá"},{"scenario":"","stem":"Loại ôn tà nào \"truyền biến không phân biệt biểu lý trước sau\" do tổn thương cơ thể cực mạnh?","opts":["A. Phong nhiệt bệnh tà","B. Thử nhiệt bệnh tà","C. Thấp nhiệt bệnh tà","D. Táo nhiệt bệnh tà"],"ans":"B","exp":"Thử nhiệt bệnh tà tổn thương cơ thể cực mạnh, truyền biến không phân biệt biểu lý trước sau; phong nhiệt dễ nghịch truyền; thấp nhiệt truyền biến tương đối chậm, thâm nhập dần.","key":"Thử nhiệt → truyền nhanh không phân biểu lý.","id":50,"topic":"Truyền biến & Quan hệ","bloom":"Hiểu"},{"scenario":"","stem":"Câu của Ngô Cúc Thông \"Trẻ con âm hư (thiếu) hơn người lớn... mắc thử ôn không bao lâu sẽ qua vệ nhập dinh\" minh họa yếu tố nào của truyền biến?","opts":["A. Tính chất tà khí","B. Thể chất (cơ địa) người bệnh","C. Điều trị","D. Mùa vụ"],"ans":"B","exp":"Cơ thể âm hư (trẻ con) dễ làm ôn tà nội tích như \"liêu nguyên chi thể\" nên truyền biến nhanh — minh họa yếu tố thể chất ảnh hưởng truyền biến.","key":"Cơ địa âm hư → truyền biến nhanh.","id":51,"topic":"Truyền biến & Quan hệ","bloom":"Phân tích"},{"scenario":"","stem":"Ba ý nghĩa của vệ-khí-dinh-huyết biện chứng là gì?","opts":["A. Xác định vị trí nông sâu; xác định loại hình & tính chất chứng hậu; cung cấp dữ liệu xác lập trị pháp","B. Chỉ để chọn bài thuốc","C. Chỉ để tiên lượng tử vong","D. Chỉ để phân biệt với thương hàn"],"ans":"A","exp":"Ý nghĩa: (1) xác định rõ vị trí nông sâu; (2) xác định chứng hậu loại hình & tính chất bệnh biến; (3) cung cấp dữ liệu chính xác để xác lập trị pháp.","key":"Vệ-khí-dinh-huyết: định nông sâu + loại hình + trị pháp.","id":52,"topic":"Truyền biến & Quan hệ","bloom":"Hiểu"},{"scenario":"","stem":"Khi phối hợp hai phương pháp biện chứng, trình tự ứng dụng hợp lý trên lâm sàng là?","opts":["A. Dùng tam tiêu trước để định nông sâu, rồi vệ-khí-dinh-huyết định vị trí","B. Dùng vệ-khí-dinh-huyết định nông sâu/thứ tự/xu thế, rồi tam tiêu định vị trí bệnh","C. Chỉ dùng một phương pháp, không phối hợp","D. Hai phương pháp thay thế hoàn toàn cho nhau"],"ans":"B","exp":"Thông thường trước dùng vệ-khí-dinh-huyết biện chứng xác định bệnh nông sâu, thứ tự và xu thế phát triển; sau dùng tam tiêu biện chứng xác định vị trí bệnh. Hai phương pháp hỗ trợ nhau, không thay thế.","key":"Vệ-khí-dinh-huyết (nông sâu) → tam tiêu (vị trí).","id":53,"topic":"Truyền biến & Quan hệ","bloom":"Đánh giá"},{"scenario":"","stem":"Mối quan hệ giữa \"bệnh huyết phần\" và \"bệnh hạ tiêu can-thận\" được phân biệt thế nào?","opts":["A. Hoàn toàn giống nhau","B. Huyết phần (nhiệt thịnh bức huyết, thực hoặc trong thực có hư); hạ tiêu can-thận (nhiệt tổn chân âm tinh huyết, thuộc hư)","C. Cả hai đều thuần hư","D. Cả hai đều ở thượng tiêu"],"ans":"B","exp":"Bệnh hạ tiêu túc thiếu âm thận/quyết âm can: nhiệt tổn thương chân âm tinh huyết, bệnh chứng thuộc hư. Bệnh huyết phần: nhiệt thịnh bức huyết (động huyết hao huyết ứ nhiệt), không giới hạn hạ tiêu, chứng thực hoặc trong thực có hư.","key":"Hạ tiêu can-thận=hư; huyết phần=thực (bức huyết).","id":54,"topic":"Truyền biến & Quan hệ","bloom":"Phân tích"},{"scenario":"","stem":"Theo Ngô Cúc Thông \"Thượng tiêu bệnh bất trị tắc chuyển trung tiêu... trung tiêu bệnh bất trị tắc chuyển hạ tiêu\", quy luật truyền biến chung của tam tiêu là?","opts":["A. Hạ → trung → thượng","B. Thượng tiêu → trung tiêu → hạ tiêu","C. Trung → thượng → hạ","D. Không có quy luật"],"ans":"B","exp":"Quy luật truyền biến chung tam tiêu: thượng tiêu (phế) → trung tiêu (tỳ vị) → hạ tiêu (can thận) — \"thủy thượng tiêu, chung hạ tiêu\".","key":"Tam tiêu truyền: thượng→trung→hạ.","id":55,"topic":"Truyền biến & Quan hệ","bloom":"Hiểu"},{"scenario":"","stem":"Trường hợp \"vệ khí cùng bệnh\", \"khí dinh lưỡng phiên\", \"vệ dinh huyết cùng bệnh\" minh họa kiểu truyền biến nào?","opts":["A. Truyền biến tuần tự điển hình","B. Truyền biến không phân thứ tự biểu lý (bệnh án không điển hình, vượt kỳ/trùng lặp)","C. Từ lý đạt biểu","D. Chỉ gặp ở phục tà"],"ans":"B","exp":"Bệnh án không điển hình: diễn biến vệ-khí-dinh-huyết vượt kỳ hay trùng lặp → vệ khí cùng bệnh, khí dinh huyết lưỡng phiên, vệ dinh huyết cùng bệnh, thậm chí cả 4 phần đều bệnh — truyền biến không phân thứ tự.","key":"Nhiều phần cùng bệnh = truyền biến không phân thứ tự (không điển hình).","id":56,"topic":"Truyền biến & Quan hệ","bloom":"Phân tích"},{"scenario":"BN sốt, ho suyễn khí thúc, mồ hôi ra, miệng khát, rêu lưỡi vàng, mạch sác; KHÔNG còn ố hàn.","stem":"Biện chứng thượng tiêu phù hợp nhất?","opts":["A. Ôn tà phạm phế (biểu)","B. Tà nhiệt ứng (úng) phế","C. Thấp nhiệt trở phế","D. Tà hãm tâm bào"],"ans":"B","exp":"Tà nhiệt úng phế: ôn tà từ biểu nhập lý, tà nhiệt ủng phế, phế khí bế uất → sốt, hãn xuất, ho suyễn khí thúc, khát, rêu vàng, mạch sác (không còn biểu chứng ố hàn). Thuộc phạm vi khí phần.","key":"Ho suyễn + rêu vàng + không ố hàn = tà nhiệt úng phế.","id":57,"topic":"Tam tiêu biện chứng","bloom":"Áp dụng"},{"scenario":"","stem":"Vì sao thử nhiệt bệnh tà có thể \"trực tiếp phạm tâm bào\" không cần khởi từ thượng tiêu thủ thái âm phế?","opts":["A. Vì thử tà thuộc thấp","B. Vì thử thuộc hỏa, tâm là hỏa tạng, đồng khí tương cầu","C. Vì thử tà thuộc hàn","D. Vì tâm bào thuộc hạ tiêu"],"ans":"B","exp":"Thử thuộc hỏa mà tâm là hỏa tạng, đồng khí tương cầu nên tà cực dễ phạm → thử nhiệt có thể trực phạm tâm bào, không nhất thiết khởi từ phế.","key":"Thử (hỏa) đồng khí với tâm (hỏa) → trực phạm tâm bào.","id":58,"topic":"Tam tiêu biện chứng","bloom":"Phân tích"},{"scenario":"BN sốt, đau bụng, đại tiện lỏng hôi thối, đi tiêu không thoải mái, ngực bụng đầy tức, rêu lưỡi vàng nề/vàng trọc, lưỡi đỏ, mạch hoạt sác.","stem":"Biện chứng chủ yếu phù hợp?","opts":["A. Dương minh nhiệt kết","B. Thấp nhiệt tích trệ bác kết trường phủ","C. Thận tinh hao tổn","D. Vệ phần chứng"],"ans":"B","exp":"Thấp nhiệt tích trệ bác kết trường phủ: thấp nhiệt + cặn bã tích trệ đại/tiểu trường → sốt, đau bụng, đại tiện lỏng hôi, rêu vàng nề/vàng trọc. Khác dương minh nhiệt kết (táo bón, rêu vàng đen khô).","key":"Đại tiện lỏng hôi + rêu vàng nề = thấp nhiệt tích trệ trường phủ (khác táo bón nhiệt kết).","id":59,"topic":"Khí phần","bloom":"Phân tích"},{"scenario":"","stem":"Huyết phần chứng KHÔNG hình thành theo con đường nào sau đây?","opts":["A. Dinh phần tà nhiệt không thấu chuyển ra khí mà truyền nhập huyết","B. Vệ/khí phần tà nhiệt chưa giải, vượt tuyến nhập huyết","C. Huyết phần phục nhiệt tự phát","D. Thận tinh hư tổn sinh nội phong"],"ans":"D","exp":"Huyết phần hình thành do: (1) dinh nhiệt truyền nhập huyết, (2) vệ/khí tà nhiệt vượt tuyến nhập huyết, (3) huyết phần phục nhiệt tự phát. Thận tinh hư tổn sinh nội phong là cơ chế hư phong nội động (hạ tiêu), không phải huyết phần.","key":"3 đường vào huyết phần — không gồm hư phong nội động.","id":60,"topic":"Huyết phần","bloom":"Hiểu"},{"scenario":"","stem":"Khi thấp nhiệt/thử thấp bệnh tà nhập dinh nhưng chưa hóa táo triệt để, ngoài triệu chứng dinh phần điển hình còn kèm dấu hiệu nào?","opts":["A. Mạch phù khẩn","B. Rêu lưỡi nề, dơ (dấu thấp còn lưu khí phần)","C. Lưỡi nhợt rêu trắng mỏng","D. Không có rêu, lưỡi đỏ thẫm thuần"],"ans":"B","exp":"Thấp nhiệt/thử thấp nhập dinh chưa hóa táo triệt để, còn lưu một phần ở khí phần → ngoài sốt đêm/chiêm ngữ/ban chẩn còn có rêu lưỡi nề, dơ (dấu thấp).","key":"Dinh phần + rêu nề dơ = thấp nhiệt nhập dinh chưa hóa táo.","id":61,"topic":"Dinh phần","bloom":"Đánh giá"},{"scenario":"","stem":"Vì sao nói \"phế bị tập kích đầu tiên\" khi ôn tà xâm nhập, liên hệ vệ phần?","opts":["A. Vì phế thuộc hạ tiêu","B. Vì phế hợp bì mao, chủ nhất thân chi khí; ôn tà từ miệng mũi vào trước phạm phế kinh và vệ phần","C. Vì phế chủ huyết","D. Vì phế tàng thần"],"ans":"B","exp":"Phế hợp bì mao lại chủ nhất thân chi khí; ôn tà từ miệng mũi nhập vào đầu tiên phạm phế kinh, vệ phần bị tập kích đầu tiên → bệnh cơ vệ phần (tà uất biểu, phế khí thất tuyên).","key":"Phế hợp bì mao + chủ khí → vệ phần bị đánh đầu tiên.","id":62,"topic":"Vệ phần","bloom":"Đánh giá"}];

let fcFlipped = 0;
let mcqAnswered = 0, mcqCorrect = 0;
let fcFilter = 'Tất cả', mcqFilter = 'Tất cả';

function initCounts(){
  document.getElementById('tab-btn-fc').textContent = '🃏 ' + flashcards.length + ' Flashcard';
  document.getElementById('tab-btn-mcq').textContent = '📝 ' + mcqs.length + ' MCQ (SBA)';
  document.getElementById('fc-total').textContent = flashcards.length;
  document.getElementById('fc-topics').textContent = TOPICS.length;
  document.getElementById('mcq-total').textContent = mcqs.length;
}

function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===(t==='fc'?0:1)));
  document.getElementById('tab-fc').classList.toggle('active',t==='fc');
  document.getElementById('tab-mcq').classList.toggle('active',t==='mcq');
}

function buildFilters(containerId, filterVar, onChangeFn){
  const c = document.getElementById(containerId);
  const cats = ['Tất cả',...TOPICS];
  c.innerHTML = '';
  cats.forEach(function(t){
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (t === filterVar ? ' active' : '');
    btn.textContent = t;
    btn.onclick = function(){ onChangeFn(t); };
    c.appendChild(btn);
  });
}

function renderFlashcards(){ buildFilters('fc-filters', fcFilter, fcSetFilter); renderFCGrid(); }
function fcSetFilter(t){ fcFilter = t; buildFilters('fc-filters', fcFilter, fcSetFilter); renderFCGrid(); }

function renderFCGrid(){
  const grid = document.getElementById('fc-grid');
  const cards = fcFilter === 'Tất cả' ? flashcards : flashcards.filter(function(c){ return c.topic === fcFilter; });
  if(!cards.length){ grid.innerHTML = '<div class="empty">Không có thẻ nào.</div>'; return; }
  grid.innerHTML = cards.map(function(c){
    return '<div class="card-wrap' + (c.tall ? ' tall' : '') + '" id="fc-' + c.id + '" onclick="flipCard(' + c.id + ')">' +
      '<div class="card-inner">' +
        '<div class="card-face card-front">' +
          '<div class="card-topic" style="color:' + (COLORS[c.topic]||'#60a5fa') + '">' + c.topic + ' • Thẻ ' + c.id + '</div>' +
          '<div class="card-q">' + c.q + '</div>' +
          '<div class="card-hint">Chạm để xem đáp án →</div>' +
        '</div>' +
        '<div class="card-face card-back">' +
          '<div class="card-topic" style="color:' + (COLORS[c.topic]||'#16a34a') + '">' + c.topic + ' • Đáp án</div>' +
          '<div class="card-a">' + c.a + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function flipCard(id){
  const el = document.getElementById('fc-'+id);
  const wasFlipped = el.classList.contains('flipped');
  el.classList.toggle('flipped');
  if(!wasFlipped){ fcFlipped++; document.getElementById('fc-flipped').textContent = fcFlipped; }
}

function renderMCQ(){ buildFilters('mcq-filters', mcqFilter, mcqSetFilter); renderMCQList(); }
function mcqSetFilter(t){ mcqFilter = t; buildFilters('mcq-filters', mcqFilter, mcqSetFilter); renderMCQList(); }

function renderMCQList(){
  const list = document.getElementById('mcq-list');
  const qs = mcqFilter === 'Tất cả' ? mcqs : mcqs.filter(function(q){ return q.topic === mcqFilter; });
  if(!qs.length){ list.innerHTML = '<div class="empty">Không có câu hỏi nào.</div>'; return; }
  list.innerHTML = qs.map(function(q){
    const scenario = q.scenario ? '<div class="q-scenario">📋 ' + q.scenario + '</div>' : '';
    const opts = q.opts.map(function(o, i){
      return '<div class="option" id="opt-' + q.id + '-' + i + '" onclick="selectOpt(' + q.id + ',' + i + ')">' +
        '<span class="opt-label">' + String.fromCharCode(65+i) + '.</span>' +
        '<span class="opt-text">' + o.substring(3) + '</span>' +
      '</div>';
    }).join('');
    return '<div class="question-card" id="qcard-' + q.id + '">' +
      '<div class="q-header">' +
        '<span class="q-num">Câu ' + q.id + '</span>' +
        '<span class="q-topic-tag" style="border-left:3px solid ' + (COLORS[q.topic]||'#334155') + ';padding-left:8px">' + q.topic + '</span>' +
        (q.bloom ? '<span class="q-bloom">' + q.bloom + '</span>' : '') +
      '</div>' +
      scenario +
      '<div class="q-stem">' + q.stem + '</div>' +
      '<div class="options">' + opts + '</div>' +
      '<button class="reveal-btn" id="rbtn-' + q.id + '" onclick="revealAns(' + q.id + ')">Xem đáp án</button>' +
      '<div class="explanation" id="exp-' + q.id + '">' +
        '<div class="exp-correct">✓ Đáp án đúng: ' + q.ans + '</div>' +
        '<div class="exp-text">' + q.exp + '</div>' +
        (q.key ? '<div class="exp-key">💡 Key: ' + q.key + '</div>' : '') +
      '</div>' +
    '</div>';
  }).join('');
}

function selectOpt(qid, optIdx){
  const q = mcqs.find(function(x){ return x.id === qid; });
  const card = document.getElementById('qcard-'+qid);
  if(card.classList.contains('correct') || card.classList.contains('wrong')) return;
  q.opts.forEach(function(_,i){ document.getElementById('opt-'+qid+'-'+i).classList.remove('selected'); });
  document.getElementById('opt-'+qid+'-'+optIdx).classList.add('selected');
}

function revealAns(qid){
  const q = mcqs.find(function(x){ return x.id === qid; });
  const card = document.getElementById('qcard-'+qid);
  if(card.classList.contains('correct') || card.classList.contains('wrong')) return;
  const correctIdx = q.ans.charCodeAt(0) - 65;
  const selectedEl = document.querySelector('#qcard-'+qid+' .option.selected');
  let selectedIdx = -1;
  if(selectedEl) selectedIdx = parseInt(selectedEl.id.split('-')[2]);
  q.opts.forEach(function(_,i){
    const opt = document.getElementById('opt-'+qid+'-'+i);
    opt.classList.add('disabled');
    if(i === correctIdx) opt.classList.add('correct-ans');
    else if(i === selectedIdx) opt.classList.add('wrong-ans');
  });
  const isCorrect = selectedIdx === correctIdx;
  card.classList.add(isCorrect ? 'correct' : 'wrong');
  document.getElementById('exp-'+qid).classList.add('show');
  document.getElementById('rbtn-'+qid).disabled = true;
  mcqAnswered++;
  if(isCorrect) mcqCorrect++;
  updateMCQStats();
}

function updateMCQStats(){
  const total = mcqs.length;
  document.getElementById('mcq-answered').textContent = mcqAnswered;
  document.getElementById('mcq-correct-count').textContent = mcqCorrect;
  const pct = mcqAnswered > 0 ? Math.round(mcqCorrect / mcqAnswered * 100) : 0;
  document.getElementById('mcq-pct').textContent = pct + '%';
  document.getElementById('mcq-bar').style.width = (total > 0 ? mcqAnswered / total * 100 : 0) + '%';
}

function resetMCQ(){ mcqAnswered = 0; mcqCorrect = 0; updateMCQStats(); renderMCQList(); }

initCounts();
renderFlashcards();
renderMCQ();
</script>
</body>
</html>
