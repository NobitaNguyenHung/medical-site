<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn Bệnh Đại Cương — Quiz & Flashcard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e5e5e0;padding:16px 24px;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:600;color:#1a1a1a}
.header p{font-size:13px;color:#666;margin-top:2px}
.tabs-wrap{display:flex;gap:0;border-bottom:1px solid #e5e5e0;background:#fff;padding:0 24px;position:sticky;top:65px;z-index:99}
.tab{padding:12px 20px;font-size:14px;cursor:pointer;border:none;background:none;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;font-weight:500;transition:color 0.15s}
.tab:hover{color:#1a1a1a}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.container{max-width:860px;margin:0 auto;padding:24px 24px 80px}
/* MCQ */
.score-bar{display:flex;align-items:center;gap:16px;background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:16px 20px;margin-bottom:20px}
.score-big{font-size:28px;font-weight:700;min-width:70px}
.score-info{flex:1}
.score-label{font-size:12px;color:#888;margin-bottom:4px}
.progress{height:6px;background:#e5e5e0;border-radius:3px;overflow:hidden}
.progress-fill{height:6px;background:#1D9E75;border-radius:3px;transition:width 0.4s ease}
.reset-btn,.export-btn{padding:8px 14px;font-size:13px;cursor:pointer;border:1px solid #d0d0c8;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit;display:flex;align-items:center;gap:6px;white-space:nowrap}
.reset-btn:hover,.export-btn:hover{background:#f5f5f0}
.q-card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:20px;margin-bottom:14px}
.q-card.answered{border-color:#d0d0c8}
.q-meta{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.q-num{font-size:12px;font-weight:600;color:#888}
.badge{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500}
.b-nhanBiet{background:#EAF3DE;color:#3B6D11}
.b-hieu{background:#E6F1FB;color:#185FA5}
.b-apDung{background:#FAEEDA;color:#854F0B}
.b-phanTich{background:#FBEAF0;color:#993556}
.b-tongHop{background:#EEEDFE;color:#534AB7}
.b-level-cb{background:#f5f5f0;color:#666}
.b-level-tb{background:#f0eeff;color:#534AB7}
.b-level-nc{background:#fff0f0;color:#A32D2D}
.q-stem{font-size:15px;line-height:1.65;margin-bottom:16px;color:#1a1a1a}
.options{display:grid;gap:7px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border:1px solid #e5e5e0;border-radius:9px;cursor:pointer;font-size:14px;line-height:1.5;transition:all 0.12s;user-select:none}
.opt:hover:not(.locked){background:#f9f9f7;border-color:#c0c0b8}
.opt.selected{border-color:#378ADD;background:#f0f7ff}
.opt.correct{border-color:#1D9E75;background:#e8f8f2;color:#085041}
.opt.wrong{border-color:#E24B4A;background:#fff0f0;color:#501313}
.opt-letter{width:24px;height:24px;min-width:24px;border-radius:50%;background:#f0f0e8;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#666;transition:all 0.12s}
.opt.correct .opt-letter{background:#1D9E75;color:#fff}
.opt.wrong .opt-letter{background:#E24B4A;color:#fff}
.opt.selected .opt-letter{background:#378ADD;color:#fff}
.explain{margin-top:14px;border-radius:9px;overflow:hidden;display:none;border:1px solid #e5e5e0}
.explain.show{display:block}
.explain-correct{padding:12px 14px;background:#e8f8f2;border-bottom:1px solid #b2dece}
.explain-correct strong{color:#085041;font-size:14px}
.explain-why{padding:10px 14px;font-size:13px;line-height:1.6;color:#333;background:#fff}
.explain-wrongs{padding:0 14px 12px;background:#fff}
.explain-wrong-item{font-size:12px;color:#666;line-height:1.5;padding:3px 0;border-top:1px solid #f0f0e8}
/* Flashcard */
.fc-controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.fc-stats{font-size:13px;color:#666}
.fc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.fc{height:180px;cursor:pointer;perspective:700px}
.fc-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform 0.4s cubic-bezier(.4,0,.2,1)}
.fc.flipped .fc-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;inset:0;border:1px solid #e5e5e0;border-radius:12px;padding:16px;backface-visibility:hidden;display:flex;flex-direction:column;justify-content:space-between;background:#fff}
.fc-back{background:#e8f8f2;border-color:#9FE1CB;transform:rotateY(180deg)}
.fc-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#999;margin-bottom:8px}
.fc-back .fc-tag{color:#0F6E56}
.fc-q{font-size:13px;font-weight:600;line-height:1.5;color:#1a1a1a}
.fc-a{font-size:12px;line-height:1.65;color:#085041;flex:1;overflow:hidden}
.fc-hint{font-size:11px;color:#aaa;display:flex;align-items:center;gap:4px}
.fc-back .fc-hint{color:#5DCAA5}
.fc-num{font-size:11px;font-weight:600;color:#0F6E56}
/* Print */
@media print{
  .header,.tabs-wrap,.score-bar,.reset-btn,.export-btn,.fc-controls{display:none!important}
  .container{padding:0;max-width:100%}
  .q-card{break-inside:avoid;page-break-inside:avoid;border:1px solid #ccc;margin-bottom:8px}
  .opt.correct{border-color:#1D9E75!important;background:#e8f8f2!important}
  .explain{display:block!important}
  .fc{height:auto}
  .fc-inner{transform:none!important}
  .fc-back{display:none}
}
.panel{display:none}.panel.active{display:block}
</style>
</head>
<body>

<div class="header">
  <h1>Ôn Bệnh Học — Đại Cương</h1>
  <p>Giáo trình ĐH Y Dược Cần Thơ 2024 · TS.BS. Lê Minh Hoàng; BS. CKII. Lê Thị Ngoan</p>
</div>

<div class="tabs-wrap">
  <button class="tab active" onclick="switchTab('mcq',this)">Trắc nghiệm MCQ (30 câu)</button>
  <button class="tab" onclick="switchTab('fc',this)">Flashcard (30 thẻ)</button>
</div>

<div class="container">

<!-- MCQ PANEL -->
<div id="panel-mcq" class="panel active">
  <div class="score-bar">
    <div>
      <div class="score-big" id="score-display">0/30</div>
    </div>
    <div class="score-info">
      <div class="score-label">Đã trả lời: <span id="answered-count">0</span>/30 câu</div>
      <div class="progress"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <button class="reset-btn" onclick="resetMCQ()"><i class="ti ti-refresh"></i> Làm lại</button>
    <button class="export-btn" onclick="window.print()"><i class="ti ti-printer"></i> In</button>
  </div>
  <div id="mcq-list"></div>
</div>

<!-- FLASHCARD PANEL -->
<div id="panel-fc" class="panel">
  <div class="fc-controls">
    <div class="fc-stats">Nhấn thẻ để lật — <span id="fc-seen">0</span>/30 đã xem</div>
    <button class="reset-btn" onclick="resetFC()"><i class="ti ti-refresh"></i> Reset thẻ</button>
  </div>
  <div class="fc-grid" id="fc-grid"></div>
</div>

</div>

<script>
const BLOOM = {nB:'Nhận biết',hi:'Hiểu',aD:'Áp dụng',pT:'Phân tích',tH:'Tổng hợp'};
const bloomClass = {nB:'b-nhanBiet',hi:'b-hieu',aD:'b-apDung',pT:'b-phanTich',tH:'b-tongHop'};
const levelClass = {'Cơ bản':'b-level-cb','Trung bình':'b-level-tb','Nâng cao':'b-level-nc'};

const MCQ = [
  {bloom:'nB',level:'Cơ bản',stem:'Ôn bệnh học là môn học nghiên cứu điều gì?',
   opts:['Quy luật phát sinh, phát triển của Ôn bệnh và phương pháp chẩn trị, dự phòng','Nguyên tắc điều trị nội thương tạp bệnh theo học thuyết tạng phủ','Phân loại bệnh truyền nhiễm theo vi sinh vật học hiện đại','Cơ chế bệnh sinh của bệnh hàn và nhiệt theo lục kinh biện chứng'],
   ans:0,why:'Giáo trình định nghĩa: "Ôn bệnh học là môn lâm sàng học nghiên cứu quy luật phát sinh, phát triển của Ôn bệnh và phương pháp chẩn trị, dự phòng."',
   wrongs:['B: Đây là mô tả của Nội khoa YHCT, không phải Ôn bệnh học','C: Phân loại vi sinh học thuộc vi sinh học hiện đại, không phải Ôn bệnh học','D: Lục kinh biện chứng thuộc Thương hàn luận, không phải Ôn bệnh học']},

  {bloom:'nB',level:'Cơ bản',stem:'Phân biệt "Ôn bệnh" và "Ôn dịch" theo Chu Dương Tuấn:',
   opts:['Ôn bệnh lây nhiều người; Ôn dịch chỉ lây một người','Ôn bệnh do phong nhiệt; Ôn dịch do thấp nhiệt gây ra','Ôn bệnh là bệnh lẻ tẻ từng người; Ôn dịch là hàng loạt người cùng mắc một lúc','Ôn bệnh biểu hiện nhẹ hơn; Ôn dịch nặng hơn về triệu chứng'],
   ans:2,why:'Chu Dương Tuấn: "Một người bị bệnh gọi là Ôn, một địa phương nhiều người bị bệnh giống nhau gọi là Dịch." Phân biệt theo số người mắc, không theo nguyên nhân hay mức độ.',
   wrongs:['A: Ngược lại — Ôn bệnh là bệnh LẺ TẺ từng người','B: Cả Ôn bệnh và Ôn dịch đều do ôn tà, không chia theo loại tà khác nhau','D: Mức độ nặng nhẹ không phải tiêu chí phân biệt hai khái niệm này']},

  {bloom:'nB',level:'Cơ bản',stem:'Câu mở đầu của Diệp Thiên Sĩ trong Ôn nhiệt luận là câu nào?',
   opts:['"Thương hàn hữu ngũ, ôn bệnh cư nhất"','"Ôn tà thượng thụ, thủ tiên phạm phế"','"Đông thương vụ hàn, xuân tất ôn bệnh"','"Nhiệt bệnh đều là một loại của thương hàn"'],
   ans:1,why:'"Ôn tà thượng thụ, thủ tiên phạm phế" — Ôn tà cảm thụ từ trên xuống, trước hết phạm vào phế. Đây là câu cương lĩnh nêu cơ chế phát bệnh và đường xâm nhập của ôn tà.',
   wrongs:['A: Câu này xuất phát từ Nạn kinh — Ngũ thập bát nạn, không phải Diệp Thiên Sĩ','C: Câu này từ Tố Vấn — Âm dương ứng tượng đại luận (Nội kinh), cơ sở lý luận phục khí','D: Câu này từ Tố Vấn nhiệt luận, dùng để chỉ quan niệm cũ gộp ôn bệnh vào thương hàn']},

  {bloom:'nB',level:'Cơ bản',stem:'Phong ôn xuất hiện vào mùa nào và do tà khí nào chủ yếu?',
   opts:['Giữa mùa xuân — ôn nhiệt tà phục','Mùa hè — thử nhiệt tà','Cuối đông đến đầu xuân — phong nhiệt tà','Mùa thu — táo nhiệt tà'],
   ans:2,why:'Phong ôn (cuối đông — đầu xuân): "khí hậu có nhiều gió và ẩm tức là phong và ôn kết hợp gây bệnh." Tương đương Tây y: viêm phổi, cúm.',
   wrongs:['A: Giữa mùa xuân là xuân ôn (phục tà), không phải phong ôn','B: Mùa hè là thử ôn (thử nhiệt) hoặc thử thấp','D: Mùa thu là thu táo, chủ khí táo nhiệt']},

  {bloom:'nB',level:'Cơ bản',stem:'Ai là người sáng lập vệ-khí-dinh-huyết biện chứng và ai sáng lập tam tiêu biện chứng trong Ôn bệnh học?',
   opts:['Cả hai đều do Ngô Cúc Thông sáng lập trong Ôn bệnh điều biện','Vệ-khí-dinh-huyết: Diệp Thiên Sĩ; Tam tiêu: Ngô Cúc Thông','Vệ-khí-dinh-huyết: Ngô Cúc Thông; Tam tiêu: Diệp Thiên Sĩ','Cả hai đều do Ngô Hựu Khả sáng lập trong Ôn dịch luận'],
   ans:1,why:'Diệp Thiên Sĩ (Ôn nhiệt luận) sáng lập vệ-khí-dinh-huyết biện chứng. Ngô Cúc Thông (Ôn bệnh điều biện) sáng lập tam tiêu biện chứng, bổ sung điểm thiếu của Diệp.',
   wrongs:['A: Sai — Diệp Thiên Sĩ sáng lập vệ-khí-dinh-huyết, Ngô Cúc Thông sáng lập tam tiêu','C: Ngược lại','D: Ngô Hựu Khả (Ôn dịch luận) đóng góp về lệ khí và đường lây, không sáng lập hai hệ biện chứng này']},

  {bloom:'nB',level:'Cơ bản',stem:'Dựa vào tính chất bệnh chứng, Ôn bệnh được chia thành mấy loại chính?',
   opts:['2 loại: ôn nhiệt và thấp nhiệt','3 loại: phong nhiệt, thấp nhiệt và táo nhiệt','4 loại theo bốn mùa: xuân ôn, thử ôn, thấp ôn, thu táo','5 loại theo ngũ tà: phong, hàn, thử, thấp, táo'],
   ans:0,why:'Dựa vào có hay không kèm thấp tà: (1) Ôn nhiệt — chỉ nhiệt không thấp; (2) Thấp nhiệt — vừa nhiệt vừa thấp. Cách phân loại theo tứ thời hay vị trí là các cách phân loại khác.',
   wrongs:['B: Không có loại phân chia thành 3 nhóm chính theo tính chất bệnh chứng','C: Phân loại theo mùa là cách khác, không phải theo tính chất bệnh chứng','D: Ngũ tà không phải tiêu chí phân loại Ôn bệnh theo tính chất bệnh chứng']},

  {bloom:'hi',level:'Cơ bản',stem:'Ngô Hựu Khả (Ôn dịch luận, cuối đời Minh) được coi là tiên phong tư duy vi sinh học vì điểm lý luận nào?',
   opts:['Ông dùng kính hiển vi phát hiện vi khuẩn trong đàm của người bệnh','Ông cho rằng lệ khí đặc thù riêng gây từng bệnh; xâm nhập qua mũi miệng; không phải phong hàn thử thấp thông thường','Ông sáng lập vệ-khí-dinh-huyết và chứng minh tà xâm nhập qua da','Ông phát hiện sốt rét do ký sinh trùng sốt rét gây ra'],
   ans:1,why:'Ngô Hựu Khả: lệ khí ≈ tác nhân gây bệnh đặc hiệu; "bệnh khác nhau do lệ khí khác nhau" ≈ tính đặc hiệu mầm bệnh; lây qua mũi miệng ≈ đường lây. Tương đồng Germ Theory trước Pasteur ~200 năm.',
   wrongs:['A: Kính hiển vi chưa tồn tại ở Trung Quốc thế kỷ 17 — đây là lý luận thuần túy','C: Vệ-khí-dinh-huyết do Diệp Thiên Sĩ sáng lập (nhà Thanh, sau Ngô); tà qua mũi miệng không phải qua da','D: Sốt rét (ngược tật) do ngược tà trong YHCT, không gắn với vi sinh học hiện đại']},

  {bloom:'hi',level:'Cơ bản',stem:'Mùa xuân, chức năng nào của cơ thể dễ bị thất điều, tạo điều kiện cho phong nhiệt tà xâm phạm?',
   opts:['Chức năng vận hóa của tỳ vị suy giảm, thủy thấp tích tụ','Chức năng phế vệ dễ bị thất điều, tấu lý sơ khai','Chức năng tàng tinh của thận suy, không ôn ấm được cơ thể','Chức năng sơ tiết của can khí thái quá, hóa hỏa'],
   ans:1,why:'Giáo trình: "Mùa xuân chức năng phế vệ rất dễ bị thất chức, đây là điều kiện rất dễ bị phong nhiệt bệnh tà xâm nhập." Tấu lý sơ khai = lỗ chân lông mở rộng, tà dễ vào.',
   wrongs:['A: Tỳ vị suy và thấp tích liên quan mùa hè cuối hạ (thấp ôn, thử thấp)','C: Thận dương suy liên quan bệnh mùa đông hoặc thể hàn','D: Can khí thái quá hóa hỏa là cơ chế nội thương, không giải thích tính mùa của ôn tà']},

  {bloom:'hi',level:'Trung bình',stem:'Hao âm ở thượng tiêu trong Ôn bệnh (tổn thương phế âm) biểu hiện như thế nào?',
   opts:['Miệng khát nhiều, muốn uống nước, lưỡi đỏ thẫm không rêu quang bóng','Mũi họng khô táo, ho khan không có đàm','Sốt thấp về đêm, lưỡng quyền đỏ, bàn tay chân nóng, co giật','Đại tiện táo bón, bụng đầy tức, mạch trầm thực'],
   ans:1,why:'"Bệnh tại thượng tiêu gây tổn thương phế âm với triệu chứng miệng mũi hầu họng khô táo, ho khan, không đàm." Phế thuộc thượng tiêu, chủ khí.',
   wrongs:['A: Đây là biểu hiện hao tổn vị âm (trung tiêu), không phải phế âm','C: Đây là biểu hiện can thận âm thương (hạ tiêu)','D: Đại tiện táo kèm bụng đầy là chứng thực (nhiệt kết đại trường), không phải hao âm']},

  {bloom:'hi',level:'Trung bình',stem:'Hao âm ở hạ tiêu (tổn thương can thận âm) biểu hiện đặc trưng nào sau đây?',
   opts:['Ho khan, mũi khô, đàm dính ít','Miệng khát, lưỡi đỏ thẫm không rêu, ăn ít','Sốt thấp về đêm, lưỡng quyền đỏ, bàn tay chân nóng, co giật, lưỡi khô đỏ teo','Sốt cao liên tục, tâm phiền, chiêm ngữ, ban chẩn nổi rõ'],
   ans:2,why:'"Bệnh tà tại hạ tiêu thương tổn can thận âm với sốt thấp, uể oải, lưỡng quyền đỏ, tay chân nóng thậm chí nóng cả mu bàn tay chân, co giật, lưỡi khô đỏ mà teo."',
   wrongs:['A: Biểu hiện thượng tiêu (phế âm thương)','B: Biểu hiện trung tiêu (vị âm thương)','D: Sốt cao kèm tâm phiền chiêm ngữ ban chẩn là dinh phần — tà chưa đến hạ tiêu']},

  {bloom:'hi',level:'Trung bình',stem:'Đặc điểm nào phân biệt khởi bệnh của tân cảm Ôn bệnh và phục tà Ôn bệnh?',

   a:'Cúm, viêm phổi (phong ôn)\nViêm não Nhật Bản B (xuân ôn)\nSốt xuất huyết Dengue (ôn bệnh phát chẩn)\nSốt rét (ngược tật)\nThương hàn/Phó thương hàn, nhiễm khuẩn huyết (thấp ôn, thử thấp)\nSay nắng nặng (thử ôn)\n→ Đặc điểm chung: cấp tính + nhiệt + có/không lây'},
  {tag:'Phạm vi',q:'Bệnh nào KHÔNG thuộc phạm vi Ôn bệnh dù là bệnh truyền nhiễm? Vì sao?',
   a:'KHÔNG thuộc Ôn bệnh:\n• Uốn ván — có lây nhưng không có đặc tính nhiệt của Ôn bệnh\n• Bệnh ký sinh trùng (giun sán) — không đặc tính nhiệt\n• Sốt trong nội thương — không phải ngoại cảm ôn tà\nQuy tắc: phải có cả 2 tiêu chí: ngoại cảm + ôn tà gây nhiệt'},
  {tag:'Phân loại',q:'Kể 5 cách đặt tên Ôn bệnh của cổ nhân.',
   a:'1. Theo MÙA: xuân ôn, đông ôn\n2. Theo TỨ THỜI CHỦ KHÍ: phong ôn (xuân), thử ôn (hè), thấp ôn (giữa hè)\n3. Kết hợp MÙA + KHÍ: thu táo\n4. Theo TRIỆU CHỨNG ĐẶC TRƯNG: đại đầu ôn (đầu sưng to), lạn hầu sa (bạch hầu)\n5. Theo TÌNH HÌNH LƯU HÀNH: ôn dịch, thiên hành bệnh'},
  {tag:'Lâm sàng',q:'Tam chứng giúp nhận biết Ôn bệnh lâm sàng (phân biệt với Thương hàn và nội thương)?',
   a:'1. SỐT NGAY từ đầu (không phải sốt muộn như nội thương)\n2. KHÔNG ố hàn nặng hoặc chỉ ố hàn rất nhẹ (khác Thương hàn)\n3. KHÁT nước ngay từ đầu (hóa táo thương âm — khác Thương hàn không khát)\n+ Bệnh NGOẠI CẢM (không phải nội thương tạp bệnh)'},
  {tag:'Lâm sàng',q:'Theo dõi ban chẩn trong Ôn bệnh: 6 đặc điểm cần quan sát.',
   a:'1. HÌNH THÁI (ban hay chẩn, phẳng hay nổi)\n2. MÀU SẮC (hồng nhạt → đỏ → đỏ thẫm → tím — nặng dần)\n3. SỐ LƯỢNG\n4. PHÂN BỐ\n5. THỜI GIAN XUẤT HIỆN và THỨ TỰ\n6. THỜI GIAN DUY TRÌ\n→ "Ban ra được" = nhiệt có lối thoát; ban tím tối = huyết nhiệt cực nặng'},
  {tag:'Biện chứng',q:'Bảng cheat-sheet: 4 phần vệ-khí-dinh-huyết — dấu hiệu phân biệt nhanh.',
   a:'VỆ: sốt + HƠI ố hàn + HƠI khát → Tân lương giải biểu\nKHÍ: sốt cao + KHÔNG ố hàn + KHÁT nhiều + rêu vàng → Thanh nhiệt/Công hạ\nDINH: sốt ĐÊM + phiền + chiêm ngữ + lưỡi đỎ THẪM → Thanh dinh thấu nhiệt\nHUYẾT: XUẤT HUYẾT đa nơi + BAN + lưỡi TỐI THẪM → Lương huyết tán ứ'}
];

let answered = new Array(MCQ.length).fill(null);
let fcSeen = new Set();

function updateScore(){
  const correct = answered.filter(a=>a===true).length;
  const done = answered.filter(a=>a!==null).length;
  document.getElementById('score-display').textContent = correct+'/'+MCQ.length;
  document.getElementById('answered-count').textContent = done;
  document.getElementById('prog-fill').style.width = (done/MCQ.length*100)+'%';
}

function buildMCQ(){
  const list = document.getElementById('mcq-list');
  list.innerHTML='';
  MCQ.forEach((q,qi)=>{
    const card=document.createElement('div');
    card.className='q-card';
    card.id='q'+qi;
    const letters=['A','B','C','D'];
    card.innerHTML=`
      <div class="q-meta">
        <span class="q-num">Câu ${qi+1}</span>
        <span class="badge ${bloomClass[q.bloom]}">${BLOOM[q.bloom]}</span>
        <span class="badge ${levelClass[q.level]}">${q.level}</span>
      </div>
      <div class="q-stem">${q.stem}</div>
      <div class="options">
        ${q.opts.map((o,oi)=>`<div class="opt" id="opt-${qi}-${oi}" onclick="pick(${qi},${oi})">
          <div class="opt-letter">${letters[oi]}</div><span>${o}</span>
        </div>`).join('')}
      </div>
      <div class="explain" id="exp-${qi}">
        <div class="explain-correct"><strong>✓ ${letters[q.ans]}. ${q.opts[q.ans]}</strong></div>
        <div class="explain-why">${q.why}</div>
        <div class="explain-wrongs">${q.wrongs.map(w=>`<div class="explain-wrong-item">• ${w}</div>`).join('')}</div>
      </div>`;
    list.appendChild(card);
  });
}

function pick(qi,oi){
  if(answered[qi]!==null) return;
  answered[qi] = oi===MCQ[qi].ans;
  const letters=['A','B','C','D'];
  MCQ[qi].opts.forEach((_,i)=>{
    const el=document.getElementById('opt-'+qi+'-'+i);
    el.classList.add('locked');
    el.onclick=null;
    if(i===MCQ[qi].ans) el.classList.add('correct');
    else if(i===oi && oi!==MCQ[qi].ans) el.classList.add('wrong');
  });
  document.getElementById('exp-'+qi).classList.add('show');
  document.getElementById('q'+qi).classList.add('answered');
  updateScore();
}

function resetMCQ(){
  answered=new Array(MCQ.length).fill(null);
  updateScore();
  buildMCQ();
}

function buildFC(){
  const grid=document.getElementById('fc-grid');
  grid.innerHTML='';
  FC.forEach((f,i)=>{
    const div=document.createElement('div');
    div.className='fc';
    div.innerHTML=`<div class="fc-inner">
      <div class="fc-front">
        <div>
          <div class="fc-tag">${f.tag} · Thẻ ${i+1}</div>
          <div class="fc-q">${f.q}</div>
        </div>
        <div class="fc-hint">↻ Nhấn để xem đáp án</div>
      </div>
      <div class="fc-back">
        <div>
          <div class="fc-tag">Đáp án · ${f.tag}</div>
          <div class="fc-a">${f.a.replace(/\n/g,'<br>')}</div>
        </div>
        <div class="fc-num">Thẻ ${i+1}/30</div>
      </div>
    </div>`;
    div.onclick=()=>{
      div.classList.toggle('flipped');
      if(div.classList.contains('flipped')){fcSeen.add(i);}
      document.getElementById('fc-seen').textContent=fcSeen.size;
    };
    grid.appendChild(div);
  });
}

function resetFC(){
  fcSeen=new Set();
  document.getElementById('fc-seen').textContent='0';
  document.querySelectorAll('.fc').forEach(c=>c.classList.remove('flipped'));
}

function switchTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}

buildMCQ();
buildFC();
updateScore();
</script>
</body>
</html>
