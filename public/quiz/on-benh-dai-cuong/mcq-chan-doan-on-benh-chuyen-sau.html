<script>
const TOPICS = ["Chẩn đoán bệnh danh Ôn bệnh","Biện chứng vệ-khí-dinh-huyết","Tam tiêu & thể bệnh nặng","Chẩn đoán qua tứ chẩn","Phân biệt bệnh lâm sàng"];
const COLORS = {"Chẩn đoán bệnh danh Ôn bệnh":"#0ea5e9","Biện chứng vệ-khí-dinh-huyết":"#8b5cf6","Tam tiêu & thể bệnh nặng":"#ef4444","Chẩn đoán qua tứ chẩn":"#f59e0b","Phân biệt bệnh lâm sàng":"#10b981"};
const flashcards = [];
const mcqs = [{"scenario":"BN nam 24 tuổi, đến khám vì sốt và ho 2 ngày vào cuối mùa đông. Bệnh khởi nhanh sau khi tiếp xúc gió lạnh, sốt rõ, hơi ố phong hàn, ho khan, đau đầu, miệng hơi khát. Khám lưỡi thấy đầu và hai rìa đỏ, rêu mỏng trắng; mạch phù sác. Không có cổ cứng, không ban chẩn, không hôn mê.","stem":"Chẩn đoán bệnh danh Ôn bệnh phù hợp nhất là gì?","opts":["A. Phong ôn","B. Xuân ôn","C. Thử thấp","D. Ngược tật"],"ans":"A","exp":"A đúng vì phong ôn khởi ở đông-xuân, cảm phong nhiệt lập tức phát bệnh với phế vệ biểu nhiệt: sốt, hơi ố phong hàn, ho, hơi khát, rêu mỏng trắng, mạch phù sác. B sai vì xuân ôn sơ khởi thường là lý nhiệt tích thịnh, bệnh nặng nhanh, có thể thần hôn/kinh quyết, không phải phế vệ biểu nhiệt điển hình. C sai vì thử thấp phát mùa hè/hè thu và nổi bật thân nặng, rêu nề, thấp trở. D sai vì ngược tật phải có hàn chiến-tráng nhiệt-hãn xuất theo chu kỳ.","key":"Phong ôn sơ khởi = đông xuân + phế vệ biểu nhiệt + ho.","id":1,"topic":"Chẩn đoán bệnh danh Ôn bệnh","bloom":"Phân tích"},{"scenario":"BN nữ 19 tuổi, nhập viện đầu mùa xuân vì sốt cao đột ngột, đau đầu dữ dội, nôn, vật vã, cổ cứng và bắt đầu lơ mơ. Không ghi nhận giai đoạn ho, hơi ố phong hàn, rêu mỏng trắng rõ trước đó. Lưỡi đỏ, rêu vàng, mạch sác.","stem":"Chẩn đoán bệnh danh Ôn bệnh phù hợp nhất là gì?","opts":["A. Phong ôn thuận truyền khí phần","B. Xuân ôn","C. Thấp ôn","D. Phong nhiệt cảm mạo"],"ans":"B","exp":"B đúng vì xuân ôn là phục nhiệt ngoại phát, khởi bệnh cấp, nặng, sơ khởi đã lý nhiệt tích thịnh với sốt cao, nôn, cổ cứng, rối loạn thần chí. A sai vì phong ôn thường có phế vệ biểu nhiệt lúc đầu như ho, hơi ố phong hàn, rêu mỏng trắng. C sai vì thấp ôn khởi chậm, thấp trệ tỳ vị, rêu nề và bệnh dai dẳng nổi bật. D sai vì cảm mạo nhẹ, nông, ít truyền biến và không gây thần hôn/cổ cứng ngay.","key":"Xuân ôn = mùa xuân + phát bệnh nhanh nặng + lý nhiệt từ đầu.","id":2,"topic":"Chẩn đoán bệnh danh Ôn bệnh","bloom":"Phân tích"},{"scenario":"BN nam 35 tuổi, làm việc ngoài trời mùa hè, nhập viện vì sốt, đầu đau căng nặng, thân thể nặng nề, các khớp đau mỏi, quản bĩ, miệng không khát. Lưỡi đỏ, rêu trắng nề hơi vàng nề, mạch phù hoạt sác. Bệnh nhân có tiền sử ăn uống lạnh sau khi đi nắng.","stem":"Chẩn đoán bệnh danh/biện chứng phù hợp nhất là gì?","opts":["A. Thử thấp tại vệ","B. Thử ôn khí phần nhiệt thịnh","C. Phong ôn tà tập phế vệ","D. Ngược tật chính ngược"],"ans":"A","exp":"A đúng vì mùa hè, thử thấp sơ khởi có sốt, hơi ố phong hàn, đầu nặng, thân nặng, khớp mỏi, quản bĩ, miệng không khát, rêu nề. B sai vì thử ôn nhiệt nổi bật hơn: sốt cao, phiền khát, mạch hồng đại, ít dấu thấp trệ. C sai vì phong ôn thiên phế vệ với ho và miệng hơi khát, không nổi bật thân nặng/rêu nề. D sai vì ngược tật cần cơn hàn chiến-sốt-hãn xuất có chu kỳ đúng giờ.","key":"Thử thấp = mùa hè + nhiệt kèm thấp: thân nặng, rêu nề, quản bĩ.","id":3,"topic":"Chẩn đoán bệnh danh Ôn bệnh","bloom":"Phân tích"},{"scenario":"BN nam 42 tuổi sống ở vùng rừng núi, đến khám vì các cơn lạnh run dữ dội, sau đó sốt cao, đau đầu, mặt đỏ, khát, rồi vã mồ hôi nhiều và hết sốt. Cơn lặp lại cách nhật, giữa hai cơn gần như bình thường; khám có lách to nhẹ.","stem":"Chẩn đoán phù hợp nhất là gì?","opts":["A. Thời hành cảm mạo","B. Thấp ôn khí phần","C. Ngược tật","D. Phế lao âm hư phát nhiệt"],"ans":"C","exp":"C đúng vì ngược tật đặc trưng bởi hàn chiến, tráng nhiệt, hãn xuất, nhiệt hạ thân mát, phát có chu kỳ, thường ở mùa hè thu/vùng dịch và có thể lách to. A sai vì cảm mạo có phế vệ rõ như nghẹt mũi, ho, ngứa họng và không có chu kỳ. B sai vì thấp ôn sốt không theo chu kỳ, kèm thân nặng, rêu nề, ngực bụng đầy. D sai vì phế lao thường sốt chiều/đêm kiểu âm hư, không có cơn hàn chiến-sốt-hãn xuất đúng giờ.","key":"Cơn sốt rét kiểu YHCT = lạnh run -> sốt cao -> mồ hôi -> hết, có chu kỳ.","id":4,"topic":"Chẩn đoán bệnh danh Ôn bệnh","bloom":"Phân tích"},{"scenario":"BN nữ 31 tuổi, sốt ngày thứ nhất, hơi sợ gió lạnh, đau đầu, ho nhẹ, ít mồ hôi, hơi khát. Lưỡi có đầu và hai rìa đỏ, rêu mỏng trắng; mạch phù sác. Không có khát nhiều, không rêu vàng, không rối loạn thần chí.","stem":"Chẩn đoán biện chứng vệ-khí-dinh-huyết phù hợp nhất là gì?","opts":["A. Vệ phần chứng","B. Khí phần chứng","C. Dinh phần chứng","D. Huyết phần chứng"],"ans":"A","exp":"A đúng vì vệ phần lấy sốt kèm hơi ố phong hàn, miệng hơi khát, rêu mỏng trắng, mạch phù sác làm yếu điểm. B sai vì khí phần không còn ố hàn, thường sốt cao, khát, rêu vàng. C sai vì dinh phần có sốt cao về đêm, tâm phiền/chiêm ngữ, lưỡi đỏ thẫm. D sai vì huyết phần phải có xuất huyết, ban chẩn dày, lưỡi tối thẫm.","key":"Vệ phần = sốt + ố phong hàn nhẹ + hơi khát + rêu mỏng trắng.","id":5,"topic":"Biện chứng vệ-khí-dinh-huyết","bloom":"Phân tích"},{"scenario":"BN nam 46 tuổi, sốt cao ngày thứ ba, không còn sợ lạnh mà sợ nóng, mồ hôi nhiều, khát muốn uống lạnh, tiểu đỏ. Lưỡi đỏ, rêu vàng khô, mạch hồng đại hữu lực. Không có ban chẩn, không xuất huyết.","stem":"Chẩn đoán biện chứng phù hợp nhất là gì?","opts":["A. Vệ phần chứng","B. Khí phần chứng kiểu nhiệt thịnh dương minh","C. Dinh phần chứng","D. Huyết phần chứng"],"ans":"B","exp":"B đúng vì khí phần/dương minh nhiệt thịnh có sốt cao, không ố hàn, mồ hôi nhiều, khát uống lạnh, rêu vàng khô, mạch hồng đại. A sai vì vệ phần còn sốt kèm ố phong hàn và rêu mỏng trắng. C sai vì dinh phần nhấn mạnh sốt về đêm, tâm phiền, lưỡi đỏ thẫm ít rêu. D sai vì huyết phần cần ban chẩn dày hoặc xuất huyết nhiều khiếu.","key":"Khí phần = lý nhiệt: sốt cao không ố hàn + khát + rêu vàng.","id":6,"topic":"Biện chứng vệ-khí-dinh-huyết","bloom":"Phân tích"},{"scenario":"BN nữ 38 tuổi sốt cao nhiều hơn về đêm, miệng khô nhưng không muốn uống nhiều, tâm phiền mất ngủ, có lúc nói nhảm. Da có ban chẩn lờ mờ; lưỡi đỏ thẫm, gần như không rêu; mạch tế sác. Không có chảy máu cam, tiểu máu hay đại tiện máu.","stem":"Chẩn đoán biện chứng phù hợp nhất là gì?","opts":["A. Khí phần nhiệt thịnh","B. Dinh phần chứng","C. Huyết phần chứng","D. Thấp nhiệt trung trở"],"ans":"B","exp":"B đúng vì dinh phần có sốt cao về đêm, tâm phiền/chiêm ngữ, miệng khô không khát nhiều, ban mờ, lưỡi đỏ thẫm, mạch tế sác. A sai vì khí phần thường khát nhiều, rêu vàng và không có lưỡi đỏ thẫm không rêu đặc trưng. C sai vì huyết phần có xuất huyết đa nơi, ban dày, lưỡi tối thẫm. D sai vì thấp nhiệt trung trở phải có thân nhiệt bất dương, bụng đầy, nôn, rêu nề.","key":"Dinh phần = sốt đêm + thần chí nhẹ + lưỡi đỏ thẫm.","id":7,"topic":"Biện chứng vệ-khí-dinh-huyết","bloom":"Phân tích"},{"scenario":"BN nam 52 tuổi, sốt cao, vật vã, thần hôn nói cuồng, ban chẩn dày đặc tím sẫm, chảy máu mũi và đi tiêu máu. Lưỡi tối thẫm, mạch sác. Gia đình kể trước đó bệnh nhân đã có giai đoạn sốt cao về đêm và lưỡi đỏ thẫm.","stem":"Chẩn đoán biện chứng phù hợp nhất là gì?","opts":["A. Dinh phần chứng","B. Huyết phần chứng","C. Khí phần thấp nhiệt","D. Thấp mông tâm bào"],"ans":"B","exp":"B đúng vì huyết phần là giai đoạn sâu nặng với sốt cao, thần hôn/chiêm cuồng, xuất huyết nhiều khiếu, ban chẩn dày đặc, lưỡi tối thẫm. A sai vì dinh phần có ban mờ và thần chí nhẹ hơn, chưa có xuất huyết đa nơi. C sai vì khí phần thấp nhiệt rêu nề, bụng đầy, chưa có động huyết. D sai vì thấp mông tâm bào thần chí lúc tỉnh lúc mê, rêu dày dơ, chất lưỡi không đỏ thẫm và không chủ xuất huyết.","key":"Huyết phần = ban dày + xuất huyết + lưỡi tối thẫm.","id":8,"topic":"Biện chứng vệ-khí-dinh-huyết","bloom":"Phân tích"},{"scenario":"BN nữ 27 tuổi, bệnh ngày đầu sau cảm phong nhiệt, sốt, hơi ố phong hàn, ho, miệng hơi khát. Khám lưỡi: rêu trắng mỏng thiếu nhuận, đầu và hai rìa lưỡi hơi đỏ; mạch phù sác.","stem":"Ý nghĩa chẩn đoán của hình ảnh lưỡi này là gì?","opts":["A. Ôn bệnh sơ khởi, tà ở vệ phần","B. Dương minh phủ thực","C. Thấp nhiệt khí phần với thấp trọc thiên thịnh","D. Tà nhập huyết phần"],"ans":"A","exp":"A đúng vì rêu trắng mỏng thiếu nhuận kèm đầu/rìa đỏ là dấu hiệu ôn bệnh giai đoạn sơ khởi, tà ở vệ phần, thường gặp đầu phong ôn. B sai vì dương minh phủ thực có rêu vàng khô nứt/xám đen, táo bón, bụng cứng. C sai vì thấp nhiệt khí phần thường rêu dày nề/trọc, bụng đầy, thân nặng. D sai vì huyết phần nổi bật chất lưỡi tối thẫm, ban chẩn và xuất huyết.","key":"Rêu trắng mỏng + đầu/rìa đỏ = vệ phần ôn bệnh.","id":9,"topic":"Chẩn đoán qua tứ chẩn","bloom":"Phân tích"},{"scenario":"BN nam 58 tuổi sốt cao về chiều, táo bón 5 ngày, đau tức cứng bụng, có lúc nói nhảm. Lưỡi rêu vàng sậm, khô nứt, có gai; mạch trầm thực hữu lực.","stem":"Chẩn đoán biện chứng phù hợp nhất là gì?","opts":["A. Dương minh tích nhiệt","B. Dương minh nhiệt kết/trường phủ nhiệt kết","C. Dinh phần chứng","D. Âm hư phát nhiệt giai đoạn sau"],"ans":"B","exp":"B đúng vì nhật bô triều nhiệt, táo bón, bụng đầy cứng đau, rêu vàng sậm khô nứt, mạch trầm thực là nhiệt kết trường phủ. A sai vì dương minh tích nhiệt là tán mạn phủ nhiệt, có sốt cao, mồ hôi nhiều, khát, rêu vàng táo nhưng chưa có táo kết phủ thực rõ. C sai vì dinh phần có sốt về đêm, lưỡi đỏ thẫm không rêu, không chủ bụng cứng táo bón. D sai vì âm hư phát nhiệt là sốt thấp lâu ngày, ngũ tâm phiền nhiệt, lưỡi đỏ bóng/teo, mạch hư.","key":"Nhật bô triều nhiệt + táo bón + bụng cứng + rêu vàng đen khô = nhiệt kết trường phủ.","id":10,"topic":"Chẩn đoán qua tứ chẩn","bloom":"Phân tích"},{"scenario":"BN nữ 33 tuổi mắc ôn bệnh thấp nhiệt ngày thứ sáu, sốt không rõ lúc mới sờ nhưng đặt tay lâu thấy nóng, ngực bụng đầy tức, buồn nôn, thân nặng, miệng nhạt nhớt. Lưỡi rêu trắng dày nề; mạch nhu hoãn.","stem":"Kiểu phát nhiệt và biện chứng phù hợp nhất là gì?","opts":["A. Tráng nhiệt do khí phần dương minh","B. Thân nhiệt bất dương do thấp nhiệt uất trở","C. Phát nhiệt dạ thâm do dinh phần","D. Sốt thấp do can thận âm thương"],"ans":"B","exp":"B đúng vì thân nhiệt bất dương là sốt bị thấp che lấp, thường kèm thân nặng, bụng đầy, nôn, rêu trắng nề, mạch nhu. A sai vì tráng nhiệt nóng rõ toàn thân, không ố hàn, khát uống lạnh, rêu vàng. C sai vì dinh phần sốt cao về đêm, lưỡi đỏ thẫm, tâm phiền. D sai vì sốt thấp sau ôn bệnh kèm ngũ tâm phiền nhiệt, đạo hãn, lưỡi đỏ quang, mạch tế sác.","key":"Sờ lâu mới nóng + rêu nề + thân nặng = thấp che nhiệt.","id":11,"topic":"Chẩn đoán qua tứ chẩn","bloom":"Phân tích"},{"scenario":"BN nam 41 tuổi trong diễn tiến ôn bệnh xuất hiện ban đỏ từng mảng dưới da ở ngực bụng rồi lan ra tứ chi, ban phẳng, sờ không cộm, ấn không đổi màu. Sốt cao, bứt rứt, lưỡi đỏ thẫm. Không có hạt nhỏ nổi cộm ở họng/miệng.","stem":"Nhận định chẩn đoán phù hợp nhất về sang thương da là gì?","opts":["A. Ban do nhiệt uất dương minh, nhiệt nhập dinh huyết","B. Chẩn do thái âm phong nhiệt","C. Bạch bối do thấp nhiệt uất trở khí phần","D. Âm ban do trung khí hư hàn"],"ans":"A","exp":"A đúng vì ban là mảng phẳng dưới da, không cộm, ấn không đổi màu; thường do dương minh nhiệt độc nội bức dinh huyết. B sai vì chẩn là hạt nhỏ nổi cộm, thường phát từ vòm họng/miệng rồi lan. C sai vì bạch bối là mụn nước nhỏ trắng như hạt gạo trong bệnh thấp nhiệt. D sai vì âm ban đỏ nhạt, thưa, kèm tứ chi lạnh, miệng không khát, hư hàn do dùng sai hàn lương/công hạ.","key":"Ban phẳng không cộm; chẩn nổi hạt cộm.","id":12,"topic":"Chẩn đoán qua tứ chẩn","bloom":"Phân tích"},{"scenario":"BN nữ 36 tuổi, sốt, hơi ố phong hàn, ho, đau đầu, hơi khát. Khám lưỡi đỏ đầu và hai rìa, rêu mỏng trắng hơi nhuận; mạch phù sác. Không có bụng đầy, không táo bón, không rối loạn thần chí.","stem":"Theo tam tiêu biện chứng, vị trí bệnh phù hợp nhất là gì?","opts":["A. Ôn tà phạm phế ở thượng tiêu","B. Dương minh nhiệt kết ở trung tiêu","C. Hạ tiêu can thận âm thương","D. Thấp mông tâm bào"],"ans":"A","exp":"A đúng vì thượng tiêu phế bị phạm có sốt, hơi ố phong hàn, ho, đau đầu, hơi khát, lưỡi đầu/rìa đỏ, rêu mỏng trắng, mạch phù sác. B sai vì trung tiêu nhiệt kết có triều nhiệt, táo bón, bụng cứng, rêu vàng đen khô. C sai vì hạ tiêu âm thương là giai đoạn sau với sốt thấp, ngũ tâm phiền nhiệt, lưỡi đỏ khô teo. D sai vì thấp mông tâm bào có thần chí lúc tỉnh lúc mê và rêu dày dơ.","key":"Ôn tà thượng thụ, thủ tiên phạm phế.","id":13,"topic":"Tam tiêu & thể bệnh nặng","bloom":"Phân tích"},{"scenario":"BN nam 50 tuổi đang mắc phong ôn ngày thứ tư, sốt, ho suyễn khí thúc, thở nhanh, ra mồ hôi, miệng khát. Không còn ố hàn. Lưỡi đỏ, rêu vàng; mạch sác.","stem":"Biện chứng thượng tiêu phù hợp nhất là gì?","opts":["A. Tà tập phế vệ","B. Tà nhiệt úng phế","C. Thấp nhiệt trở phế","D. Phế vị âm thương hậu kỳ"],"ans":"B","exp":"B đúng vì tà nhiệt úng phế có sốt, ho, suyễn, mồ hôi, khát, rêu vàng, mạch sác sau khi tà từ biểu nhập lý. A sai vì tà tập phế vệ còn sốt kèm hơi ố phong hàn, rêu mỏng trắng. C sai vì thấp nhiệt trở phế có ố hàn, thân nhiệt bất dương, tức ngực, ho, rêu trắng nề. D sai vì hậu kỳ phế vị âm thương là sau khi tà nhiệt thoái, còn khô, hư, tân dịch chưa phục.","key":"Ho suyễn + rêu vàng + không ố hàn = tà nhiệt úng phế.","id":14,"topic":"Tam tiêu & thể bệnh nặng","bloom":"Phân tích"},{"scenario":"BN nữ 63 tuổi sau vài ngày ôn bệnh phế vệ, nay đột ngột thần hôn, chi lạnh từ khuỷu gối trở xuống, lưỡi run, chất lưỡi đỏ thẫm. Không thấy rêu dày dơ; người nhà ghi nhận trước đó ho sốt rõ.","stem":"Chẩn đoán biện chứng phù hợp nhất là gì?","opts":["A. Tà hãm tâm bào","B. Thấp mông tâm bào","C. Dương minh tích nhiệt","D. Hàn quyết"],"ans":"A","exp":"A đúng vì tà hãm tâm bào có thần hôn, chi lạnh, lưỡi run, lưỡi đỏ thẫm, thường do phế bệnh nghịch truyền tâm bào. B sai vì thấp mông tâm bào thần chí lúc tỉnh lúc mê, rêu dày dơ, chất lưỡi không đỏ thẫm và tứ chi không quyết lạnh. C sai vì dương minh tích nhiệt chủ sốt cao, mồ hôi, khát, mạch hồng đại, không chủ lưỡi run-thần hôn-chi lạnh. D sai vì hàn quyết có không sốt, toàn thân lạnh, lưỡi nhạt, mạch vi.","key":"Thần hôn + chi lạnh + lưỡi đỏ thẫm/lưỡi run = tâm bào bị hãm.","id":15,"topic":"Tam tiêu & thể bệnh nặng","bloom":"Phân tích"},{"scenario":"BN nam 57 tuổi trong ôn bệnh thấp nhiệt, thần chí lơ mơ lúc tỉnh lúc mê, ngực tức, rêu lưỡi đóng lớp dày dơ; chất lưỡi không đỏ thẫm, tứ chi không lạnh quyết. Không có ban chẩn hay xuất huyết.","stem":"Chẩn đoán biện chứng phù hợp nhất là gì?","opts":["A. Nhiệt hãm tâm bào","B. Thấp mông tâm bào","C. Huyết phần chứng","D. Dinh phần chứng"],"ans":"B","exp":"B đúng vì thấp mông tâm bào là thấp nhiệt khí phần không giải, đàm trọc che bào lạc: thần chí lúc tỉnh lúc mê, rêu dày dơ, chất lưỡi không đỏ thẫm. A sai vì nhiệt hãm tâm bào có thần hôn sâu, chi lạnh, lưỡi đỏ thẫm/lưỡi run. C sai vì huyết phần có xuất huyết, ban dày, lưỡi tối thẫm. D sai vì dinh phần có sốt đêm, tâm phiền, lưỡi đỏ thẫm, ban mờ.","key":"Tâm bào do thấp che = rêu dày dơ, tỉnh mê xen kẽ, lưỡi không đỏ thẫm.","id":16,"topic":"Tam tiêu & thể bệnh nặng","bloom":"Phân tích"},{"scenario":"BN nữ 48 tuổi sốt, thần hôn, lưỡi run nói khó, tay chân lạnh. Đồng thời bụng dưới đầy cứng, ấn đau, táo bón 4 ngày; lưỡi đỏ thẫm, rêu vàng khô; mạch sác trầm thực.","stem":"Chẩn đoán biện chứng phù hợp nhất là gì?","opts":["A. Nhiệt nhập tâm bào kiêm dương minh phủ thực","B. Nhiệt hãm tâm bào đơn thuần","C. Dương minh tích nhiệt đơn thuần","D. Chân âm khuy tổn"],"ans":"A","exp":"A đúng vì có hai cụm cùng lúc: tâm bào bị nhiệt hãm (thần hôn, lưỡi run, chi lạnh) và dương minh phủ thực (bụng cứng đau, táo bón, rêu vàng khô, mạch trầm thực). B sai vì không giải thích táo bón bụng cứng phủ thực. C sai vì không giải thích thần hôn kèm lưỡi run, chi lạnh do tâm bào. D sai vì chân âm khuy tổn là hậu kỳ, sốt thấp kéo dài, ngũ tâm phiền nhiệt, lưỡi khô teo.","key":"Tâm bào + phủ thực = thần hôn/lưỡi run/chi lạnh + bụng cứng táo bón.","id":17,"topic":"Tam tiêu & thể bệnh nặng","bloom":"Phân tích"},{"scenario":"BN nam 60 tuổi sau ôn bệnh kéo dài, sốt không cao nhưng lâu không lui, chiều lưỡng quyền hồng, nóng lòng bàn tay chân, họng khô răng đen, hay lừ đừ và nghe kém. Lưỡi đỏ thẫm, khô, hơi teo mềm; mạch hư nhuyễn.","stem":"Chẩn đoán biện chứng phù hợp nhất là gì?","opts":["A. Khí phần uất nhiệt","B. Chân âm khuy tổn","C. Thấp nhiệt trung trở","D. Tà tập phế vệ"],"ans":"B","exp":"B đúng vì chân âm khuy tổn sau xuân ôn/ôn bệnh kéo dài có sốt không cao lâu ngày, lưỡng quyền hồng chiều, ngũ tâm phiền nhiệt, họng khô răng đen, lừ đừ/điếc, lưỡi đỏ thẫm khô teo, mạch hư. A sai vì khí phần uất nhiệt là thực nhiệt, rêu vàng, phiền khát rõ. C sai vì thấp nhiệt trung trở có thân nhiệt bất dương, bụng đầy, nôn, rêu nề. D sai vì tà tập phế vệ là giai đoạn đầu với sốt và hơi ố phong hàn.","key":"Hậu kỳ ôn bệnh + âm hư sâu + lưỡi khô teo = chân âm khuy tổn.","id":18,"topic":"Tam tiêu & thể bệnh nặng","bloom":"Phân tích"},{"scenario":"BN nữ 55 tuổi đang sốt cao, đột ngột tay chân lạnh nhưng ngực bụng vẫn nóng, phiền thao, nói nhảm, hơi thở thô, mồ hôi nhiều, tiểu đỏ, táo bón. Lưỡi đỏ thẫm, rêu vàng táo; mạch trầm thực sác.","stem":"Chẩn đoán chứng quyết thoát phù hợp nhất là gì?","opts":["A. Nhiệt quyết","B. Hàn quyết","C. Dương thoát","D. Âm kiệt"],"ans":"A","exp":"A đúng vì nhiệt quyết có ngực bụng nóng mà tay chân lạnh, phiền thao/chiêm ngữ, hơi thở thô, mồ hôi nhiều, tiểu đỏ, táo bón, lưỡi đỏ/rêu vàng táo, mạch trầm thực sác. B sai vì hàn quyết không sốt, toàn thân lạnh, lưỡi nhạt, mạch vi. C sai vì dương thoát có mồ hôi lạnh, sắc mặt trắng bệch, lưỡi nhạt nhuận, mạch vi tế. D sai vì âm kiệt có thân nhiệt hạ đột ngột, tay chân vẫn ấm, miệng khát, lưỡi đỏ bóng ít rêu, mạch vô lực.","key":"Chi lạnh không luôn là hàn; ngực bụng nóng + rêu vàng táo = nhiệt quyết.","id":19,"topic":"Tam tiêu & thể bệnh nặng","bloom":"Phân tích"},{"scenario":"Hai BN cùng đến khám mùa xuân vì sốt. BN thứ nhất sốt, hơi ố phong hàn, ho, miệng hơi khát, rêu mỏng trắng, mạch phù sác. BN thứ hai đột ngột sốt cao, đau đầu, nôn, phiền táo, cổ cứng, lưỡi đỏ rêu vàng, bệnh nặng nhanh.","stem":"Cặp chẩn đoán phù hợp nhất cho hai BN là gì?","opts":["A. Phong ôn; Xuân ôn","B. Xuân ôn; Phong ôn","C. Phong nhiệt cảm mạo; Thấp ôn","D. Thử thấp; Ngược tật"],"ans":"A","exp":"A đúng vì BN thứ nhất có tân cảm phong nhiệt phạm phế vệ của phong ôn; BN thứ hai có phục nhiệt ngoại phát với lý nhiệt tích thịnh nặng của xuân ôn. B đảo ngược đặc điểm. C sai vì cảm mạo phong nhiệt nhẹ nông, còn thấp ôn không khởi bằng lý nhiệt dữ dội/cổ cứng. D sai vì không có yếu tố mùa hè thấp nề của thử thấp hay cơn chu kỳ của ngược tật.","key":"Phong ôn khởi ở phế vệ; xuân ôn khởi ở lý nhiệt.","id":20,"topic":"Phân biệt bệnh lâm sàng","bloom":"Phân tích"},{"scenario":"BN nam 20 tuổi sốt, hơi ố phong, đau đầu, nghẹt mũi, đau họng, ho nhẹ, toàn trạng khá, bệnh 2 ngày đã giảm. Lưỡi hơi đỏ, rêu mỏng. Không có sốt cao kéo dài, không truyền biến khí phần, không phế nhiệt úng thịnh.","stem":"Chẩn đoán phù hợp nhất so với phong ôn là gì?","opts":["A. Phong nhiệt cảm mạo","B. Phong ôn","C. Xuân ôn","D. Thử thấp"],"ans":"A","exp":"A đúng vì phong nhiệt cảm mạo cũng ở phế vệ nhưng bệnh nhẹ, nông, triệu chứng thanh khiếu như nghẹt mũi/đau họng rõ, bệnh trình ngắn và ít truyền biến. B sai vì phong ôn thường sốt-ho-hơi khát rõ, có khả năng truyền thành tà nhiệt úng phế/dương minh/tâm bào. C sai vì xuân ôn khởi lý nhiệt nặng. D sai vì thử thấp có mùa hè, thân nặng, rêu nề, quản bĩ.","key":"Cùng phong nhiệt phế vệ nhưng cảm mạo nhẹ nông, phong ôn dễ truyền biến.","id":21,"topic":"Phân biệt bệnh lâm sàng","bloom":"Phân tích"},{"scenario":"Trẻ 6 tuổi sốt, ho, ố phong vào mùa đông-xuân. Sau 2 ngày xuất hiện mắt đỏ, sợ ánh sáng, phù nhẹ mi mắt, chảy nhiều nước mắt nước mũi, nghẹt mũi; ngày 3 bắt đầu mọc chẩn lan từ sau tai/đầu mặt ra thân mình.","stem":"Chẩn đoán phân biệt phù hợp nhất với phong ôn là gì?","opts":["A. Ma chẩn","B. Phế ung","C. Xuân ôn","D. Ngược tật"],"ans":"A","exp":"A đúng vì sởi/ma chẩn có phế vệ giống phong ôn lúc đầu nhưng nổi bật mắt đỏ, sợ ánh sáng, chảy nước mắt mũi, phù mi và chẩn sau 2-3 ngày, thường ở trẻ. B sai vì phế ung có hàn chiến, sốt liên tục không hạ, ho khạc mủ máu tanh hôi về tuần 2. C sai vì xuân ôn là lý nhiệt nặng từ đầu. D sai vì ngược tật có cơn hàn chiến-sốt-hãn xuất chu kỳ.","key":"Phong ôn vs ma chẩn: mắt đỏ sợ sáng + chẩn ngày 2-3 ở trẻ.","id":22,"topic":"Phân biệt bệnh lâm sàng","bloom":"Phân tích"},{"scenario":"BN nam 47 tuổi sốt sau đợt viêm hô hấp. Ban đầu giống phong ôn, nhưng sang tuần thứ hai vẫn sốt cao liên tục, hàn chiến, ho khạc nhiều đàm mủ máu tanh hôi; X-quang có bóng mờ tăng mật độ kèm mức nước.","stem":"Chẩn đoán phân biệt phù hợp nhất là gì?","opts":["A. Phế ung","B. Phong nhiệt cảm mạo","C. Xuân ôn khí phần uất nhiệt","D. Chính ngược"],"ans":"A","exp":"A đúng vì phế ung sơ khởi giống phong ôn nhưng về tuần 2 có sốt không lui/lui rồi sốt lại, ho khạc nhiều mủ máu tanh hôi và X-quang có bóng mờ/nước. B sai vì cảm mạo nhẹ và ngắn ngày. C sai vì xuân ôn không chủ khạc mủ máu tanh hôi và ổ tổn thương phổi dạng ung. D sai vì chính ngược phát cơn chu kỳ và giữa cơn giảm.","key":"Phong ôn kéo dài tuần 2 + đàm mủ máu tanh = nghĩ phế ung.","id":23,"topic":"Phân biệt bệnh lâm sàng","bloom":"Phân tích"},{"scenario":"BN nữ 29 tuổi phát bệnh sau hạ chí với sốt cao, phiền khát, mạch hồng đại, ít dấu thân nặng/rêu nề. Không có quản bĩ rõ, không miệng nhớt dính; nhiệt chứng nổi bật hơn thấp chứng.","stem":"Chẩn đoán phân biệt phù hợp nhất với thử thấp là gì?","opts":["A. Thử ôn","B. Thử thấp","C. Thấp ôn","D. Phục thử"],"ans":"A","exp":"A đúng vì thử ôn phát mùa hè sau hạ chí, nhiệt nổi bật: sốt cao, phiền khát, mạch hồng đại, hao khí thương tân; dấu thấp không rõ. B sai vì thử thấp phải có thấp tà uất trở: thân nặng, tức ngực/bụng trướng, miệng nhớt, rêu nề, mạch nhu. C sai vì thấp ôn khởi chậm, bệnh dai dẳng, tỳ vị thất điều nổi bật. D sai vì phục thử phát sau lập thu do thử tà phục, mới phát đã lý nhiệt nhưng thời điểm và cơ chế khác.","key":"Thử ôn nhiệt thắng; thử thấp nhiệt kèm thấp nặng.","id":24,"topic":"Phân biệt bệnh lâm sàng","bloom":"Phân tích"},{"scenario":"BN nam 44 tuổi vào tiết hè thu, bệnh khởi từ từ, sốt khó thoái, bệnh trình dai dẳng. Triệu chứng nổi bật là ngực thượng vị tức căng, nôn, chán ăn, thân nặng, rêu lưỡi nề; nhiệt ban đầu không quá rõ, về sau mới hóa nhiệt.","stem":"Chẩn đoán phân biệt phù hợp nhất với thử thấp là gì?","opts":["A. Thấp ôn","B. Thử ôn","C. Xuân ôn","D. Chính ngược"],"ans":"A","exp":"A đúng vì thấp ôn thường khởi chậm, dai dẳng, chủ yếu ở tỳ vị với thấp nhiệt lưu luyến, sốt khó lui, rêu nề, chức năng tỳ vị thất điều rõ. B sai vì thử ôn nhiệt thịnh rõ từ đầu, sốt cao phiền khát. C sai vì xuân ôn phát mùa xuân, lý nhiệt cấp nặng. D sai vì chính ngược có hàn chiến-sốt-mồ hôi theo chu kỳ, giữa cơn gần bình thường.","key":"Thấp ôn = thấp trệ tỳ vị + khởi chậm + kéo dài.","id":25,"topic":"Phân biệt bệnh lâm sàng","bloom":"Phân tích"},{"scenario":"BN nữ 32 tuổi sau lập thu đột ngột sốt cao, tâm phiền, miệng khát, ngực bĩ, lưỡi đỏ rêu nề. Không có giai đoạn thử thấp tại vệ rõ. Vài giờ sau bệnh chuyển nặng nhanh với lưỡi đỏ thẫm và xuất huyết dưới da.","stem":"Chẩn đoán phân biệt phù hợp nhất là gì?","opts":["A. Phục thử phát ở khí/dinh phần","B. Thử thấp tại vệ","C. Phong ôn tà tập phế vệ","D. Phế lao âm hư"],"ans":"A","exp":"A đúng vì phục thử do thử nhiệt tà phục tàng, sau lập thu mới phát, mới phát đã lý nhiệt; nếu phát ở dinh phần có sốt cao, tâm phiền, lưỡi đỏ thẫm, xuất huyết da niêm. B sai vì thử thấp tại vệ phát mùa hè với sốt, hơi ố phong hàn, thân nặng, rêu nề nhưng chưa lý nhiệt-dinh huyết ngay. C sai vì phong ôn phế vệ có ho, hơi khát, rêu mỏng trắng. D sai vì phế lao là âm hư phát nhiệt kéo dài, không bạo phát xuất huyết.","key":"Sau lập thu + thử tà phục + lý nhiệt/dinh huyết từ đầu = phục thử.","id":26,"topic":"Phân biệt bệnh lâm sàng","bloom":"Phân tích"},{"scenario":"BN nam 39 tuổi sốt thành cơn nhưng không có lạnh run dữ dội. Sốt không theo chu kỳ cố định, kèm thân nặng, ngực thượng vị tức căng, buồn nôn, rêu lưỡi nề. Bệnh khởi chậm, kéo dài nhiều ngày.","stem":"Chẩn đoán phân biệt phù hợp nhất với ngược tật là gì?","opts":["A. Thấp ôn","B. Chính ngược","C. Ôn ngược","D. Hàn ngược"],"ans":"A","exp":"A đúng vì thấp ôn có khởi bệnh chậm, sốt không chu kỳ, ít hàn chiến, kèm thân nặng, ngực vị tức căng, nôn, rêu nề. B sai vì chính ngược có cơn lạnh run-sốt cao-mồ hôi đúng giờ, giữa cơn giảm. C sai vì ôn ngược vẫn có quy luật phát cơn ngược nhưng nhiệt nhiều hàn ít. D sai vì hàn ngược hàn nhiều nhiệt ít, phát đúng giờ, thích uống nóng, mạch huyền khẩn.","key":"Không chu kỳ + rêu nề + thấp trệ = thấp ôn, không phải ngược tật.","id":27,"topic":"Phân biệt bệnh lâm sàng","bloom":"Phân tích"},{"scenario":"BN nam 34 tuổi có cơn phát đúng giờ, trước cơn mệt mỏi, ngáp, tay chân rã rời; sau đó lạnh run, tiếp theo sốt cao, mặt đỏ, khát, đau đầu; cuối cơn ra mồ hôi đầm đìa rồi hết triệu chứng. Lưỡi đỏ, rêu mỏng vàng, mạch huyền.","stem":"Thể lâm sàng của ngược tật phù hợp nhất là gì?","opts":["A. Chính ngược","B. Thấp ngược","C. Hàn ngược","D. Lao ngược"],"ans":"A","exp":"A đúng vì chính ngược có trình tự điển hình: tiền triệu mệt-ngáp, lạnh run, sốt cao, rồi hãn xuất và hết cơn, phát đúng giờ; rêu mỏng trắng/vàng, mạch huyền. B sai vì thấp ngược có thân nhiệt bất dương, ngực quản bĩ, nôn, chán ăn, rêu nề hoạt. C sai vì hàn ngược hàn nhiều nhiệt ít, thích uống nóng, mạch huyền khẩn. D sai vì lao ngược là lâu ngày, chính hư tà luyến, phát khi lao lực.","key":"Chính ngược = cơn kinh điển lạnh -> nóng -> mồ hôi -> lui.","id":28,"topic":"Phân biệt bệnh lâm sàng","bloom":"Phân tích"},{"scenario":"BN nữ 30 tuổi vùng dịch sốt rét, phát cơn đúng giờ nhưng hàn nhẹ, nhiệt nặng; có khi chỉ sốt không lạnh. Trong cơn thiếu khí, phiền thao, tay chân nóng, muốn nôn, khớp đau, khát thích uống; lưỡi đỏ rêu vàng, mạch huyền sác.","stem":"Thể ngược tật phù hợp nhất là gì?","opts":["A. Ôn ngược","B. Hàn ngược","C. Thấp ngược","D. Ngược mẫu"],"ans":"A","exp":"A đúng vì ôn ngược có quy luật phát cơn như chính ngược nhưng nhiệt nhiều hàn ít hoặc chỉ nhiệt không hàn, phiền thao, khát uống, lưỡi đỏ rêu vàng, mạch huyền sác. B sai vì hàn ngược hàn nhiều nhiệt ít, không khát hoặc thích uống nóng. C sai vì thấp ngược chủ thân nhiệt bất dương, nặng nề, rêu nề hoạt, tiêu lỏng. D sai vì ngược mẫu là ngược lâu ngày sinh khối cứng hạ sườn do ứ huyết.","key":"Ngược tật mà nhiệt thắng rõ = ôn ngược.","id":29,"topic":"Phân biệt bệnh lâm sàng","bloom":"Phân tích"},{"scenario":"BN nam 46 tuổi sốt rét phát đúng giờ, thân nhiệt bất dương, mồ hôi ra không sảng khoái, ngực quản bĩ muộn, nôn, chán ăn, cơ thể nặng nề mệt mỏi, miệng không khát, tiêu phân lỏng. Rêu lưỡi nề hoạt; mạch huyền hoãn.","stem":"Thể ngược tật phù hợp nhất là gì?","opts":["A. Thấp ngược","B. Thử ngược","C. Ôn ngược","D. Hàn ngược"],"ans":"A","exp":"A đúng vì thấp ngược có hàn nhiệt đúng giờ nhưng thấp tà khốn trung: thân nhiệt bất dương, hãn xuất không sáng, ngực quản bĩ, nôn, chán ăn, thân nặng, tiêu lỏng, rêu nề hoạt, mạch huyền hoãn. B sai vì thử ngược nhiệt nặng, khát nhiều, mặt đỏ, răng khô, tiểu vàng, rêu vàng trắng nề. C sai vì ôn ngược nhiệt nhiều hàn ít, lưỡi đỏ rêu vàng. D sai vì hàn ngược hàn nhiều nhiệt ít, thích uống nóng, rêu mỏng trắng, mạch huyền khẩn.","key":"Ngược + thấp trệ trung tiêu = thấp ngược.","id":30,"topic":"Phân biệt bệnh lâm sàng","bloom":"Phân tích"}];

let fcFlipped = 0;
let mcqAnswered = 0, mcqCorrect = 0;
let fcFilter = 'Tất cả', mcqFilter = 'Tất cả';

function initCounts(){
  document.getElementById('tab-btn-fc').textContent = '🃏 ' + flashcards.length + ' Flashcard';
  document.getElementById('tab-btn-mcq').textContent = '📝 ' + mcqs.length + ' MCQ (SBA)';
  document.getElementById('fc-total').textContent = flashcards.length;
  document.getElementById('fc-topics').textContent = TOPICS.length;
  document.getElementById('mcq-total').textContent = mcqs.length;
}

function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===(t==='fc'?0:1)));
  document.getElementById('tab-fc').classList.toggle('active',t==='fc');
  document.getElementById('tab-mcq').classList.toggle('active',t==='mcq');
}

function buildFilters(containerId, filterVar, onChangeFn){
  const c = document.getElementById(containerId);
  const cats = ['Tất cả',...TOPICS];
  c.innerHTML = '';
  cats.forEach(function(t){
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (t === filterVar ? ' active' : '');
    btn.textContent = t;
    btn.onclick = function(){ onChangeFn(t); };
    c.appendChild(btn);
  });
}

function renderFlashcards(){ buildFilters('fc-filters', fcFilter, fcSetFilter); renderFCGrid(); }
function fcSetFilter(t){ fcFilter = t; buildFilters('fc-filters', fcFilter, fcSetFilter); renderFCGrid(); }

function renderFCGrid(){
  const grid = document.getElementById('fc-grid');
  const cards = fcFilter === 'Tất cả' ? flashcards : flashcards.filter(function(c){ return c.topic === fcFilter; });
  if(!cards.length){ grid.innerHTML = '<div class="empty">Không có thẻ nào.</div>'; return; }
  grid.innerHTML = cards.map(function(c){
    return '<div class="card-wrap' + (c.tall ? ' tall' : '') + '" id="fc-' + c.id + '" onclick="flipCard(' + c.id + ')">' +
      '<div class="card-inner">' +
        '<div class="card-face card-front">' +
          '<div class="card-topic" style="color:' + (COLORS[c.topic]||'#60a5fa') + '">' + c.topic + ' • Thẻ ' + c.id + '</div>' +
          '<div class="card-q">' + c.q + '</div>' +
          '<div class="card-hint">Chạm để xem đáp án →</div>' +
        '</div>' +
        '<div class="card-face card-back">' +
          '<div class="card-topic" style="color:' + (COLORS[c.topic]||'#16a34a') + '">' + c.topic + ' • Đáp án</div>' +
          '<div class="card-a">' + c.a + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function flipCard(id){
  const el = document.getElementById('fc-'+id);
  const wasFlipped = el.classList.contains('flipped');
  el.classList.toggle('flipped');
  if(!wasFlipped){ fcFlipped++; document.getElementById('fc-flipped').textContent = fcFlipped; }
}

function renderMCQ(){ buildFilters('mcq-filters', mcqFilter, mcqSetFilter); renderMCQList(); }
function mcqSetFilter(t){ mcqFilter = t; buildFilters('mcq-filters', mcqFilter, mcqSetFilter); renderMCQList(); }

function renderMCQList(){
  const list = document.getElementById('mcq-list');
  const qs = mcqFilter === 'Tất cả' ? mcqs : mcqs.filter(function(q){ return q.topic === mcqFilter; });
  if(!qs.length){ list.innerHTML = '<div class="empty">Không có câu hỏi nào.</div>'; return; }
  list.innerHTML = qs.map(function(q){
    const scenario = q.scenario ? '<div class="q-scenario">📋 ' + q.scenario + '</div>' : '';
    const opts = q.opts.map(function(o, i){
      return '<div class="option" id="opt-' + q.id + '-' + i + '" onclick="selectOpt(' + q.id + ',' + i + ')">' +
        '<span class="opt-label">' + String.fromCharCode(65+i) + '.</span>' +
        '<span class="opt-text">' + o.substring(3) + '</span>' +
      '</div>';
    }).join('');
    return '<div class="question-card" id="qcard-' + q.id + '">' +
      '<div class="q-header">' +
        '<span class="q-num">Câu ' + q.id + '</span>' +
        '<span class="q-topic-tag" style="border-left:3px solid ' + (COLORS[q.topic]||'#334155') + ';padding-left:8px">' + q.topic + '</span>' +
        (q.bloom ? '<span class="q-bloom">' + q.bloom + '</span>' : '') +
      '</div>' +
      scenario +
      '<div class="q-stem">' + q.stem + '</div>' +
      '<div class="options">' + opts + '</div>' +
      '<button class="reveal-btn" id="rbtn-' + q.id + '" onclick="revealAns(' + q.id + ')">Xem đáp án</button>' +
      '<div class="explanation" id="exp-' + q.id + '">' +
        '<div class="exp-correct">✓ Đáp án đúng: ' + q.ans + '</div>' +
        '<div class="exp-text">' + q.exp + '</div>' +
        (q.key ? '<div class="exp-key">💡 Key: ' + q.key + '</div>' : '') +
      '</div>' +
    '</div>';
  }).join('');
}

function selectOpt(qid, optIdx){
  const q = mcqs.find(function(x){ return x.id === qid; });
  const card = document.getElementById('qcard-'+qid);
  if(card.classList.contains('correct') || card.classList.contains('wrong')) return;
  q.opts.forEach(function(_,i){ document.getElementById('opt-'+qid+'-'+i).classList.remove('selected'); });
  document.getElementById('opt-'+qid+'-'+optIdx).classList.add('selected');
}

function revealAns(qid){
  const q = mcqs.find(function(x){ return x.id === qid; });
  const card = document.getElementById('qcard-'+qid);
  if(card.classList.contains('correct') || card.classList.contains('wrong')) return;
  const correctIdx = q.ans.charCodeAt(0) - 65;
  const selectedEl = document.querySelector('#qcard-'+qid+' .option.selected');
  let selectedIdx = -1;
  if(selectedEl) selectedIdx = parseInt(selectedEl.id.split('-')[2]);
  q.opts.forEach(function(_,i){
    const opt = document.getElementById('opt-'+qid+'-'+i);
    opt.classList.add('disabled');
    if(i === correctIdx) opt.classList.add('correct-ans');
    else if(i === selectedIdx) opt.classList.add('wrong-ans');
  });
  const isCorrect = selectedIdx === correctIdx;
  card.classList.add(isCorrect ? 'correct' : 'wrong');
  document.getElementById('exp-'+qid).classList.add('show');
  document.getElementById('rbtn-'+qid).disabled = true;
  mcqAnswered++;
  if(isCorrect) mcqCorrect++;
  updateMCQStats();
}

function updateMCQStats(){
  const total = mcqs.length;
  document.getElementById('mcq-answered').textContent = mcqAnswered;
  document.getElementById('mcq-correct-count').textContent = mcqCorrect;
  const pct = mcqAnswered > 0 ? Math.round(mcqCorrect / mcqAnswered * 100) : 0;
  document.getElementById('mcq-pct').textContent = pct + '%';
  document.getElementById('mcq-bar').style.width = (total > 0 ? mcqAnswered / total * 100 : 0) + '%';
}

function resetMCQ(){ mcqAnswered = 0; mcqCorrect = 0; updateMCQStats(); renderMCQList(); }

initCounts();
renderFlashcards();
renderMCQ();
</script>
</body>
</html>
