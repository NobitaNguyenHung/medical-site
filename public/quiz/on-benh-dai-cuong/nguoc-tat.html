<style>

.q-stem{font-size:.92rem;line-height:1.6;color:#e2e8f0;margin-bottom:14px;font-weight:500}
.q-scenario{background:#0f172a;border-left:3px solid #2563eb;padding:10px 14px;border-radius:4px;font-size:.85rem;color:#94a3b8;margin-bottom:12px;line-height:1.6}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.option{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:8px;border:1px solid #334155;cursor:pointer;transition:all .2s;background:#0f172a}
.option:hover:not(.disabled){background:#1e3a5f;border-color:#2563eb}

.option.wrong-ans{background:#2d0f0f;border-color:#dc2626;color:#f87171}

.opt-label{font-weight:700;min-width:20px;color:#60a5fa}
.opt-text{font-size:.88rem;line-height:1.5}
.reveal-btn{padding:8px 18px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s}

.exp-correct{color:#4ade80;font-weight:700;margin-bottom:8px}
.exp-text{font-size:.85rem;line-height:1.6;color:#cbd5e1}
.exp-key{font-size:.82rem;color:#fbbf24;margin-top:8px;font-style:italic}
.hidden{display:none!important}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0f172a}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}

.reset-btn:hover{background:#475569}

<script>
const TOPICS = ['Khái niệm & Lịch sử','Cơ chế YHCT','Cơ chế YHHĐ','Chẩn đoán & Phân biệt','Biện chứng 8 thể','Bài thuốc','Điều trị & Dự phòng','Tích hợp Đông-Tây'];
const COLORS = {
  'Khái niệm & Lịch sử':'#0ea5e9',
  'Cơ chế YHCT':'#f59e0b',
  'Cơ chế YHHĐ':'#3b82f6',
  'Chẩn đoán & Phân biệt':'#8b5cf6',
  'Biện chứng 8 thể':'#ec4899',
  'Bài thuốc':'#10b981',
  'Điều trị & Dự phòng':'#14b8a6',
  'Tích hợp Đông-Tây':'#f97316'
};

const flashcards = [
  {id:1,topic:'Khái niệm & Lịch sử',q:`Định nghĩa ngược tật theo YHCT?`,a:`Ngoại cảm <b>nhiệt bệnh cấp tính</b> do cảm thụ <b>ngược tà</b>; đặc trưng <b>hàn chiến → tráng nhiệt → hãn xuất</b>, phát <b>có chu kỳ</b>. Đa số phát mùa hè–thu.`},
  {id:2,topic:'Khái niệm & Lịch sử',q:`"Hàn nhiệt hưu tác" nghĩa là gì?`,a:`Hưu = nghỉ, tác = phát → chỉ <b>tính chu kỳ ngắt quãng</b> (lúc phát lúc nghỉ) — dấu ấn cốt lõi của ngược tật (Tố vấn – Ngược luận).`},
  {id:3,topic:'Khái niệm & Lịch sử',q:`Tố vấn – Ngược luận giải thích hàn và nhiệt ra sao?`,a:`"Tịnh vu dương tắc dương thắng" → <b>nhiệt</b>; "tịnh vu âm tắc âm thắng" → <b>hàn</b>. Ngược khí (ngược tà) là nguyên nhân bệnh.`},
  {id:4,topic:'Khái niệm & Lịch sử',q:`Vị thuốc cổ trị ngược ghi trong Thần Nông bản thảo?`,a:`<b>Thường sơn</b> (hằng sơn).`},
  {id:5,topic:'Khái niệm & Lịch sử',q:`Trửu hậu bị cấp phương (Cát Hồng) dùng gì trị sốt rét?`,a:`<b>Thanh hao</b> một nắm, vắt nước uống → gợi ý <b>chiết lạnh</b>, về sau dẫn tới phát hiện artemisinin.`},
  {id:6,topic:'Khái niệm & Lịch sử',q:`Ngược tật tương ứng bệnh Tây y nào?`,a:`<b>Sốt rét (malaria)</b> do ký sinh trùng <i>Plasmodium</i>.`},
  {id:7,topic:'Khái niệm & Lịch sử',q:`Đường truyền của ngược tà / sốt rét?`,a:`Qua <b>muỗi</b> (YHHĐ: muỗi <i>Anopheles</i> cái).`},
  {id:8,topic:'Khái niệm & Lịch sử',q:`Mùa phát bệnh chủ yếu của ngược tật?`,a:`<b>Hè – thu</b>; có tính khu vực (chướng ngược ở vùng rừng núi).`},
  {id:9,topic:'Cơ chế YHCT',q:`Ngược tà phục tàng ở vị trí nào?`,a:`<b>Bán biểu bán lý (thiếu dương)</b>, xuất nhập giữa khu vực <b>dinh – vệ</b>.`},
  {id:10,topic:'Cơ chế YHCT',q:`Cơ chế gây hàn chiến trong cơn ngược?`,a:`Tà ngoại xuất đấu vệ khí → <b>dương khí bị uất át không ngoại đạt</b> → ố hàn / rét run.`},
  {id:11,topic:'Cơ chế YHCT',q:`Vì sao tiếp sau hàn chiến là tráng nhiệt?`,a:`Dương khí toàn thân được <b>huy động kháng tà</b> → dương nhiệt kháng thịnh → sốt cao, phiền khát, mặt đỏ.`},
  {id:12,topic:'Cơ chế YHCT',q:`Vì sao ra mồ hôi rồi hạ sốt?`,a:`Chính thắng tà tạm thoái, nhiệt bức tân tiết → <b>hãn xuất</b>; <b>nhiệt theo mồ hôi giải</b> → thân mát lại.`},
  {id:13,topic:'Cơ chế YHCT',q:`Vì sao bệnh tái phát theo chu kỳ?`,a:`Tà vẫn <b>phục bán biểu bán lý</b>, tích tụ chờ thời → lại đấu vệ khí → tà–chính giao tranh lặp lại.`},
  {id:14,topic:'Cơ chế YHCT',q:`Yếu tố quyết định chu kỳ phát dài hay ngắn?`,a:`<b>Vị trí nông – sâu</b> của tà phục. Tà càng <b>sâu</b> → chu kỳ càng dài, càng khó khỏi.`},
  {id:15,topic:'Cơ chế YHCT',q:`Truyền biến nguy hiểm của ngược tật?`,a:`Nội truyền <b>dinh – huyết</b>, phạm <b>tâm/can/kinh quyết âm</b> → thần hôn, kinh quyết (≈ sốt rét ác tính).`},
  {id:16,topic:'Cơ chế YHCT',q:`Câu Tố vấn lý giải tính định giờ của cơn?`,a:`"Vệ khí giả, <b>nhất nhật nhất dạ chu vu thân</b>" — dinh vệ vận hành có quy luật nên hàn nhiệt phát đúng giờ.`},
  {id:17,topic:'Cơ chế YHHĐ',q:`Tác nhân và vector của sốt rét?`,a:`Ký sinh trùng <i>Plasmodium</i> spp., truyền qua <b>muỗi <i>Anopheles</i> cái</b>.`},
  {id:18,topic:'Cơ chế YHHĐ',q:`5 loài Plasmodium gây bệnh ở người?`,a:`<i>P. falciparum, P. vivax, P. ovale, P. malariae, P. knowlesi</i>.`},
  {id:19,topic:'Cơ chế YHHĐ',q:`Cơn sốt kịch phát (paroxysm) sinh ra do đâu?`,a:`<b>Vỡ schizont đồng loạt</b> → giải phóng pyrogen (hemozoin, GPI) → đại thực bào tiết <b>TNF-α, IL-1</b> → sốt.`},
  {id:20,topic:'Cơ chế YHHĐ',q:`3 giai đoạn của cơn paroxysm?`,a:`<b>Cold stage</b> (rét run) → <b>Hot stage</b> (sốt cao) → <b>Sweating stage</b> (vã mồ hôi, hạ sốt) — trùng khít hàn chiến → tráng nhiệt → hãn xuất.`},
  {id:21,topic:'Cơ chế YHHĐ',q:`Sốt cách nhật (tertian, 48h) gặp ở loài nào?`,a:`<i>P. vivax</i> và <i>P. ovale</i>.`},
  {id:22,topic:'Cơ chế YHHĐ',q:`Sốt cách 3 ngày (quartan, 72h) do loài nào?`,a:`<i>P. malariae</i>.`},
  {id:23,topic:'Cơ chế YHHĐ',q:`Tái phát muộn do thể ngủ (hypnozoite) ở gan?`,a:`<i>P. vivax</i> và <i>P. ovale</i> → đối chiếu YHCT là <b>lao ngược</b>.`},
  {id:24,topic:'Cơ chế YHHĐ',q:`Sốt rét ác tính thể não chủ yếu do loài nào?`,a:`<i>P. falciparum</i> — hồng cầu nhiễm <b>kết dính/sequestration</b> vi mạch não → hôn mê, co giật.`},
  {id:25,topic:'Chẩn đoán & Phân biệt',q:`Triệu chứng điển hình giúp chẩn đoán xác định?`,a:`Hàn chiến – tráng nhiệt – hãn xuất – nhiệt hạ thân mát, <b>chu kỳ đúng giờ</b>; kèm <b>lách to, thiếu máu</b>.`},
  {id:26,topic:'Chẩn đoán & Phân biệt',q:`Mạch chủ về của ngược tật?`,a:`<b>Mạch huyền</b>. Huyền khẩn → hàn nặng; huyền sác → nhiệt nặng.`},
  {id:27,topic:'Chẩn đoán & Phân biệt',q:`Tiêu chuẩn vàng xét nghiệm YHHĐ?`,a:`<b>Soi lam máu nhuộm Giemsa</b> (giọt đặc + giọt mỏng) tìm KST, định loài & đếm mật độ.`},
  {id:28,topic:'Chẩn đoán & Phân biệt',q:`Các xét nghiệm hỗ trợ khác?`,a:`<b>RDT</b> (test nhanh kháng nguyên HRP-2/pLDH), <b>PCR</b>.`},
  {id:29,topic:'Chẩn đoán & Phân biệt',q:`Phân biệt ngược tật với thời hành cảm mạo?`,a:`Cảm mạo có <b>triệu chứng phế vệ rõ</b> (ho, ngứa họng, nghẹt mũi); ngược tật <b>chu kỳ + tính vùng/mùa</b>, giữa cơn sạch triệu chứng.`},
  {id:30,topic:'Chẩn đoán & Phân biệt',q:`Phân biệt ngược tật với thấp ôn?`,a:`Thấp ôn <b>khởi chậm, ít hàn chiến</b>, sốt <b>không chu kỳ</b>, kèm thân nặng, bĩ, nôn, rêu nề.`},
  {id:31,topic:'Chẩn đoán & Phân biệt',q:`Phân biệt ngược tật với phế lao?`,a:`Phế lao sốt <b>âm hư về chiều/đêm</b>, không "đúng giờ" như ngược tật.`},
  {id:32,topic:'Chẩn đoán & Phân biệt',q:`Mã ICD-10 của sốt rét?`,a:`<b>B50–B54</b> (B50 <i>falciparum</i>, B51 <i>vivax</i>, B52 <i>malariae</i>, B53 khác, B54 không định loài).`},
  {id:33,topic:'Biện chứng 8 thể',q:`Kể tên 8 thể lâm sàng của ngược tật?`,a:`Chính ngược · Ôn ngược · Thử ngược · Thấp ngược · Hàn ngược · Chương ngược (nhiệt/lãnh chương) · Lao ngược · Ngược mẫu.`},
  {id:34,topic:'Biện chứng 8 thể',q:`Đặc trưng của chính ngược?`,a:`<b>Hàn nhiệt vãng lai đúng giờ</b>; tà phục thiếu dương xuất nhập dinh-vệ. Lưỡi đỏ rêu mỏng, mạch huyền.`},
  {id:35,topic:'Biện chứng 8 thể',q:`Đặc trưng của ôn ngược?`,a:`<b>Nhiệt nhiều hàn ít</b> hoặc chỉ nhiệt, khát, lưỡi đỏ rêu vàng, mạch huyền sác; do tố thể <b>dương thịnh</b>.`},
  {id:36,topic:'Biện chứng 8 thể',q:`Đặc trưng của thử ngược?`,a:`Hàn nhẹ <b>nhiệt nặng</b>, khát dữ, ngực tức buồn nôn; do <b>thử nhiệt kèm thấp</b>.`},
  {id:37,topic:'Biện chứng 8 thể',q:`Đặc trưng của thấp ngược?`,a:`<b>Thân nhiệt bất dương</b>, nôn, chán ăn, người nặng nề, phân lỏng, rêu nề, mạch huyền hoãn; thấp khốn trung tiêu.`},
  {id:38,topic:'Biện chứng 8 thể',q:`Đặc trưng của hàn ngược?`,a:`<b>Hàn nhiều nhiệt ít</b>, thích uống nóng, miệng không khát, rêu trắng, mạch huyền khẩn; dương hư + cảm hàn tà.`},
  {id:39,topic:'Biện chứng 8 thể',q:`Đặc trưng nhiệt chương và đối chiếu YHHĐ?`,a:`Sốt cao, <b>thần hôn, chiêm ngữ, kinh quyết</b>, lưỡi đỏ thẫm rêu đen ≈ <b>sốt rét ác tính thể não</b>.`},
  {id:40,topic:'Biện chứng 8 thể',q:`Đặc trưng của lao ngược?`,a:`Cửu ngược, <b>hễ lao nhọc lại phát</b>, sắc mặt nhợt, mạch tế nhược; <b>chính hư tà luyến</b> (≈ tái phát hypnozoite).`},
  {id:41,topic:'Biện chứng 8 thể',q:`Đặc trưng của ngược mẫu?`,a:`<b>Bĩ khối hạ sườn trái</b>, trướng thống, sắc mặt u tối, lưỡi ứ ban, mạch huyền sáp; <b>huyết ứ đàm ngưng</b> (≈ lách to).`},
  {id:42,topic:'Biện chứng 8 thể',q:`Đại pháp điều trị chung theo giai đoạn?`,a:`Thực chứng → <b>khứ tà tiết ngược</b>; hư-thực thác tạp → <b>phò chính khứ tà</b>; hư chứng → <b>phò chính bổ hư</b>; tà thiếu dương → <b>hòa giải</b>.`},
  {id:43,topic:'Bài thuốc',q:`Phương chủ điều trị chính ngược?`,a:`<b>Tiểu sài hồ thang gia vị</b> (gia Thường sơn, Bình lang, Thảo quả). Pháp: khứ tà tiết ngược, hòa giải đạt tà.`},
  {id:44,topic:'Bài thuốc',q:`Vai trò Sài hồ + Hoàng cầm trong phương?`,a:`<b>Hòa giải thiếu dương bán biểu bán lý</b> — trục chủ đạo của Tiểu sài hồ thang.`},
  {id:45,topic:'Bài thuốc',q:`Lưu ý quan trọng khi dùng Thường sơn?`,a:`Thường <b>gây buồn nôn/nôn</b> → uống lúc <b>ấm</b>, không uống lúc nóng. (YHHĐ: febrifugine trong Dichroa febrifuga).`},
  {id:46,topic:'Bài thuốc',q:`Phương chủ của ôn ngược và hàn ngược?`,a:`Ôn ngược → <b>Bạch hổ gia quế chi thang</b>; Hàn ngược → <b>Sài hồ quế khương thang</b> gia giảm.`},
  {id:47,topic:'Bài thuốc',q:`Phương chủ của ngược mẫu và cơ chế?`,a:`<b>Miết giáp tiễn hoàn</b> — nhuyễn kiên tán tích + hoạt huyết hóa ứ (<b>công bổ kiêm thi</b>).`},
  {id:48,topic:'Điều trị & Dự phòng',q:`Thời điểm uống thuốc cắt cơn tốt nhất?`,a:`<b>Trước cơn khoảng 2 giờ</b>.`},
  {id:49,topic:'Tích hợp Đông-Tây',q:`Thanh hao là nguồn gốc của thuốc hiện đại nào?`,a:`<b>Artemisinin</b> (Đồ U U / Tu Youyou, Nobel Y học 2015) — nền tảng của <b>ACT</b> (artemisinin-based combination therapy).`},
  {id:50,topic:'Tích hợp Đông-Tây',q:`Phác đồ WHO cho sốt rét nặng và vai trò YHCT?`,a:`Sốt rét nặng → <b>artesunate tĩnh mạch</b> ưu tiên; <i>falciparum</i> chưa biến chứng → ACT 3 ngày. YHCT đóng vai trò <b>hỗ trợ triệu chứng/phục hồi</b>, không thay thế thuốc đặc hiệu.`}
];

const mcqs = [
  {id:1,topic:'Khái niệm & Lịch sử',bloom:'Nhớ',scenario:'',stem:`Dấu hiệu đặc trưng nhất của ngược tật điển hình là?`,opts:['A. Sốt cao liên tục không dao động','B. Hàn chiến – tráng nhiệt – hãn xuất, phát có chu kỳ','C. Sốt nhẹ về chiều kèm ho khan','D. Sốt kèm phát ban dát toàn thân'],ans:'B',exp:`Ngược tật được định nghĩa bằng bộ ba hàn chiến → tráng nhiệt → hãn xuất phát thành cơn có chu kỳ. A là kiểu sốt nhiễm khuẩn huyết; C gợi phế lao (âm hư); D gợi ban chẩn ôn bệnh khác.`,key:`Chu kỳ "hàn nhiệt hưu tác" là chìa khóa nhận diện ngược tật.`},
  {id:2,topic:'Khái niệm & Lịch sử',bloom:'Hiểu',scenario:'',stem:`Thuật ngữ "hàn nhiệt hưu tác" mô tả đặc điểm nào?`,opts:['A. Sốt cao liên tục','B. Tính chu kỳ ngắt quãng (lúc phát lúc nghỉ)','C. Rét run kéo dài không dứt','D. Sốt kèm vàng da'],ans:'B',exp:`Hưu = nghỉ, tác = phát → mô tả cơn sốt có giai đoạn phát rồi tự lui, lặp lại theo chu kỳ. Đây là điểm Trung y nhận ra từ hơn 2000 năm trước.`,key:`Hưu tác = ngắt quãng theo chu kỳ.`},
  {id:3,topic:'Tích hợp Đông-Tây',bloom:'Nhớ',scenario:'',stem:`Vị thuốc YHCT là nguồn gốc của artemisinin?`,opts:['A. Thường sơn','B. Thanh hao','C. Sài hồ','D. Thảo quả'],ans:'B',exp:`Artemisinin (thanh hao tố) được Đồ U U phân lập từ Thanh hao (Artemisia annua), lấy cảm hứng từ Trửu hậu bị cấp phương. Thường sơn chứa febrifugine (khác).`,key:`Thanh hao → artemisinin → Nobel 2015.`},
  {id:4,topic:'Bài thuốc',bloom:'Hiểu',scenario:'',stem:`Vì sao khi dùng Thường sơn nên uống lúc ấm, không uống lúc nóng?`,opts:['A. Dễ gây tiêu chảy','B. Dễ gây buồn nôn/nôn','C. Gây hạ huyết áp tư thế','D. Gây kích ứng xuất huyết dạ dày'],ans:'B',exp:`Tài liệu ghi rõ Thường sơn thường gây buồn nôn, nôn ọe nên uống lúc ấm. (YHHĐ: febrifugine gây nôn.)`,key:`Thường sơn → nôn → uống ấm.`},
  {id:5,topic:'Cơ chế YHCT',bloom:'Hiểu',scenario:'',stem:`Ngược tà phục tàng chủ yếu ở vị trí nào?`,opts:['A. Phế vệ','B. Bán biểu bán lý (thiếu dương)','C. Dương minh phủ','D. Hạ tiêu can thận'],ans:'B',exp:`Bệnh biến chủ yếu là ngược tà phục tại bán biểu bán lý, xuất nhập giữa dinh-vệ → quyết định đại pháp hòa giải thiếu dương.`,key:`Định vị: bán biểu bán lý (thiếu dương).`},
  {id:6,topic:'Cơ chế YHCT',bloom:'Hiểu',scenario:'',stem:`Cơ chế YHCT của giai đoạn hàn chiến là?`,opts:['A. Âm hư sinh nội nhiệt','B. Dương khí bị tà uất át, không ngoại đạt','C. Vong dương thoát chứng','D. Huyết ứ trở lạc'],ans:'B',exp:`Khi tà đấu vệ khí, dương khí bị uất át không ngoại đạt nên xuất hiện rét run; sau đó dương khí huy động kháng tà thì chuyển sốt cao.`,key:`Hàn chiến = dương uất không ngoại đạt.`},
  {id:7,topic:'Cơ chế YHHĐ',bloom:'Hiểu',scenario:'',stem:`Cơn sốt kịch phát trong sốt rét xuất hiện do?`,opts:['A. Ký sinh trùng xâm nhập tế bào gan','B. Vỡ schizont đồng loạt giải phóng pyrogen kích thích cytokine','C. Tán huyết tự miễn qua kháng thể nóng','D. Bội nhiễm vi khuẩn gram âm'],ans:'B',exp:`Cơn paroxysm là hệ quả của vỡ schizont đồng bộ trong hồng cầu → hemozoin/GPI kích hoạt đại thực bào tiết TNF-α, IL-1 → sốt. Giai đoạn gan không gây cơn sốt.`,key:`Vỡ schizont đồng loạt → cytokine → sốt chu kỳ.`},
  {id:8,topic:'Cơ chế YHHĐ',bloom:'Nhớ',scenario:'',stem:`Vector truyền bệnh sốt rét là?`,opts:['A. Muỗi Aedes','B. Muỗi Anopheles cái','C. Muỗi Culex','D. Bọ chét chuột'],ans:'B',exp:`Sốt rét truyền qua muỗi Anopheles cái. Aedes truyền sốt xuất huyết/Zika, Culex truyền viêm não Nhật Bản.`,key:`Anopheles cái = vector sốt rét.`},
  {id:9,topic:'Cơ chế YHHĐ',bloom:'Hiểu',scenario:'',stem:`Sốt cách nhật (tertian, chu kỳ 48 giờ) điển hình gặp ở loài?`,opts:['A. P. malariae','B. P. vivax và P. ovale','C. P. knowlesi','D. Toàn bộ các loài như nhau'],ans:'B',exp:`Schizogony 48h của P. vivax/ovale tạo sốt tertian (cách nhật). P. malariae là quartan (72h); P. knowlesi quotidian (24h).`,key:`Tertian 48h = vivax/ovale.`},
  {id:10,topic:'Cơ chế YHHĐ',bloom:'Nhớ',scenario:'',stem:`Sốt cách 3 ngày (quartan, chu kỳ 72 giờ) do loài nào?`,opts:['A. P. vivax','B. P. malariae','C. P. ovale','D. P. falciparum'],ans:'B',exp:`P. malariae có schizogony 72h → quartan. Khớp mô tả "cách ba ngày phát" trong tài liệu.`,key:`Quartan 72h = P. malariae.`},
  {id:11,topic:'Cơ chế YHHĐ',bloom:'Hiểu',scenario:'',stem:`Tái phát muộn do thể ngủ hypnozoite ở gan gặp ở loài nào?`,opts:['A. P. falciparum','B. P. malariae','C. P. vivax và P. ovale','D. P. knowlesi'],ans:'C',exp:`Chỉ P. vivax và P. ovale có hypnozoite ngủ ở gan → tái phát sau nhiều tháng; đối chiếu YHCT là lao ngược. Falciparum không có hypnozoite.`,key:`Hypnozoite (vivax/ovale) ↔ lao ngược.`},
  {id:12,topic:'Cơ chế YHHĐ',bloom:'Phân tích',scenario:'',stem:`Sốt rét ác tính thể não chủ yếu do loài và cơ chế nào?`,opts:['A. P. vivax, tán huyết ồ ạt','B. P. falciparum, hồng cầu nhiễm kết dính (sequestration) vi mạch não','C. P. malariae, viêm cầu thận phức hợp miễn dịch','D. P. ovale, cường lách'],ans:'B',exp:`P. falciparum gây cytoadherence/sequestration làm tắc vi mạch não → hôn mê, co giật. Đối chiếu YHCT là nhiệt chương (nhiệt độc hãm tâm bào).`,key:`Falciparum + sequestration = thể não ≈ nhiệt chương.`},
  {id:13,topic:'Chẩn đoán & Phân biệt',bloom:'Áp dụng',scenario:`BN nam 30 tuổi vừa đi rừng về, sốt thành cơn đúng giờ kèm rét run rồi vã mồ hôi, khám thấy lách to.`,stem:`Xét nghiệm tiêu chuẩn vàng để xác định chẩn đoán?`,opts:['A. Cấy máu tìm vi khuẩn','B. Soi lam máu nhuộm Giemsa (giọt đặc + giọt mỏng)','C. Công thức máu toàn phần','D. Siêu âm ổ bụng'],ans:'B',exp:`Soi lam máu Giemsa là tiêu chuẩn vàng: vừa tìm KST, vừa định loài và đếm mật độ. Công thức máu/siêu âm chỉ gợi ý (thiếu máu, lách to).`,key:`Giemsa giọt đặc + mỏng = tiêu chuẩn vàng.`},
  {id:14,topic:'Chẩn đoán & Phân biệt',bloom:'Nhớ',scenario:'',stem:`Mạch chủ về của ngược tật là?`,opts:['A. Mạch phù','B. Mạch huyền','C. Mạch trầm tế','D. Mạch hồng đại'],ans:'B',exp:`Mạch huyền là mạch chủ của ngược tật. Huyền khẩn chủ hàn nặng, huyền sác chủ nhiệt nặng.`,key:`Ngược tật → mạch huyền.`},
  {id:15,topic:'Chẩn đoán & Phân biệt',bloom:'Hiểu',scenario:'',stem:`Mạch huyền sác trong ngược tật chỉ điểm điều gì?`,opts:['A. Hàn tương đối nặng','B. Nhiệt tương đối nặng','C. Khí hư','D. Huyết ứ'],ans:'B',exp:`Huyền sác = nhiệt nặng; huyền khẩn = hàn nặng. Đây là cơ sở phân biệt ôn ngược (huyền sác) với hàn ngược (huyền khẩn).`,key:`Huyền sác → nhiệt; huyền khẩn → hàn.`},
  {id:16,topic:'Chẩn đoán & Phân biệt',bloom:'Phân tích',scenario:`BN sốt và đau đầu mấy ngày nay.`,stem:`Đặc điểm nào giúp phân biệt ngược tật với thời hành cảm mạo?`,opts:['A. Có ho, ngứa họng, nghẹt mũi (triệu chứng phế vệ)','B. Sốt chu kỳ đúng giờ, giữa cơn không triệu chứng, có tính vùng/mùa','C. Đau mỏi toàn thân','D. Kèm sổ mũi nhiều'],ans:'B',exp:`Cảm mạo có triệu chứng phế vệ rõ; ngược tật đặc trưng bởi chu kỳ đúng giờ, giữa hai cơn sạch triệu chứng, kèm tính khu vực/mùa.`,key:`Giữa cơn sạch triệu chứng + chu kỳ = ngược tật.`},
  {id:17,topic:'Chẩn đoán & Phân biệt',bloom:'Phân tích',scenario:'',stem:`Kiểu sốt của phế lao khác ngược tật ở điểm nào?`,opts:['A. Sốt đúng giờ theo chu kỳ','B. Sốt âm hư về chiều/đêm, không đúng giờ','C. Kèm hàn chiến rõ rệt','D. Kèm lách to và thiếu máu'],ans:'B',exp:`Phế lao là sốt âm hư nội nhiệt (về chiều/đêm), không có tính "đúng giờ chu kỳ" như ngược tật.`,key:`Phế lao = sốt về chiều, không chu kỳ.`},
  {id:18,topic:'Biện chứng 8 thể',bloom:'Hiểu',scenario:'',stem:`Thể có hàn nhiệt vãng lai cân bằng, phát đúng giờ, tà ở thiếu dương là?`,opts:['A. Ôn ngược','B. Chính ngược','C. Hàn ngược','D. Thấp ngược'],ans:'B',exp:`Chính ngược: hàn nhiệt vãng lai đúng giờ, tà phục thiếu dương xuất nhập dinh-vệ, mạch huyền — nguyên mẫu của ngược tật.`,key:`Chính ngược = nguyên mẫu thiếu dương.`},
  {id:19,topic:'Biện chứng 8 thể',bloom:'Áp dụng',scenario:`BN cơn ngược, nhiệt nhiều hàn ít, khát thích uống, tay chân nóng, lưỡi đỏ rêu vàng, mạch huyền sác.`,stem:`Thể bệnh phù hợp nhất?`,opts:['A. Hàn ngược','B. Ôn ngược','C. Thấp ngược','D. Lao ngược'],ans:'B',exp:`Nhiệt nhiều hàn ít + khát + lưỡi đỏ rêu vàng + mạch huyền sác = ôn ngược (tố thể dương thịnh, thử tà nội uẩn).`,key:`Nhiệt nhiều hàn ít, huyền sác = ôn ngược.`},
  {id:20,topic:'Biện chứng 8 thể',bloom:'Áp dụng',scenario:`BN cơn rét nhiều, sốt ít, thích uống nước nóng, miệng không khát, rêu mỏng trắng, mạch huyền khẩn.`,stem:`Thể bệnh phù hợp nhất?`,opts:['A. Ôn ngược','B. Hàn ngược','C. Thử ngược','D. Nhiệt chương'],ans:'B',exp:`Hàn nhiều nhiệt ít + thích uống nóng + rêu trắng + mạch huyền khẩn = hàn ngược (dương hư + cảm hàn tà).`,key:`Hàn nhiều, huyền khẩn = hàn ngược.`},
  {id:21,topic:'Biện chứng 8 thể',bloom:'Áp dụng',scenario:`BN hàn nhiệt đúng giờ, thân nhiệt bất dương, nôn, chán ăn, người nặng nề mệt mỏi, phân lỏng, rêu nề, mạch huyền hoãn.`,stem:`Thể bệnh phù hợp nhất?`,opts:['A. Thấp ngược','B. Ôn ngược','C. Lao ngược','D. Chính ngược'],ans:'A',exp:`Thân nhiệt bất dương + nôn + phân lỏng + người nặng + rêu nề + mạch huyền hoãn = thấp ngược (thấp nhiệt khốn trở trung tiêu).`,key:`Thân nhiệt bất dương + thấp tiêu hóa = thấp ngược.`},
  {id:22,topic:'Biện chứng 8 thể',bloom:'Phân tích',scenario:`BN từ vùng rừng núi, sốt cao, thần hôn, chiêm ngữ, kinh quyết, lưỡi đỏ thẫm rêu đen, mạch hồng sác.`,stem:`Thể bệnh và đối chiếu YHHĐ phù hợp nhất?`,opts:['A. Chính ngược ~ sốt rét thường','B. Nhiệt chương ~ sốt rét ác tính thể não','C. Lao ngược ~ tái phát mạn','D. Ngược mẫu ~ lách to'],ans:'B',exp:`Vùng rừng + sốt cao + thần hôn/kinh quyết + lưỡi đỏ thẫm rêu đen = nhiệt chương (nhiệt độc hãm tâm bào) ≈ sốt rét ác tính thể não — dễ tử vong, cần cấp cứu.`,key:`Thần hôn + kinh quyết vùng rừng = nhiệt chương (thể não).`},
  {id:23,topic:'Biện chứng 8 thể',bloom:'Hiểu',scenario:'',stem:`Ngược tật lâu ngày, hễ lao nhọc lại phát, sắc mặt nhợt, mạch tế nhược thuộc thể?`,opts:['A. Chính ngược','B. Lao ngược','C. Ôn ngược','D. Thử ngược'],ans:'B',exp:`Lao ngược = cửu ngược hao thương khí huyết, chính hư tà luyến; gắng sức là phát; sắc mặt nhợt, mạch tế nhược.`,key:`Lao nhọc tái phát + khí huyết hư = lao ngược.`},
  {id:24,topic:'Biện chứng 8 thể',bloom:'Phân tích',scenario:`BN cửu ngược không khỏi, hạ sườn trái nổi khối trướng thống, sắc mặt u tối, lưỡi có ứ ban, mạch huyền sáp.`,stem:`Thể bệnh phù hợp nhất?`,opts:['A. Lao ngược','B. Ngược mẫu','C. Lãnh chương','D. Thấp ngược'],ans:'B',exp:`Khối hạ sườn + sắc mặt u tối + lưỡi ứ ban + mạch huyền sáp = ngược mẫu (huyết ứ đàm ngưng) ≈ lách to.`,key:`Bĩ khối hạ sườn + huyết ứ = ngược mẫu.`},
  {id:25,topic:'Bài thuốc',bloom:'Áp dụng',scenario:'',stem:`Phương chủ điều trị chính ngược là?`,opts:['A. Bạch hổ gia quế chi thang','B. Tiểu sài hồ thang gia vị','C. Hậu phác thảo quả thang','D. Miết giáp tiễn hoàn'],ans:'B',exp:`Chính ngược dùng Tiểu sài hồ thang gia Thường sơn, Bình lang, Thảo quả — hòa giải thiếu dương kèm tiết ngược.`,key:`Chính ngược → Tiểu sài hồ thang gia vị.`},
  {id:26,topic:'Bài thuốc',bloom:'Hiểu',scenario:'',stem:`Vai trò của Sài hồ + Hoàng cầm trong Tiểu sài hồ thang?`,opts:['A. Thanh nhiệt lương huyết','B. Hòa giải thiếu dương bán biểu bán lý','C. Ôn dương tán hàn','D. Hoạt huyết hóa ứ'],ans:'B',exp:`Sài hồ + Hoàng cầm là cặp chủ dược hòa giải thiếu dương bán biểu bán lý — đúng định vị bệnh của ngược tật.`,key:`Sài hồ + Hoàng cầm = hòa giải thiếu dương.`},
  {id:27,topic:'Bài thuốc',bloom:'Áp dụng',scenario:'',stem:`Phương chủ của ôn ngược (nhiệt nhiều hàn ít)?`,opts:['A. Sài hồ quế khương thang','B. Bạch hổ gia quế chi thang','C. Hậu phác thảo quả thang','D. Khứ lao thang'],ans:'B',exp:`Ôn ngược thiên nhiệt → Bạch hổ gia quế chi thang (thanh nhiệt + giải biểu, biểu lý song giải), gia Sài hồ/Thanh hao hòa giải thấu tà.`,key:`Ôn ngược → Bạch hổ gia quế chi thang.`},
  {id:28,topic:'Bài thuốc',bloom:'Áp dụng',scenario:'',stem:`Phương chủ của thấp ngược?`,opts:['A. Hậu phác thảo quả thang','B. Thanh chương thang','C. Bạch hổ gia quế chi thang','D. Tiểu sài hồ thang'],ans:'A',exp:`Thấp ngược dùng Hậu phác thảo quả thang — táo thấp hóa trọc, khứ tà tiết ngược.`,key:`Thấp ngược → Hậu phác thảo quả thang.`},
  {id:29,topic:'Bài thuốc',bloom:'Áp dụng',scenario:'',stem:`Phương chủ của hàn ngược?`,opts:['A. Bạch hổ gia quế chi thang','B. Sài hồ quế khương thang gia giảm','C. Thanh chương thang','D. Miết giáp tiễn hoàn'],ans:'B',exp:`Hàn ngược (dương hư + hàn tà) → Sài hồ quế khương thang gia giảm — tán hàn tiết ngược, hòa giải khử tà.`,key:`Hàn ngược → Sài hồ quế khương thang.`},
  {id:30,topic:'Bài thuốc',bloom:'Áp dụng',scenario:'',stem:`Phương chủ của nhiệt chương?`,opts:['A. Thanh chương thang gia giảm','B. Bất hoán kim chính khí tán','C. Hậu phác thảo quả thang','D. Khứ lao thang'],ans:'A',exp:`Nhiệt chương → Thanh chương thang gia giảm (thanh nhiệt tịch uế giải độc), nặng thì phối Tử tuyết đơn / Thanh hao tố.`,key:`Nhiệt chương → Thanh chương thang.`},
  {id:31,topic:'Bài thuốc',bloom:'Áp dụng',scenario:'',stem:`Phương chủ của lãnh chương (dương hư, chương độc thấp trọc)?`,opts:['A. Thanh chương thang','B. Bất hoán kim chính khí tán gia vị','C. Bạch hổ thang','D. Miết giáp tiễn hoàn'],ans:'B',exp:`Lãnh chương → Bất hoán kim chính khí tán (tán hàn tịch uế giải độc hóa trọc); hôn mê phối Tô hợp hương hoàn.`,key:`Lãnh chương → Bất hoán kim chính khí tán.`},
  {id:32,topic:'Bài thuốc',bloom:'Áp dụng',scenario:'',stem:`Phương chủ của lao ngược?`,opts:['A. Khứ lao thang hợp Hà nhân ẩm','B. Tiểu sài hồ thang','C. Thanh chương thang','D. Hậu phác thảo quả thang'],ans:'A',exp:`Lao ngược (chính hư tà luyến) → Khứ lao thang hợp Hà nhân ẩm — bổ ích chính khí, phò chính khứ tà.`,key:`Lao ngược → Khứ lao thang + Hà nhân ẩm.`},
  {id:33,topic:'Bài thuốc',bloom:'Áp dụng',scenario:'',stem:`Phương chủ của ngược mẫu?`,opts:['A. Miết giáp tiễn hoàn','B. Bạch hổ gia quế chi thang','C. Sài hồ quế khương thang','D. Bất hoán kim chính khí tán'],ans:'A',exp:`Ngược mẫu (huyết ứ đàm ngưng, bĩ khối hạ sườn) → Miết giáp tiễn hoàn — nhuyễn kiên tán tích, hoạt huyết hóa ứ.`,key:`Ngược mẫu → Miết giáp tiễn hoàn.`},
  {id:34,topic:'Bài thuốc',bloom:'Hiểu',scenario:'',stem:`Miết giáp tiễn hoàn trị ngược mẫu chủ yếu nhờ cơ chế nào?`,opts:['A. Thanh nhiệt giải độc đơn thuần','B. Nhuyễn kiên tán tích + hoạt huyết hóa ứ (công bổ kiêm thi)','C. Ôn bổ tỳ thận','D. Tư âm sinh tân đơn thuần'],ans:'B',exp:`Miết giáp nhuyễn kiên tán tích, phối Giá trùng/Đào nhân/Đại hoàng/Đơn bì hoạt huyết hóa ứ; là phương công bổ kiêm thi, tuấn dược hoãn công.`,key:`Ngược mẫu = nhuyễn kiên + hoạt huyết, công bổ kiêm thi.`},
  {id:35,topic:'Điều trị & Dự phòng',bloom:'Áp dụng',scenario:'',stem:`Thời điểm uống thuốc cắt cơn ngược tốt nhất?`,opts:['A. Ngay lúc đang sốt cao','B. Trước cơn khoảng 2 giờ','C. Ngay sau khi ra mồ hôi hết sốt','D. Vào lúc nửa đêm cố định'],ans:'B',exp:`Tài liệu nêu rõ: nên dùng thuốc trước lúc phát bệnh khoảng 2 giờ là tốt nhất (đón đầu cơn).`,key:`Uống thuốc trước cơn ~2 giờ.`},
  {id:36,topic:'Tích hợp Đông-Tây',bloom:'Đánh giá',scenario:'',stem:`Trong kỷ nguyên ACT, vai trò hợp lý nhất của biện chứng YHCT với sốt rét là?`,opts:['A. Thay thế hoàn toàn thuốc đặc hiệu','B. Hỗ trợ triệu chứng/phục hồi, không thay thế thuốc đặc hiệu','C. Chỉ dùng cho thể não','D. Chống chỉ định hoàn toàn'],ans:'B',exp:`Phác đồ đặc hiệu (ACT/artesunate) là nền tảng theo WHO; YHCT đóng vai trò hỗ trợ triệu chứng và phục hồi, không thay thế thuốc đặc hiệu.`,key:`YHCT hỗ trợ, không thay thế ACT.`},
  {id:37,topic:'Tích hợp Đông-Tây',bloom:'Áp dụng',scenario:`BN sốt rét P. falciparum nặng, rối loạn ý thức, KST mật độ cao.`,stem:`Thuốc ưu tiên theo WHO?`,opts:['A. Chloroquine uống','B. Artesunate tĩnh mạch','C. Primaquine đơn thuần','D. Doxycycline đơn thuần'],ans:'B',exp:`Sốt rét nặng: artesunate tĩnh mạch là ưu tiên (giảm tử vong so với quinine). Chloroquine không dùng cho falciparum kháng; primaquine để diệt hypnozoite/giao bào; doxycycline chỉ phối hợp.`,key:`Sốt rét nặng → artesunate TM.`},
  {id:38,topic:'Tích hợp Đông-Tây',bloom:'Hiểu',scenario:'',stem:`Để chống tái phát do hypnozoite (P. vivax/ovale), cần thêm thuốc nào (sau loại trừ thiếu G6PD)?`,opts:['A. Artemether','B. Primaquine hoặc tafenoquine','C. Quinine','D. Mefloquine'],ans:'B',exp:`Primaquine/tafenoquine diệt thể ngủ hypnozoite ở gan để triệt căn, ngừa tái phát; cần loại trừ thiếu G6PD vì nguy cơ tan máu.`,key:`Hypnozoite → primaquine/tafenoquine (kiểm G6PD).`},
  {id:39,topic:'Cơ chế YHHĐ',bloom:'Phân tích',scenario:'',stem:`Lách to và thiếu máu trong sốt rét tương ứng thể YHCT nào?`,opts:['A. Chính ngược','B. Ngược mẫu (bĩ khối hạ sườn)','C. Ôn ngược','D. Thử ngược'],ans:'B',exp:`Lách to do bắt giữ/tán huyết hồng cầu ↔ ngược mẫu (huyết ứ đàm ngưng tạo bĩ khối hạ sườn trái); thiếu máu cũng gặp ở lao ngược.`,key:`Lách to ↔ ngược mẫu.`},
  {id:40,topic:'Cơ chế YHCT',bloom:'Hiểu',scenario:'',stem:`Theo YHCT, vì sao có loại ngược phát cách nhật, có loại cách 3 ngày?`,opts:['A. Do loài muỗi khác nhau','B. Do vị trí nông – sâu của tà phục bán biểu bán lý','C. Do mùa phát bệnh','D. Do tuổi bệnh nhân'],ans:'B',exp:`YHCT giải thích bằng vị trí nông-sâu của tà phục: tà sâu thì chu kỳ dài và khó khỏi. (YHHĐ: do thời gian schizogony của từng loài.)`,key:`Nông-sâu của tà → chu kỳ ngắn-dài.`},
  {id:41,topic:'Khái niệm & Lịch sử',bloom:'Nhớ',scenario:'',stem:`Ngược tật phát nhiều nhất vào mùa nào?`,opts:['A. Đông – xuân','B. Hè – thu','C. Xuân','D. Phân bố đều quanh năm'],ans:'B',exp:`Bệnh có thể phát quanh năm nhưng gặp nhiều nhất vào hè-thu, kèm tính khu vực (chướng ngược ở rừng núi).`,key:`Ngược tật phát nhiều hè-thu.`},
  {id:42,topic:'Chẩn đoán & Phân biệt',bloom:'Hiểu',scenario:'',stem:`Định vị bát cương của ngược tật điển hình là?`,opts:['A. Biểu thực hàn','B. Bán biểu bán lý, hàn nhiệt vãng lai','C. Lý thực nhiệt','D. Lý hư hàn'],ans:'B',exp:`Ngược tật điển hình ở bán biểu bán lý với hàn nhiệt vãng lai; sơ khởi thực, lâu ngày chuyển hư-thực thác tạp.`,key:`Bát cương: bán biểu bán lý, hàn nhiệt vãng lai.`},
  {id:43,topic:'Biện chứng 8 thể',bloom:'Đánh giá',scenario:`BN ngược tật kéo dài, nay vừa còn cơn vừa mệt mỏi, ăn kém, sút cân.`,stem:`Khi chuyển "chính hư tà luyến", pháp trị ưu tiên là?`,opts:['A. Công hạ mạnh trục tà','B. Phò chính khứ tà, tiêu bản kiêm cố','C. Phát hãn giải biểu mạnh','D. Thanh nhiệt lương huyết đơn thuần'],ans:'B',exp:`Giai đoạn chính hư tà luyến cần vừa nâng chính vừa trừ tà (tiêu bản kiêm cố); công hạ/phát hãn mạnh sẽ làm hao chính thêm.`,key:`Chính hư tà luyến → phò chính khứ tà.`},
  {id:44,topic:'Cơ chế YHHĐ',bloom:'Nhớ',scenario:'',stem:`Loài Plasmodium gây sốt hằng ngày (quotidian, chu kỳ 24 giờ)?`,opts:['A. P. malariae','B. P. knowlesi','C. P. ovale','D. P. vivax'],ans:'B',exp:`P. knowlesi có schizogony 24h → sốt quotidian; là loài lây từ khỉ, có thể diễn tiến nặng nhanh.`,key:`Quotidian 24h = P. knowlesi.`},
  {id:45,topic:'Tích hợp Đông-Tây',bloom:'Đánh giá',scenario:'',stem:`Phát hiện artemisinin (Nobel Y học 2015, Đồ U U) lấy cảm hứng từ y văn cổ nào?`,opts:['A. Hoàng đế Nội kinh','B. Trửu hậu bị cấp phương (Cát Hồng)','C. Thương hàn luận','D. Bản thảo cương mục'],ans:'B',exp:`Câu "thanh hao một nắm, vắt nước uống" trong Trửu hậu bị cấp phương gợi ý chiết lạnh, dẫn Đồ U U tới artemisinin.`,key:`Cát Hồng → chiết lạnh → artemisinin.`},
  {id:46,topic:'Bài thuốc',bloom:'Phân tích',scenario:`BN chính ngược nhưng nhiệt nặng, khát nhiều, mồ hôi nhiều.`,stem:`Gia thêm vị nào hợp lý nhất vào Tiểu sài hồ thang?`,opts:['A. Phụ tử, Can khương','B. Thạch cao, Tri mẫu, Hoa phấn','C. Ma hoàng, Quế chi','D. Đại hoàng, Mang tiêu'],ans:'B',exp:`Nhiệt nặng + khát + nhiều mồ hôi → gia Thạch cao, Tri mẫu, Hoa phấn để thanh nhiệt sinh tân. Phụ tử/Can khương là ôn (sai); Đại hoàng/Mang tiêu cho táo kết phủ thực.`,key:`Nhiệt nặng khát → +Thạch cao, Tri mẫu, Hoa phấn.`},
  {id:47,topic:'Bài thuốc',bloom:'Phân tích',scenario:`BN chính ngược, hiện tượng hàn hơi nặng, ít mồ hôi, các khớp đau nhức.`,stem:`Gia vị nào phù hợp nhất?`,opts:['A. Quế chi','B. Thạch cao','C. Hoàng liên','D. Sinh địa'],ans:'A',exp:`Hàn nặng, ít mồ hôi, đau khớp → gia Quế chi để ôn thông giải biểu. Thạch cao/Hoàng liên/Sinh địa đều hàn lương, không phù hợp.`,key:`Hàn nặng đau khớp → +Quế chi.`},
  {id:48,topic:'Điều trị & Dự phòng',bloom:'Áp dụng',scenario:`BN ngược tật thể não, sốt cao, hôn mê, hiện tượng nhiệt nổi trội.`,stem:`Xử trí YHCT phù hợp nhất?`,opts:['A. Tô hợp hương hoàn (ôn khai)','B. "Tam bảo" (An cung/Tử tuyết/Chí bảo) phối Thanh hao tố','C. Tiểu sài hồ thang đơn thuần','D. Bổ trung ích khí thang'],ans:'B',exp:`Hôn mê do nhiệt nổi trội → dùng "Tam bảo" thanh nhiệt khai khiếu; Thanh hao tố (artemisinin) rất tốt cho sốt rét thể não. Tô hợp hương hoàn dành cho thấp đàm uế trọc (ôn khai).`,key:`Hôn mê nhiệt trội → Tam bảo + thanh hao tố.`},
  {id:49,topic:'Điều trị & Dự phòng',bloom:'Áp dụng',scenario:`BN ngược tật hôn mê nhưng thấp đàm uế trọc nổi trội: rêu lưỡi trắng nề, đàm nhiều.`,stem:`Phương khai khiếu phù hợp nhất?`,opts:['A. Tử tuyết đơn','B. Tô hợp hương hoàn (ôn khai)','C. An cung ngưu hoàng hoàn','D. Bạch hổ thang'],ans:'B',exp:`Thấp đàm uế trọc mông bịt tâm khiếu → Tô hợp hương hoàn (phương hương ôn khai). Tam bảo (Tử tuyết/An cung) thuộc lương khai, dùng khi nhiệt trội.`,key:`Thấp đàm uế trọc → Tô hợp hương hoàn (ôn khai).`},
  {id:50,topic:'Điều trị & Dự phòng',bloom:'Hiểu',scenario:'',stem:`Biện pháp dự phòng ngược tật theo tài liệu là?`,opts:['A. Chỉ uống thuốc khi đang sốt','B. Diệt muỗi/khống chế ổ bệnh + điều trị triệt căn giai đoạn ngưng phát','C. Cách ly tuyệt đối bệnh nhân','D. Tiêm vaccine bắt buộc cho toàn dân'],ans:'B',exp:`Dự phòng: khống chế vật mang mầm bệnh, diệt muỗi; điều trị triệt để, đặc biệt điều trị triệt căn ở giai đoạn ngưng phát; nâng cao thể chất; vùng dịch dùng thuốc phòng.`,key:`Diệt muỗi + điều trị triệt căn giai đoạn ngưng phát.`}
];

let fcFlipped = 0;
let mcqAnswered = 0, mcqCorrect = 0;
let fcFilter = 'Tất cả', mcqFilter = 'Tất cả';

function initCounts(){
  document.getElementById('tab-btn-fc').textContent = '🃏 ' + flashcards.length + ' Flashcard';
  document.getElementById('tab-btn-mcq').textContent = '📝 ' + mcqs.length + ' MCQ (SBA)';
  document.getElementById('fc-total').textContent = flashcards.length;
  document.getElementById('fc-topics').textContent = TOPICS.length;
  document.getElementById('mcq-total').textContent = mcqs.length;
}

function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===(t==='fc'?0:1)));
  document.getElementById('tab-fc').classList.toggle('active',t==='fc');
  document.getElementById('tab-mcq').classList.toggle('active',t==='mcq');
}

function buildFilters(containerId, filterVar, onChangeFn){
  const c = document.getElementById(containerId);
  const cats = ['Tất cả',...TOPICS];
  c.innerHTML = '';
  cats.forEach(function(t){
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (t === filterVar ? ' active' : '');
    btn.textContent = t;
    btn.onclick = function(){ onChangeFn(t); };
    c.appendChild(btn);
  });
}

function renderFlashcards(){ buildFilters('fc-filters', fcFilter, fcSetFilter); renderFCGrid(); }
function fcSetFilter(t){ fcFilter = t; buildFilters('fc-filters', fcFilter, fcSetFilter); renderFCGrid(); }

function renderFCGrid(){
  const grid = document.getElementById('fc-grid');
  const cards = fcFilter === 'Tất cả' ? flashcards : flashcards.filter(function(c){ return c.topic === fcFilter; });
  grid.innerHTML = cards.map(function(c){
    return '<div class="card-wrap' + (c.tall ? ' tall' : '') + '" id="fc-' + c.id + '" onclick="flipCard(' + c.id + ')">' +
      '<div class="card-inner">' +
        '<div class="card-face card-front">' +
          '<div class="card-topic" style="color:' + COLORS[c.topic] + '">' + c.topic + ' • Thẻ ' + c.id + '</div>' +
          '<div class="card-q">' + c.q + '</div>' +
          '<div class="card-hint">Chạm để xem đáp án →</div>' +
        '</div>' +
        '<div class="card-face card-back">' +
          '<div class="card-topic" style="color:' + COLORS[c.topic] + '">' + c.topic + ' • Đáp án</div>' +
          '<div class="card-a">' + c.a + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function flipCard(id){
  const el = document.getElementById('fc-'+id);
  const wasFlipped = el.classList.contains('flipped');
  el.classList.toggle('flipped');
  if(!wasFlipped){ fcFlipped++; document.getElementById('fc-flipped').textContent = fcFlipped; }
}

function renderMCQ(){ buildFilters('mcq-filters', mcqFilter, mcqSetFilter); renderMCQList(); }
function mcqSetFilter(t){ mcqFilter = t; buildFilters('mcq-filters', mcqFilter, mcqSetFilter); renderMCQList(); }

function renderMCQList(){
  const list = document.getElementById('mcq-list');
  const qs = mcqFilter === 'Tất cả' ? mcqs : mcqs.filter(function(q){ return q.topic === mcqFilter; });
  list.innerHTML = qs.map(function(q){
    const scenario = q.scenario ? '<div class="q-scenario">📋 ' + q.scenario + '</div>' : '';
    const opts = q.opts.map(function(o, i){
      return '<div class="option" id="opt-' + q.id + '-' + i + '" onclick="selectOpt(' + q.id + ',' + i + ')">' +
        '<span class="opt-label">' + String.fromCharCode(65+i) + '.</span>' +
        '<span class="opt-text">' + o.substring(3) + '</span>' +
      '</div>';
    }).join('');
    return '<div class="question-card" id="qcard-' + q.id + '">' +
      '<div class="q-header">' +
        '<span class="q-num">Câu ' + q.id + '</span>' +
        '<span class="q-topic-tag" style="border-left:3px solid ' + COLORS[q.topic] + ';padding-left:8px">' + q.topic + '</span>' +
        '<span class="q-bloom">' + q.bloom + '</span>' +
      '</div>' +
      scenario +
      '<div class="q-stem">' + q.stem + '</div>' +
      '<div class="options">' + opts + '</div>' +
      '<button class="reveal-btn" id="rbtn-' + q.id + '" onclick="revealAns(' + q.id + ')">Xem đáp án</button>' +
      '<div class="explanation" id="exp-' + q.id + '">' +
        '<div class="exp-correct">✓ Đáp án đúng: ' + q.ans + '</div>' +
        '<div class="exp-text">' + q.exp + '</div>' +
        '<div class="exp-key">💡 Key: ' + q.key + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function selectOpt(qid, optIdx){
  const q = mcqs.find(function(x){ return x.id === qid; });
  const card = document.getElementById('qcard-'+qid);
  if(card.classList.contains('correct') || card.classList.contains('wrong')) return;
  q.opts.forEach(function(_,i){ document.getElementById('opt-'+qid+'-'+i).classList.remove('selected'); });
  document.getElementById('opt-'+qid+'-'+optIdx).classList.add('selected');
}

function revealAns(qid){
  const q = mcqs.find(function(x){ return x.id === qid; });
  const card = document.getElementById('qcard-'+qid);
  if(card.classList.contains('correct') || card.classList.contains('wrong')) return;
  const correctIdx = q.ans.charCodeAt(0) - 65;
  const selectedEl = document.querySelector('#qcard-'+qid+' .option.selected');
  let selectedIdx = -1;
  if(selectedEl) selectedIdx = parseInt(selectedEl.id.split('-')[2]);
  q.opts.forEach(function(_,i){
    const opt = document.getElementById('opt-'+qid+'-'+i);
    opt.classList.add('disabled');
    if(i === correctIdx) opt.classList.add('correct-ans');
    else if(i === selectedIdx) opt.classList.add('wrong-ans');
  });
  const isCorrect = selectedIdx === correctIdx;
  card.classList.add(isCorrect ? 'correct' : 'wrong');
  document.getElementById('exp-'+qid).classList.add('show');
  document.getElementById('rbtn-'+qid).disabled = true;
  mcqAnswered++;
  if(isCorrect) mcqCorrect++;
  updateMCQStats();
}

function updateMCQStats(){
  const total = mcqs.length;
  document.getElementById('mcq-answered').textContent = mcqAnswered;
  document.getElementById('mcq-correct-count').textContent = mcqCorrect;
  const pct = mcqAnswered > 0 ? Math.round(mcqCorrect / mcqAnswered * 100) : 0;
  document.getElementById('mcq-pct').textContent = pct + '%';
  document.getElementById('mcq-bar').style.width = (total > 0 ? mcqAnswered / total * 100 : 0) + '%';
}

function resetMCQ(){ mcqAnswered = 0; mcqCorrect = 0; updateMCQStats(); renderMCQList(); }

initCounts();
renderFlashcards();
renderMCQ();
</script>
