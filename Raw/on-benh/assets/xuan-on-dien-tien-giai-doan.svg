<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
    <marker id="arr-down" markerWidth="7" markerHeight="10" refX="3.5" refY="10" orient="auto">
      <polygon points="0 0, 7 0, 3.5 10" fill="#6B7280"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#DC2626"/>
    </marker>
  </defs>

  <rect width="900" height="640" fill="#F8FAFC" rx="12"/>
  <text x="450" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">XUÂN ÔN — DIỄN TIẾN BỆNH THEO GIAI ĐOẠN</text>

  <!-- ===== STAGE HEADERS ===== -->
  <!-- Stage 1: Sơ kỳ - Khí phần -->
  <rect x="20" y="48" width="190" height="48" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="115" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">SƠ KỲ</text>
  <text x="115" y="86" text-anchor="middle" font-size="11" fill="#78350F">Khí phần (氣分)</text>

  <line x1="210" y1="72" x2="238" y2="72" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Stage 2: Dương minh -->
  <rect x="240" y="48" width="190" height="48" rx="10" fill="#FFEDD5" stroke="#F97316" stroke-width="2"/>
  <text x="335" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#C2410C">PHÁT TRIỂN</text>
  <text x="335" y="86" text-anchor="middle" font-size="11" fill="#9A3412">Dương minh tích nhiệt</text>

  <line x1="430" y1="72" x2="458" y2="72" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Stage 3: Dinh huyết -->
  <rect x="460" y="48" width="190" height="48" rx="10" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="555" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#9D174D">NẶNG</text>
  <text x="555" y="86" text-anchor="middle" font-size="11" fill="#831843">Dinh huyết phần (営血分)</text>

  <line x1="650" y1="72" x2="678" y2="72" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Stage 4: Hậu kỳ -->
  <rect x="680" y="48" width="200" height="48" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="780" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#15803D">HẬU KỲ</text>
  <text x="780" y="86" text-anchor="middle" font-size="11" fill="#166534">Tà ít hư nhiều / Hồi phục</text>

  <!-- ===== COLUMN DIVIDERS ===== -->
  <line x1="215" y1="105" x2="215" y2="595" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4"/>
  <line x1="435" y1="105" x2="435" y2="595" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4"/>
  <line x1="655" y1="105" x2="655" y2="595" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4"/>

  <!-- ===== COLUMN 1: SƠ KỲ ===== -->
  <!-- Sub-type 1a -->
  <rect x="22" y="112" width="186" height="85" rx="8" fill="#FEF9C3" stroke="#EAB308" stroke-width="1.5"/>
  <text x="115" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#713F12">Khí phần uất nhiệt</text>
  <line x1="30" y1="136" x2="200" y2="136" stroke="#EAB308" stroke-width="0.5"/>
  <text x="115" y="150" text-anchor="middle" font-size="10" fill="#78350F">• Sốt cao, miệng đắng, khát</text>
  <text x="115" y="164" text-anchor="middle" font-size="10" fill="#78350F">• Lưỡi đỏ rêu vàng, mạch huyền</text>
  <text x="34" y="183" font-size="10" fill="#166534" font-weight="600">Rx: Hoàng cầm thang / Chi tử xị</text>

  <!-- Sub-type 1b -->
  <rect x="22" y="205" width="186" height="80" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="115" y="223" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">Biểu hàn lý nhiệt</text>
  <line x1="30" y1="229" x2="200" y2="229" stroke="#3B82F6" stroke-width="0.5"/>
  <text x="115" y="244" text-anchor="middle" font-size="10" fill="#1E3A8A">• Sốt + ố hàn + đầu gáy cứng</text>
  <text x="115" y="258" text-anchor="middle" font-size="10" fill="#1E3A8A">• Rêu vàng, bụng trướng</text>
  <text x="34" y="275" font-size="10" fill="#166534" font-weight="600">Rx: Tăng tổn song giải tán</text>

  <!-- Sub-type 1c -->
  <rect x="22" y="293" width="186" height="80" rx="8" fill="#FDF4FF" stroke="#A855F7" stroke-width="1.5"/>
  <text x="115" y="311" text-anchor="middle" font-size="11" font-weight="700" fill="#7E22CE">Vệ dinh đồng bệnh</text>
  <line x1="30" y1="317" x2="200" y2="317" stroke="#A855F7" stroke-width="0.5"/>
  <text x="115" y="332" text-anchor="middle" font-size="10" fill="#6B21A8">• Sốt + đau họng + ban lờ mờ</text>
  <text x="115" y="346" text-anchor="middle" font-size="10" fill="#6B21A8">• Lưỡi đỏ thẫm, rêu vàng trắng</text>
  <text x="34" y="363" font-size="10" fill="#166534" font-weight="600">Rx: Ngân kiều tán gia giảm</text>

  <!-- ===== COLUMN 2: DƯƠNG MINH ===== -->
  <!-- 2a -->
  <rect x="242" y="112" width="186" height="80" rx="8" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="335" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#9A3412">Nhiệt tích tân thương</text>
  <line x1="250" y1="136" x2="420" y2="136" stroke="#F97316" stroke-width="0.5"/>
  <text x="335" y="151" text-anchor="middle" font-size="10" fill="#7C2D12">• Sốt rất cao, mặt đỏ, nhiều MH</text>
  <text x="335" y="165" text-anchor="middle" font-size="10" fill="#7C2D12">• Khát, mạch hồng đại</text>
  <text x="252" y="181" font-size="10" fill="#166534" font-weight="600">Rx: Bạch hổ thang gia vị</text>

  <!-- 2b -->
  <rect x="242" y="200" width="186" height="80" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="335" y="218" text-anchor="middle" font-size="11" font-weight="700" fill="#B91C1C">Nhiệt thịnh động phong</text>
  <line x1="250" y1="224" x2="420" y2="224" stroke="#EF4444" stroke-width="0.5"/>
  <text x="335" y="239" text-anchor="middle" font-size="10" fill="#991B1B">• Sốt cao + co giật</text>
  <text x="335" y="253" text-anchor="middle" font-size="10" fill="#991B1B">• Cổ gáy cứng, thần hôn</text>
  <text x="252" y="270" font-size="10" fill="#166534" font-weight="600">Rx: Linh giác câu đẳng thang</text>

  <!-- 2c -->
  <rect x="242" y="288" width="186" height="85" rx="8" fill="#FFF1F2" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="335" y="306" text-anchor="middle" font-size="11" font-weight="700" fill="#9F1239">Nhiệt kết trường phủ</text>
  <line x1="250" y1="312" x2="420" y2="312" stroke="#F43F5E" stroke-width="0.5"/>
  <text x="335" y="327" text-anchor="middle" font-size="10" fill="#881337">• Táo bón, bụng đầy, rêu cháy</text>
  <text x="335" y="341" text-anchor="middle" font-size="10" fill="#881337">• Mạch trầm, âm dịch hao</text>
  <text x="252" y="357" font-size="10" fill="#166534" font-weight="600">Rx: Tăng dịch thừa khí thang</text>
  <text x="252" y="368" font-size="10" fill="#166534" font-weight="600">    / Tân gia hoàng long thang</text>

  <!-- ===== COLUMN 3: DINH HUYẾT ===== -->
  <!-- 3a -->
  <rect x="462" y="112" width="186" height="80" rx="8" fill="#FDF2F8" stroke="#EC4899" stroke-width="1.5"/>
  <text x="555" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#9D174D">Khí dinh lưỡng phiên</text>
  <line x1="470" y1="136" x2="640" y2="136" stroke="#EC4899" stroke-width="0.5"/>
  <text x="555" y="151" text-anchor="middle" font-size="10" fill="#831843">• Sốt cao + phát ban + nục huyết</text>
  <text x="555" y="165" text-anchor="middle" font-size="10" fill="#831843">• Lưỡi đỏ thẫm, rêu vàng</text>
  <text x="472" y="181" font-size="10" fill="#166534" font-weight="600">Rx: Hóa ban thang / Thanh ôn bại độc</text>

  <!-- 3b -->
  <rect x="462" y="200" width="186" height="80" rx="8" fill="#450A0A" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
  <text x="555" y="218" text-anchor="middle" font-size="11" font-weight="700" fill="#7F1D1D">Nhiệt thịnh động huyết</text>
  <line x1="470" y1="224" x2="640" y2="224" stroke="#DC2626" stroke-width="0.5"/>
  <text x="555" y="239" text-anchor="middle" font-size="10" fill="#7F1D1D">• Ban dày · thổ/nục/tiện huyết</text>
  <text x="555" y="253" text-anchor="middle" font-size="10" fill="#7F1D1D">• Hôn cuồng, mạch sắc</text>
  <text x="472" y="270" font-size="10" fill="#166534" font-weight="600">Rx: Tê giác địa hoàng thang</text>

  <!-- 3c: Nhiệt nhập tâm bào -->
  <rect x="462" y="288" width="186" height="80" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
  <text x="555" y="306" text-anchor="middle" font-size="11" font-weight="700" fill="#5B21B6">Nhiệt nhập tâm bào</text>
  <line x1="470" y1="312" x2="640" y2="312" stroke="#7C3AED" stroke-width="0.5"/>
  <text x="555" y="327" text-anchor="middle" font-size="10" fill="#4C1D95">• Thần hôn, lưỡi rụt, tứ chi lạnh</text>
  <text x="555" y="341" text-anchor="middle" font-size="10" fill="#4C1D95">• Đàm úng, mạch huyền hoạt</text>
  <text x="472" y="357" font-size="10" fill="#166534" font-weight="600">Rx: Thanh cung thang +</text>
  <text x="472" y="368" font-size="10" fill="#166534" font-weight="600">     An cung ngưu hoàng hoàn</text>

  <!-- ===== COLUMN 4: HẬU KỲ ===== -->
  <!-- 4a -->
  <rect x="662" y="112" width="226" height="80" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="775" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#15803D">Chân âm khuy tổn</text>
  <line x1="670" y1="136" x2="880" y2="136" stroke="#22C55E" stroke-width="0.5"/>
  <text x="775" y="151" text-anchor="middle" font-size="10" fill="#166534">• Sốt nhẹ dai dẳng, lòng bàn tay nóng</text>
  <text x="775" y="165" text-anchor="middle" font-size="10" fill="#166534">• Lưỡi đỏ thẫm khô, mạch hư</text>
  <text x="672" y="181" font-size="10" fill="#166534" font-weight="600">Rx: Gia giảm Phục mạch thang</text>

  <!-- 4b -->
  <rect x="662" y="200" width="226" height="80" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="775" y="218" text-anchor="middle" font-size="11" font-weight="700" fill="#065F46">Âm hư phong động</text>
  <line x1="670" y1="224" x2="880" y2="224" stroke="#10B981" stroke-width="0.5"/>
  <text x="775" y="239" text-anchor="middle" font-size="10" fill="#064E3B">• Run ngón tay, mắt trợn ngược</text>
  <text x="775" y="253" text-anchor="middle" font-size="10" fill="#064E3B">• Răng đen, lưỡi tím đen như gan</text>
  <text x="672" y="270" font-size="10" fill="#166534" font-weight="600">Rx: Tam giáp / Đại định phong châu</text>

  <!-- 4c -->
  <rect x="662" y="288" width="226" height="85" rx="8" fill="#F0FFF4" stroke="#4ADE80" stroke-width="1.5"/>
  <text x="775" y="306" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Tà lưu âm phần</text>
  <line x1="670" y1="312" x2="880" y2="312" stroke="#4ADE80" stroke-width="0.5"/>
  <text x="775" y="327" text-anchor="middle" font-size="10" fill="#166534">• Đêm sốt, sáng mát, không MH</text>
  <text x="775" y="341" text-anchor="middle" font-size="10" fill="#166534">• Ăn được nhưng gầy, mạch trầm</text>
  <text x="672" y="357" font-size="10" fill="#166534" font-weight="600">Rx: Thanh hao miết giáp thang</text>
  <text x="672" y="368" font-size="10" fill="#166534" font-weight="600">     (Tư âm + sơ tà thấu lạc)</text>

  <!-- ===== CRITICAL: TÀ HÃM CHÍNH SUY (bottom) ===== -->
  <rect x="22" y="395" width="856" height="100" rx="10" fill="#1C1917" stroke="#DC2626" stroke-width="2.5"/>
  <text x="450" y="420" text-anchor="middle" font-size="14" font-weight="700" fill="#FCA5A5">⚠ TÀ HÃM CHÍNH SUY — NGUY KỊCH (邪陷正衰)</text>
  <line x1="30" y1="428" x2="870" y2="428" stroke="#DC2626" stroke-width="0.5"/>
  <text x="175" y="448" text-anchor="middle" font-size="11" fill="#FED7AA" font-weight="600">Dương hư tà hãm</text>
  <text x="175" y="462" text-anchor="middle" font-size="10" fill="#FCA5A5">Nhiệt độ hạ đột · MH lạnh đầm dề</text>
  <text x="175" y="476" text-anchor="middle" font-size="10" fill="#FCA5A5">→ Sâm phụ long mẫu thang</text>
  <text x="450" y="448" text-anchor="middle" font-size="11" fill="#FED7AA" font-weight="600">Nhiệt bế huyết thoát</text>
  <text x="450" y="462" text-anchor="middle" font-size="10" fill="#FCA5A5">Ban dày toàn thân · móng tay xanh</text>
  <text x="450" y="476" text-anchor="middle" font-size="10" fill="#FCA5A5">→ Thanh ôn bại độc + Sinh mạch tán</text>
  <text x="730" y="448" text-anchor="middle" font-size="11" fill="#FED7AA" font-weight="600">Dương khí bạo thoát</text>
  <text x="730" y="462" text-anchor="middle" font-size="10" fill="#FCA5A5">Mạch vi tế muốn tuyệt · da hoa văn</text>
  <text x="730" y="476" text-anchor="middle" font-size="10" fill="#FCA5A5">→ Hồi dương cứu nghịch thang</text>
  <line x1="308" y1="430" x2="308" y2="488" stroke="#6B7280" stroke-width="0.5"/>
  <line x1="590" y1="430" x2="590" y2="488" stroke="#6B7280" stroke-width="0.5"/>

  <!-- Trend arrow: nặng dần -->
  <rect x="22" y="508" width="856" height="30" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="85" y="521" font-size="10" fill="#92400E" font-weight="600">NHẸ</text>
  <line x1="110" y1="523" x2="745" y2="523" stroke="#F59E0B" stroke-width="2" marker-end="url(#arr)"/>
  <text x="760" y="521" font-size="10" fill="#B91C1C" font-weight="700">NẶNG</text>
  <text x="450" y="521" text-anchor="middle" font-size="10" fill="#78350F">— Tà xâm sâu · Âm hao · Chính suy — Bệnh tiến triển từ khí → dinh → huyết —</text>
  <text x="22" y="538" font-size="9" fill="#92400E">KHÍ</text>
  <text x="240" y="538" text-anchor="middle" font-size="9" fill="#B45309">DƯƠNG MINH</text>
  <text x="555" y="538" text-anchor="middle" font-size="9" fill="#BE185D">DINH HUYẾT / TÂM BÀO</text>
  <text x="770" y="538" text-anchor="middle" font-size="9" fill="#15803D">HẬU KỲ</text>

  <!-- Footer -->
  <text x="450" y="625" text-anchor="middle" font-size="10" fill="#9CA3AF">Nguồn: Giáo trình Ôn Bệnh — TS.BS. Lê Minh Hoàng; BS. CKII. Lê Thị Ngoan</text>
</svg>
