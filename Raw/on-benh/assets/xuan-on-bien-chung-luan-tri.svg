<svg viewBox="0 0 880 720" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#6B7280"/></marker>
    <marker id="ar" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#DC2626"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#16A34A"/></marker>
  </defs>

  <rect width="880" height="720" fill="#F8FAFC" rx="12"/>
  <text x="440" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">XUÂN ÔN — CÂY QUYẾT ĐỊNH BIỆN CHỨNG LUẬN TRỊ</text>

  <!-- ROOT: Sốt cấp tính mùa xuân -->
  <rect x="290" y="42" width="300" height="48" rx="10" fill="#1F2937" stroke="#374151"/>
  <text x="440" y="62" text-anchor="middle" font-size="13" font-weight="700" fill="white">XUÂN ÔN — Sốt cấp tính</text>
  <text x="440" y="80" text-anchor="middle" font-size="11" fill="#9CA3AF">Lý nhiệt tích thịnh · Phát bệnh nhanh</text>

  <!-- Branch: Có biểu chứng không? -->
  <line x1="440" y1="90" x2="440" y2="110" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="300" y="112" width="280" height="36" rx="8" fill="#E5E7EB" stroke="#9CA3AF"/>
  <text x="440" y="135" text-anchor="middle" font-size="12" fill="#374151">Có kèm biểu chứng không?</text>

  <!-- Left branch: Có biểu -->
  <line x1="370" y1="148" x2="200" y2="182" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="260" y="168" text-anchor="middle" font-size="10" fill="#1D4ED8">CÓ (ố hàn, đau đầu)</text>

  <!-- Right branch: Không biểu -->
  <line x1="510" y1="148" x2="650" y2="182" stroke="#EF4444" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="600" y="168" text-anchor="middle" font-size="10" fill="#B91C1C">KHÔNG (thuần lý nhiệt)</text>

  <!-- Left sub: Biểu hàn lý nhiệt -->
  <rect x="60" y="182" width="270" height="50" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="195" y="201" text-anchor="middle" font-size="12" font-weight="600" fill="#1D4ED8">Biểu hàn LÝ nhiệt</text>
  <text x="195" y="220" text-anchor="middle" font-size="10" fill="#1E40AF">→ Tăng tổn song giải tán</text>

  <!-- Left sub2: Vệ dinh -->
  <rect x="60" y="242" width="270" height="50" rx="8" fill="#FDF4FF" stroke="#A855F7" stroke-width="1.5"/>
  <text x="195" y="261" text-anchor="middle" font-size="12" font-weight="600" fill="#7E22CE">Vệ dinh đồng bệnh</text>
  <text x="195" y="279" text-anchor="middle" font-size="10" fill="#6B21A8">→ Ngân kiều tán gia Sinh địa, Đơn bì</text>
  <line x1="195" y1="232" x2="195" y2="242" stroke="#A855F7" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="145" y="239" font-size="9" fill="#7E22CE">+ ban lờ mờ, đau họng</text>

  <!-- Right: Thuần lý nhiệt - which level? -->
  <rect x="550" y="182" width="290" height="36" rx="8" fill="#E5E7EB" stroke="#9CA3AF"/>
  <text x="695" y="205" text-anchor="middle" font-size="12" fill="#374151">Tà ở tầng nào?</text>

  <!-- Branches from tầng -->
  <!-- KHÍ PHẦN -->
  <line x1="600" y1="218" x2="560" y2="248" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="550" y="240" text-anchor="end" font-size="9" fill="#92400E">Khí phần</text>

  <rect x="460" y="250" width="195" height="62" rx="8" fill="#FEF9C3" stroke="#EAB308" stroke-width="1.5"/>
  <text x="558" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#713F12">Khí phần uất nhiệt</text>
  <line x1="470" y1="275" x2="650" y2="275" stroke="#EAB308" stroke-width="0.5"/>
  <text x="558" y="287" text-anchor="middle" font-size="9" fill="#78350F">Đờm phủ → Hoàng cầm thang</text>
  <text x="558" y="300" text-anchor="middle" font-size="9" fill="#78350F">Hung cách → Chi tử xị / Lương cách</text>

  <!-- DƯƠNG MINH -->
  <line x1="695" y1="218" x2="695" y2="248" stroke="#F97316" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="720" y="237" font-size="9" fill="#C2410C">Dương minh</text>

  <rect x="660" y="250" width="200" height="104" rx="8" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="760" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#9A3412">Dương minh tích nhiệt</text>
  <line x1="668" y1="273" x2="852" y2="273" stroke="#F97316" stroke-width="0.5"/>
  <text x="760" y="287" text-anchor="middle" font-size="9" fill="#7C2D12">Tân thương → Bạch hổ thang</text>
  <text x="760" y="300" text-anchor="middle" font-size="9" fill="#7C2D12">Động phong → Linh giác câu đẳng</text>
  <text x="760" y="313" text-anchor="middle" font-size="9" fill="#7C2D12">Nhiệt kết phủ:</text>
  <text x="760" y="326" text-anchor="middle" font-size="9" fill="#7C2D12">Tăng dịch thừa khí / Tân gia HL</text>
  <text x="760" y="339" text-anchor="middle" font-size="9" fill="#7C2D12">Đạo xích thừa khí (tiểu trường nhiệt)</text>

  <!-- DINH HUYẾT -->
  <line x1="790" y1="218" x2="830" y2="248" stroke="#EF4444" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- MID SECTION: Dinh huyết & Tâm bào -->
  <!-- Section header -->
  <rect x="30" y="318" width="820" height="22" rx="4" fill="#FEE2E2"/>
  <text x="440" y="333" text-anchor="middle" font-size="11" font-weight="700" fill="#B91C1C">GIAI ĐOẠN NẶNG — Dinh Huyết / Tâm Bào (営血分 / 心包)</text>

  <!-- 4 boxes in row -->
  <!-- Box A: Khí dinh lưỡng phiên -->
  <rect x="30" y="348" width="180" height="82" rx="8" fill="#FDF2F8" stroke="#EC4899" stroke-width="1.5"/>
  <text x="120" y="365" text-anchor="middle" font-size="10" font-weight="700" fill="#9D174D">Khí dinh lưỡng phiên</text>
  <line x1="38" y1="371" x2="202" y2="371" stroke="#EC4899" stroke-width="0.5"/>
  <text x="120" y="383" text-anchor="middle" font-size="9" fill="#831843">Ban lờ + sốt cao + nục</text>
  <text x="120" y="395" text-anchor="middle" font-size="9" fill="#831843">Lưỡi đỏ thẫm rêu vàng</text>
  <line x1="38" y1="403" x2="202" y2="403" stroke="#EC4899" stroke-width="0.5"/>
  <text x="120" y="415" text-anchor="middle" font-size="9" fill="#9D174D" font-weight="600">→ Hóa ban thang</text>
  <text x="120" y="426" text-anchor="middle" font-size="9" fill="#9D174D" font-weight="600">→ Thanh ôn bại độc ẩm</text>

  <!-- Box B: Nhiệt thịnh động huyết -->
  <rect x="220" y="348" width="190" height="82" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
  <text x="315" y="365" text-anchor="middle" font-size="10" font-weight="700" fill="#7F1D1D">Nhiệt thịnh động huyết</text>
  <line x1="228" y1="371" x2="402" y2="371" stroke="#DC2626" stroke-width="0.5"/>
  <text x="315" y="383" text-anchor="middle" font-size="9" fill="#7F1D1D">Ban dày · thổ/nục/tiện huyết</text>
  <text x="315" y="395" text-anchor="middle" font-size="9" fill="#7F1D1D">Hôn cuồng, lưỡi đỏ thâm</text>
  <line x1="228" y1="403" x2="402" y2="403" stroke="#DC2626" stroke-width="0.5"/>
  <text x="315" y="415" text-anchor="middle" font-size="9" fill="#B91C1C" font-weight="600">→ Tê giác địa hoàng thang</text>
  <text x="315" y="426" text-anchor="middle" font-size="9" fill="#B91C1C" font-weight="600">  (Thủy ngưu giác thay thế)</text>

  <!-- Box C: Nhiệt huyết kết -->
  <rect x="420" y="348" width="185" height="82" rx="8" fill="#FFF1F2" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="513" y="365" text-anchor="middle" font-size="10" font-weight="700" fill="#9F1239">Nhiệt + Huyết kết</text>
  <line x1="428" y1="371" x2="597" y2="371" stroke="#F43F5E" stroke-width="0.5"/>
  <text x="513" y="383" text-anchor="middle" font-size="9" fill="#881337">Bụng dưới cứng + thần cuồng</text>
  <text x="513" y="395" text-anchor="middle" font-size="9" fill="#881337">Lưỡi tím tối · mạch trầm sáp</text>
  <line x1="428" y1="403" x2="597" y2="403" stroke="#F43F5E" stroke-width="0.5"/>
  <text x="513" y="415" text-anchor="middle" font-size="9" fill="#9F1239" font-weight="600">→ Đào nhân thừa khí thang</text>
  <text x="513" y="426" text-anchor="middle" font-size="9" fill="#9F1239" font-weight="600">  (Tiết nhiệt + trục ứ)</text>

  <!-- Box D: Nhiệt nhập tâm bào -->
  <rect x="615" y="348" width="235" height="82" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
  <text x="733" y="365" text-anchor="middle" font-size="10" font-weight="700" fill="#5B21B6">Nhiệt nhập Tâm Bào</text>
  <line x1="623" y1="371" x2="842" y2="371" stroke="#7C3AED" stroke-width="0.5"/>
  <text x="733" y="383" text-anchor="middle" font-size="9" fill="#4C1D95">Thần hôn · đàm úng · lưỡi rụt</text>
  <text x="733" y="395" text-anchor="middle" font-size="9" fill="#4C1D95">Nội bế: mạch huyền hoạt sắc</text>
  <line x1="623" y1="403" x2="842" y2="403" stroke="#7C3AED" stroke-width="0.5"/>
  <text x="733" y="415" text-anchor="middle" font-size="9" fill="#5B21B6" font-weight="600">→ Thanh cung thang</text>
  <text x="733" y="426" text-anchor="middle" font-size="9" fill="#5B21B6" font-weight="600">  + An cung / Tử tuyết / Chí bảo</text>

  <!-- HẬU KỲ section -->
  <rect x="30" y="445" width="820" height="22" rx="4" fill="#F0FDF4"/>
  <text x="440" y="460" text-anchor="middle" font-size="11" font-weight="700" fill="#15803D">HẬU KỲ — Chân âm khuy tổn (下焦真陰虧損)</text>

  <!-- 3 hậu kỳ boxes -->
  <rect x="30" y="474" width="255" height="78" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="158" y="491" text-anchor="middle" font-size="10" font-weight="700" fill="#15803D">Chân âm khuy tổn</text>
  <line x1="38" y1="497" x2="277" y2="497" stroke="#22C55E" stroke-width="0.5"/>
  <text x="158" y="509" text-anchor="middle" font-size="9" fill="#166534">Sốt nhẹ dai dẳng · lòng bàn tay nóng</text>
  <text x="158" y="521" text-anchor="middle" font-size="9" fill="#166534">Họng khô răng đen · mạch hư</text>
  <text x="158" y="538" text-anchor="middle" font-size="9" fill="#15803D" font-weight="600">→ Gia giảm Phục mạch thang</text>
  <text x="158" y="549" text-anchor="middle" font-size="9" fill="#15803D" font-weight="600">  (Tư bổ can thận âm)</text>

  <rect x="298" y="474" width="255" height="78" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="426" y="491" text-anchor="middle" font-size="10" font-weight="700" fill="#065F46">Âm hư phong động</text>
  <line x1="306" y1="497" x2="545" y2="497" stroke="#10B981" stroke-width="0.5"/>
  <text x="426" y="509" text-anchor="middle" font-size="9" fill="#064E3B">Run tay · mắt trợn · co rút</text>
  <text x="426" y="521" text-anchor="middle" font-size="9" fill="#064E3B">Răng đen · lưỡi tím đen như gan</text>
  <text x="426" y="538" text-anchor="middle" font-size="9" fill="#065F46" font-weight="600">→ Tam giáp phục mạch thang</text>
  <text x="426" y="549" text-anchor="middle" font-size="9" fill="#065F46" font-weight="600">→ Đại định phong châu (nặng)</text>

  <rect x="566" y="474" width="284" height="78" rx="8" fill="#F0FFF4" stroke="#4ADE80" stroke-width="1.5"/>
  <text x="708" y="491" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">Tà lưu âm phần / Âm hư hỏa tích</text>
  <line x1="574" y1="497" x2="842" y2="497" stroke="#4ADE80" stroke-width="0.5"/>
  <text x="708" y="509" text-anchor="middle" font-size="9" fill="#166534">Đêm sốt · sáng mát · không MH · gầy</text>
  <text x="708" y="521" text-anchor="middle" font-size="9" fill="#166534">Phiền bức không nằm được · mạch tế sác</text>
  <text x="708" y="538" text-anchor="middle" font-size="9" fill="#15803D" font-weight="600">→ Thanh hao miết giáp (tà lưu)</text>
  <text x="708" y="549" text-anchor="middle" font-size="9" fill="#15803D" font-weight="600">→ Hoàng liên a giao thang (âm hư hỏa)</text>

  <!-- NGUY KỊCH -->
  <rect x="30" y="564" width="820" height="22" rx="4" fill="#450A0A"/>
  <text x="440" y="579" text-anchor="middle" font-size="11" font-weight="700" fill="#FCA5A5">⚠ NGUY KỊCH — Tà hãm chính suy (邪陷正衰)</text>

  <rect x="30" y="594" width="255" height="68" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="158" y="610" text-anchor="middle" font-size="10" font-weight="700" fill="#7F1D1D">Dương hư tà hãm</text>
  <text x="158" y="624" text-anchor="middle" font-size="9" fill="#991B1B">Nhiệt hạ đột · MH lạnh · tứ chi lạnh</text>
  <text x="158" y="637" text-anchor="middle" font-size="9" fill="#991B1B" font-weight="600">→ Sâm phụ long mẫu thang</text>
  <text x="158" y="650" text-anchor="middle" font-size="9" fill="#991B1B" font-weight="600">  + Chí bảo đơn + Tây y chống sốc</text>

  <rect x="298" y="594" width="255" height="68" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="426" y="610" text-anchor="middle" font-size="10" font-weight="700" fill="#7F1D1D">Nhiệt bế huyết thoát</text>
  <text x="426" y="624" text-anchor="middle" font-size="9" fill="#991B1B">Ban toàn thân · móng tay tím</text>
  <text x="426" y="637" text-anchor="middle" font-size="9" fill="#991B1B" font-weight="600">→ Thanh ôn bại độc ẩm</text>
  <text x="426" y="650" text-anchor="middle" font-size="9" fill="#991B1B" font-weight="600">  + Sinh mạch tán gia giảm</text>

  <rect x="566" y="594" width="284" height="68" rx="8" fill="#FEF2F2" stroke="#B91C1C" stroke-width="2"/>
  <text x="708" y="610" text-anchor="middle" font-size="10" font-weight="700" fill="#7F1D1D">Dương khí bạo thoát</text>
  <text x="708" y="624" text-anchor="middle" font-size="9" fill="#991B1B">Mạch vi tế muốn tuyệt · da hoa văn</text>
  <text x="708" y="637" text-anchor="middle" font-size="9" fill="#991B1B" font-weight="600">→ Hồi dương cứu nghịch thang</text>
  <text x="708" y="650" text-anchor="middle" font-size="9" fill="#991B1B" font-weight="600">  + Tây y nâng huyết áp chống sốc</text>

  <!-- Nội bế ngoại thoát note -->
  <rect x="30" y="670" width="820" height="22" rx="4" fill="#EDE9FE"/>
  <text x="440" y="685" text-anchor="middle" font-size="10" fill="#5B21B6" font-weight="600">Nội bế ngoại thoát: Sinh mạch tán / Sâm phụ thang + An cung ngưu hoàng hoàn — Khai bế cố thoát đồng thời</text>

  <!-- Footer -->
  <text x="440" y="712" text-anchor="middle" font-size="9" fill="#9CA3AF">Nguồn: Giáo trình Ôn Bệnh — TS.BS. Lê Minh Hoàng; BS. CKII. Lê Thị Ngoan | Mục đích giáo dục — áp dụng lâm sàng cần cá thể hóa</text>
</svg>
