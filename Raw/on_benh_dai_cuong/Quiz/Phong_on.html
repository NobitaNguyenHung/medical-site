 q:"Điểm đặc trưng để nhận biết nghịch truyền tâm bào trong phong ôn là gì?",
 A:"Sốt cao + táo bón + bụng cứng đau",
 B:"Sốt cao + thần chí dị thường (thần hôn, chiêm ngữ, hoặc hôn mê bất ngữ)",
 C:"Sốt cao + ho suyễn + đàm vàng đặc",
 D:"Sốt thấp + mồ hôi nhiều + tứ chi mềm yếu",
 ans:"B",
 exp:"\"Triệu chứng dứt khoát phải có thần chí dị thường.\" Diệp Thiên Sĩ: \"Ôn tà thượng thụ, thủ tiên phạm phế, nghịch truyền tâm bào.\" Tâm bào nhiệt thịnh → nhiễu loạn thần minh.",
 wa:"Táo bón + bụng cứng là nhiệt kết trường phủ (thuận truyền dương minh), không phải nghịch truyền.",
 wc:"Ho suyễn + đàm vàng là khí phần phế, không phải tâm bào.",
 wd:"Sốt thấp + mồ hôi + tứ chi mềm gợi ý âm hư, không phải nghịch truyền tâm bào."
},
// ===== CAT 3: BIỂU HIỆN LÂM SÀNG =====
{id:14,cat:"c3",lvl:0,
 q:"Bộ tứ triệu chứng đặc trưng của phong ôn giai đoạn sơ khởi (phế vệ biểu nhiệt) là:",
 A:"Sốt cao, không ố hàn, phiền khát dữ, mạch trầm hồng",
 B:"Sốt, ố phong hàn nhẹ, ho, miệng hơi khát",
 C:"Sốt cao, không mồ hôi, đau đầu nhiều, mạch phù khẩn",
 D:"Sốt, ố hàn nặng hơn sốt, không khát, mạch phù hoãn",
 ans:"B",
 exp:"\"Triệu chứng chủ yếu lúc mới phát là: Sốt. Hơi ố phong hàn. Ho. Miệng hơi khát. Rêu mỏng trắng. Mạch phù sắc.\" Đây là phế vệ biểu nhiệt chứng điển hình.",
 wa:"Không ố hàn và phiền khát dữ gợi ý lý nhiệt tích thịnh (xuân ôn), không phải sơ khởi phế vệ.",
 wc:"Không mồ hôi + đau đầu nhiều + mạch phù khẩn là biểu hàn thực (thương hàn), không phải phong ôn.",
 wd:"Ố hàn nặng hơn sốt + không khát + mạch phù hoãn là phong hàn cảm mạo, không phải phong ôn."
},
{id:15,cat:"c3",lvl:0,
 q:"Mạch đặc trưng trong giai đoạn phế vệ của phong ôn là:",
 A:"Mạch trầm trì",
 B:"Mạch phù sắc",
 C:"Mạch hồng đại",
 D:"Mạch tế vi",
 ans:"B",
 exp:"\"Mạch phù sắc đều là triệu chứng của phong nhiệt tập biểu.\" Phù = biểu chứng, sắc = nhiệt chứng. Kết hợp phù sắc xác nhận phong nhiệt tại biểu.",
 wa:"Trầm trì gợi ý lý hàn hoặc âm hư, ngược với phong nhiệt.",
 wc:"Hồng đại là tứ đại chứng dương minh (giai đoạn sau), không phải sơ khởi.",
 wd:"Tế vi gợi ý hư chứng hoặc tâm dương hư suy, không phải giai đoạn sơ khởi."
},
{id:16,cat:"c3",lvl:0,
 q:"Đặc điểm lưỡi đặc trưng trong phong ôn sơ khởi (tà tập phế vệ) là:",
 A:"Lưỡi nhợt, rêu trắng mà trơn",
 B:"Lưỡi đỏ thâm, rêu đen khô nứt",
 C:"Lưỡi đỏ hai rìa và chót lưỡi, rêu mỏng trắng",
 D:"Lưỡi đỏ toàn bộ, rêu vàng dày",
 ans:"C",
 exp:"\"Rêu lưỡi mỏng trắng, đỏ hai rìa và chót lưỡi, mạch phù sác đều là triệu chứng của phong nhiệt tập biểu.\" Lưỡi đỏ rìa là dấu hiệu nhiệt bắt đầu; rêu mỏng trắng vì bệnh còn nông.",
 wa:"Lưỡi nhợt rêu trắng trơn là biểu hàn hoặc dương hư, không phải phong nhiệt.",
 wb:"Lưỡi đỏ thâm rêu đen khô là lý nhiệt tích thịnh giai đoạn nặng, không phải sơ khởi.",
 wd:"Lưỡi đỏ toàn bộ rêu vàng dày là giai đoạn khí phần hoặc dinh phần, không phải phế vệ sơ khởi."
},
{id:17,cat:"c3",lvl:1,
 q:"Tại sao ở giai đoạn sơ khởi phong ôn, miệng chỉ \"hơi khát\" chứ không khát dữ?",
 A:"Bệnh mới khởi, phong nhiệt chỉ bắt đầu thương tân dịch, chưa tổn thương nhiều",
 B:"Bệnh nhân uống đủ nước nên không khát nhiều",
 C:"Vị khí còn mạnh bảo vệ được tân dịch hoàn toàn",
 D:"Phế âm còn đủ để cân bằng tất cả nhiệt tà",
 ans:"A",
 exp:"\"Phong nhiệt chi tà dễ thương tân dịch, nhưng bệnh chỉ là khởi đầu nên tân dịch ít bị tổn thương cho nên miệng chỉ hơi khát.\" Đây là điểm phân biệt với xuân ôn (phiền khát dữ ngay từ đầu).",
 wb:"Lý do bệnh lý không phải sinh hoạt bệnh nhân.",
 wc:"Vị khí còn mạnh là đúng nhưng không phải lý do chính xác từ giáo trình.",
 wd:"Phế âm không liên quan trực tiếp đến mức độ khát."
},
{id:18,cat:"c3",lvl:1,
 q:"\"Tứ đại chủ chứng\" của dương minh nhiệt tích gồm:",
 A:"Sốt cao + ố hàn + ho + khát nhẹ",
 B:"Tráng nhiệt + hạn đại xuất + phiền khát muốn uống lạnh + mạch đại",
 C:"Triều nhiệt + táo bón + bụng đau + chiêm ngữ",
 D:"Sốt + thần hôn + tứ chi lạnh + mạch tế",
 ans:"B",
 exp:"\"Tráng nhiệt, hạn đại xuất, khát muốn uống, mạch đại, là 'Tứ đại chủ chứng' của dương minh nhiệt tích và cũng là điểm chính trong biện chứng.\" Dùng Bạch hồ thang.",
 wa:"Ố hàn và khát nhẹ là phế vệ sơ khởi, không phải dương minh.",
 wc:"Triều nhiệt + táo bón là nhiệt kết trường phủ (dùng Thừa khí thang), một thể riêng trong dương minh.",
 wd:"Thần hôn + tứ chi lạnh là nghịch truyền tâm bào, không phải dương minh nhiệt tích."
},
{id:19,cat:"c3",lvl:2,
 q:"Hiện tượng \"nhiệt thâm quyết diệp thâm\" trong phong ôn có nghĩa là:",
 A:"Sốt càng cao thì mồ hôi càng ra nhiều",
 B:"Tà nhiệt truyền vào càng sâu thì tứ chi quyết lạnh càng nhiều",
 C:"Nhiệt độ càng cao thì co giật càng mạnh",
 D:"Bệnh kéo dài thì âm dịch càng hao tổn",
 ans:"B",
 exp:"\"Trường hợp nhiệt bề nóng thì tứ chi lạnh ít, nhiệt bề càng nặng thì tứ chi lạnh càng nhiều điều này gọi là 'nhiệt thâm quyết diệp thâm, nhiệt vi quyết diệp vi'.\" Đây là điểm phân biệt với hàn quyết.",
 wa:"Mồ hôi ra nhiều là do lý nhiệt bức tân, không phải ý nghĩa câu này.",
 wc:"Co giật liên quan đến nhiệt cực động phong, khác với quyết lạnh tứ chi.",
 wd:"Âm dịch hao tổn theo thời gian là đúng nhưng không phải ý nghĩa câu trích dẫn này."
},
{id:20,cat:"c3",lvl:1,
 q:"Đặc điểm lưỡi đặc trưng khi nghịch truyền tâm bào trong phong ôn là:",
 A:"Lưỡi nhợt, rêu trắng mỏng",
 B:"Lưỡi run, màu lưỡi tươi bóng",
 C:"Lưỡi vàng rêu nê (dày nhớt)",
 D:"Lưỡi đỏ thâm, rêu xám đen nứt",
 ans:"B",
 exp:"\"Tâm bào nhiệt thịnh dinh âm hao tổn, miếu khiếu của tâm không thông nên lưỡi run nhưng màu sắc lưỡi vẫn tươi bóng.\" Lưỡi run (run giật) do tâm bào nhiệt, màu tươi bóng vì dinh âm chưa kiệt.",
 wa:"Lưỡi nhợt rêu trắng là hư hàn, ngược với tâm bào nhiệt thịnh.",
 wc:"Lưỡi vàng rêu nê là thấp nhiệt, không phải tâm bào.",
 wd:"Rêu xám đen nứt là lý nhiệt tân dịch cực kiệt (nhiệt kết trường phủ nặng), không phải đặc trưng tâm bào."
},
// ===== CAT 4: CHẨN ĐOÁN XÁC ĐỊNH =====
{id:21,cat:"c4",lvl:1,
 q:"Căn cứ chính để chẩn đoán xác định phong ôn gồm các yếu tố nào?",
 A:"Mùa thu-đông, sốt cao đột ngột, lý nhiệt tích thịnh từ đầu",
 B:"Xuất hiện mùa đông-xuân; sơ khởi phế vệ biểu nhiệt chứng; truyền biến từ phế vệ → khí phần/tâm bào; hậu kỳ phế vị âm thương",
 C:"Bốn mùa, sốt nhẹ, ít truyền biến, khỏi trong vài ngày",
 D:"Mùa xuân-hạ, phục tà nội phát, lý nhiệt ngay từ đầu, hậu kỳ can thận âm thương",
 ans:"B",
 exp:"Ba căn cứ chẩn đoán: (1) Mùa đông xuân; (2) Phát bệnh nhanh, sơ khởi phế vệ biểu nhiệt; (3) Truyền biến từ phế vệ → khí phần → dương minh hoặc nghịch truyền tâm bào; hậu kỳ phế vị âm thương.",
 wa:"Mùa thu và lý nhiệt ngay từ đầu không đúng với phong ôn.",
 wc:"Ít truyền biến và khỏi nhanh là cảm mạo, không phải phong ôn.",
 wd:"Phục tà nội phát và can thận âm thương hậu kỳ là của xuân ôn, không phải phong ôn."
},
{id:22,cat:"c4",lvl:1,
 q:"Khi xét nghiệm máu trong phong ôn thấy bạch cầu tăng cao, trung tính tăng nhiều, điều này gợi ý:",
 A:"Nhiễm virus",
 B:"Dị ứng",
 C:"Nhiễm vi khuẩn",
 D:"Ký sinh trùng xâm nhập",
 ans:"C",
 exp:"\"Viêm phổi thùy... bạch cầu tăng cao, tế bào trung tính tăng nhiều thì thuộc viêm do vi trùng.\" Ngược lại, nếu bình thường hoặc hơi thấp có thể là virus gây nhiễm.",
 wa:"Virus thường gây BC bình thường hoặc hơi thấp (lymphocyte tăng).",
 wb:"Dị ứng gây tăng bạch cầu ái toan, không phải trung tính.",
 wd:"Ký sinh trùng gây tăng bạch cầu ái toan là chủ yếu."
},
{id:23,cat:"c4",lvl:1,
 q:"Đặc điểm hậu kỳ đặc thù của phong ôn, phân biệt với các ôn bệnh khác là:",
 A:"Can thận âm thương",
 B:"Tỳ vị khí hư",
 C:"Phế vị âm thương",
 D:"Thận dương hư suy",
 ans:"C",
 exp:"\"Bệnh vào giai đoạn sau sẽ xuất hiện triệu chứng phế vị âm thương.\" Phong ôn do phong nhiệt thương phế trực tiếp nên hậu kỳ ảnh hưởng phế vị âm. Khác xuân ôn hậu kỳ can thận âm thương.",
 wa:"Can thận âm thương là hậu kỳ của xuân ôn, không phải phong ôn.",
 wb:"Tỳ vị khí hư không phải đặc trưng hậu kỳ phong ôn.",
 wd:"Thận dương hư không liên quan đến bệnh cơ phong ôn."
},
// ===== CAT 5: CHẨN ĐOÁN PHÂN BIỆT =====
{id:24,cat:"c5",lvl:1,
 q:"Điểm phân biệt cơ bản nhất giữa phong ôn và xuân ôn về cơ chế sinh bệnh là:",
 A:"Phong ôn do phục tà; xuân ôn do tân cảm",
 B:"Phong ôn do tân cảm phong nhiệt (cảm ngay phát ngay); xuân ôn do phục tà nội phát (đông tàng xuân phát)",
 C:"Cả hai đều do tân cảm phong nhiệt, chỉ khác mùa phát bệnh",
 D:"Phong ôn do hàn tà hóa nhiệt; xuân ôn do nhiệt tà trực tiếp xâm nhập",
 ans:"B",
 exp:"Phong ôn = tân cảm (cảm tà lập tức phát bệnh). Xuân ôn = phục tà (\"Đông thương ư hàn, xuân tất ôn bệnh\" — Nội Kinh). Sự khác biệt này dẫn đến khác nhau về sơ khởi bệnh vị và mức độ nặng nhẹ.",
 wa:"Ngược lại: phong ôn tân cảm, xuân ôn phục tà.",
 wc:"Chúng khác nhau ở cơ chế tân cảm/phục tà, không chỉ khác mùa.",
 wd:"Phong ôn không phải do hàn tà hóa nhiệt."
},
{id:25,cat:"c5",lvl:1,
 q:"Điểm khác biệt sơ khởi bệnh vị giữa phong ôn và xuân ôn là:",
 A:"Phong ôn: sơ khởi dinh phần; xuân ôn: sơ khởi phế vệ",
 B:"Phong ôn: sơ khởi phế vệ; xuân ôn: sơ khởi khí phần hoặc dinh phần",
 C:"Cả hai đều sơ khởi phế vệ, chỉ khác mức độ nặng nhẹ triệu chứng",
 D:"Phong ôn: sơ khởi can thận; xuân ôn: sơ khởi tâm bào",
 ans:"B",
 exp:"\"Phong ôn sơ khởi bệnh vị tại phế vệ.\" \"Xuân ôn bệnh vị sơ khởi tại khí phần hoặc dinh phần bệnh tình nặng biến hóa nhanh.\" Sự khác biệt này có ý nghĩa điều trị lớn.",
 wa:"Ngược lại: phong ôn sơ khởi phế vệ, không phải dinh phần.",
 wc:"Sơ khởi bệnh vị khác nhau rõ ràng, không chỉ khác mức độ.",
 wd:"Can thận và tâm bào không phải bệnh vị sơ khởi của cả hai bệnh."
},
{id:26,cat:"c5",lvl:1,
 q:"Điểm khác biệt hậu kỳ giữa phong ôn và xuân ôn là:",
 A:"Phong ôn hậu kỳ can thận âm thương; xuân ôn hậu kỳ phế vị âm thương",
 B:"Phong ôn hậu kỳ phế vị âm thương; xuân ôn hậu kỳ can thận âm thương",
 C:"Cả hai đều là phế vị âm thương ở hậu kỳ",
 D:"Phong ôn không có giai đoạn hậu kỳ rõ ràng",
 ans:"B",
 exp:"Phong ôn trung tâm bệnh tại phế → hậu kỳ phế vị âm thương, dùng Sa sâm mạch đông thang. Xuân ôn do phục tà sâu, hậu kỳ can thận âm thương (hạ tiêu), dùng Phục mạch thang.",
 wa:"Ngược lại: phong ôn là phế vị, xuân ôn là can thận.",
 wc:"Chúng khác nhau rõ ràng ở hậu kỳ.",
 wd:"Phong ôn có giai đoạn hậu kỳ phế vị âm thương rõ ràng."
},
{id:27,cat:"c5",lvl:1,
 q:"Điểm phân biệt chính giữa cảm mạo phong nhiệt và phong ôn là:",
 A:"Cảm mạo phong nhiệt không có sốt",
 B:"Cảm mạo phong nhiệt bệnh nhẹ hơn, ngắn ngày, ít truyền biến; phong ôn bệnh nặng hơn, truyền biến nhanh",
 C:"Cảm mạo phong nhiệt có thể nghịch truyền tâm bào; phong ôn thì không",
 D:"Cảm mạo phong nhiệt chỉ gặp mùa hè; phong ôn chỉ gặp mùa đông",
 ans:"B",
 exp:"\"Phong nhiệt cảm mạo bệnh thường nhẹ nông... triệu chứng toàn thân không nặng... bệnh trình tương đối ngắn vài ngày là khỏi, rất ít truyền biến.\" Cả hai có cùng nguyên nhân phong nhiệt và sơ khởi phế vệ nhưng khác mức độ.",
 wa:"Cảm mạo phong nhiệt vẫn có sốt.",
 wc:"Nghịch truyền tâm bào là đặc điểm của phong ôn nặng, không phải cảm mạo.",
 wd:"Cả hai bệnh gặp ở mùa xuân-đông, không giới hạn như vậy."
},
{id:28,cat:"c5",lvl:1,
 q:"Triệu chứng nào đặc hiệu của sởi (ma chẩn) giúp phân biệt với phong ôn?",
 A:"Sốt cao kèm táo bón ngay từ đầu",
 B:"Mắt đỏ, sợ ánh sáng, chảy nhiều nước mắt nước mũi; phát ban sau 2-3 ngày",
 C:"Thần hôn ngay từ đầu bệnh",
 D:"Khạc ra mủ máu tanh hôi",
 ans:"B",
 exp:"\"Sởi xuất hiện hai mắt đỏ, sợ ánh sáng, hơi phù mi mắt, chảy nhiều nước mắt nước mũi, nghẹt mũi. Sau khi phát bệnh 2-3 ngày xuất hiện chẩn.\" Sởi thường gặp ở trẻ nhỏ, dễ thành dịch.",
 wa:"Táo bón ngay từ đầu là dương minh, không phải đặc trưng của sởi.",
 wc:"Thần hôn ngay từ đầu gợi ý xuân ôn hoặc phong ôn nặng, không phải đặc trưng sởi.",
 wd:"Khạc mủ máu tanh là đặc trưng phế ung, không phải sởi."
},
{id:29,cat:"c5",lvl:2,
 q:"Điểm phân biệt phế ung với phong ôn trong tuần đầu tiên là:",
 A:"Phế ung không có sốt; phong ôn luôn có sốt",
 B:"Phế ung có hàn chiến, sốt liên tục không hạ; phong ôn sốt thường lui khi điều trị đúng",
 C:"Phế ung chỉ có ho khan ngay từ đầu; phong ôn có đàm vàng đặc ngay từ đầu",
 D:"Phế ung chỉ gặp ở người già; phong ôn gặp mọi lứa tuổi",
 ans:"B",
 exp:"\"Phế ung sơ khởi xuất hiện triệu chứng rất rõ ràng thường là hàn chiến, sốt liên tục không hạ.\" Giáo trình cũng lưu ý: nếu sau 1 tuần sốt không lui hoặc lui rồi lại sốt cao → nghĩ đến phế ung.",
 wa:"Cả hai đều có sốt, đây không phải điểm phân biệt.",
 wc:"Phế ung sơ khởi giống phong ôn, khó phân biệt — không phải ho khan thuần túy ngay.",

// ===== RENDER =====
let score={done:0,correct:0};
let activeFilter="all";

function catInfo(id){return CATS.find(c=>c.id===id)||{name:"",icon:""};}
function lvlLabel(l){return["Cơ bản","Trung bình","Nâng cao"][l];}
function lvlClass(l){return["lvl-0","lvl-1","lvl-2"][l];}
function catBorder(cat){return"border-"+cat;}
function catHead(cat){return"cat-"+cat;}

function renderAll(){
  const groups={};
  CATS.forEach(c=>{groups[c.id]=[];});
  QS.forEach(q=>{if(activeFilter==="all"||activeFilter===q.cat)groups[q.cat].push(q);});

  const quiz=document.getElementById("quiz");
  quiz.innerHTML="";
  CATS.forEach(cat=>{
    const qs=groups[cat.id];
    if(!qs.length)return;
    const ci=catInfo(cat.id);
    const sec=document.createElement("div");
    sec.className="cat-section";
    sec.innerHTML=`<div class="cat-header ${catHead(cat.id)}">${ci.icon} ${ci.name} <span style="opacity:.7;font-weight:400;font-size:11px">(${qs.length} câu)</span></div>`;
    qs.forEach(q=>{
      sec.appendChild(makeCard(q));
    });
    quiz.appendChild(sec);
  });
}

function makeCard(q){
  const div=document.createElement("div");
  div.className=`q-card ${catBorder(q.cat)}`;
  div.id="q"+q.id;
  const opts=["A","B","C","D"];
  const optHtml=opts.map(l=>`<div class="opt-row" id="opt-${q.id}-${l}" onclick="selectOpt(${q.id},'${l}')"><span class="opt-letter">${l}</span><span class="opt-text">${q[l]}</span></div>`).join("");
  div.innerHTML=`
  <div class="q-head">
    <span class="q-num">Câu ${q.id}</span>
    <span class="q-stem">${q.q}</span>
    <div class="q-meta"><span class="lvl-tag ${lvlClass(q.lvl)}">${lvlLabel(q.lvl)}</span></div>
  </div>
  <div class="q-opts">${optHtml}</div>
  <button class="reveal-btn" id="btn-${q.id}" onclick="reveal(${q.id})">Xem đáp án</button>
  <div class="answer-block" id="ans-${q.id}">
    <div class="ans-correct">✅ Đáp án đúng: <span>${q.ans}. ${q[q.ans]}</span></div>
    <div class="exp-title">Giải thích</div>
    <div class="exp-text">${q.exp}</div>
    <div class="exp-title">Tại sao các đáp án khác sai</div>
    <div class="wrong-reasons">
      ${["A","B","C","D"].filter(l=>l!==q.ans).map(l=>`<div><b>${l}.</b> ${q["w"+l.toLowerCase()]||"Không phải đáp án tối ưu."}</div>`).join("")}
    </div>
  </div>`;
  return div;
}

function selectOpt(id,letter){
  const q=QS.find(x=>x.id===id);
  ["A","B","C","D"].forEach(l=>{
    const el=document.getElementById(`opt-${id}-${l}`);
    el.classList.remove("selected","correct","wrong");
  });
  const sel=document.getElementById(`opt-${id}-${letter}`);
  sel.classList.add("selected");
}

function reveal(id){
  const q=QS.find(x=>x.id===id);
  const ansBlock=document.getElementById("ans-"+id);
  const btn=document.getElementById("btn-"+id);
  const wasAnswered=ansBlock.classList.contains("show");
  if(wasAnswered)return;

  ansBlock.classList.add("show");
  btn.disabled=true;
  btn.textContent="Đã xem";

  // highlight options
  const sel=document.querySelector(`#q${id} .opt-row.selected`);
  const selLetter=sel?sel.querySelector(".opt-letter").textContent:null;
  ["A","B","C","D"].forEach(l=>{
    const el=document.getElementById(`opt-${id}-${l}`);
    if(l===q.ans)el.classList.add("correct");
    else if(l===selLetter)el.classList.add("wrong");
  });

  score.done++;
  if(selLetter===q.ans)score.correct++;
  updateStats();
}

function updateStats(){
  document.getElementById("s-done").textContent=score.done;
  document.getElementById("s-correct").textContent=score.correct;
  const pct=score.done?Math.round(score.correct/score.done*100):0;
  document.getElementById("s-pct").textContent=pct+"%";
  document.getElementById("prog").style.width=(score.done/50*100)+"%";
}

// Filter buttons
const fb=document.getElementById("filterBar");
const allBtn=document.createElement("button");
allBtn.className="filter-btn active";allBtn.textContent="Tất cả (50)";
allBtn.onclick=()=>{activeFilter="all";document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));allBtn.classList.add("active");renderAll();};
fb.appendChild(allBtn);
CATS.forEach(cat=>{
  const cnt=QS.filter(q=>q.cat===cat.id).length;
  const b=document.createElement("button");
  b.className="filter-btn";b.textContent=`${cat.icon} ${cat.name} (${cnt})`;
  b.onclick=()=>{activeFilter=cat.id;document.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");renderAll();};
  fb.appendChild(b);
});

renderAll();
</script>
