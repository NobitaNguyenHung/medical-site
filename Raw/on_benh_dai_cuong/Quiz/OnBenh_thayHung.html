let state = {};
let totalCorrect = 0, totalWrong = 0, totalDone = 0;
const TOTAL = 61;

function renderQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  QUESTIONS.forEach((section, si) => {
    const secDiv = document.createElement('div');
    secDiv.innerHTML = `<div class="section-header"><span class="section-badge">Phần ${si+1}</span><span class="section-title">${section.section}</span></div>`;
    container.appendChild(secDiv);
    section.questions.forEach(q => {
      const card = createQuestionCard(q);
      container.appendChild(card);
    });
  });
}

function createQuestionCard(q) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'card-' + q.id;
  const qState = state[q.id] || {selected: null, revealed: false};
  const isLocked = qState.revealed;

  card.innerHTML = `
    <div class="q-number">Câu ${q.id}</div>
    <div class="q-text">${q.text}</div>
    <div class="options" id="opts-${q.id}">
      ${q.options.map((opt, i) => {
        let cls = 'option-btn';
        if (isLocked) {
          cls += ' disabled';
          if (i === q.answer) cls += ' correct';
          else if (qState.selected === i) cls += ' wrong';
        } else if (qState.selected === i) {
          cls += ' selected';
        }
        return `<button class="${cls}" onclick="selectOption(${q.id}, ${i})" ${isLocked ? 'disabled' : ''}>
          <span class="option-key">${String.fromCharCode(65+i)}</span>
          <span>${opt}</span>
        </button>`;
      }).join('')}
    </div>
    <div class="actions">
      <button class="btn-check" id="btn-check-${q.id}" onclick="checkAnswer(${q.id})" ${(!isLocked && qState.selected === null) ? 'disabled' : (isLocked ? 'disabled' : '')}>Kiểm tra</button>
      <button class="btn-show" id="btn-show-${q.id}" onclick="showAnswer(${q.id})" ${isLocked ? 'disabled' : ''}>Xem đáp án</button>
    </div>
    <div class="result-chip ${isLocked ? (qState.selected === q.answer ? 'correct-chip show' : (qState.selected !== null ? 'wrong-chip show' : '')) : ''}" id="chip-${q.id}">
      ${isLocked ? (qState.selected === q.answer ? '✓ Đúng rồi!' : (qState.selected !== null ? '✗ Chưa đúng' : '')) : ''}
    </div>
    <div class="explanation ${isLocked ? 'show' : ''}" id="exp-${q.id}">${q.explanation}</div>
  `;
  return card;
}

function selectOption(qId, optIdx) {
  if (state[qId] && state[qId].revealed) return;
  if (!state[qId]) state[qId] = {selected: null, revealed: false};
  state[qId].selected = optIdx;
  const opts = document.querySelectorAll(`#opts-${qId} .option-btn`);
  opts.forEach((btn, i) => {
    btn.classList.remove('selected');
    if (i === optIdx) btn.classList.add('selected');
  });
  document.getElementById('btn-check-' + qId).disabled = false;
}

function checkAnswer(qId) {
  if (!state[qId] || state[qId].selected === null) return;
  const q = findQ(qId);
  const sel = state[qId].selected;
  const isCorrect = sel === q.answer;
  revealResult(qId, q, sel, isCorrect, true);
}

function showAnswer(qId) {
  const q = findQ(qId);
  const sel = state[qId] ? state[qId].selected : null;
  revealResult(qId, q, sel, sel === q.answer, false);
}

function revealResult(qId, q, sel, isCorrect, fromCheck) {
  if (state[qId] && state[qId].revealed) return;
  if (!state[qId]) state[qId] = {selected: null, revealed: false};
  const wasAnswered = state[qId].selected !== null;
  state[qId].revealed = true;

  const opts = document.querySelectorAll(`#opts-${qId} .option-btn`);
  opts.forEach((btn, i) => {
    btn.classList.add('disabled');
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (sel === i) btn.classList.add('wrong');
  });

  document.getElementById('btn-check-' + qId).disabled = true;
  document.getElementById('btn-show-' + qId).disabled = true;

  const chip = document.getElementById('chip-' + qId);
  if (sel !== null) {
    chip.className = 'result-chip ' + (isCorrect ? 'correct-chip' : 'wrong-chip') + ' show';
    chip.textContent = isCorrect ? '✓ Đúng rồi!' : '✗ Chưa đúng';
  }
  document.getElementById('exp-' + qId).classList.add('show');

  totalDone++;
  if (wasAnswered || fromCheck) {
    if (isCorrect) totalCorrect++;
    else if (sel !== null) totalWrong++;
  }
  updateStats();
}

function findQ(id) {
  for (const s of QUESTIONS) {
    const q = s.questions.find(q => q.id === id);
    if (q) return q;
  }
}

function updateStats() {
  document.getElementById('st-done').textContent = totalDone;
  document.getElementById('st-correct').textContent = totalCorrect;
  document.getElementById('st-wrong').textContent = totalWrong;
  document.getElementById('prog-label').textContent = `Tiến độ: ${totalDone} / ${TOTAL}`;
  document.getElementById('prog-fill').style.width = (totalDone / TOTAL * 100) + '%';
}

function resetAll() {
  state = {};
  totalCorrect = 0;
  totalWrong = 0;
  totalDone = 0;
  updateStats();
  renderQuiz();
}

renderQuiz();
</script>
